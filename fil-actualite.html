<script>
/* ── État du fil ── */
let feedMode = 'tous';
let feedCat  = '';
let feedPage = 1;
let currentUser = null;

/* ── Init ── */
document.addEventListener('DOMContentLoaded', async () => {
  // Récupérer l'utilisateur courant
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' }).then(r => r.json());
    if (r.user) {
      currentUser = r.user;
      Posts.init(currentUser.id);
      // Afficher bouton créer
      document.getElementById('btn-create-post').style.display = 'inline-flex';
      document.getElementById('posts-fab').style.display = 'flex';
      // Afficher le déclencheur inline
      Posts.renderTrigger('feed-create-trigger');
    } else {
      Posts.init(null);
    }
  } catch(e) {
    Posts.init(null);
  }

  // Filtres mode
  document.querySelectorAll('#feed-filters .posts-feed-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      feedMode = btn.dataset.mode;
      feedPage = 1;
      document.querySelectorAll('#feed-filters .posts-feed-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadFeed();
    });
  });

  // Filtres catégorie
  document.querySelectorAll('#cat-filters .posts-feed-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      feedCat = btn.dataset.cat;
      feedPage = 1;
      document.querySelectorAll('#cat-filters .posts-feed-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadFeed();
    });
  });

  // Hashtag depuis URL
  const urlParams = new URLSearchParams(location.search);
  const hashtag = urlParams.get('hashtag');
  if (hashtag) {
    document.querySelector('h2').textContent = `#${hashtag}`;
    document.querySelector('h2').nextElementSibling.textContent = `Publications avec le hashtag #${hashtag}`;
  }

  // Post unique depuis URL
  const postId = urlParams.get('post');
  if (postId) {
    loadSinglePost(postId);
  } else {
    loadFeed();
  }

  loadMeilleuresVentes();
});

/* ── Widget "🔥 Les meilleures ventes du moment" ── */
async function loadMeilleuresVentes() {
  const box = document.getElementById('meilleures-ventes-widget');
  if (!box) return;
  try {
    const r = await fetch('/api/fil/meilleures-ventes', { credentials: 'include' }).then(r => r.json());
    const produits = r.produits || [];
    if (!produits.length) { box.innerHTML = ''; return; }
    box.innerHTML = `
      <div style="font-weight:700;font-size:15px;margin-bottom:10px;">🔥 Les meilleures ventes du moment</div>
      <div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;">
        ${produits.map(p => {
          const loc = [p.vitrine_ville, p.vitrine_region, p.vitrine_pays].filter(Boolean).join(', ');
          return `<div style="flex:none;width:150px;background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;">
            ${p.photo ? `<img loading="lazy" src="${p.photo}" style="width:100%;height:100px;object-fit:cover;">` : `<div style="width:100%;height:100px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:24px;">🛍️</div>`}
            <div style="padding:8px;">
              <div style="font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.nom}</div>
              <div style="font-size:11px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.initiative_nom||''}</div>
              ${loc ? `<div style="font-size:10.5px;color:#94a3b8;">📍 ${loc}</div>` : ''}
              <div style="font-size:12.5px;font-weight:700;margin:4px 0;">${p.prix!=null ? Number(p.prix).toFixed(2)+' '+(p.devise||'EUR') : 'Prix sur demande'}</div>
              <button class="btn btn-sm btn-outline" style="width:100%;" onclick="voirVitrineDepuisFil(${p.initiative_id}, 'meilleure_vente', ${p.owner_user_id})">Voir la vitrine</button>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  } catch (e) { box.innerHTML = ''; }
}

/* ── Charger le fil ── */
async function loadFeed() {
  const container = document.getElementById('feed-list');
  container.innerHTML = `<div style="text-align:center;padding:30px;color:#9ca3af;"><div style="font-size:1.8rem;margin-bottom:8px;">⏳</div><p>Chargement…</p></div>`;

  try {
    const params = new URLSearchParams({ mode: feedMode, page: feedPage, limit: 15 });
    if (feedCat) params.set('categorie', feedCat);

    const urlParams = new URLSearchParams(location.search);
    const hashtag = urlParams.get('hashtag');
    if (hashtag) params.set('hashtag', hashtag);

    const r = await fetch(`/api/fil?${params}`, { credentials: 'include' }).then(r => r.json());
    const posts = r.posts || [];

    if (!posts.length) {
      container.innerHTML = `<div style="text-align:center;padding:40px;color:#9ca3af;">
        <div style="font-size:2.5rem;margin-bottom:12px;">📭</div>
        <p style="font-size:1rem;font-weight:600;margin-bottom:4px;">Aucune publication</p>
        <p style="font-size:.88rem;">${feedMode === 'suivis' ? 'Suivez des personnes et des initiatives pour voir leurs publications.' : 'Soyez le premier à partager quelque chose !'}</p>
        ${currentUser ? '<button class="btn-primary" onclick="Posts.openModal()" style="margin-top:12px;">✍️ Créer un post</button>' : ''}
      </div>`;
      document.getElementById('feed-pagination').innerHTML = '';
      return;
    }

    Posts.renderFeed(posts, 'feed-list', { currentUserId: currentUser?.id });
    renderPagination(r.page, r.pages, r.total);
  } catch(e) {
    container.innerHTML = `<div style="text-align:center;padding:30px;color:#dc2626;"><p>Erreur de chargement. <button onclick="loadFeed()" class="btn-secondary" style="margin-left:8px;">Réessayer</button></p></div>`;
  }
}

/* ── Post unique ── */
async function loadSinglePost(postId) {
  try {
    const r = await fetch(`/api/fil/${postId}`, { credentials: 'include' }).then(r => r.json());
    if (r.post) {
      document.getElementById('feed-list').innerHTML = Posts.renderPostCard(r.post, { currentUserId: currentUser?.id });
      document.getElementById('feed-filters').style.display = 'none';
      document.getElementById('cat-filters').style.display = 'none';
      document.getElementById('feed-pagination').innerHTML = `<button class="btn-secondary" onclick="history.back()">← Retour au fil</button>`;
    }
  } catch(e) { loadFeed(); }
}

/* ── Pagination ── */
function renderPagination(page, pages, total) {
  const el = document.getElementById('feed-pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  let html = `<div style="display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;">`;
  if (page > 1) html += `<button class="btn-secondary btn-sm" onclick="changePage(${page-1})">← Précédent</button>`;
  html += `<span style="color:#6b7280;font-size:.88rem;">Page ${page} / ${pages}</span>`;
  if (page < pages) html += `<button class="btn-secondary btn-sm" onclick="changePage(${page+1})">Suivant →</button>`;
  html += `</div>`;
  el.innerHTML = html;
}

function changePage(p) {
  feedPage = p;
  loadFeed();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Exposer loadFeed pour Posts.js ── */
window.loadFeed = loadFeed;
window.PostsFeed = { refresh: loadFeed };
</script>
