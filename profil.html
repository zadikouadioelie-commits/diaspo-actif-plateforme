<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diaspo'Actif — Profil</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="/assets/responsive.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="assets/logo.svg">
<style>
/* ===== VARIABLES THÈME (modifiées dynamiquement) ===== */
:root {
  --tp:        #1565C0;
  --tp-light:  #E3F2FD;
  --tp-dark:   #0D47A1;
  --tp-banner: linear-gradient(135deg,#0D47A1 0%,#1976D2 100%);
}

/* ===== BANNIÈRE ===== */
.p-banner {
  width:100%; height:200px;
  background: var(--tp-banner);
  position:relative; overflow:hidden;
  cursor:pointer;
}
.p-banner img { width:100%; height:100%; object-fit:cover; display:block; }
.p-banner-edit {
  position:absolute; bottom:10px; right:12px;
  background:rgba(0,0,0,.45); color:#fff; border:none; border-radius:6px;
  padding:5px 12px; font-size:12px; cursor:pointer; display:none;
}
.is-own .p-banner-edit { display:block; }
.banner-back-btn {
  position:absolute; top:12px; left:14px; z-index:10;
  background:rgba(0,0,0,.45); color:#fff; text-decoration:none;
  border-radius:8px; padding:5px 13px; font-size:13px; font-weight:600;
  backdrop-filter:blur(4px); transition:background .15s;
}
.banner-back-btn:hover { background:rgba(0,0,0,.65); color:#fff; }

/* ===== CARTE PROFIL ===== */
.p-card {
  background:#fff; border:1px solid var(--border);
  border-radius:12px; margin-bottom:14px;
  padding:0 24px 20px;
}
.p-card-top {
  display:flex; align-items:flex-end;
  justify-content:space-between; flex-wrap:wrap; gap:10px;
}
.p-avatar-wrap { position:relative; margin-top:-52px; }
.p-avatar {
  width:104px; height:104px; border-radius:50%;
  border:4px solid #fff; background:var(--tp);
  display:flex; align-items:center; justify-content:center;
  font-size:34px; font-weight:800; color:#fff;
  overflow:hidden; box-shadow:0 2px 14px rgba(0,0,0,.18);
  position:relative; cursor:default;
}
.p-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.p-avatar-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,.4); border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:22px;
  opacity:0; transition:opacity .2s; cursor:pointer;
}
.is-own .p-avatar:hover .p-avatar-overlay { opacity:1; }
.is-own .p-avatar { cursor:pointer; }
.p-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding-bottom:6px; }
.btn-follow {
  height:36px; padding:0 20px; border-radius:8px; font-size:13px; font-weight:700;
  cursor:pointer; border:none; background:var(--tp); color:#fff; transition:background .2s;
}
.btn-follow:hover { background:var(--tp-dark); }
.btn-follow.following { background:#fff; color:var(--tp); border:1.5px solid var(--tp); }
.btn-follow.following:hover { background:#fee2e2; border-color:#dc2626; color:#dc2626; }
.btn-msg {
  height:36px; padding:0 16px; border-radius:8px; font-size:13px; font-weight:600;
  cursor:pointer; background:#fff; border:1.5px solid var(--border); color:var(--text);
  text-decoration:none; display:flex; align-items:center;
}
.btn-msg:hover { border-color:var(--tp); color:var(--tp); }

/* Identité */
.p-name { font-size:22px; font-weight:800; color:#0D1B2A; margin:14px 0 3px; }
.p-titre { font-size:14px; color:var(--muted); margin:0 0 5px; }
.p-loc { font-size:13px; color:var(--muted); margin:0 0 10px; }
.p-bio { font-size:14px; color:var(--text); line-height:1.65; margin:0 0 14px; white-space:pre-wrap; }

/* À propos */
.apropos-block { margin:14px 0; background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:16px 18px; position:relative; }
.apropos-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.apropos-title { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
.apropos-edit-btn { background:none; border:none; cursor:pointer; font-size:13px; color:var(--muted); padding:2px 6px; border-radius:6px; transition:background .15s; }
.apropos-edit-btn:hover { background:var(--bg); color:var(--accent); }
.apropos-text { font-size:14px; color:var(--text); line-height:1.7; white-space:pre-wrap; overflow:hidden; transition:max-height .3s ease; }
.apropos-text.collapsed { max-height:72px; }
.apropos-more-btn { background:none; border:none; cursor:pointer; font-size:12px; font-weight:700; color:var(--accent); padding:6px 0 0; display:block; }
.apropos-add-btn { background:none; border:1.5px dashed var(--border); border-radius:14px; width:100%; padding:14px; font-size:13px; color:var(--muted); cursor:pointer; text-align:center; margin:14px 0; transition:border-color .15s, color .15s; }
.apropos-add-btn:hover { border-color:var(--accent); color:var(--accent); }
.apropos-editor { margin-top:10px; }
.apropos-editor textarea { width:100%; box-sizing:border-box; border:1.5px solid var(--border); border-radius:8px; padding:10px 12px; font-size:14px; line-height:1.65; resize:vertical; min-height:100px; background:var(--bg); color:var(--fg); font-family:inherit; }
.apropos-editor textarea:focus { outline:none; border-color:var(--accent); }
.apropos-editor-actions { display:flex; gap:8px; margin-top:8px; justify-content:flex-end; }
.apropos-save-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:7px 18px; font-size:13px; font-weight:700; cursor:pointer; }
.apropos-cancel-btn { background:none; border:1.5px solid var(--border); border-radius:8px; padding:7px 14px; font-size:13px; cursor:pointer; color:var(--muted); }
.p-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.p-tag {
  background:var(--tp-light); color:var(--tp); border:1px solid var(--tp);
  border-radius:99px; padding:3px 12px; font-size:12px; font-weight:600;
}

/* Stats */
.p-stats {
  display:flex; gap:0; flex-wrap:wrap;
  border-top:1px solid var(--border); padding-top:14px; margin-top:2px;
}
.p-stat {
  padding:0 20px 0 0; margin-right:20px;
  border-right:1px solid var(--border); cursor:pointer;
}
.p-stat:last-child { border-right:none; }
.p-stat .n { font-size:17px; font-weight:800; color:var(--tp); }
.p-stat .l { font-size:11px; color:var(--muted); margin-top:1px; }

/* ===== SÉLECTEUR DE THÈME ===== */
.theme-row {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:12px 0; border-bottom:1px solid var(--border); margin-bottom:2px;
}
.theme-row span { font-size:12px; font-weight:700; color:var(--muted); }
.theme-swatch {
  width:26px; height:26px; border-radius:50%; cursor:pointer;
  border:3px solid transparent; transition:all .18s;
  box-shadow:0 1px 5px rgba(0,0,0,.22);
}
.theme-swatch.active { border-color:#0D1B2A; transform:scale(1.2); }

/* ===== SECTIONS ===== */
.p-section {
  background:#fff; border:1px solid var(--border);
  border-radius:12px; padding:20px 24px; margin-bottom:14px;
}
.p-sec-hd {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
}
.p-sec-hd h3 { margin:0; font-size:16px; font-weight:800; color:#0D1B2A; }
.p-sec-actions { display:flex; gap:6px; }
.btn-ico {
  background:none; border:1px solid var(--border); border-radius:6px;
  padding:5px 11px; cursor:pointer; font-size:12px; color:var(--muted);
  transition:all .18s; white-space:nowrap;
}
.btn-ico:hover { background:var(--tp-light); color:var(--tp); border-color:var(--tp); }

/* Expériences */
.exp-list { display:flex; flex-direction:column; gap:0; }
.exp-item {
  display:flex; gap:14px; padding:14px 0;
  border-bottom:1px solid var(--border);
}
.exp-item:last-child { border-bottom:none; padding-bottom:0; }
.exp-logo {
  width:46px; height:46px; flex-shrink:0; border-radius:8px;
  background:var(--tp-light); display:flex; align-items:center;
  justify-content:center; font-size:15px; font-weight:800; color:var(--tp);
}
.exp-body { flex:1; min-width:0; }
.exp-body h4 { margin:0 0 2px; font-size:14px; font-weight:700; color:#0D1B2A; }
.exp-company { font-size:13px; color:var(--text); margin:0 0 2px; }
.exp-dates { font-size:12px; color:var(--muted); margin:0 0 5px; }
.exp-desc { font-size:13px; color:var(--muted); margin:0; line-height:1.55; }
.exp-btns { display:flex; gap:5px; margin-top:6px; }
.btn-sm-ghost {
  background:none; border:1px solid var(--border); border-radius:5px;
  padding:3px 9px; font-size:11px; cursor:pointer; color:var(--muted);
}
.btn-sm-ghost:hover { border-color:var(--tp); color:var(--tp); }
.btn-sm-ghost.danger:hover { border-color:#dc2626; color:#dc2626; }

/* Compétences */
.skills-wrap { display:flex; flex-wrap:wrap; gap:8px; }
.skill-pill {
  display:flex; align-items:center; gap:6px;
  background:var(--tp-light); color:var(--tp);
  border:1px solid var(--tp); border-radius:99px;
  padding:5px 14px; font-size:13px; font-weight:600;
}
.skill-del { cursor:pointer; font-size:11px; opacity:.65; }
.skill-del:hover { opacity:1; }
.skill-add-row { display:flex; gap:8px; margin-top:12px; align-items:center; }
.skill-add-row input {
  flex:1; height:36px; border:1px solid var(--border); border-radius:6px;
  padding:0 12px; font-size:13px; font-family:inherit;
}

/* Publications */
.pub-item { padding:12px 0; border-bottom:1px solid var(--border); }
.pub-item:last-child { border-bottom:none; padding-bottom:0; }
.pub-cat { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--tp); margin-bottom:4px; }
.pub-text { font-size:14px; color:var(--text); line-height:1.55; margin:0 0 4px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.pub-date { font-size:11px; color:var(--muted); }

/* Grilles abonnements */
.follow-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}
.fc {
  border:1px solid var(--border); border-radius:10px;
  padding:14px 10px; text-align:center;
  text-decoration:none; color:inherit; transition:box-shadow .2s;
  display:block;
}
.fc:hover { box-shadow:0 4px 14px rgba(0,0,0,.1); }
.fc-av {
  width:50px; height:50px; border-radius:50%; margin:0 auto 8px;
  background:var(--tp-light); display:flex; align-items:center;
  justify-content:center; font-size:17px; font-weight:800; color:var(--tp); overflow:hidden;
}
.fc-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.fc-nom { font-size:12px; font-weight:700; color:#0D1B2A; margin-bottom:2px; line-height:1.3; }
.fc-sub { font-size:11px; color:var(--muted); }
.init-fc {
  border:1px solid var(--border); border-radius:10px; padding:12px 14px;
  text-decoration:none; color:inherit; display:flex; align-items:center;
  gap:10px; transition:box-shadow .2s;
}
.init-fc:hover { box-shadow:0 4px 14px rgba(0,0,0,.1); }
.init-fc-av {
  width:40px; height:40px; border-radius:8px; flex-shrink:0;
  background:var(--tp-light); display:flex; align-items:center;
  justify-content:center; font-size:13px; font-weight:800; color:var(--tp);
}
.init-fc-body .init-fc-nom { font-size:13px; font-weight:700; color:#0D1B2A; }
.init-fc-body .init-fc-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.init-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }

/* ===== FORMULAIRES ÉDITION ===== */
.p-edit-form { background:#F8FAFF; border:1px solid var(--border); border-radius:8px; padding:16px; margin-top:12px; }
.fg { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.fg.full { grid-template-columns:1fr; }
.fg label { font-size:11px; font-weight:700; color:var(--muted); display:block; margin-bottom:3px; text-transform:uppercase; letter-spacing:.04em; }
.fg input, .fg textarea, .fg select {
  width:100%; box-sizing:border-box; height:38px;
  border:1px solid var(--border); border-radius:6px;
  padding:0 12px; font-size:13px; font-family:inherit;
}
.fg textarea { height:80px; padding:10px 12px; resize:vertical; }
.edit-btns { display:flex; gap:8px; margin-top:12px; }
.btn-save {
  background:var(--tp); color:#fff; border:none; border-radius:7px;
  padding:8px 20px; font-size:13px; font-weight:700; cursor:pointer;
}
.btn-save:hover { background:var(--tp-dark); }
.btn-cancel {
  background:#fff; border:1px solid var(--border); border-radius:7px;
  padding:8px 16px; font-size:13px; cursor:pointer;
}
.e-msg { font-size:12px; margin-top:6px; display:none; }
.e-msg.err { color:#dc2626; } .e-msg.ok { color:#16a34a; }

/* ===== EMPTY STATE ===== */
.empty-p { text-align:center; padding:20px 0; color:var(--muted); font-size:13px; }
.empty-p .ei { font-size:28px; margin-bottom:6px; }

/* ===== LAYOUT 2 COLONNES ===== */
.p-layout { display:flex; gap:14px; align-items:flex-start; }
.p-main   { flex:1; min-width:0; }
.p-side   { width:240px; flex-shrink:0; }
.p-side-sticky { position:sticky; top:14px; }

/* ===== PUBLICATIONS RICHES ===== */
.post-card {
  background:#fff; border:1px solid var(--border); border-radius:12px;
  margin-bottom:12px; overflow:hidden;
}
.post-header { display:flex; align-items:center; gap:10px; padding:14px 16px 8px; }
.post-av {
  width:40px; height:40px; border-radius:50%; flex-shrink:0;
  background:var(--tp-light); display:flex; align-items:center;
  justify-content:center; font-size:14px; font-weight:800; color:var(--tp); overflow:hidden;
}
.post-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.post-meta { flex:1; min-width:0; }
.post-meta .pm-nom { font-size:13px; font-weight:700; color:#0D1B2A; }
.post-meta .pm-titre { font-size:11px; color:var(--muted); }
.post-meta .pm-date { font-size:11px; color:var(--muted); }
.post-cat-pill {
  background:var(--tp-light); color:var(--tp); border-radius:99px;
  padding:2px 10px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
}
.post-body { padding:0 16px 10px; }
.post-text { font-size:14px; color:var(--text); line-height:1.65; margin:0 0 10px; white-space:pre-wrap; }
.post-img {
  width:100%; max-height:320px; object-fit:cover;
  border-radius:8px; display:block; margin-bottom:10px;
}
.post-link-card {
  border:1px solid var(--border); border-radius:8px; overflow:hidden;
  margin-bottom:10px; text-decoration:none; display:flex; color:inherit;
}
.post-link-card img { width:100px; height:80px; object-fit:cover; flex-shrink:0; }
.post-link-body { padding:10px 12px; flex:1; min-width:0; }
.post-link-body .plb-src { font-size:10px; color:var(--muted); text-transform:uppercase; font-weight:700; }
.post-link-body .plb-title { font-size:13px; font-weight:700; color:#0D1B2A; line-height:1.4; }
.post-shared {
  border:1px solid var(--border); border-radius:8px; padding:12px 14px;
  margin-bottom:10px; background:#F8FAFF;
}
.post-shared .ps-nom { font-size:12px; font-weight:700; color:var(--tp); margin-bottom:4px; }
.post-shared .ps-text { font-size:13px; color:var(--text); }
.post-actions {
  display:flex; gap:0; border-top:1px solid var(--border); padding:4px 8px;
}
.post-btn {
  flex:1; display:flex; align-items:center; justify-content:center; gap:5px;
  padding:8px 4px; font-size:12px; font-weight:600; color:var(--muted);
  background:none; border:none; border-radius:6px; cursor:pointer; transition:all .18s;
}
.post-btn:hover { background:var(--tp-light); color:var(--tp); }
.post-btn.liked { color:#dc2626; }
.post-stats { padding:0 16px 6px; font-size:11px; color:var(--muted); display:flex; gap:12px; }

/* ===== PUBLICITÉS ===== */
.ad-card {
  background:#fff; border:1px solid var(--border); border-radius:10px;
  overflow:hidden; margin-bottom:12px;
}
.ad-label {
  font-size:9px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted);
  padding:6px 12px 0; display:flex; align-items:center; gap:4px;
}
.ad-img { width:100%; height:110px; object-fit:cover; display:block; }
.ad-body { padding:10px 12px 14px; }
.ad-body h4 { margin:0 0 4px; font-size:13px; font-weight:800; color:#0D1B2A; line-height:1.35; }
.ad-body p  { margin:0 0 10px; font-size:11.5px; color:var(--muted); line-height:1.5; }
.ad-btn {
  display:inline-block; background:var(--tp); color:#fff; border-radius:6px;
  padding:6px 14px; font-size:11px; font-weight:700; text-decoration:none; cursor:pointer;
  border:none;
}
.ad-btn:hover { background:var(--tp-dark); }
.ad-inline {
  background:linear-gradient(135deg,#F8FAFF,#EEF3FB);
  border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; margin-bottom:12px; display:flex; gap:14px; align-items:center;
}
.ad-inline-img { width:80px; height:80px; border-radius:8px; object-fit:cover; flex-shrink:0; }
.ad-inline-body h4 { margin:0 0 4px; font-size:13px; font-weight:800; color:#0D1B2A; }
.ad-inline-body p  { margin:0 0 8px; font-size:12px; color:var(--muted); }

/* SIDEBAR extras */
.side-card {
  background:#fff; border:1px solid var(--border); border-radius:10px;
  padding:14px; margin-bottom:12px;
}
.side-card h4 { margin:0 0 12px; font-size:13px; font-weight:800; color:#0D1B2A; }
.suggest-item { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.suggest-item:last-child { margin-bottom:0; }
.sug-av {
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  background:var(--tp-light); display:flex; align-items:center;
  justify-content:center; font-size:12px; font-weight:800; color:var(--tp); overflow:hidden;
}
.sug-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.sug-body { flex:1; min-width:0; }
.sug-body .sb-nom { font-size:12px; font-weight:700; color:#0D1B2A; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sug-body .sb-sub { font-size:11px; color:var(--muted); }
.btn-sug { background:none; border:1.5px solid var(--tp); color:var(--tp); border-radius:99px; padding:3px 12px; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; }
.btn-sug:hover { background:var(--tp-light); }

/* ===== TABS ===== */
.p-tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:16px; background:#fff; border-radius:12px 12px 0 0; padding:0 4px; }
.p-tab-btn { padding:12px 18px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .18s; white-space:nowrap; }
.p-tab-btn:hover { color:var(--tp); }
.p-tab-btn.active { color:var(--tp); border-bottom-color:var(--tp); }
.p-tab-panel { display:none; }
.p-tab-panel.active { display:block; }

/* ===== ACTIVITÉ FEED ===== */
.act-feed-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.act-filter-btn { padding:5px 12px; border-radius:99px; font-size:12px; font-weight:600; border:1.5px solid var(--border); cursor:pointer; background:#fff; color:var(--muted); transition:all .15s; }
.act-filter-btn.active, .act-filter-btn:hover { background:var(--tp-light); color:var(--tp); border-color:var(--tp); }
.act-search-row { display:flex; gap:8px; margin-bottom:14px; }
.act-search-row input { flex:1; height:36px; border:1px solid var(--border); border-radius:8px; padding:0 12px; font-size:13px; font-family:inherit; }
.act-item { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.act-item:last-child { border-bottom:none; }
.act-icon { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; background:var(--tp-light); }
.act-body { flex:1; }
.act-type { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--tp); margin-bottom:2px; }
.act-titre { font-size:13px; color:#0D1B2A; line-height:1.4; }
.act-date { font-size:11px; color:var(--muted); margin-top:3px; }

<script>
/* ===================================================
   PROFIL UTILISATEUR — logique complète
   =================================================== */

const THEMES = {
  ocean:  { primary:'#1565C0', dark:'#0D47A1', light:'#E3F2FD', banner:'linear-gradient(135deg,#0D47A1 0%,#1976D2 100%)', label:'Océan' },
  foret:  { primary:'#2E7D32', dark:'#1B5E20', light:'#E8F5E9', banner:'linear-gradient(135deg,#1B5E20 0%,#388E3C 100%)', label:'Forêt' },
  soleil: { primary:'#D84315', dark:'#BF360C', light:'#FBE9E7', banner:'linear-gradient(135deg,#BF360C 0%,#F4511E 100%)', label:'Soleil' },
  violet: { primary:'#6A1B9A', dark:'#4A148C', light:'#F3E5F5', banner:'linear-gradient(135deg,#4A148C 0%,#7B1FA2 100%)', label:'Violet' },
  terre:  { primary:'#5D4037', dark:'#3E2723', light:'#EFEBE9', banner:'linear-gradient(135deg,#3E2723 0%,#6D4C41 100%)', label:'Terre' },
  nuit:   { primary:'#1A237E', dark:'#0D1B2A', light:'#E8EAF6', banner:'linear-gradient(135deg,#0D1B2A 0%,#1A237E 100%)', label:'Nuit' },
};

const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

let profil = null;
let isOwn  = false;
let CU     = null; /* utilisateur connecté */

/* ---- init ---- */
async function init() {
  CU = await fetchCurrentUser();
  await applyAuthState();
  const backLink = document.getElementById('back-link');
  if (CU) backLink.href = ROLE_DASHBOARD[CU.role] || 'index.html';
  else     backLink.href = 'index.html';

  const uid = new URLSearchParams(location.search).get('id') || CU?.id;
  if (!uid) { window.location.href = 'login.html'; return; }

  try {
    const r = await api('GET', '/profil/' + uid);
    profil = r.profil;
    isOwn  = CU && Number(CU.id) === Number(profil.id);
    if (isOwn) document.getElementById('root-page').classList.add('is-own');
    applyTheme(profil.theme_couleur || 'ocean');
    // Charger les accréditations publiques
    try {
      const ra = await api('GET', '/accreditations/user/' + uid);
      profil._accreditations = (ra.accreditations||[]).map(a=>a.type);
    } catch(e) { profil._accreditations = []; }
    // Charger le badge association
    try {
      const rb = await api('GET', '/asso/badge/' + uid);
      profil._asso_badge = rb.badge || null;
    } catch(e) { profil._asso_badge = null; }
    render();
  } catch(e) {
    document.getElementById('p-sections').innerHTML =
      '<div class="p-section"><p style="color:red">Profil introuvable ou erreur serveur.</p></div>';
  }
}

/* ---- thème ---- */
function applyTheme(name) {
  const t = THEMES[name] || THEMES.ocean;
  const r = document.documentElement.style;
  r.setProperty('--tp',        t.primary);
  r.setProperty('--tp-dark',   t.dark);
  r.setProperty('--tp-light',  t.light);
  r.setProperty('--tp-banner', t.banner);
  document.getElementById('p-banner').style.background = t.banner;
  if (profil) profil.theme_couleur = name;
}

async function setTheme(name) {
  applyTheme(name);
  renderThemeSwatches(name);
  try { await api('PUT', '/profil', { theme_couleur: name }); } catch(e){}
}

function renderThemeSwatches(active) {
  const el = document.getElementById('theme-swatches');
  el.innerHTML = Object.entries(THEMES).map(([k,t]) =>
    `<button class="theme-swatch${k===active?' active':''}" style="background:${t.primary}" title="${t.label}" onclick="setTheme('${k}')"></button>`
  ).join('');
}

/* ---- bannière ---- */
function pickBannerFile() {
  if (!isOwn) return;
  document.getElementById('banner-file-input').click();
}

async function handleBannerFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('Image trop volumineuse (max 5 Mo).'); return; }
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      // Compress via canvas
      const compressed = await compressImage(ev.target.result, 1200, 400, 0.82);
      const up = await api('POST', '/upload', { data: compressed, nom: file.name });
      await api('PUT', '/profil', { banner_url: up.url });
      profil.banner_url = up.url;
      renderBanner();
    } catch(err) { alert('Erreur lors du chargement de la bannière.'); }
  };
  reader.readAsDataURL(file);
  input.value = '';
}

async function removeBanner() {
  if (!isOwn || !confirm('Supprimer la bannière personnalisée ?')) return;
  await api('PUT', '/profil', { banner_url: null });
  profil.banner_url = null;
  renderBanner();
}

function compressImage(dataUrl, maxW, maxH, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

function renderBanner() {
  const banner = document.getElementById('p-banner');
  const img = document.getElementById('banner-img');
  const delBtn = document.getElementById('banner-del-btn');
  if (profil.banner_url) {
    img.src = profil.banner_url;
    img.style.display = 'block';
    banner.style.background = 'none';
    if (delBtn) delBtn.style.display = 'flex';
  } else {
    img.style.display = 'none';
    const t = THEMES[profil.theme_couleur || 'ocean'];
    banner.style.background = t.banner;
    if (delBtn) delBtn.style.display = 'none';
  }
}

/* ---- avatar ---- */
function editAvatar() {
  if (!isOwn) return;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/jpeg,image/png,image/webp,image/gif';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const up = await api('POST', '/upload', { data: ev.target.result, nom: file.name });
        await api('PUT', '/profil', { photo_url: up.url });
        profil.photo_url = up.url;
        renderAvatar();
      } catch(err) { alert('Erreur lors du chargement de la photo.'); }
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(n) { return (n||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase(); }

function fmtDate(str) {
  if (!str) return '';
  const [y, m] = str.split('-');
  return (MOIS[parseInt(m,10)-1]||'') + ' ' + y;
}

/* ======================================================
   RENDER PRINCIPAL
   ====================================================== */
function render() {
  renderBanner();
  renderAvatar();
  renderIdentity();
  renderActions();
  if (isOwn) {
    document.getElementById('theme-row-wrap').style.display = 'block';
    renderThemeSwatches(profil.theme_couleur || 'ocean');
  }
  renderStats();
  renderSections();
}

function renderBanner() {
  const banner = document.getElementById('p-banner');
  const img = document.getElementById('banner-img');
  const delBtn = document.getElementById('banner-del-btn');
  const dlBtn  = document.getElementById('banner-dl-btn');
  if (profil.banner_url) {
    img.src = profil.banner_url; img.style.display = 'block';
    banner.style.background = 'none';
    if (delBtn) delBtn.style.display = 'flex';
    if (dlBtn)  dlBtn.style.display  = 'flex';
  } else {
    img.style.display = 'none';
    const t = THEMES[profil.theme_couleur || 'ocean'];
    banner.style.background = t ? t.banner : '';
    if (delBtn) delBtn.style.display = 'none';
    if (dlBtn)  dlBtn.style.display  = 'none';
  }
}

async function downloadBanner() {
  if (!profil.banner_url) return;
  try {
    const res = await fetch(profil.banner_url, { credentials: 'include' });
    const blob = await res.blob();
    const ext = blob.type.includes('png') ? 'png' : blob.type.includes('webp') ? 'webp' : 'jpg';
    const nom = [profil.prenom, profil.nom].filter(Boolean).join('-') || 'banniere';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `banniere-${nom}.${ext}`;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch(e) {
    /* fallback : ouvre dans un nouvel onglet */
    window.open(profil.banner_url, '_blank');
  }
}

function renderAvatar() {
  const av   = document.getElementById('p-avatar');
  const img  = document.getElementById('av-img');
  const ini  = document.getElementById('av-initials');
  const over = document.getElementById('av-overlay');
  if (profil.photo_url) {
    img.src = profil.photo_url; img.style.display = 'block';
    ini.style.display = 'none';
  } else {
    img.style.display = 'none';
    ini.style.display = '';
    ini.textContent = initials((profil.prenom||'')+' '+(profil.nom||''));
  }
  over.style.display = isOwn ? '' : 'none';
}

function renderIdentity() {
  const el = document.getElementById('p-identity');
  const nomComplet = [profil.prenom, profil.nom].filter(Boolean).join(' ') || profil.nom || 'Membre';
  const loc = [profil.ville, profil.pays].filter(Boolean).join(', ');
  const ci  = Array.isArray(profil.centres_interet) ? profil.centres_interet : [];

  let html = `<div class="p-name">${esc(nomComplet)}</div>`;
  if (profil.titre_pro) html += `<div class="p-titre">${esc(profil.titre_pro)}</div>`;
  else if (profil.situation_pro) html += `<div class="p-titre">${esc(profil.situation_pro.replace('_',' '))}</div>`;
  if (loc) html += `<div class="p-loc">📍 ${esc(loc)}</div>`;
  // Badge Partenaire Officiel
  if (profil.partenaire_officiel) {
    const po = profil.partenaire_officiel;
    html += `<div style="margin:8px 0 12px;display:flex;flex-wrap:wrap;align-items:center;gap:8px;">
      <a href="partenaires.html" class="badge-partenaire-officiel" title="Voir l'annuaire des Partenaires Officiels">🏅 Partenaire Officiel Diaspo'Actif</a>
      ${po.domaines_expertise.slice(0,2).map(d=>`<span style="background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;border-radius:99px;padding:2px 9px;font-size:11px;font-weight:600;">${esc(d)}</span>`).join('')}
    </div>
    ${isOwn ? `<div class="po-owner-actions" style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-secondary" style="font-size:12px;padding:5px 14px;" onclick="openEditFichePartenaire()">✏️ Modifier ma fiche partenaire</button>
      ${po.site_web ? `<a href="${esc(po.site_web)}" target="_blank" rel="noopener" style="font-size:12px;color:#2563eb;">🌐 ${esc(po.site_web)}</a>` : ''}
    </div>` : ''}`;
  }

  // Badge Deal Master
  if (profil.is_deal_master) {
    html += `<div style="margin:6px 0 14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px;">
      <a href="hall-of-fame.html" style="display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#fef3c7,#fffbeb);color:#b45309;border:1.5px solid #fde68a;border-radius:99px;padding:4px 14px;font-size:12px;font-weight:800;text-decoration:none;">
        ⭐ Deal Master Diaspo'Actif
      </a>
    </div>`;
  }

  // ── À propos ──
  html += `<div class="apropos-block" id="apropos-block">
    <div class="apropos-header">
      <span class="apropos-title">À propos</span>
      ${isOwn ? `<button class="apropos-edit-btn" onclick="openAproposEditor()" title="Modifier">✏️ Modifier</button>` : ''}
    </div>`;
  if (profil.bio) {
    const long = profil.bio.length > 220;
    html += `<div class="apropos-text${long?' collapsed':''}" id="apropos-text">${esc(profil.bio)}</div>
      ${long ? `<button class="apropos-more-btn" id="apropos-more" onclick="toggleApropos()">Lire la suite ▾</button>` : ''}`;
  } else if (isOwn) {
    html += `<button class="apropos-add-btn" onclick="openAproposEditor()" style="border:none;text-align:left;padding:4px 0;font-size:13px;color:var(--muted);background:none;cursor:pointer;">✏️ Ajoutez une présentation pour vous faire connaître…</button>`;
  } else {
    html += `<p style="font-size:13px;color:var(--muted);margin:0;font-style:italic;">Ce membre n'a pas encore ajouté de présentation.</p>`;
  }
  html += `</div>`;

  if (ci.length) html += `<div class="p-tags">${ci.map(c=>`<span class="p-tag">${esc(c)}</span>`).join('')}</div>`;

  const accreds = profil._accreditations || [];
  const assoBadge = profil._asso_badge;
  if (accreds.length || assoBadge) {
    html += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">`;
    if (accreds.includes('mobilisation_active'))
      html += `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;background:#fef3c7;color:#92400e;border:1px solid #f59e0b;">📢 Mobilisation Active</span>`;
    if (accreds.includes('createur_opportunites'))
      html += `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;background:#dbeafe;color:#1e40af;border:1px solid #3b82f6;">💼 Créateur d'Opportunités</span>`;
    if (assoBadge === 'accreditee')
      html += `<span title="Association officiellement accréditée par Diaspo'Actif — abonnement actif et vérifiée" style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;background:linear-gradient(90deg,#7c3aed,#5b21b6);color:#fff;border:1px solid #7c3aed;">🏅 Association Accréditée DA</span>`;
    else if (assoBadge === 'verifiee')
      html += `<span title="Association vérifiée par Diaspo'Actif" style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;background:#e0f2fe;color:#0369a1;border:1px solid #0891b2;">✅ Association Vérifiée DA</span>`;
    html += `</div>`;
  }

  if (isOwn) html += `<button class="btn-ico" style="margin-bottom:4px;" onclick="openEditIdentity()">✏️ Modifier</button>`;

  el.innerHTML = html;
}

async function saveFichePartenaire() {
  const split = s => s.split(',').map(x => x.trim()).filter(Boolean);
  try {
    await api('PUT', '/partenaires/moi', {
      description_complete: document.getElementById('po-desc').value.trim() || null,
      domaines_expertise:   split(document.getElementById('po-domaines').value),
      pays_intervention:    split(document.getElementById('po-pays').value),
      services:             split(document.getElementById('po-services').value),
      site_web:             document.getElementById('po-site').value.trim() || null,
    });
    const msg = document.getElementById('po-save-msg');
    if (msg) { msg.style.display = 'block'; setTimeout(() => document.getElementById('modal-fiche-po')?.remove(), 1500); }
    // rafraîchir les données du profil
    const data = await api('GET', `/profil/${profil.id}`);
    if (data.profil) { Object.assign(profil, data.profil); renderIdentity(); }
  } catch(e) { alert('Erreur lors de la sauvegarde.'); }
}

function toggleApropos() {
  const txt  = document.getElementById('apropos-text');
  const btn  = document.getElementById('apropos-more');
  if (!txt || !btn) return;
  const collapsed = txt.classList.toggle('collapsed');
  btn.textContent = collapsed ? 'Lire la suite ▾' : 'Réduire ▴';
}

function openAproposEditor() {
  const block = document.getElementById('apropos-block');
  // supprimer un éditeur déjà ouvert
  document.getElementById('apropos-editor-wrap')?.remove();
  const wrap = document.createElement('div');
  wrap.id = 'apropos-editor-wrap';
  wrap.className = 'apropos-editor';
  wrap.innerHTML = `
    <textarea id="apropos-ta" placeholder="Parlez de vous : votre parcours, vos projets, vos valeurs…" maxlength="2000">${esc(profil.bio||'')}</textarea>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
      <span style="font-size:11px;color:var(--muted)" id="apropos-counter">${(profil.bio||'').length}/2000</span>
      <div class="apropos-editor-actions" style="margin-top:0">
        <button class="apropos-cancel-btn" onclick="closeAproposEditor()">Annuler</button>
        <button class="apropos-save-btn" onclick="saveApropos()">💾 Enregistrer</button>
      </div>
    </div>`;
  // Insérer dans le bloc existant ou sous le bouton "Ajouter"
  const addBtn = document.querySelector('.apropos-add-btn');
  if (addBtn) { addBtn.insertAdjacentElement('afterend', wrap); }
  else if (block) { block.appendChild(wrap); }
  const ta = document.getElementById('apropos-ta');
  ta.addEventListener('input', () => { document.getElementById('apropos-counter').textContent = ta.value.length + '/2000'; });
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
}

function closeAproposEditor() {
  document.getElementById('apropos-editor-wrap')?.remove();
}

async function saveApropos() {
  const ta = document.getElementById('apropos-ta');
  if (!ta) return;
  const bio = ta.value.trim();
  try {
    await api('PUT', '/profil', { bio });
    profil.bio = bio;
    renderIdentity();
  } catch(e) {
    alert('Erreur lors de la sauvegarde.');
  }
}

function switchProfileTab(id) {
  document.querySelectorAll('.p-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.p-tab-panel').forEach(p => p.classList.toggle('active', p.id === 'ptab-'+id));
  const panel = document.getElementById('ptab-'+id);
  if (!panel || panel.dataset.loaded) return;
  panel.dataset.loaded = '1';
  if (id === 'activite') loadActiviteTab();
  if (id === 'publications') loadPublicationsTab();
  if (id === 'publicites') loadPublicitesTab();
  if (id === 'suivis') loadSuivisTab();
  if (id === 'abonnes') loadAbonnesTab();
  if (id === 'communs') loadCommunsTab();
}

/* ======================================================
   ONGLET — ACTIVITÉ
   ====================================================== */
const ACT_CATS = [
  { id:'all', label:'Tout' },
  { id:'publications', label:'Publications' },
  { id:'commentaires', label:'Commentaires' },
  { id:'evenements', label:'Événements' },
  { id:'accreditations', label:'Accréditations' },
];
const ACT_ICONS = { publication:'📝', commentaire:'💬', evenement:'📅', accreditation:'🏅', default:'⚡' };
let _actPage = 1, _actCat = 'all', _actQ = '';

async function loadActiviteTab(reset = true) {
  const panel = document.getElementById('ptab-activite');
  if (reset) { _actPage = 1; panel.innerHTML = buildActHeader(); }
  try {
    const r = await api('GET', `/profil/${profil.id}/activite?page=${_actPage}&categorie=${_actCat}&q=${encodeURIComponent(_actQ)}`);
    const list = document.getElementById('act-list') || (() => { const d = document.createElement('div'); d.id='act-list'; panel.appendChild(d); return d; })();
    if (reset) list.innerHTML = '';
    if (!r.activite.length && reset) {
      list.innerHTML = '<div class="empty-p"><div class="ei">⚡</div>Aucune activité publique pour l\'instant.</div>';
    } else {
      r.activite.forEach(item => {
        const d = document.createElement('div');
        d.className = 'act-item';
        d.innerHTML = `
          <div class="act-icon">${ACT_ICONS[item.type] || ACT_ICONS.default}</div>
          <div class="act-body">
            <div class="act-type">${esc(item.categorie||item.type)}</div>
            <div class="act-titre">${esc(item.titre||'—')}</div>
            <div class="act-date">${fmtDate(item.date)}</div>
          </div>`;
        if (item.url) d.style.cursor='pointer', d.onclick=()=>location.href=item.url;
        list.appendChild(d);
      });
      // Bouton "voir plus"
      const existing = document.getElementById('act-more-btn');
      if (existing) existing.remove();
      if (r.page < r.pages) {
        const btn = document.createElement('button');
        btn.id = 'act-more-btn';
        btn.className = 'act-load-more';
        btn.textContent = `Voir plus (${r.total - _actPage*20 > 0 ? r.total - _actPage*20 : ''} activités restantes)`;
        btn.onclick = () => { _actPage++; loadActiviteTab(false); };
        list.after(btn);
      }
    }
  } catch(e) {
    document.getElementById('ptab-activite').innerHTML += `<div style="color:#dc2626;padding:10px">Erreur : ${e.message}</div>`;
  }
}

function buildActHeader() {
  return `<div class="p-section" style="margin-bottom:0;border-radius:12px 12px 0 0;border-bottom:none;padding-bottom:10px">
    <div class="act-feed-filter" id="act-filter-row">
      ${ACT_CATS.map(c=>`<button class="act-filter-btn${c.id===_actCat?' active':''}" onclick="setActCat('${c.id}')">${c.label}</button>`).join('')}
    </div>
    <div class="act-search-row">
      <input type="text" placeholder="🔍 Rechercher dans l'activité…" value="${esc(_actQ)}" oninput="debAct(this.value)">
    </div>
  </div><div class="p-section" style="border-radius:0 0 12px 12px;border-top:none;min-height:80px;" id="act-list-wrap">`;
}

let _actTimer = null;
function debAct(v) { clearTimeout(_actTimer); _actTimer = setTimeout(()=>{ _actQ=v; loadActiviteTab(true); }, 400); }
function setActCat(c) { _actCat=c; document.querySelectorAll('.act-filter-btn').forEach(b=>b.classList.toggle('active',b.textContent===ACT_CATS.find(x=>x.id===c)?.label)); loadActiviteTab(true); }
function fmtDate(d) { if (!d) return ''; try { return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}); } catch(e){return d;} }

/* ======================================================
   ONGLET — PUBLICATIONS
   ====================================================== */
const PUB_CATS = ['all','post','article','annonce','offre','campagne','communique'];
let _pubPage=1, _pubCat='all', _pubQ='';

async function loadPublicationsTab(reset=true) {
  const panel = document.getElementById('ptab-publications');
  if (reset) { _pubPage=1; panel.innerHTML = buildPubHeader(); }
  // Bouton "Créer un post" si propriétaire
  if (isOwn && reset) {
    const createBtn = document.createElement('div');
    createBtn.style.cssText = 'margin-bottom:14px;';
    createBtn.innerHTML = `<button class="btn btn-outline" onclick="if(window.Posts){Posts.openModal();}else{location.href='fil-actualite.html';}" style="border-color:#4338CA;color:#4338CA;font-weight:700;">✍️ Créer un post</button>`;
    panel.prepend(createBtn);
  }
  try {
    const r = await api('GET', `/profil/${profil.id}/publications?page=${_pubPage}&categorie=${_pubCat}&q=${encodeURIComponent(_pubQ)}`);
    let list = document.getElementById('pub-list');
    if (!list) { list = document.createElement('div'); list.id='pub-list'; panel.querySelector('.pub-list-wrap')?.appendChild(list); }
    if (reset) list.innerHTML = '';
    if (!r.publications.length && reset) {
      list.innerHTML = `<div class="empty-p"><div class="ei">📝</div>${isOwn ? 'Aucune publication. <button class="btn btn-sm" onclick="if(window.Posts){Posts.openModal();}else{location.href=\'fil-actualite.html\';}" style="background:#4338CA;color:#fff;border:none;border-radius:6px;padding:5px 12px;margin-left:8px;cursor:pointer;">Créer mon premier post</button>' : 'Aucune publication pour l\'instant.'}</div>`;
    } else {
      if (window.Posts) {
        Posts.renderFeed(r.publications, list.id || 'pub-list', { currentUserId: CU?.id });
      } else {
        r.publications.forEach(p => {
          const d = document.createElement('div');
          d.className = 'post-card';
          const nom = [profil.prenom, profil.nom].filter(Boolean).join(' ') || profil.nom;
          const avHtml = profil.photo_url ? `<img loading="lazy" src="${esc(profil.photo_url)}" alt="">` : `<span style="font-size:13px;font-weight:800">${initials(nom)}</span>`;
          d.innerHTML = `<div class="post-header"><div class="post-av">${avHtml}</div><div class="post-meta"><div class="pm-nom">${esc(nom)}</div><div class="pm-date">${fmtDate(p.created_at)}</div></div></div><div class="post-body"><div class="post-text">${esc(p.contenu||'')}</div></div><div class="post-stats"><span>❤️ ${p.nb_reactions||0}</span><span>💬 ${p.nb_commentaires||0}</span></div>`;
          list.appendChild(d);
        });
      }
      const existing = document.getElementById('pub-more-btn');
      if (existing) existing.remove();
      if (r.page < r.pages) {
        const btn = document.createElement('button');
        btn.id='pub-more-btn'; btn.className='act-load-more';
        btn.textContent='Voir plus';
        btn.onclick=()=>{ _pubPage++; loadPublicationsTab(false); };
        list.after(btn);
      }
    }
  } catch(e) { document.getElementById('ptab-publications').innerHTML += `<div style="color:#dc2626;padding:10px">Erreur : ${e.message}</div>`; }
}

function buildPubHeader() {
  return `<div class="p-section" style="padding-bottom:8px">
    <div class="act-feed-filter">
      ${PUB_CATS.map(c=>`<button class="act-filter-btn${c===_pubCat?' active':''}" onclick="setPubCat('${c}')">${c==='all'?'Tout':c}</button>`).join('')}
    </div>
    <div class="act-search-row">
      <input type="text" placeholder="🔍 Rechercher une publication…" value="${esc(_pubQ)}" oninput="debPub(this.value)">
    </div>
  </div><div class="pub-list-wrap"><div id="pub-list"></div></div>`;
}

async function loadPublicitesTab() {
  const panel = document.getElementById('ptab-publicites');
  try {
    const r = await api('GET', `/profil/${profil.id}/publicites`);
    if (!r.publicites.length) {
      panel.innerHTML = '<div class="p-section"><div class="empty-p"><div class="ei">📣</div>Aucune publicité publiée pour l\'instant.</div></div>';
      return;
    }
    panel.innerHTML = r.publicites.map(p => `
      <div class="pub-ad-card">
        ${p.image_url ? `<img class="pub-ad-img" src="${esc(p.image_url)}" alt="${esc(p.titre||'')}">` : ''}
        <div class="pub-ad-body">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <div class="pub-ad-title">${esc(p.titre||p.nom_campagne||'Campagne')}</div>
            <span class="pub-ad-statut ${p.statut}">${p.statut==='active'?'Active':'Terminée'}</span>
          </div>
          ${p.description ? `<div class="pub-ad-desc">${esc(p.description)}</div>` : ''}
          <div class="pub-ad-meta">
            ${p.date_debut?'Du '+fmtDate(p.date_debut):''}${p.date_fin?' au '+fmtDate(p.date_fin):''}
          </div>
          ${p.lien_cible ? `<a class="ad-btn" href="${esc(p.lien_cible)}" target="_blank" rel="noopener">En savoir plus →</a>` : ''}
        </div>
      </div>`).join('');
  } catch(e) {
    panel.innerHTML = '<div class="p-section"><div class="empty-p">Aucune publicité disponible.</div></div>';
  }
}

function buildPrivacyPanel() {
  const sections = [
    { id:'publications',    label:'Publications', sub:'Vos posts, articles, annonces' },
    { id:'activite',        label:'Fil d\'activité', sub:'Votre activité globale sur la plateforme' },
    { id:'commentaires',    label:'Commentaires', sub:'Vos commentaires sur les publications' },
    { id:'evenements',      label:'Événements', sub:'Vos participations et créations d\'événements' },
    { id:'accreditations',  label:'Accréditations', sub:'Vos accréditations et badges' },
    { id:'contacts',        label:'Relations', sub:'Vos abonnés et abonnements' },
  ];
  const privacy = profil.privacy || {};
  const div = document.createElement('div');
  div.className = 'privacy-section';
  div.innerHTML = `<div class="p-sec-hd"><h3>🔒 Confidentialité du profil</h3></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">Choisissez qui peut voir chaque rubrique de votre profil.</p>
    ${sections.map(s => `
      <div class="privacy-row">
        <div>
          <div class="privacy-label">${s.label}</div>
          <div class="privacy-sub">${s.sub}</div>
        </div>
        <select class="privacy-select" id="priv-${s.id}" onchange="savePrivacy()">
          <option value="public"${(privacy[s.id]||'public')==='public'?' selected':''}>🌍 Public</option>
          <option value="membres"${privacy[s.id]==='membres'?' selected':''}>👤 Membres</option>
          <option value="relations"${privacy[s.id]==='relations'?' selected':''}>🤝 Relations</option>
          <option value="prive"${privacy[s.id]==='prive'?' selected':''}>🔒 Privé</option>
        </select>
      </div>`).join('')}
    <div id="priv-msg" style="font-size:12px;color:#16a34a;margin-top:10px;display:none">✅ Paramètres sauvegardés</div>`;
  return div;
}

let _privTimer = null;
async function savePrivacy() {
  const sections = ['publications','activite','commentaires','evenements','accreditations','contacts'];
  const privacy = {};
  sections.forEach(s => {
    const el = document.getElementById('priv-'+s);
    if (el) privacy[s] = el.value;
  });
  try {
    await api('PUT', '/profil', { privacy });
    profil.privacy = privacy;
    const msg = document.getElementById('priv-msg');
    if (msg) { msg.style.display='block'; clearTimeout(_privTimer); _privTimer=setTimeout(()=>msg.style.display='none',2500); }
  } catch(e) {}
}

let _codesLoaded = false;
async function renderCodesPanel() {
  if (_codesLoaded) return;
  _codesLoaded = true;
  const panel = document.getElementById('conf-panel-codes');
  if (!panel) return;

  // Charger da_id du profil
  const daId = profil.da_id || '—';
  const profileUrl = `${location.origin}/profil.html?id=${profil.id}`;

  panel.innerHTML = `

      .codes-card h4{margin:0 0 6px;font-size:14px;font-weight:800;}

      .ds-masked{font-size:20px;letter-spacing:4px;color:var(--muted);margin-bottom:12px;font-family:monospace;}
      .ds-revealed{font-family:monospace;font-size:16px;font-weight:800;letter-spacing:3px;color:#1e293b;background:#f0fdf4;border:1.5px solid #22c55e;border-radius:8px;padding:8px 16px;margin-bottom:12px;word-break:break-all;}
      .codes-btn-row{display:flex;gap:8px;flex-wrap:wrap;}
      .codes-btn{font-size:12px;padding:6px 14px;border-radius:7px;cursor:pointer;font-weight:700;border:1.5px solid;background:transparent;}
      .codes-btn.orange{color:var(--orange);border-color:var(--orange);}
      .codes-btn.purple{color:#7c3aed;border-color:#7c3aed;}
      .codes-btn.red{color:#dc2626;border-color:#dc2626;}
      .codes-btn.green{color:#16a34a;border-color:#16a34a;}
      .ds-pwd-form{margin-top:14px;display:none;}
      .ds-pwd-form input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);margin-bottom:8px;}
      .ds-err{color:#dc2626;font-size:12px;margin-top:4px;display:none;}
      .history-list{margin-top:12px;}
      .history-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
      .history-action{font-weight:700;color:var(--text);}
      .history-meta{color:var(--muted);text-align:right;font-size:11px;}
    </style>

    <!-- Carte 1 : Identifiant DA -->
    <div class="codes-card">
      <h4>🪪 Identifiant Diaspo'Actif (ID DA)</h4>
      <p class="codes-sub">Identifiant public · visible sur votre profil et sous votre QR Code · utilisable pour vous retrouver, vous inviter ou créer un partenariat</p>
      <div id="codes-da-qr" style="margin-bottom:12px;"></div>
      <div class="da-badge" id="codes-da-badge">${daId}</div>
      <div class="codes-btn-row">
        <button class="codes-btn orange" onclick="navigator.clipboard.writeText('${daId}').then(()=>showToast?.('✅ ID copié !'))">📋 Copier l'ID</button>
        <button class="codes-btn orange" onclick="(async()=>{const r=await fetch('/api/profil/ds-id/log-copy',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:'{}'});})();" style="display:none">log</button>
        <button class="codes-btn purple" onclick="window._dlQRCode()">⬇️ Télécharger le QR Code</button>
        <button class="codes-btn purple" onclick="navigator.share?navigator.share({title:'Mon profil Diaspo\\'Actif',text:'Retrouvez-moi : ${daId}',url:'${profileUrl}'}).catch(()=>{}):navigator.clipboard.writeText('${profileUrl}').then(()=>showToast?.('🔗 Lien copié !'))">🔗 Partager</button>
      </div>
    </div>

    <!-- Carte 2 : Code de Sécurité DS-ID -->
    <div class="codes-card">
      <h4>🔐 Code de Sécurité Diaspo'Actif (DS-ID)</h4>
      <p class="codes-sub">Votre signature numérique personnelle · strictement confidentielle · jamais visible publiquement · utilisée pour signer des deals, partenariats et votes</p>
      <div id="ds-masked-view">
        <div class="ds-masked">••••••••••••••••••••</div>
        <div class="codes-btn-row">
          <button class="codes-btn green" onclick="window._showDsIdForm('reveal')">👁 Afficher</button>
        </div>
      </div>
      <div id="ds-revealed-view" style="display:none;">
        <div class="ds-revealed" id="ds-value"></div>
        <div class="codes-btn-row">
          <button class="codes-btn green" onclick="window._copyDsId()">📋 Copier</button>
          <button class="codes-btn red" onclick="window._showDsIdForm('regen')">🔄 Régénérer</button>
          <button class="codes-btn orange" onclick="window._hideDsId()">🙈 Masquer</button>
        </div>
      </div>
      <!-- Formulaire mot de passe -->
      <div class="ds-pwd-form" id="ds-pwd-form">
        <div id="ds-pwd-title" style="font-size:13px;font-weight:700;margin-bottom:8px;">🔑 Entrez votre mot de passe pour continuer</div>
        <input type="password" id="ds-pwd-input" placeholder="Votre mot de passe" autocomplete="current-password">
        <div id="ds-pwd-err" class="ds-err"></div>
        <div class="codes-btn-row" style="margin-top:4px;">
          <button class="codes-btn green" onclick="window._submitDsId()" style="background:var(--orange);color:#fff;border-color:var(--orange);">Valider</button>
          <button class="codes-btn orange" onclick="window._cancelDsId()">Annuler</button>
        </div>
      </div>
    </div>

    <!-- Historique -->
    <div class="codes-card">
      <h4>📋 Historique de sécurité</h4>
      <div id="ds-history-list"><p style="font-size:13px;color:var(--muted);">Chargement…</p></div>
    </div>
  `;

  // Rendre le QR code
  if (window.ProfileQR) {
    ProfileQR.render(document.getElementById('codes-da-qr'), {
      userId: profil.id, userNom: profil.nom || '', userRole: profil.role || '', size: 120
    });
  }

  window._dlQRCode = function() {
    const canvas = document.querySelector('#codes-da-qr canvas');
    if (!canvas) return;
    const a = document.createElement('a');
    a.download = `qr-diaspoactif-${daId}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };

  let _dsAction = 'reveal';
  window._showDsIdForm = function(action) {
    _dsAction = action;
    document.getElementById('ds-pwd-form').style.display = '';
    document.getElementById('ds-pwd-title').textContent = action === 'regen'
      ? '⚠️ Régénérer le DS-ID — entrez votre mot de passe (l\'ancien code sera invalidé)'
      : '🔑 Entrez votre mot de passe pour afficher votre DS-ID';
    document.getElementById('ds-pwd-input').value = '';
    document.getElementById('ds-pwd-err').style.display = 'none';
    document.getElementById('ds-pwd-input').focus();
  };
  window._cancelDsId = function() {
    document.getElementById('ds-pwd-form').style.display = 'none';
  };
  window._hideDsId = function() {
    document.getElementById('ds-revealed-view').style.display = 'none';
    document.getElementById('ds-masked-view').style.display = '';
    document.getElementById('ds-value').textContent = '';
  };
  window._copyDsId = async function() {
    const val = document.getElementById('ds-value').textContent;
    if (!val) return;
    await navigator.clipboard.writeText(val);
    await api('POST', '/profil/ds-id/log-copy', {});
    showToast?.('📋 DS-ID copié !');
  };
  window._submitDsId = async function() {
    const pwd = document.getElementById('ds-pwd-input').value;
    const err = document.getElementById('ds-pwd-err');
    err.style.display = 'none';
    if (!pwd) { err.textContent = 'Mot de passe requis.'; err.style.display = 'block'; return; }
    try {
      if (_dsAction === 'regen') {
        const r = await api('POST', '/profil/ds-id/regenerate', { password: pwd });
        document.getElementById('ds-value').textContent = r.ds_id;
        document.getElementById('ds-pwd-form').style.display = 'none';
        document.getElementById('ds-masked-view').style.display = 'none';
        document.getElementById('ds-revealed-view').style.display = '';
        showToast?.('✅ DS-ID régénéré avec succès.');
      } else {
        const r = await api('POST', '/profil/ds-id/reveal', { password: pwd });
        document.getElementById('ds-value').textContent = r.ds_id;
        document.getElementById('ds-pwd-form').style.display = 'none';
        document.getElementById('ds-masked-view').style.display = 'none';
        document.getElementById('ds-revealed-view').style.display = '';
      }
      loadDsHistory();
    } catch(e) {
      err.textContent = e.message || 'Erreur de validation.';
      err.style.display = 'block';
    }
  };

  // Touche Entrée dans le champ mot de passe
  document.getElementById('ds-pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') window._submitDsId(); });

  async function loadDsHistory() {
    const el = document.getElementById('ds-history-list');
    try {
      const r = await api('GET', '/profil/ds-id/history');
      if (!r.history.length) { el.innerHTML = '<p style="font-size:13px;color:var(--muted);">Aucune activité enregistrée.</p>'; return; }
      const labels = { creation:'Création', consultation:'Consultation', copie:'Copie', regeneration:'Régénération', signature:'Signature numérique', echec_validation:'Tentative échouée' };
      const colors = { creation:'#16a34a', consultation:'#2563eb', copie:'#7c3aed', regeneration:'#d97706', signature:'#0891b2', echec_validation:'#dc2626' };
      el.innerHTML = '<div class="history-list">' + r.history.map(h => `
        <div class="history-row">
          <span class="history-action" style="color:${colors[h.action]||'var(--text)'}">${labels[h.action]||h.action}</span>
          <div class="history-meta">
            <div>${new Date(h.created_at).toLocaleString('fr-FR')}</div>
            ${h.ip ? `<div>IP : ${h.ip}</div>` : ''}
          </div>
        </div>`).join('') + '</div>';
    } catch(e) { el.innerHTML = '<p style="font-size:13px;color:var(--muted);">Historique indisponible.</p>'; }
  }
  loadDsHistory();
}

async function loadContactsTab(panel, type, titre, icon) {
  let page = 1, q = '';
  async function render(p, search) {
    try {
      const data = await api('GET', `/profil/${profil.id}/${type}?page=${p}&q=${encodeURIComponent(search||'')}`);
      if (data.masque) {
        panel.innerHTML = `<div style="padding:32px;text-align:center;color:var(--muted)">🔒 Cette liste est privée.</div>`;
        return;
      }
      const list = data[type] || [];
      const total = data.total || 0;
      const pages = data.pages || 1;
      if (p === 1) {
        panel.innerHTML = `
          <div style="padding:16px 0">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">${icon} ${titre} <span style="font-size:12px;color:var(--muted);font-weight:400">(${total})</span></h3>
            <div style="display:flex;gap:8px;margin-bottom:16px;">
              <input id="contacts-search-${type}" type="text" placeholder="Rechercher…" value="${search||''}"
                style="flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--card);"
                oninput="debContacts_${type}(this.value)">
            </div>
            <div id="contacts-list-${type}" class="contacts-grid"></div>
            <div id="contacts-more-${type}" style="text-align:center;margin-top:12px;"></div>
          </div>`;
        window[`debContacts_${type}`] = debounce(v => { q = v; render(1, v); }, 300);
      }
      const listEl = document.getElementById(`contacts-list-${type}`);
      if (!listEl) return;
      if (p === 1) listEl.innerHTML = '';
      if (!list.length && p === 1) { listEl.innerHTML = '<div style="color:var(--muted);padding:16px;text-align:center;">Aucun résultat.</div>'; }
      list.forEach(u => {
        const card = document.createElement('a');
        card.href = `/profil.html?id=${u.id}`;
        card.className = 'contact-card';
        const nom = [u.prenom, u.nom].filter(Boolean).join(' ') || '—';
        const roleLabel = { individu:'Membre', initiative:'Initiative', association:'Association', entreprise:'Entreprise', etablissement:'Établissement', organisation:'Organisation' }[u.role] || u.role || 'Membre';
        card.innerHTML = `
          <div class="cc-avatar">${u.photo_url ? `<img src="${u.photo_url}" alt="">` : `<div class="cc-initials">${nom.charAt(0)}</div>`}</div>
          <div class="cc-body">
            <div class="cc-nom">${nom}</div>
            <div class="cc-role">${roleLabel}${u.pays ? ` · ${u.pays}` : ''}${u.ville ? ` · ${u.ville}` : ''}</div>
            ${u.titre_pro ? `<div class="cc-titre">${u.titre_pro}</div>` : ''}
          </div>`;
        listEl.appendChild(card);
      });
      const moreEl = document.getElementById(`contacts-more-${type}`);
      if (moreEl) {
        moreEl.innerHTML = p < pages ? `<button class="act-load-more" onclick="loadMore_${type}()">Voir plus</button>` : '';
        window[`loadMore_${type}`] = () => { page++; render(page, q); };
      }
    } catch(e) {
      panel.innerHTML = `<div style="padding:20px;color:var(--muted)">Erreur de chargement.</div>`;
    }
  }
  render(1, '');
}

    const d = await api('GET', `/profil/${profil.id}/communs`);
    let html = `<div style="padding:16px 0">`;

    if (d.suggestions && d.suggestions.length) {
      html += `<div class="communs-suggestions">
        ${d.suggestions.map(s => `<div class="communs-suggestion">💡 ${s}</div>`).join('')}
      </div>`;
    }

    if (d.points && d.points.length) {
      html += `<div class="communs-bloc">
        <h3 class="communs-titre">✨ Vous avez en commun</h3>
        <div class="communs-points">
          ${d.points.map(p => {
            const icons = { pays:'🌍', ville:'📍', profession:'💼', interets:'🎯', competences:'🛠️' };
            return `<div class="communs-point"><span class="communs-icon">${icons[p.type]||'•'}</span><div><div class="communs-label">${p.label}</div><div class="communs-val">${p.valeur}</div></div></div>`;
          }).join('')}
        </div>
      </div>`;
    }

    if (d.users_communs && d.users_communs.length) {
      html += `<div class="communs-bloc">
        <h3 class="communs-titre">👥 Comptes suivis en commun (${d.users_communs.length})</h3>
        <div class="contacts-grid">
          ${d.users_communs.map(u => {
            const nom = [u.prenom, u.nom].filter(Boolean).join(' ') || '—';
            return `<a href="/profil.html?id=${u.id}" class="contact-card">
              <div class="cc-avatar">${u.photo_url ? `<img src="${u.photo_url}" alt="">` : `<div class="cc-initials">${nom.charAt(0)}</div>`}</div>
              <div class="cc-body"><div class="cc-nom">${nom}</div><div class="cc-role">${u.pays||''} ${u.ville||''}</div>${u.titre_pro?`<div class="cc-titre">${u.titre_pro}</div>`:''}</div>
            </a>`;
          }).join('')}
        </div>
      </div>`;
    }

    if (d.initiatives_communes && d.initiatives_communes.length) {
      html += `<div class="communs-bloc">
        <h3 class="communs-titre">🚀 Initiatives communes (${d.initiatives_communes.length})</h3>
        <div class="communs-init-list">
          ${d.initiatives_communes.map(i => `<a href="/profil.html?id=${i.id}" class="communs-init-item">
            <span class="communs-icon">🚀</span>
            <div><div class="communs-label">${i.nom}</div><div class="communs-val">${i.domaine||''} ${i.pays?`· ${i.pays}`:''}</div></div>
          </a>`).join('')}
        </div>
      </div>`;
    }

    if (d.evenements_communs && d.evenements_communs.length) {
      html += `<div class="communs-bloc">
        <h3 class="communs-titre">📅 Événements en commun (${d.evenements_communs.length})</h3>
        <div class="communs-init-list">
          ${d.evenements_communs.map(e => `<a href="/evenements.html?id=${e.id}" class="communs-init-item">
            <span class="communs-icon">📅</span>
            <div><div class="communs-label">${e.titre}</div><div class="communs-val">${e.ville||''} ${e.date_debut?`· ${fmtDate(e.date_debut)}`:''}</div></div>
          </a>`).join('')}
        </div>
      </div>`;
    }

    if (!d.points?.length && !d.users_communs?.length && !d.initiatives_communes?.length && !d.evenements_communs?.length) {
      html += `<div style="padding:32px;text-align:center;color:var(--muted);">Pas encore de points en commun détectés.</div>`;
    }

    html += `</div>`;
    panel.innerHTML = html;
  } catch(e) {
    panel.innerHTML = `<div style="padding:20px;color:var(--muted)">Erreur de chargement.</div>`;
  }
}

async function loadCommunsSidebar() {
  try {
    const d = await api('GET', `/profil/${profil.id}/communs`);
    const total = d.nb_communs || 0;
    if (!total && !d.points?.length) return;
    const sb = document.getElementById('p-sidebar');
    if (!sb) return;
    const widget = document.createElement('div');
    widget.className = 'communs-sidebar-widget';
    const items = [
      ...(d.points||[]).map(p => { const icons={pays:'🌍',ville:'📍',profession:'💼',interets:'🎯',competences:'🛠️'}; return `<div class="csw-item">${icons[p.type]||'•'} ${p.label}</div>`; }),
      ...(d.users_communs?.length ? [`<div class="csw-item">👥 ${d.users_communs.length} compte(s) suivi(s) en commun</div>`] : []),
      ...(d.initiatives_communes?.length ? [`<div class="csw-item">🚀 ${d.initiatives_communes.length} initiative(s) commune(s)</div>`] : []),
    ].slice(0,4);
    if (!items.length) return;
    widget.innerHTML = `
      <div class="csw-head">🤝 Vous avez en commun</div>
      ${items.join('')}
      <button class="csw-btn" onclick="switchProfileTab('communs')">Voir tout →</button>`;
    sb.insertBefore(widget, sb.firstChild);
  } catch(e) {}
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

function openEditExp(i) { renderExpForm(profil.experiences[i], i); }

  const wrap = document.getElementById('exp-form-wrap');
  const isEdit = idx !== null;
  wrap.innerHTML = `<div class="p-edit-form">

      <div><label>Date de fin (AAAA-MM)</label><input id="ef-fin" placeholder="2024-06" value="${esc(exp?.fin||'')}" ${exp?.actuel?'disabled':''}></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:24px">
        <input type="checkbox" id="ef-act" ${exp?.actuel?'checked':''} onchange="document.getElementById('ef-fin').disabled=this.checked">

      </div>
    </div>

    <div class="edit-btns">
      <button class="btn-save" onclick="saveExp(${idx})">Enregistrer</button>
      <button class="btn-cancel" onclick="document.getElementById('exp-form-wrap').innerHTML=''">Annuler</button>
    </div>
    <p class="e-msg err" id="exp-err"></p>
  </div>`;
  wrap.scrollIntoView({behavior:'smooth', block:'nearest'});
}

async function saveExp(idx) {
  const titre  = document.getElementById('ef-titre').value.trim();
  const ent    = document.getElementById('ef-ent').value.trim();
  const err    = document.getElementById('exp-err');
  if (!titre || !ent) { err.style.display='block'; err.textContent='Titre et entreprise requis.'; return; }

  const newExp = {
    titre, entreprise: ent,
    lieu:        document.getElementById('ef-lieu').value.trim(),
    debut:       document.getElementById('ef-deb').value.trim(),
    fin:         document.getElementById('ef-fin').value.trim(),
    actuel:      document.getElementById('ef-act').checked,
    description: document.getElementById('ef-desc').value.trim(),
  };

  const list = [...(profil.experiences||[])];
  if (idx !== null) list[idx] = newExp;
  else list.unshift(newExp);

  try {
    await api('PUT', '/profil', { experiences: list });
    profil.experiences = list;
    rebuildSection('sec-exp', buildSectionExp());
  } catch(e) { err.style.display='block'; err.textContent='Erreur lors de la sauvegarde.'; }
}

async function deleteExp(idx) {
  if (!confirm('Supprimer cette expérience ?')) return;
  const list = [...(profil.experiences||[])];
  list.splice(idx, 1);
  try {
    await api('PUT', '/profil', { experiences: list });
    profil.experiences = list;
    rebuildSection('sec-exp', buildSectionExp());
  } catch(e) { alert('Erreur.'); }
}

function buildSectionSkills() {
  const sec = document.createElement('div');
  sec.className = 'p-section';
  sec.id = 'sec-skills';

  const skills = Array.isArray(profil.competences) ? profil.competences : [];

  let hd = `<div class="p-sec-hd"><h3>🛠 Compétences</h3>`;
  if (isOwn) hd += `<div class="p-sec-actions"><button class="btn-ico" onclick="focusSkillInput()">+ Ajouter</button></div>`;
  hd += `</div>`;

  const pillsHtml = skills.length
    ? `<div class="skills-wrap">${skills.map((s,i)=>`<span class="skill-pill">${esc(s)}${isOwn?`<span class="skill-del" onclick="deleteSkill(${i})" title="Retirer">✕</span>`:''}</span>`).join('')}</div>`
    : `<div class="empty-p"><div class="ei">🛠</div>Aucune compétence renseignée${isOwn?' — ajoutez-en ci-dessous':''}</div>`;

  const addForm = isOwn ? `<div class="skill-add-row" id="skill-add-row">
    <input id="skill-input" placeholder="Ex : React, Finance, Agriculture…" onkeydown="if(event.key==='Enter')addSkill()">
    <button class="btn-ico" onclick="addSkill()">Ajouter</button>
  </div>` : '';

  sec.innerHTML = hd + pillsHtml + addForm;
  return sec;
}

function focusSkillInput() { document.getElementById('skill-input')?.focus(); }

async function addSkill() {
  const inp   = document.getElementById('skill-input');
  const val   = inp?.value.trim();
  if (!val) return;
  const list  = [...(profil.competences||[])];
  if (list.includes(val)) { inp.value=''; return; }
  list.push(val);
  try {
    await api('PUT', '/profil', { competences: list });
    profil.competences = list;
    rebuildSection('sec-skills', buildSectionSkills());
    setTimeout(focusSkillInput, 80);
  } catch(e) {}
}

async function deleteSkill(idx) {
  const list = [...(profil.competences||[])];
  list.splice(idx, 1);
  try {
    await api('PUT', '/profil', { competences: list });
    profil.competences = list;
    rebuildSection('sec-skills', buildSectionSkills());
  } catch(e) {}
}

      <div><label>Ville</label><input id="id-ville" value="${esc(profil.ville||'')}"></div>
      <div><label>Pays</label><input id="id-pays" value="${esc(profil.pays||'')}"></div>
    </div>
    <div class="fg full"><div><label>Biographie</label><textarea id="id-bio" rows="4">${esc(profil.bio||'')}</textarea></div></div>
    <div style="margin-bottom:10px;">
      <label style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:8px;">Centres d'intérêt</label>
      <div style="display:flex;flex-wrap:wrap;gap:7px;">${INTERETS.map(i=>`
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;padding:4px 10px;border:1px solid var(--border);border-radius:99px;${ci.includes(i)?'background:var(--tp-light);border-color:var(--tp);color:var(--tp);font-weight:600;':''}">
          <input type="checkbox" value="${i}" ${ci.includes(i)?'checked':''} style="accent-color:var(--tp);"> ${i}
        </label>`).join('')}
      </div>
    </div>
    <div class="edit-btns">
      <button class="btn-save" onclick="saveIdentity()">Enregistrer</button>
      <button class="btn-cancel" onclick="document.getElementById('identity-edit-form').remove()">Annuler</button>
    </div>
    <p class="e-msg err" id="id-err"></p><p class="e-msg ok" id="id-ok"></p>`;

  document.getElementById('p-identity').appendChild(form);
  form.scrollIntoView({behavior:'smooth', block:'nearest'});
}

async function saveIdentity() {
  const err = document.getElementById('id-err');
  const ok  = document.getElementById('id-ok');
  err.style.display = 'none'; ok.style.display = 'none';

  const body = {
    prenom:        document.getElementById('id-prenom').value.trim(),
    nom:           document.getElementById('id-nom').value.trim() || profil.nom,
    titre_pro:     document.getElementById('id-titre').value.trim(),
    telephone:     document.getElementById('id-tel').value.trim(),
    ville:         document.getElementById('id-ville').value.trim(),
    pays:          document.getElementById('id-pays').value.trim(),
    bio:           document.getElementById('id-bio').value.trim(),
    centres_interet: [...document.querySelectorAll('#identity-edit-form input[type=checkbox]:checked')].map(c=>c.value),
  };
  try {
    const r = await api('PUT', '/profil', body);
    Object.assign(profil, body);
    ok.style.display='block'; ok.textContent='Profil mis à jour ✓';
    setTimeout(()=>{ document.getElementById('identity-edit-form')?.remove(); renderIdentity(); renderStats(); }, 800);
  } catch(e) { err.style.display='block'; err.textContent=e.message||'Erreur.'; }
}

/* ======================================================
   FOLLOW / UNFOLLOW
   ====================================================== */
async function toggleFollow() {
  if (!CU) { window.location.href='login.html'; return; }
  const btn = document.getElementById('btn-follow');
  btn.disabled = true;
  try {
    const method = profil.isFollowing ? 'DELETE' : 'POST';
    const r = await api(method, `/users/${profil.id}/suivre`);
    profil.isFollowing = !profil.isFollowing;
    profil.nbAbonnes   = r.nbAbonnes;
    renderActions();
    renderStats();
  } catch(e) { alert(e.message||'Erreur.'); }
  finally { const b2 = document.getElementById('btn-follow'); if(b2) b2.disabled=false; }
}

/* ======================================================
   UTILITAIRES
   ====================================================== */
function rebuildSection(id, newEl) {
  const old = document.getElementById(id);
  if (old) old.replaceWith(newEl);
  else document.getElementById('p-sections').appendChild(newEl);
}

/* ---- démarrage ---- */
init();
</script>
