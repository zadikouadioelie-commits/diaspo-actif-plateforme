<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diaspo'Actif — Demandes de mise en relation</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="stylesheet" href="assets/styles.v2.css">
<link rel="stylesheet" href="/assets/responsive.v2.css">
<link rel="stylesheet" href="/assets/ui-enhancements.v2.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b00">
<link rel="apple-touch-icon" href="assets/logo.png">
<style>
.dr-wrap{max-width:760px;margin:0 auto;padding:24px 20px 60px;}
.dr-title{font-size:20px;font-weight:800;margin:0 0 4px;}
.dr-sub{font-size:13px;color:var(--muted);margin:0 0 20px;}
.dr-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;display:flex;gap:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.dr-card img{width:56px;height:56px;object-fit:cover;border-radius:12px;flex-shrink:0;}
.dr-avatar-fallback{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--orange),#ffb27a);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;flex-shrink:0;}
.dr-body{flex:1;min-width:0;}
.dr-name{font-weight:800;font-size:14.5px;}
.dr-urgence{display:inline-block;color:#fff;border-radius:99px;padding:1px 9px;font-size:10.5px;font-weight:700;margin-left:6px;vertical-align:middle;}
.dr-objet{font-weight:700;font-size:13.5px;margin-top:4px;}
.dr-motif{font-size:12.5px;color:var(--muted);margin-top:2px;}
.dr-compat{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;padding:8px 10px;margin-top:8px;font-size:11.5px;color:#166534;}
.dr-compat ul{margin:4px 0 0;padding-left:16px;}
.dr-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.dr-empty{text-align:center;padding:60px 20px;color:var(--muted);}
.dr-empty .n{font-size:44px;margin-bottom:10px;}
</style>
</head>
<body>
<div class="page">

  <header class="topbar" style="flex-shrink:0;">
    <div class="topbar-inner">
      <div class="logo"><img loading="lazy" class="logo-img" src="assets/logo.png" alt="Diaspo'Actif"> DIASPO'ACTIF</div>
      <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="annuaire.html">Annuaire</a>
        <a href="fil-actualite.html">Fil</a>
        <a href="formations.html">Formations</a>
        <a href="messagerie.html">Messages</a>
      </nav>
      <div class="topbar-right">
        <select class="lang-select" id="lang-select"></select>
        <div id="auth-area" class="auth-area"></div>
      </div>
    </div>
  </header>

  <div class="dr-wrap">
    <h1 class="dr-title">🤝 Demandes de mise en relation</h1>
    <p class="dr-sub">Les demandes reçues, en attente de votre réponse. Consultez le profil du demandeur avant d'accepter, refuser ou bloquer.</p>
    <div id="dr-list"><div style="padding:20px;color:var(--muted);font-size:13px;text-align:center;">Chargement…</div></div>
  </div>

</div>

<script src="assets/data.js"></script>
<script src="assets/demo.js"></script>
<script src="assets/app.js"></script>
<script>
function escH(s){ const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

const DR_URGENCE_BADGE = { faible:'#94A3B8', normal:'#64748B', important:'#D97706', urgent:'#DC2626' };

async function loadDemandes(){
  const el = document.getElementById('dr-list');
  try {
    const r = await api('GET', '/demandes-contact?direction=recues&statut=en_attente');
    const demandes = r.demandes || [];
    if (!demandes.length) {
      el.innerHTML = `<div class="dr-empty"><div class="n">📭</div><div style="font-weight:700;">Aucune demande en attente</div><div style="font-size:12.5px;margin-top:4px;">Les nouvelles demandes de mise en relation apparaîtront ici.</div></div>`;
      return;
    }
    el.innerHTML = demandes.map(d => {
      const initiales = escH((d.autre_nom||'?').trim().slice(0,2).toUpperCase());
      const avatar = d.image_url
        ? `<img src="${escH(d.image_url)}" alt="">`
        : `<div class="dr-avatar-fallback">${initiales}</div>`;
      return `
        <div class="dr-card">
          ${avatar}
          <div class="dr-body">
            <div class="dr-name">${escH(d.autre_nom)}
              <span class="dr-urgence" style="background:${DR_URGENCE_BADGE[d.urgence]||'#64748B'};">${escH(d.urgence)}</span>
            </div>
            <div class="dr-objet">${escH(d.objet || d.motif_autre || d.motif)}</div>
            <div class="dr-motif">${escH(d.motif_autre || d.motif)}${d.message ? ` — ${escH(d.message)}` : ''}</div>
            ${(d.compatibilite && d.compatibilite.length) ? `
              <div class="dr-compat">
                <strong>💡 Pourquoi cette mise en relation peut vous intéresser ?</strong>
                <ul>${d.compatibilite.map(c => `<li>${escH(c)}</li>`).join('')}</ul>
              </div>` : ''}
            <div class="dr-actions">
              <a class="btn btn-sm btn-outline" href="profil.html?id=${d.demandeur_id}" target="_blank" rel="noopener">👁️ Voir le profil</a>
              <button class="btn btn-sm btn-orange" onclick="repondreDemande(${d.id},'accepter')">Accepter</button>
              <button class="btn btn-sm btn-outline" onclick="repondreDemande(${d.id},'refuser')">Refuser</button>
              <button class="btn btn-sm btn-outline" style="color:#DC2626;border-color:#DC2626;" onclick="repondreDemande(${d.id},'bloquer')">Bloquer</button>
            </div>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<p style="color:red;font-size:13px;">Erreur de chargement.</p>`;
  }
}

async function repondreDemande(id, action){
  if (action === 'bloquer' && !confirm('Bloquer ce compte ? Il ne pourra plus vous envoyer de demande de contact.')) return;
  try {
    const r = await api('POST', `/demandes-contact/${id}/repondre`, { action });
    await loadDemandes();
    if (action === 'accepter' && r.conversation_id) {
      window.location.href = `messagerie.html?conv=${r.conversation_id}`;
    }
  } catch(e) { alert('Erreur : ' + e.message); }
}

document.addEventListener('DOMContentLoaded', async () => {
  await applyAuthState();
  loadDemandes();
});
</script>
<script src="assets/back-button.js"></script>
</body>
</html>
