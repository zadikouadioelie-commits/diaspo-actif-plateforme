<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>Réinitialisation du mot de passe — Diaspo'Actif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Instrument Sans', system-ui, sans-serif; color: #1B2430; }
  a { text-decoration: none; color: inherit; }
  input { font-family: inherit; }
  input::placeholder { color: #9AA4B2; }
</style>
</head>
<body>

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: radial-gradient(1200px 600px at 20% 0%, #16457E 0%, #0E2E5A 45%, #091C3C 100%); position: relative; overflow: hidden;">
  <div style="position: absolute; top: -120px; right: -80px; width: 380px; height: 380px; border-radius: 50%; background: radial-gradient(circle, rgba(226,113,29,.22), transparent 70%);"></div>
  <div style="position: absolute; bottom: -140px; left: -100px; width: 420px; height: 420px; border-radius: 50%; background: radial-gradient(circle, rgba(46,125,209,.18), transparent 70%);"></div>

  <div style="position: relative; width: 100%; max-width: 440px;">
    <div style="text-align: center; margin-bottom: 24px;">
      <div style="display: inline-flex; align-items: center; gap: 11px;">
        <img src="assets/vitrine/logo-diaspo-actif-transparent.png" alt="Diaspo'Actif" style="height: 52px; width: auto; filter: brightness(0) invert(1);">
        <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #fff; letter-spacing: -.01em;">DIASPO'ACTIF</span>
      </div>
    </div>

    <div style="background: #FFFFFF; border-radius: 22px; padding: 40px 38px; box-shadow: 0 40px 90px rgba(5,16,38,.5);">
      <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; margin: 0 0 6px; color: #0E2E5A; letter-spacing: -.01em;">Nouveau mot de passe</h1>
      <div style="font-size: 12.5px; color: #8A93A3; margin-bottom: 22px;">Console d'administration du site Diaspo'Actif</div>

      <form id="reset-form" onsubmit="return submitReset(event)" style="display: flex; flex-direction: column; gap: 16px;">
        <label style="display: block;">
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: .1em; color: #5B6472;">NOUVEAU MOT DE PASSE</span>
          <input id="reset-password" type="password" required minlength="8" placeholder="8 caractères minimum" style="width: 100%; margin-top: 8px; background: #F6F9FD; border: 1px solid #E2E8F1; border-radius: 11px; padding: 14px 15px; font-size: 15px; color: #1B2430; outline: none; box-sizing: border-box;">
        </label>
        <label style="display: block;">
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: .1em; color: #5B6472;">CONFIRMER LE MOT DE PASSE</span>
          <input id="reset-password2" type="password" required minlength="8" placeholder="Retapez le mot de passe" style="width: 100%; margin-top: 8px; background: #F6F9FD; border: 1px solid #E2E8F1; border-radius: 11px; padding: 14px 15px; font-size: 15px; color: #1B2430; outline: none; box-sizing: border-box;">
        </label>

        <div id="reset-err" style="display: none; font-size: 13px; color: #C0392B; background: #FBE9E7; border-radius: 10px; padding: 10px 14px;"></div>
        <div id="reset-ok" style="display: none; font-size: 13px; color: #1B8A5B; background: #E9F7EF; border-radius: 10px; padding: 10px 14px;"></div>

        <button type="submit" id="reset-btn" style="font-size: 14.5px; font-weight: 600; letter-spacing: .02em; color: #fff; background: linear-gradient(135deg, #0E2E5A, #16457E); padding: 16px; border-radius: 12px; box-shadow: 0 12px 30px rgba(14,46,90,.28); border: none; cursor: pointer; font-family: inherit;">Réinitialiser le mot de passe</button>
      </form>
    </div>

    <div style="text-align: center; margin-top: 22px;">
      <a href="vitrine-admin-connexion.html" style="font-size: 13px; color: #A9BAD4;">← Revenir à la connexion</a>
    </div>
  </div>
</div>

<script>
  async function submitReset(e) {
    e.preventDefault();
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const password = document.getElementById('reset-password').value;
    const password2 = document.getElementById('reset-password2').value;
    const errBox = document.getElementById('reset-err');
    const okBox = document.getElementById('reset-ok');
    const btn = document.getElementById('reset-btn');
    errBox.style.display = 'none';
    okBox.style.display = 'none';

    if (!token) {
      errBox.textContent = 'Lien invalide : jeton manquant.';
      errBox.style.display = 'block';
      return false;
    }
    if (password !== password2) {
      errBox.textContent = 'Les deux mots de passe ne correspondent pas.';
      errBox.style.display = 'block';
      return false;
    }

    btn.disabled = true;
    try {
      const r = await fetch('/api/vitrine-site/admin/reset-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await r.json();
      if (r.ok) {
        okBox.textContent = 'Mot de passe réinitialisé. Redirection vers la connexion...';
        okBox.style.display = 'block';
        setTimeout(() => { window.location.href = 'vitrine-admin-connexion.html'; }, 1800);
      } else {
        errBox.textContent = data.error || 'Erreur lors de la réinitialisation.';
        errBox.style.display = 'block';
        btn.disabled = false;
      }
    } catch (err) {
      errBox.textContent = 'Connexion impossible. Réessayez.';
      errBox.style.display = 'block';
      btn.disabled = false;
    }
    return false;
  }
</script>
</body>
</html>
