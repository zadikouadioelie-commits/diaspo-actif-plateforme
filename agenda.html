<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mon Agenda — Diaspo'Actif</title>
<link rel="icon" href="/assets/logo.svg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f7;color:#1a2b4a;}
:root{--primary:#1a3a5c;--accent:#4a90d9;--green:#27ae60;--red:#e74c3c;--orange:#e67e22;}

/* HEADER */
#ag-header{background:var(--primary);color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.ag-back{color:#fff;text-decoration:none;font-size:.8rem;opacity:.8;}
#ag-title{font-size:1.1rem;font-weight:800;flex:1;}
.ag-nav-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:6px;font-size:.8rem;cursor:pointer;}
.ag-nav-btn:hover{background:rgba(255,255,255,.22);}
.ag-nav-btn.primary{background:var(--accent);border-color:var(--accent);}
#ag-period{font-size:.85rem;font-weight:700;min-width:200px;text-align:center;}

/* TABS VUE */
#ag-view-tabs{display:flex;border-bottom:2px solid #e0e8f0;background:#fff;padding:0 20px;gap:4px;}
.view-tab{padding:10px 16px;font-size:.82rem;font-weight:700;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all .2s;}
.view-tab.active{color:var(--primary);border-bottom-color:var(--accent);}

/* MAIN */
#ag-main{max-width:1200px;margin:0 auto;padding:16px;}

/* VUE MOIS */
#view-month{}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e0e8f0;border-radius:8px;overflow:hidden;}
.month-header{background:#f8f9ff;padding:8px;text-align:center;font-size:.75rem;font-weight:800;color:#888;text-transform:uppercase;}
.month-day{background:#fff;min-height:90px;padding:4px;cursor:pointer;transition:background .1s;position:relative;}
.month-day:hover{background:#f0f7ff;}
.month-day.other-month{background:#fafafa;opacity:.5;}
.month-day.today{background:#eff6ff;}
.month-day.today .day-num{background:var(--accent);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.day-num{font-size:.78rem;font-weight:700;color:#888;margin-bottom:3px;}
.month-event{font-size:.7rem;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;font-weight:600;}
.month-more{font-size:.65rem;color:var(--accent);cursor:pointer;margin-top:2px;}

/* VUE SEMAINE */
.week-grid{display:grid;grid-template-columns:60px repeat(7,1fr);border:1px solid #e0e8f0;border-radius:8px;overflow:hidden;background:#fff;}
.week-header-empty{background:#f8f9ff;border-right:1px solid #e0e8f0;border-bottom:2px solid #e0e8f0;}
.week-day-header{background:#f8f9ff;padding:8px 4px;text-align:center;font-size:.75rem;border-right:1px solid #e0e8f0;border-bottom:2px solid #e0e8f0;}
.week-day-header .dname{font-weight:800;text-transform:uppercase;color:#888;}
.week-day-header .dnum{font-size:1.2rem;font-weight:900;color:var(--primary);}
.week-day-header.today .dnum{background:var(--accent);color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.week-hours{display:contents;}
.week-time-col{padding:0;}
.week-hour-label{height:48px;border-bottom:1px solid #f0f0f0;border-right:1px solid #e0e8f0;padding:0 4px;display:flex;align-items:flex-start;font-size:.65rem;color:#bbb;padding-top:2px;}
.week-day-col{position:relative;border-right:1px solid #e8edf5;}
.week-day-slots{position:relative;height:1152px;/* 24h x 48px */}
.week-slot{position:absolute;left:1px;right:1px;border-radius:4px;padding:2px 4px;font-size:.7rem;color:#fff;font-weight:600;cursor:pointer;overflow:hidden;z-index:1;}
.week-hour-line{position:absolute;left:0;right:0;height:1px;background:#f0f0f0;}
.week-now-line{position:absolute;left:0;right:0;height:2px;background:#e74c3c;z-index:5;}

/* VUE JOUR */
.day-timeline{display:grid;grid-template-columns:60px 1fr;border:1px solid #e0e8f0;border-radius:8px;overflow:hidden;background:#fff;}
.day-slots{position:relative;height:1152px;}
.day-slot{position:absolute;left:2px;right:2px;border-radius:6px;padding:4px 8px;font-size:.78rem;color:#fff;font-weight:600;cursor:pointer;overflow:hidden;}

/* VUE LISTE */
.list-group{margin-bottom:20px;}
.list-date-header{font-size:.8rem;font-weight:800;color:#888;text-transform:uppercase;padding:8px 0;border-bottom:2px solid #e0e8f0;margin-bottom:8px;}
.list-event{display:flex;gap:12px;align-items:flex-start;padding:10px 14px;background:#fff;border-radius:8px;margin-bottom:8px;border-left:4px solid #4a90d9;cursor:pointer;transition:box-shadow .15s;}
.list-event:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);}
.list-event-time{font-size:.78rem;font-weight:700;color:#888;min-width:90px;}
.list-event-info{flex:1;}
.list-event-title{font-size:.9rem;font-weight:700;}
.list-event-desc{font-size:.78rem;color:#888;margin-top:2px;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal-box{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-title{font-size:1rem;font-weight:800;margin-bottom:16px;color:var(--primary);}
.modal-close{position:absolute;top:16px;right:16px;background:#f0f0f0;border:none;border-radius:50%;width:28px;height:28px;font-size:1rem;cursor:pointer;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-field{margin-bottom:10px;}
label{font-size:.78rem;font-weight:600;color:#555;display:block;margin-bottom:3px;}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid #d0d8e4;border-radius:7px;font-family:inherit;font-size:.85rem;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px #4a90d920;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn{padding:9px 18px;border-radius:8px;font-size:.85rem;font-weight:700;border:none;cursor:pointer;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-outline{background:#f0f4ff;color:var(--primary);border:1px solid #d0d8e4;}
.btn-orange{background:var(--orange);color:#fff;}

/* PANNEAU RDV */
#rdv-panel{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;}
#rdv-panel h3{font-size:.9rem;margin-bottom:12px;color:var(--primary);}
.rdv-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:#f8f9ff;margin-bottom:8px;border-left:4px solid #e0e8f0;}
.rdv-item.en_attente{border-color:var(--orange);}
.rdv-item.accepte{border-color:var(--green);}
.rdv-item.refuse{border-color:var(--red);}
.rdv-item.contre_proposition{border-color:#9b59b6;}
.rdv-badge{font-size:.65rem;font-weight:800;padding:2px 7px;border-radius:10px;background:#e0e8f0;color:#555;text-transform:uppercase;}

/* COULEURS */
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.color-swatch.selected{border-color:#fff;box-shadow:0 0 0 2px var(--primary);transform:scale(1.15);}

/* RESPONSIVE */
@media(max-width:768px){
  .month-event{display:none;}
  .month-day{min-height:50px;}
  .form-row{grid-template-columns:1fr;}
  #ag-period{font-size:.75rem;min-width:120px;}
}
</style>
</head>
<body>

<header id="ag-header">
  <a href="/dashboard-utilisateur.html" class="ag-back">← Dashboard</a>
  <span id="ag-title">📅 Mon Agenda</span>
  <button class="ag-nav-btn" onclick="navPrev()">‹</button>
  <span id="ag-period">—</span>
  <button class="ag-nav-btn" onclick="navNext()">›</button>
  <button class="ag-nav-btn" onclick="goToday()">Aujourd'hui</button>
  <button class="ag-nav-btn primary" onclick="openNewEvent()">+ Événement</button>
  <button class="ag-nav-btn" onclick="openRdvModal()" style="background:#27ae60;border-color:#27ae60;">🤝 RDV</button>
  <button class="ag-nav-btn" onclick="location.href='/meeting.html'" style="background:#e67e22;border-color:#e67e22;">📹 Réunion</button>
</header>

<div id="ag-view-tabs">
  <button class="view-tab active" data-view="month" onclick="switchView('month',this)">Mois</button>
  <button class="view-tab" data-view="week" onclick="switchView('week',this)">Semaine</button>
  <button class="view-tab" data-view="day" onclick="switchView('day',this)">Jour</button>
  <button class="view-tab" data-view="list" onclick="switchView('list',this)">Liste</button>
  <button class="view-tab" data-view="rdv" onclick="switchView('rdv',this)">🤝 Mes RDV</button>
</div>

<div id="ag-main">
  <div id="view-month"></div>
  <div id="view-week" style="display:none;"></div>
  <div id="view-day" style="display:none;"></div>
  <div id="view-list" style="display:none;"></div>
  <div id="view-rdv" style="display:none;"></div>
</div>

<!-- MODAL ÉVÉNEMENT -->
<div class="modal-backdrop" id="modal-event">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-event')">×</button>
    <div class="modal-title" id="event-modal-title">Nouvel événement</div>
    <input type="hidden" id="ev-id">
    <div class="form-field"><label>Titre *</label><input id="ev-titre" type="text" placeholder="Titre de l'événement"></div>
    <div class="form-row">
      <div><label>Date début *</label><input id="ev-date-debut" type="datetime-local"></div>
      <div><label>Date fin *</label><input id="ev-date-fin" type="datetime-local"></div>
    </div>
    <div class="form-row">
      <div><label>Lieu</label><input id="ev-lieu" type="text" placeholder="Paris, Zoom, Téléphone…"></div>
      <div><label>Type</label><select id="ev-lieu-type"><option value="physique">Physique</option><option value="virtuel">Virtuel</option><option value="telephone">Téléphone</option></select></div>
    </div>
    <div class="form-field"><label>Description</label><textarea id="ev-desc" rows="2" placeholder="Description…"></textarea></div>
    <div class="form-field"><label>Notes privées</label><textarea id="ev-notes" rows="2" placeholder="Notes privées (visibles uniquement par vous)…"></textarea></div>
    <div class="form-field">
      <label>Couleur</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;" id="color-picker">
        <div class="color-swatch selected" style="background:#4a90d9;" data-color="#4a90d9" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#27ae60;" data-color="#27ae60" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#e74c3c;" data-color="#e74c3c" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#e67e22;" data-color="#e67e22" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#9b59b6;" data-color="#9b59b6" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#1a3a5c;" data-color="#1a3a5c" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#16a085;" data-color="#16a085" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#f39c12;" data-color="#f39c12" onclick="selectColor(this)"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveEvent()">💾 Enregistrer</button>
      <button class="btn btn-outline" onclick="closeModal('modal-event')">Annuler</button>
      <button class="btn btn-red" id="btn-delete-ev" onclick="deleteEvent()" style="display:none;">🗑 Supprimer</button>
    </div>
  </div>
</div>

<!-- MODAL PROPOSER RDV -->
<div class="modal-backdrop" id="modal-rdv">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-rdv')">×</button>
    <div class="modal-title">🤝 Proposer un rendez-vous</div>
    <div class="form-field"><label>Avec qui ? (ID ou recherche)</label>
      <input id="rdv-dest-search" type="text" placeholder="Rechercher un utilisateur…" oninput="searchUsers(this.value)">
      <div id="rdv-user-results" style="border:1px solid #e0e8f0;border-radius:6px;margin-top:4px;display:none;max-height:150px;overflow-y:auto;background:#fff;position:relative;z-index:10;"></div>
      <input type="hidden" id="rdv-dest-id">
      <div id="rdv-dest-name" style="font-size:.8rem;color:var(--green);margin-top:4px;font-weight:700;"></div>
    </div>
    <div class="form-field"><label>Sujet *</label><input id="rdv-titre" type="text" placeholder="Objet du rendez-vous"></div>
    <div class="form-field"><label>Description</label><textarea id="rdv-desc" rows="2" placeholder="Description…"></textarea></div>
    <div class="form-row">
      <div><label>Date *</label><input id="rdv-date" type="date"></div>
      <div><label>Durée</label>
        <select id="rdv-duree">
          <option value="15">15 min</option>
          <option value="30" selected>30 min</option>
          <option value="45">45 min</option>
          <option value="60">1 heure</option>
          <option value="90">1h30</option>
          <option value="120">2 heures</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div><label>Heure début *</label><input id="rdv-heure-debut" type="time" value="09:00"></div>
      <div><label>Heure fin</label><input id="rdv-heure-fin" type="time" value="09:30" readonly style="background:#f8f9ff;"></div>
    </div>
    <div class="form-row">
      <div><label>Lieu</label><input id="rdv-lieu" type="text" placeholder="Lieu ou lien visio…"></div>
      <div><label>Type</label><select id="rdv-lieu-type"><option value="virtuel">Virtuel</option><option value="physique">Physique</option><option value="telephone">Téléphone</option></select></div>
    </div>
    <div id="rdv-dispo-result" style="font-size:.8rem;margin-top:4px;"></div>
    <div class="modal-actions">
      <button class="btn btn-green" onclick="proposerRdv()">📨 Envoyer la proposition</button>
      <button class="btn btn-outline" onclick="closeModal('modal-rdv')">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL RÉPONDRE RDV -->
<div class="modal-backdrop" id="modal-rdv-respond">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-rdv-respond')">×</button>
    <div class="modal-title" id="rdv-respond-title">Répondre au rendez-vous</div>
    <input type="hidden" id="rdv-respond-id">
    <div id="rdv-respond-info" style="background:#f8f9ff;border-radius:8px;padding:12px;margin-bottom:14px;font-size:.85rem;"></div>
    <div class="form-field"><label>Message (optionnel)</label><textarea id="rdv-respond-msg" rows="2" placeholder="Votre message…"></textarea></div>
    <div id="contre-prop-fields" style="display:none;">
      <div style="font-size:.82rem;font-weight:700;color:#9b59b6;margin-bottom:8px;">Proposer une autre date :</div>
      <div class="form-row">
        <div><label>Nouvelle date</label><input id="contre-date" type="date"></div>
        <div><label>Heure début</label><input id="contre-heure-debut" type="time"></div>
      </div>
      <div><label>Heure fin</label><input id="contre-heure-fin" type="time"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-green" onclick="respondRdv('accepte')">✅ Accepter</button>
      <button class="btn btn-orange" onclick="showContreProp()">🔄 Autre date</button>
      <button class="btn btn-red" onclick="respondRdv('refuse')">❌ Refuser</button>
      <button class="btn btn-outline" onclick="closeModal('modal-rdv-respond')">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL DÉTAIL ÉVÉNEMENT -->
<div class="modal-backdrop" id="modal-event-detail">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-event-detail')">×</button>
    <div id="event-detail-content"></div>
  </div>
</div>

<script>
/* ═══════════ STATE ═══════════ */
let currentView = 'month';
let currentDate = new Date();
let events = [];
let rdvList = [];
let selectedColor = '#4a90d9';

/* ═══════════ INIT ═══════════ */
(async () => {
  await loadEvents();
  await loadRdv();
  render();
  checkReminders();
  setInterval(checkReminders, 5 * 60 * 1000);
})();

async function loadEvents() {
  try {
    const from = new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1).toISOString().slice(0,10);
    const to   = new Date(currentDate.getFullYear(), currentDate.getMonth()+2, 0).toISOString().slice(0,10);
    const r = await fetch(`/api/agenda/events?from=${from}&to=${to}`, { credentials:'include' });
    if (r.ok) events = await r.json();
  } catch(e) {}
}
async function loadRdv() {
  try {
    const r = await fetch('/api/rdv', { credentials:'include' });
    if (r.ok) rdvList = await r.json();
  } catch(e) {}
}
async function checkReminders() {
  try { await fetch('/api/agenda/reminders', { credentials:'include' }); } catch(e) {}
}

/* ═══════════ NAVIGATION ═══════════ */
function switchView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function navPrev() {
  if (currentView==='month') currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1);
  else if (currentView==='week') currentDate = new Date(currentDate.getTime() - 7*86400000);
  else if (currentView==='day') currentDate = new Date(currentDate.getTime() - 86400000);
  else if (currentView==='list') currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1);
  loadAndRender();
}
function navNext() {
  if (currentView==='month') currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1);
  else if (currentView==='week') currentDate = new Date(currentDate.getTime() + 7*86400000);
  else if (currentView==='day') currentDate = new Date(currentDate.getTime() + 86400000);
  else if (currentView==='list') currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1);
  loadAndRender();
}
function goToday() { currentDate = new Date(); loadAndRender(); }
async function loadAndRender() { await loadEvents(); render(); }

/* ═══════════ RENDER ═══════════ */
function render() {
  document.getElementById('view-month').style.display = currentView==='month'?'':'none';
  document.getElementById('view-week').style.display  = currentView==='week'?'':'none';
  document.getElementById('view-day').style.display   = currentView==='day'?'':'none';
  document.getElementById('view-list').style.display  = currentView==='list'?'':'none';
  document.getElementById('view-rdv').style.display   = currentView==='rdv'?'':'none';
  if (currentView==='month') renderMonth();
  if (currentView==='week')  renderWeek();
  if (currentView==='day')   renderDay();
  if (currentView==='list')  renderList();
  if (currentView==='rdv')   renderRdvPanel();
}

const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const JOURS = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const JOURS_L = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

function renderMonth() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('ag-period').textContent = `${MOIS[m]} ${y}`;
  const first = new Date(y, m, 1), last = new Date(y, m+1, 0);
  const startDow = first.getDay();
  const today = new Date(); today.setHours(0,0,0,0);

  let html = '<div class="month-grid">';
  for (const j of JOURS) html += `<div class="month-header">${j}</div>`;

  let day = new Date(y, m, 1 - startDow);
  for (let i=0; i<42; i++) {
    const isToday = day.getTime()===today.getTime();
    const isOther = day.getMonth()!==m;
    const ds = day.toISOString().slice(0,10);
    const dayEvts = events.filter(e => e.date_debut.startsWith(ds));
    html += `<div class="month-day${isOther?' other-month':''}${isToday?' today':''}" onclick="dayClick('${ds}')">`;
    html += `<div class="day-num">${isToday?`<span style="background:var(--accent);color:#fff;border-radius:50%;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;">${day.getDate()}</span>`:day.getDate()}</div>`;
    dayEvts.slice(0,3).forEach(ev => {
      html += `<div class="month-event" style="background:${ev.couleur||'#4a90d9'}" onclick="event.stopPropagation();openEventDetail(${ev.id})">${_esc(ev.titre)}</div>`;
    });
    if (dayEvts.length>3) html += `<div class="month-more">+${dayEvts.length-3} autres</div>`;
    html += '</div>';
    day = new Date(day.getTime()+86400000);
  }
  html += '</div>';
  document.getElementById('view-month').innerHTML = html;
}

function renderWeek() {
  const dow = currentDate.getDay();
  const monday = new Date(currentDate.getTime() - (dow===0?6:dow-1)*86400000);
  const days = Array.from({length:7}, (_,i) => new Date(monday.getTime()+i*86400000));
  const today = new Date(); today.setHours(0,0,0,0);
  document.getElementById('ag-period').textContent = `Sem. du ${days[0].getDate()} ${MOIS[days[0].getMonth()].slice(0,3)} au ${days[6].getDate()} ${MOIS[days[6].getMonth()].slice(0,3)} ${days[6].getFullYear()}`;

  let html = '<div class="week-grid">';
  html += '<div class="week-header-empty" style="background:#f8f9ff;border-right:1px solid #e0e8f0;border-bottom:2px solid #e0e8f0;"></div>';
  days.forEach(d => {
    const isToday = d.getTime()===today.getTime();
    html += `<div class="week-day-header${isToday?' today':''}"><div class="dname">${JOURS[d.getDay()]}</div><div class="dnum" style="${isToday?'background:var(--accent);color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin:0 auto;':''}">${d.getDate()}</div></div>`;
  });
  // Grille heures
  for (let h=0; h<24; h++) {
    html += `<div class="week-hour-label">${String(h).padStart(2,'0')}:00</div>`;
    days.forEach(d => {
      const ds = d.toISOString().slice(0,10);
      const dayEvts = events.filter(e => e.date_debut.startsWith(ds));
      html += `<div class="week-day-col" style="border-right:1px solid #e8edf5;height:48px;border-bottom:1px solid #f0f0f0;position:relative;" onclick="dayHourClick('${ds}','${String(h).padStart(2,'0')}:00')">`;
      if (h===0) {
        // Render events for this day (positioned absolutely relative to column)
        dayEvts.forEach(ev => {
          const s = ev.date_debut.slice(11,16)||'00:00'; const e = ev.date_fin.slice(11,16)||'01:00';
          const [sh,sm] = s.split(':').map(Number); const [eh,em] = e.split(':').map(Number);
          const top = (sh*60+sm)*48/60; const height = Math.max(16,(eh*60+em-sh*60-sm)*48/60);
          html += `<div class="week-slot" style="background:${ev.couleur||'#4a90d9'};top:${top}px;height:${height}px;" onclick="event.stopPropagation();openEventDetail(${ev.id})">${_esc(ev.titre)}</div>`;
        });
      }
      html += '</div>';
    });
  }
  html += '</div>';
  document.getElementById('view-week').innerHTML = html;
}

function renderDay() {
  const ds = currentDate.toISOString().slice(0,10);
  document.getElementById('ag-period').textContent = `${JOURS_L[currentDate.getDay()]} ${currentDate.getDate()} ${MOIS[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
  const dayEvts = events.filter(e => e.date_debut.startsWith(ds));
  let html = '<div class="day-timeline">';
  html += '<div>';
  for (let h=0; h<24; h++) html += `<div class="week-hour-label">${String(h).padStart(2,'0')}:00</div>`;
  html += '</div>';
  html += '<div class="day-slots" onclick="dayHourClickFromEvt(event)">';
  // Lignes
  for (let h=0; h<24; h++) html += `<div class="week-hour-line" style="top:${h*48}px;"></div>`;
  // Heure courante
  const now = new Date(); const nowMin = now.getHours()*60+now.getMinutes();
  if (ds === now.toISOString().slice(0,10)) html += `<div class="week-now-line" style="top:${nowMin*48/60}px;"></div>`;
  // Événements
  dayEvts.forEach(ev => {
    const s = ev.date_debut.slice(11,16)||'00:00'; const e = ev.date_fin.slice(11,16)||'01:00';
    const [sh,sm] = s.split(':').map(Number); const [eh,em] = e.split(':').map(Number);
    const top = (sh*60+sm)*48/60; const height = Math.max(24,(eh*60+em-sh*60-sm)*48/60);
    html += `<div class="day-slot" style="background:${ev.couleur||'#4a90d9'};top:${top}px;height:${height}px;" onclick="event.stopPropagation();openEventDetail(${ev.id})"><strong>${_esc(ev.titre)}</strong><br>${s} – ${e}${ev.lieu?'<br>📍 '+_esc(ev.lieu):''}</div>`;
  });
  html += '</div></div>';
  document.getElementById('view-day').innerHTML = html;
}

function renderList() {
  const from = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
  const to   = new Date(currentDate.getFullYear(), currentDate.getMonth()+3, 0);
  document.getElementById('ag-period').textContent = `${MOIS[from.getMonth()]} – ${MOIS[to.getMonth()]} ${to.getFullYear()}`;
  const upcoming = events.filter(e => new Date(e.date_debut) >= from).sort((a,b) => new Date(a.date_debut)-new Date(b.date_debut));
  if (!upcoming.length) { document.getElementById('view-list').innerHTML = '<div style="padding:40px;text-align:center;color:#aaa;">Aucun événement à venir</div>'; return; }
  const groups = {};
  upcoming.forEach(ev => {
    const k = ev.date_debut.slice(0,10);
    if (!groups[k]) groups[k] = [];
    groups[k].push(ev);
  });
  let html = '';
  for (const [date, evts] of Object.entries(groups)) {
    const d = new Date(date+'T12:00:00');
    html += `<div class="list-group"><div class="list-date-header">${JOURS_L[d.getDay()]} ${d.getDate()} ${MOIS[d.getMonth()]} ${d.getFullYear()}</div>`;
    evts.forEach(ev => {
      html += `<div class="list-event" style="border-left-color:${ev.couleur||'#4a90d9'}" onclick="openEventDetail(${ev.id})">
        <div class="list-event-time">${(ev.date_debut.slice(11,16)||'')}<br><span style="font-weight:400;color:#bbb;">${(ev.date_fin.slice(11,16)||'')}</span></div>
        <div class="list-event-info"><div class="list-event-title">${_esc(ev.titre)}</div>${ev.lieu?`<div class="list-event-desc">📍 ${_esc(ev.lieu)}</div>`:''}${ev.description?`<div class="list-event-desc">${_esc(ev.description.slice(0,80))}</div>`:''}</div>
        ${ev.meeting_id?`<button class="btn btn-orange" style="font-size:.7rem;padding:4px 8px;" onclick="event.stopPropagation();joinMeeting(${ev.meeting_id})">📹</button>`:''}
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('view-list').innerHTML = html;
}

function renderRdvPanel() {
  document.getElementById('ag-period').textContent = 'Mes Rendez-vous';
  const LABELS = { en_attente:'En attente',accepte:'Accepté',refuse:'Refusé',contre_proposition:'Contre-prop.',annule:'Annulé',expire:'Expiré' };
  const COLORS = { en_attente:'#e67e22',accepte:'#27ae60',refuse:'#e74c3c',contre_proposition:'#9b59b6',annule:'#95a5a6',expire:'#95a5a6' };
  let html = '<div style="background:#fff;border-radius:12px;padding:16px;">';
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><h3 style="font-size:.95rem;color:var(--primary);">Mes rendez-vous (${rdvList.length})</h3><button class="btn btn-green" onclick="openRdvModal()" style="font-size:.78rem;padding:6px 12px;">+ Proposer un RDV</button></div>`;
  if (!rdvList.length) { html += '<div style="padding:24px;text-align:center;color:#aaa;">Aucun rendez-vous</div>'; }
  rdvList.forEach(rdv => {
    const isProposeur = rdv.proposeur_id !== undefined; // simplified
    const other = rdv.proposeur_nom ? `${rdv.proposeur_prenom} ${rdv.proposeur_nom}` : `${rdv.dest_prenom} ${rdv.dest_nom}`;
    html += `<div class="rdv-item ${rdv.statut}" style="cursor:pointer;" onclick="openRdvDetail(${rdv.id})">
      <div style="flex:1;">
        <div style="font-weight:700;font-size:.88rem;">${_esc(rdv.titre)}</div>
        <div style="font-size:.75rem;color:#888;">👤 ${_esc(other)} · 📅 ${rdv.date_proposee} ${rdv.heure_debut}–${rdv.heure_fin}</div>
        ${rdv.lieu?`<div style="font-size:.72rem;color:#aaa;">📍 ${_esc(rdv.lieu)}</div>`:''}
        ${rdv.statut==='contre_proposition'?`<div style="font-size:.72rem;color:#9b59b6;">Nouvelle proposition : ${rdv.contre_date} ${rdv.contre_heure_debut}</div>`:''}
      </div>
      <span class="rdv-badge" style="background:${COLORS[rdv.statut]||'#e0e8f0'};color:#fff;">${LABELS[rdv.statut]||rdv.statut}</span>
      ${rdv.meeting_id?`<button class="btn" style="background:#e67e22;color:#fff;font-size:.72rem;padding:4px 8px;" onclick="event.stopPropagation();joinMeetingByRdv(${rdv.meeting_id})">📹</button>`:''}
    </div>`;
  });
  html += '</div>';
  document.getElementById('view-rdv').innerHTML = html;
}

/* ═══════════ ÉVÉNEMENTS ═══════════ */
function dayClick(ds) { currentView='day'; currentDate = new Date(ds+'T12:00:00'); render(); }
function dayHourClick(ds, h) { openNewEvent(ds, h); }
function dayHourClickFromEvt(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const y = e.clientY - rect.top;
  const totalMin = (y / 48) * 60;
  const h = Math.floor(totalMin/60), m = Math.floor((totalMin%60)/15)*15;
  const ds = currentDate.toISOString().slice(0,10);
  openNewEvent(ds, `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
}

function openNewEvent(dateStr, timeStr) {
  document.getElementById('event-modal-title').textContent = 'Nouvel événement';
  document.getElementById('ev-id').value = '';
  document.getElementById('ev-titre').value = '';
  document.getElementById('ev-desc').value = '';
  document.getElementById('ev-notes').value = '';
  document.getElementById('ev-lieu').value = '';
  document.getElementById('ev-lieu-type').value = 'physique';
  document.getElementById('btn-delete-ev').style.display = 'none';
  const ds = dateStr || currentDate.toISOString().slice(0,10);
  const ts = timeStr || '09:00';
  const [h,m] = ts.split(':').map(Number);
  const endH = h+1>23?23:h+1;
  document.getElementById('ev-date-debut').value = `${ds}T${ts}`;
  document.getElementById('ev-date-fin').value   = `${ds}T${String(endH).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  selectedColor = '#4a90d9';
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('selected', s.dataset.color==='#4a90d9'));
  openModal('modal-event');
}

function openEventDetail(id) {
  const ev = events.find(e => e.id===id);
  if (!ev) return;
  const sd = new Date(ev.date_debut), ed = new Date(ev.date_fin);
  const fmt = d => d.toLocaleString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  let html = `<div style="border-left:5px solid ${ev.couleur||'#4a90d9'};padding-left:12px;margin-bottom:16px;">
    <div style="font-size:1.1rem;font-weight:800;margin-bottom:4px;">${_esc(ev.titre)}</div>
    <div style="font-size:.82rem;color:#888;">📅 ${fmt(sd)} → ${fmt(ed)}</div>
    ${ev.lieu?`<div style="font-size:.82rem;color:#888;">📍 ${_esc(ev.lieu)}</div>`:''}
  </div>`;
  if (ev.description) html += `<div style="font-size:.85rem;color:#333;margin-bottom:10px;line-height:1.6;">${_esc(ev.description)}</div>`;
  if (ev.notes_privees) html += `<div style="background:#fffbe6;border-radius:6px;padding:8px;font-size:.8rem;margin-bottom:10px;">🔒 ${_esc(ev.notes_privees)}</div>`;
  document.getElementById('event-detail-content').innerHTML = html;
  // Actions
  const actions = document.createElement('div');
  actions.className = 'modal-actions';
  actions.innerHTML = `<button class="btn btn-outline" onclick="editEvent(${id})">✏️ Modifier</button>`;
  if (ev.meeting_id) actions.innerHTML += `<button class="btn btn-orange" onclick="joinMeeting(${ev.meeting_id})">📹 Rejoindre la réunion</button>`;
  actions.innerHTML += `<button class="btn btn-outline" onclick="closeModal('modal-event-detail')">Fermer</button>`;
  document.getElementById('event-detail-content').appendChild(actions);
  openModal('modal-event-detail');
}

function editEvent(id) {
  const ev = events.find(e => e.id===id);
  if (!ev) return;
  closeModal('modal-event-detail');
  document.getElementById('event-modal-title').textContent = 'Modifier l\'événement';
  document.getElementById('ev-id').value = id;
  document.getElementById('ev-titre').value = ev.titre||'';
  document.getElementById('ev-desc').value = ev.description||'';
  document.getElementById('ev-notes').value = ev.notes_privees||'';
  document.getElementById('ev-lieu').value = ev.lieu||'';
  document.getElementById('ev-lieu-type').value = ev.lieu_type||'physique';
  document.getElementById('ev-date-debut').value = ev.date_debut?.slice(0,16)||'';
  document.getElementById('ev-date-fin').value = ev.date_fin?.slice(0,16)||'';
  selectedColor = ev.couleur||'#4a90d9';
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('selected', s.dataset.color===selectedColor));
  document.getElementById('btn-delete-ev').style.display = '';
  openModal('modal-event');
}

async function saveEvent() {
  const id = document.getElementById('ev-id').value;
  const data = {
    titre: document.getElementById('ev-titre').value.trim(),
    description: document.getElementById('ev-desc').value.trim(),
    notes_privees: document.getElementById('ev-notes').value.trim(),
    lieu: document.getElementById('ev-lieu').value.trim(),
    lieu_type: document.getElementById('ev-lieu-type').value,
    date_debut: document.getElementById('ev-date-debut').value.replace('T',' ').slice(0,16)+':00',
    date_fin: document.getElementById('ev-date-fin').value.replace('T',' ').slice(0,16)+':00',
    couleur: selectedColor
  };
  if (!data.titre) { alert('Le titre est requis'); return; }
  const url = id ? `/api/agenda/events/${id}` : '/api/agenda/events';
  const method = id ? 'PUT' : 'POST';
  const r = await fetch(url, { method, headers:{'Content-Type':'application/json'}, credentials:'include', body:JSON.stringify(data) });
  if (r.ok) { closeModal('modal-event'); await loadAndRender(); }
  else alert('Erreur : ' + (await r.json()).error);
}

async function deleteEvent() {
  const id = document.getElementById('ev-id').value;
  if (!id || !confirm('Supprimer cet événement ?')) return;
  const r = await fetch(`/api/agenda/events/${id}`, { method:'DELETE', credentials:'include' });
  if (r.ok) { closeModal('modal-event'); await loadAndRender(); }
}

function selectColor(el) {
  selectedColor = el.dataset.color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

/* ═══════════ RDV ═══════════ */
function openRdvModal(destId, destName) {
  document.getElementById('rdv-dest-id').value = destId||'';
  document.getElementById('rdv-dest-name').textContent = destName ? `✅ ${destName}` : '';
  document.getElementById('rdv-dest-search').value = destName||'';
  document.getElementById('rdv-titre').value = '';
  document.getElementById('rdv-desc').value = '';
  document.getElementById('rdv-dispo-result').textContent = '';
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('rdv-date').value = today;
  updateRdvFin();
  openModal('modal-rdv');
}

document.getElementById('rdv-heure-debut')?.addEventListener('change', updateRdvFin);
document.getElementById('rdv-duree')?.addEventListener('change', updateRdvFin);
function updateRdvFin() {
  const h = document.getElementById('rdv-heure-debut').value;
  const dur = parseInt(document.getElementById('rdv-duree').value)||30;
  if (!h) return;
  const [hh,mm] = h.split(':').map(Number);
  const total = hh*60+mm+dur;
  document.getElementById('rdv-heure-fin').value = `${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}

let userSearchTimer;
async function searchUsers(q) {
  clearTimeout(userSearchTimer);
  const res = document.getElementById('rdv-user-results');
  if (!q || q.length < 2) { res.style.display='none'; return; }
  userSearchTimer = setTimeout(async () => {
    try {
      const r = await fetch(`/api/users/search?q=${encodeURIComponent(q)}&limit=8`, { credentials:'include' });
      if (!r.ok) return;
      const users = await r.json();
      if (!users.length) { res.style.display='none'; return; }
      res.innerHTML = users.map(u => `<div style="padding:8px 12px;cursor:pointer;font-size:.82rem;border-bottom:1px solid #f0f0f0;" onmousedown="selectRdvUser(${u.id},'${_esc(u.prenom)} ${_esc(u.nom)}')">${_esc(u.prenom)} ${_esc(u.nom)}<span style="color:#aaa;margin-left:6px;">${_esc(u.email||u.ville||'')}</span></div>`).join('');
      res.style.display = 'block';
    } catch(e) {}
  }, 300);
}
function selectRdvUser(id, name) {
  document.getElementById('rdv-dest-id').value = id;
  document.getElementById('rdv-dest-name').textContent = `✅ ${name}`;
  document.getElementById('rdv-dest-search').value = name;
  document.getElementById('rdv-user-results').style.display = 'none';
}

async function proposerRdv() {
  const destId = document.getElementById('rdv-dest-id').value;
  const titre = document.getElementById('rdv-titre').value.trim();
  const date = document.getElementById('rdv-date').value;
  const heureDebut = document.getElementById('rdv-heure-debut').value;
  const heureFin = document.getElementById('rdv-heure-fin').value;
  if (!destId||!titre||!date||!heureDebut) { alert('Veuillez remplir tous les champs obligatoires'); return; }
  const dispo = document.getElementById('rdv-dispo-result');
  dispo.textContent = '⏳ Vérification des disponibilités…';
  // Vérif dispo
  const debut = `${date}T${heureDebut}:00`;
  const fin   = `${date}T${heureFin}:00`;
  try {
    const r1 = await fetch(`/api/agenda/availability?debut=${encodeURIComponent(debut)}&fin=${encodeURIComponent(fin)}`, { credentials:'include' });
    const a1 = await r1.json();
    const r2 = await fetch(`/api/agenda/availability?user_id=${destId}&debut=${encodeURIComponent(debut)}&fin=${encodeURIComponent(fin)}`, { credentials:'include' });
    const a2 = await r2.json();
    if (!a1.libre) { dispo.innerHTML = `<span style="color:var(--red);">❌ Vous n'êtes pas disponible sur ce créneau.${a1.suggestions.length?` Suggestions : ${a1.suggestions.map(s=>s.debut.slice(11,16)).join(', ')}.`:''}</span>`; return; }
    if (!a2.libre) { dispo.innerHTML = `<span style="color:var(--orange);">⚠️ Le destinataire n'est peut-être pas disponible sur ce créneau.${a2.suggestions.length?` Créneaux libres : ${a2.suggestions.map(s=>s.debut.slice(11,16)).join(', ')}.`:''}</span>`; }
    else dispo.innerHTML = '<span style="color:var(--green);">✅ Les deux utilisateurs sont disponibles.</span>';
  } catch(e) {}

  const body = {
    destinataire_id: parseInt(destId),
    titre,
    description: document.getElementById('rdv-desc').value.trim(),
    date_proposee: date, heure_debut: heureDebut, heure_fin: heureFin,
    duree_minutes: parseInt(document.getElementById('rdv-duree').value)||30,
    lieu: document.getElementById('rdv-lieu').value.trim(),
    lieu_type: document.getElementById('rdv-lieu-type').value
  };
  const r = await fetch('/api/rdv', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body:JSON.stringify(body) });
  const j = await r.json();
  if (r.ok) { closeModal('modal-rdv'); await loadRdv(); if (currentView==='rdv') renderRdvPanel(); alert('✅ Proposition de RDV envoyée !'); }
  else dispo.innerHTML = `<span style="color:var(--red);">❌ ${j.error}</span>`;
}

function openRdvDetail(id) {
  const rdv = rdvList.find(r => r.id===id);
  if (!rdv) return;
  document.getElementById('rdv-respond-id').value = id;
  document.getElementById('rdv-respond-title').textContent = `RDV : ${rdv.titre}`;
  document.getElementById('rdv-respond-info').innerHTML = `
    <strong>${_esc(rdv.titre)}</strong><br>
    📅 ${rdv.date_proposee} · ${rdv.heure_debut} – ${rdv.heure_fin}<br>
    ${rdv.lieu?`📍 ${_esc(rdv.lieu)}<br>`:''}
    ${rdv.description?`📝 ${_esc(rdv.description)}<br>`:''}
    Statut : <strong>${rdv.statut}</strong>
    ${rdv.statut==='contre_proposition'?`<br>Nouvelle proposition : ${rdv.contre_date} ${rdv.contre_heure_debut} – ${rdv.contre_heure_fin}`:''}
  `;
  document.getElementById('contre-prop-fields').style.display = 'none';
  document.getElementById('rdv-respond-msg').value = '';
  openModal('modal-rdv-respond');
}

function showContreProp() {
  document.getElementById('contre-prop-fields').style.display = '';
}

async function respondRdv(action) {
  const id = document.getElementById('rdv-respond-id').value;
  const body = {
    action,
    message_reponse: document.getElementById('rdv-respond-msg').value.trim(),
    contre_date: document.getElementById('contre-date')?.value,
    contre_heure_debut: document.getElementById('contre-heure-debut')?.value,
    contre_heure_fin: document.getElementById('contre-heure-fin')?.value
  };
  const r = await fetch(`/api/rdv/${id}/respond`, { method:'PATCH', headers:{'Content-Type':'application/json'}, credentials:'include', body:JSON.stringify(body) });
  const j = await r.json();
  if (r.ok) {
    closeModal('modal-rdv-respond');
    await loadRdv(); await loadAndRender();
    if (action==='accepte' && j.meeting) {
      if (confirm(`✅ RDV accepté ! Une salle de réunion a été créée.\nRejoindre maintenant ?`)) joinMeetingByRoomId(j.meeting.room_id, j.meeting.token_host || j.meeting.token_guest);
    } else alert(action==='accepte'?'✅ RDV accepté !':action==='refuse'?'❌ RDV refusé':action==='contre_proposition'?'🔄 Contre-proposition envoyée':'✅ Action effectuée');
  } else alert('Erreur : ' + j.error);
}

async function joinMeeting(meetingId) {
  try {
    const r = await fetch(`/api/meetings/${meetingId}`, { credentials:'include' });
    const m = await r.json();
    if (m.room_id) location.href = `/meeting.html?room=${m.room_id}&token=${m.token_host||m.token_guest}`;
  } catch(e) {}
}
function joinMeetingByRoomId(roomId, token) {
  location.href = `/meeting.html?room=${roomId}&token=${token}`;
}

/* ═══════════ UTILS ═══════════ */
function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function openModal(id) { document.getElementById(id).style.display='flex'; }
function closeModal(id) { document.getElementById(id).style.display='none'; }
document.querySelectorAll('.modal-backdrop').forEach(m => m.addEventListener('click', e => { if(e.target===m) m.style.display='none'; }));
</script>
