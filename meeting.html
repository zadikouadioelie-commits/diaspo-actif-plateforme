<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Réunion — Diaspo'Actif</title>
<link rel="icon" href="/assets/logo.svg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;height:100dvh;overflow:hidden;}
:root{--accent:#7c3aed;--green:#10b981;--red:#ef4444;--bg2:#161b22;--border:#30363d;}

/* ===== LOBBY ===== */
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;background:linear-gradient(135deg,#0d1117 0%,#1a1040 100%);padding:24px;}
.lobby-card{background:#161b22;border:1px solid #30363d;border-radius:18px;padding:32px;max-width:520px;width:100%;}
.lobby-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.lobby-logo{font-size:2rem;}
.lobby-title{font-size:1.15rem;font-weight:800;}
.lobby-sub{font-size:.82rem;color:#8b949e;margin-top:2px;}
.lobby-preview{width:100%;max-width:320px;height:180px;background:#000;border-radius:12px;margin:0 auto 16px;position:relative;overflow:hidden;}
.lobby-preview video{width:100%;height:100%;object-fit:cover;}
.no-cam{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:#555;}
.lobby-controls{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.ctrl-btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;width:46px;height:46px;border-radius:50%;font-size:1.1rem;cursor:pointer;transition:all .15s;}
.ctrl-btn:hover{background:#30363d;}
.ctrl-btn.off{background:var(--red);border-color:var(--red);}
.lobby-name{background:#21262d;border:1px solid #30363d;color:#e6edf3;width:100%;padding:10px 14px;border-radius:10px;font-size:.9rem;margin-bottom:10px;}
.lobby-name:focus{outline:none;border-color:var(--accent);}
.lobby-info-box{background:#1c1033;border:1px solid #3b2d6e;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:.8rem;color:#c4b5fd;}
.lobby-info-box strong{color:#a78bfa;}
.btn-join{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:.95rem;font-weight:800;cursor:pointer;letter-spacing:.3px;transition:opacity .15s;}
.btn-join:hover{opacity:.9;}
.btn-join:disabled{opacity:.4;cursor:not-allowed;}
#lobby-error{color:var(--red);font-size:.82rem;margin-top:8px;display:none;text-align:center;}

/* ===== ROOM ===== */
#room{display:none;height:100dvh;background:#0d1117;position:relative;}
#jitsi-frame{width:100%;height:100%;border:none;position:absolute;inset:0;}

/* Overlay info bar */
#info-bar{position:fixed;top:0;left:0;right:0;background:rgba(13,17,23,.9);backdrop-filter:blur(8px);border-bottom:1px solid #21262d;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100;gap:12px;}
#info-bar .meeting-title{font-size:.88rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#info-bar .bar-actions{display:flex;gap:6px;flex-shrink:0;}
.bar-btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:6px 12px;border-radius:20px;font-size:.77rem;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:4px;}
.bar-btn:hover{background:#30363d;}
.bar-btn.end{background:var(--red);border-color:var(--red);}
#bar-timer{font-size:.82rem;font-weight:700;color:#8b949e;min-width:55px;}

/* Side panel */
#side-panel{position:fixed;right:0;top:0;bottom:0;width:300px;background:#161b22;border-left:1px solid #21262d;display:none;flex-direction:column;z-index:150;transform:translateX(100%);transition:transform .2s;}
#side-panel.open{display:flex;transform:translateX(0);}
#panel-tabs{display:flex;border-bottom:1px solid #21262d;}
.ptab{flex:1;padding:10px;font-size:.78rem;font-weight:700;text-align:center;cursor:pointer;color:#8b949e;border-bottom:2px solid transparent;}
.ptab.active{color:var(--accent);border-bottom-color:var(--accent);}
#panel-body{flex:1;overflow-y:auto;padding:12px;}
.p-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #21262d;font-size:.8rem;}
.p-item:last-child{border-bottom:none;}
.p-av{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0;}
.p-nm{font-weight:700;}
.p-role{font-size:.7rem;color:#8b949e;}
.p-stat{margin-left:auto;font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:20px;background:#1c1033;color:#a78bfa;}
.p-stat.present{background:#052e16;color:#86efac;}
.p-stat.absent{background:#1f1f1f;color:#9ca3af;}

/* Notes panel */
#notes-area{width:100%;flex:1;background:#21262d;border:none;color:#e6edf3;padding:10px;font-family:inherit;font-size:.83rem;resize:none;line-height:1.5;}
#notes-area:focus{outline:none;}
#notes-footer{padding:10px;border-top:1px solid #21262d;display:flex;gap:6px;}

/* Ended screen */
#ended-screen{display:none;position:fixed;inset:0;background:#0d1117;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;z-index:500;padding:20px;}
#ended-screen h2{font-size:1.5rem;font-weight:900;}
#ended-screen p{color:#8b949e;}
.end-btn{background:var(--accent);color:#fff;border:none;padding:12px 28px;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;}
.end-btn.outline{background:#21262d;border:1px solid #30363d;}
.stat-row{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:16px;width:100%;max-width:380px;}
.stat-row .s-label{font-size:.75rem;color:#8b949e;margin-bottom:4px;}
.stat-row .s-value{font-size:1.2rem;font-weight:800;color:var(--accent);}

@media(max-width:600px){
  #side-panel{width:100%;}
  .bar-btn span{display:none;}
}
</style>
<link rel="stylesheet" href="/assets/ui-enhancements.css?v=20260630d">
  <link rel="stylesheet" href="/assets/design-upgrade.css?v=20260630d">
</head>
<body>

<!-- ===== LOBBY ===== -->
<div id="lobby">
  <div class="lobby-card">
    <div class="lobby-head">
      <div class="lobby-logo">📹</div>
      <div>
        <div class="lobby-title" id="lobby-title">Rejoindre la réunion</div>
        <div class="lobby-sub" id="lobby-sub">Prévisualisez votre caméra avant de rejoindre</div>
      </div>
    </div>

    <div class="lobby-preview">
      <video id="preview-video" autoplay muted playsinline></video>
      <div class="no-cam" id="no-cam">📷</div>
    </div>
    <div class="lobby-controls">
      <button class="ctrl-btn" id="lobby-cam" title="Caméra" onclick="togglePreviewCam()">📷</button>
      <button class="ctrl-btn" id="lobby-mic" title="Micro" onclick="togglePreviewMic()">🎙</button>
    </div>

    <input class="lobby-name" id="display-name" type="text" placeholder="Votre nom d'affichage" maxlength="40">

    <div class="lobby-info-box" id="lobby-info-box" style="display:none;">
      <strong id="li-titre">—</strong><br>
      <span id="li-date">—</span><span id="li-participants" style="margin-left:8px;">—</span>
      <div id="li-enreg" style="display:none;margin-top:4px;color:#fca5a5;">🔴 Enregistrement activé — les participants seront informés</div>
    </div>

    <button class="btn-join" id="btn-join" disabled onclick="joinRoom()">Rejoindre la réunion</button>
    <div id="lobby-error"></div>
  </div>
</div>

<!-- ===== ROOM ===== -->
<div id="room">
  <!-- Info bar -->
  <div id="info-bar">
    <div class="meeting-title" id="bar-title">Réunion</div>
    <div id="bar-timer">⏱ 00:00</div>
    <div class="bar-actions">
      <button class="bar-btn" onclick="togglePanel('participants')">👥 <span id="nb-parts-badge">—</span></button>
      <button class="bar-btn" onclick="togglePanel('notes')">📋 <span>Notes</span></button>
      <button class="bar-btn end" onclick="quitterReunion()">📵 <span>Quitter</span></button>
    </div>
  </div>

  <!-- Jitsi container (pushed down to leave room for info bar) -->
  <iframe id="jitsi-frame" src="" allow="camera;microphone;fullscreen;display-capture;autoplay"
    style="position:absolute;inset:0;top:44px;width:100%;height:calc(100% - 44px);border:none;"></iframe>

  <!-- Side panel -->
  <div id="side-panel">
    <div id="panel-tabs">
      <div class="ptab active" id="ptab-participants" onclick="showPanelTab('participants')">👥 Participants</div>
      <div class="ptab" id="ptab-notes" onclick="showPanelTab('notes')">📋 Notes</div>
    </div>
    <div id="panel-body">
      <!-- filled dynamically -->
    </div>
    <div id="notes-footer" style="display:none;">
      <button class="bar-btn" style="flex:1;justify-content:center;" onclick="saveNotes()">💾 Sauvegarder</button>
    </div>
  </div>
</div>

<!-- ===== ENDED ===== -->
<div id="ended-screen">
  <div style="font-size:3rem;">✅</div>
  <h2>Réunion terminée</h2>
  <p id="ended-sub">Merci pour votre participation.</p>
  <div class="stat-row" id="ended-stats" style="display:none;">
    <div class="s-label">Durée de votre présence</div>
    <div class="s-value" id="ended-duree">—</div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
    <button class="end-btn" onclick="window.location.href='reunions.html'">📋 Voir les réunions</button>
    <button class="end-btn outline" onclick="window.location.href='agenda.html'">📅 Mon agenda</button>
  </div>
</div>

<script>
/* ============================================================
   PARAMÈTRES URL
============================================================ */
const params = new URLSearchParams(location.search);
const REUNION_ID = params.get('reunion_id') ? parseInt(params.get('reunion_id')) : null;
const JITSI_ROOM = params.get('jitsi_room') || params.get('room') || null;
// Legacy RDV support
const LEGACY_TOKEN = params.get('token') || null;

let ME = null;
let reunionData = null;
let localStream = null;
let camOn = true, micOn = true;
let timerInterval = null;
let startTime = null;
let activePanel = null;
let notesContent = '';

const api = (m,p,b) => fetch('/api'+p,{method:m,credentials:'include',
  headers:b?{'Content-Type':'application/json'}:{},body:b?JSON.stringify(b):undefined})
  .then(async r=>{const d=await r.json();if(!r.ok)throw new Error(d.error||r.statusText);return d;});

function fmtTime(s){if(!s)return'—';return new Date(s).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
function fmtDate(s){if(!s)return'—';return new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function initials(prenom,nom){return((prenom||'?')[0]+(nom||'?')[0]).toUpperCase();}

/* ============================================================
   INIT
============================================================ */
async function init() {
  ME = await fetch('/api/me',{credentials:'include'}).then(r=>r.ok?r.json():null).catch(()=>null);

  if (!JITSI_ROOM && !REUNION_ID) {
    showError('Lien de réunion invalide.');
    document.getElementById('btn-join').disabled = false;
    return;
  }

  // Pré-remplir nom
  if (ME) {
    document.getElementById('display-name').value = `${ME.prenom||''} ${ME.nom||''}`.trim();
  }

  // Charger infos réunion si REUNION_ID
  if (REUNION_ID) {
    try {
      const {reunion, invites} = await api('GET', `/reunions/${REUNION_ID}`);
      reunionData = {reunion, invites};
      document.getElementById('lobby-title').textContent = reunion.titre;
      document.getElementById('lobby-sub').textContent = `${reunion.type} · ${fmtDate(reunion.date_debut)} à ${fmtTime(reunion.date_debut)}`;
      const box = document.getElementById('lobby-info-box');
      document.getElementById('li-titre').textContent = reunion.titre;
      document.getElementById('li-date').textContent = fmtDate(reunion.date_debut);
      document.getElementById('li-participants').textContent = `${invites.length} participant(s)`;
      if (reunion.enregistrement_active) document.getElementById('li-enreg').style.display = 'block';
      box.style.display = 'block';
    } catch(e) {
      // Pas grave si erreur, on continue
    }
  }

  // Démarrer prévisualisation caméra
  await startPreview();
  document.getElementById('btn-join').disabled = false;
}

/* ============================================================
   LOBBY — Prévisualisation caméra
============================================================ */
async function startPreview() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
    const vid = document.getElementById('preview-video');
    vid.srcObject = localStream;
    document.getElementById('no-cam').style.display = 'none';
  } catch(e) {
    document.getElementById('no-cam').style.display = 'flex';
    camOn = false; micOn = false;
    document.getElementById('lobby-cam').classList.add('off');
    document.getElementById('lobby-mic').classList.add('off');
  }
}

function togglePreviewCam() {
  camOn = !camOn;
  if (localStream) localStream.getVideoTracks().forEach(t=>t.enabled=camOn);
  document.getElementById('lobby-cam').classList.toggle('off', !camOn);
  document.getElementById('preview-video').style.display = camOn ? '' : 'none';
  document.getElementById('no-cam').style.display = camOn ? 'none' : 'flex';
}
function togglePreviewMic() {
  micOn = !micOn;
  if (localStream) localStream.getAudioTracks().forEach(t=>t.enabled=micOn);
  document.getElementById('lobby-mic').classList.toggle('off', !micOn);
}

function showError(msg) {
  const el = document.getElementById('lobby-error');
  el.textContent = msg;
  el.style.display = 'block';
}

/* ============================================================
   JOIN ROOM — Lancer Jitsi
============================================================ */
async function joinRoom() {
  const name = document.getElementById('display-name').value.trim() || 'Participant';
  document.getElementById('btn-join').disabled = true;

  // Stopper la prévisualisation
  if (localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream = null; }

  const roomId = JITSI_ROOM || `diaspoactif-legacy-${REUNION_ID||'rdv'}`;

  // Charger Jitsi via iframe avec URL de configuration
  const isOrganisateur = reunionData?.reunion?.organisateur_id === ME?.id;
  const jitsiParams = new URLSearchParams({
    'config.startWithAudioMuted': (!micOn).toString(),
    'config.startWithVideoMuted': (!camOn).toString(),
    'config.disableDeepLinking': 'true',
    'config.prejoinPageEnabled': 'false',
    'config.enableClosePage': 'false',
    'config.requireDisplayName': 'true',
    'config.enableLayerSuspension': 'true',
    'config.startAudioOnly': 'false',
    'config.enableNoisyMicDetection': 'true',
    'config.reactions.enabled': 'true',
    'config.disableReactions': 'false',
    'config.disablePolls': 'false',
    'config.toolbarButtons': JSON.stringify([
      'microphone','camera','desktop','chat',
      'raisehand','reactions','tileview',
      'fullscreen','security','participants-pane',
      'invite','settings','stats',
      ...(isOrganisateur ? ['mute-everyone','kick','recording'] : [])
    ]),
    'userInfo.displayName': name,
    'interfaceConfig.SHOW_JITSI_WATERMARK': 'false',
    'interfaceConfig.SHOW_WATERMARK_FOR_GUESTS': 'false',
    'interfaceConfig.TOOLBAR_ALWAYS_VISIBLE': 'true',
    'interfaceConfig.TILE_VIEW_MAX_COLUMNS': '5',
    'interfaceConfig.VERTICAL_FILMSTRIP': 'false',
  });

  const jitsiSrc = `https://meet.jit.si/${encodeURIComponent(roomId)}#${jitsiParams.toString()}`;
  document.getElementById('jitsi-frame').src = jitsiSrc;

  // Afficher la room
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('room').style.display = 'block';

  // Info bar
  const titre = reunionData?.reunion?.titre || document.getElementById('lobby-title').textContent || 'Réunion';
  document.getElementById('bar-title').textContent = titre;

  // Démarrer timer
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);

  // Pointer la présence si réunion connue
  if (REUNION_ID) {
    api('POST', `/reunions/${REUNION_ID}/presence`).catch(()=>{});
    if (reunionData?.reunion?.statut === 'planifiee' && reunionData?.reunion?.organisateur_id === ME?.id) {
      api('PATCH', `/reunions/${REUNION_ID}/start`).catch(()=>{});
    }
  }

  // Charger participants
  if (reunionData) renderParticipantsPanel(reunionData.invites);
}

/* ============================================================
   TIMER
============================================================ */
function updateTimer() {
  if (!startTime) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsed / 60).toString().padStart(2,'0');
  const s = (elapsed % 60).toString().padStart(2,'0');
  document.getElementById('bar-timer').textContent = `⏱ ${m}:${s}`;
}

/* ============================================================
   PANEL
============================================================ */
function togglePanel(tab) {
  const panel = document.getElementById('side-panel');
  if (activePanel === tab && panel.classList.contains('open')) {
    panel.classList.remove('open');
    activePanel = null;
  } else {
    panel.classList.add('open');
    activePanel = tab;
    showPanelTab(tab);
  }
}

function showPanelTab(tab) {
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`ptab-${tab}`)?.classList.add('active');
  const body = document.getElementById('panel-body');
  const notesFooter = document.getElementById('notes-footer');

  if (tab === 'participants') {
    notesFooter.style.display = 'none';
    if (reunionData) {
      renderParticipantsPanel(reunionData.invites);
    } else {
      body.innerHTML = '<div style="font-size:.82rem;color:#8b949e;padding:8px 0;">Aucune information sur les participants.</div>';
    }
  } else if (tab === 'notes') {
    notesFooter.style.display = 'flex';
    body.innerHTML = `<div style="padding:4px 0;font-size:.75rem;color:#8b949e;margin-bottom:8px;">Notes de réunion (sauvegardées dans le résumé)</div>
      <textarea id="notes-area" style="width:100%;min-height:300px;background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:10px;font-family:inherit;font-size:.83rem;border-radius:10px;resize:vertical;"
        placeholder="Sujets abordés, décisions prises, actions…">${escH(notesContent)}</textarea>`;
  }
}

function renderParticipantsPanel(invites) {
  const presents = invites.filter(i=>i.rejoint_at&&!i.quitte_at);
  const pending = invites.filter(i=>!i.rejoint_at&&i.statut!=='refuse');
  const absent = invites.filter(i=>i.quitte_at);
  document.getElementById('nb-parts-badge').textContent = presents.length || invites.length;

  const renderItem = (i, statut) => `<div class="p-item">
    <div class="p-av">${initials(i.prenom,i.nom)}</div>
    <div>
      <div class="p-nm">${escH(i.prenom||'')} ${escH(i.nom||'')}</div>
      <div class="p-role">${{coorganisateur:'Organisateur',moderateur:'Modérateur',participant:'Participant'}[i.role]||i.role}</div>
    </div>
    <span class="p-stat ${statut}">${{present:'🟢 Présent',attente:'⏳ En attente',absent:'Parti'}[statut]||statut}</span>
  </div>`;

  document.getElementById('panel-body').innerHTML =
    (presents.length ? `<div style="font-size:.72rem;font-weight:700;color:#8b949e;text-transform:uppercase;margin-bottom:6px;">Présents (${presents.length})</div>`+presents.map(i=>renderItem(i,'present')).join('') : '') +
    (pending.length ? `<div style="font-size:.72rem;font-weight:700;color:#8b949e;text-transform:uppercase;margin:10px 0 6px;">En attente (${pending.length})</div>`+pending.map(i=>renderItem(i,'attente')).join('') : '') +
    (absent.length ? `<div style="font-size:.72rem;font-weight:700;color:#8b949e;text-transform:uppercase;margin:10px 0 6px;">Partis (${absent.length})</div>`+absent.map(i=>renderItem(i,'absent')).join('') : '') ||
    '<div style="font-size:.82rem;color:#8b949e;padding:8px 0;">Aucun participant enregistré.</div>';
}

async function saveNotes() {
  const notes = document.getElementById('notes-area')?.value || '';
  notesContent = notes;
  if (REUNION_ID) {
    try {
      await api('PUT', `/reunions/${REUNION_ID}/resume`, {sujets:[], decisions:[], actions:[], notes});
      showToast('Notes sauvegardées !', 'success');
    } catch(e) { showToast('Erreur sauvegarde : ' + e.message, 'danger'); }
  } else {
    showToast('Notes sauvegardées localement.', 'info');
  }
}

/* ============================================================
   QUITTER
============================================================ */
async function quitterReunion() {
  clearInterval(timerInterval);

  // Stopper l'iframe
  document.getElementById('jitsi-frame').src = '';
  document.getElementById('room').style.display = 'none';

  let dureeMin = null;
  if (startTime) { dureeMin = Math.round((Date.now() - startTime) / 60000); }

  // Pointer la sortie
  if (REUNION_ID) {
    try { await api('PATCH', `/reunions/${REUNION_ID}/presence`); } catch(e) {}
  }

  // Sauvegarder les notes si renseignées
  const notes = document.getElementById('notes-area')?.value;
  if (notes && REUNION_ID) {
    try { await api('PUT', `/reunions/${REUNION_ID}/resume`, {sujets:[], decisions:[], actions:[], notes}); } catch(e) {}
  }

  // Afficher écran de fin
  const screen = document.getElementById('ended-screen');
  document.getElementById('ended-sub').textContent = reunionData?.reunion?.titre
    ? `Vous avez quitté "${reunionData.reunion.titre}".`
    : 'Vous avez quitté la réunion.';
  if (dureeMin !== null) {
    document.getElementById('ended-stats').style.display = 'block';
    document.getElementById('ended-duree').textContent = dureeMin < 1 ? 'Moins d\'une minute' : `${dureeMin} minute${dureeMin>1?'s':''}`;
  }
  screen.style.display = 'flex';
}

// Pointer la sortie si l'onglet se ferme
window.addEventListener('beforeunload', () => {
  if (REUNION_ID && startTime) {
    navigator.sendBeacon('/api/reunions/'+REUNION_ID+'/presence', new Blob(['{}'],{type:'application/json'}));
  }
});

/* ============================================================
   TOAST
============================================================ */
function showToast(msg, type='info') {
  const colors = {success:'#10b981',danger:'#ef4444',warning:'#f59e0b',info:'#7c3aed'};
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;bottom:20px;right:20px;z-index:9999;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:700;color:#fff;background:${colors[type]||colors.info};box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:320px;`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 4000);
}

init();
</script>
