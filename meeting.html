<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Réunion — Diaspo'Actif</title>
<link rel="icon" href="/assets/logo.svg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;height:100dvh;overflow:hidden;}
:root{--primary:#1a3a5c;--accent:#4a90d9;--green:#27ae60;--red:#e74c3c;}

/* LOBBY */
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;background:linear-gradient(135deg,#0d1117 0%,#1a2b4a 100%);padding:24px;}
.lobby-card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:32px;max-width:480px;width:100%;text-align:center;}
.lobby-logo{font-size:2.5rem;margin-bottom:12px;}
.lobby-title{font-size:1.3rem;font-weight:800;margin-bottom:4px;}
.lobby-sub{font-size:.85rem;color:#8b949e;margin-bottom:24px;}
.lobby-preview{width:260px;height:160px;background:#000;border-radius:10px;margin:0 auto 20px;position:relative;overflow:hidden;}
.lobby-preview video{width:100%;height:100%;object-fit:cover;}
.lobby-preview .no-cam{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#888;}
.lobby-controls{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.ctrl-btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;width:44px;height:44px;border-radius:50%;font-size:1.1rem;cursor:pointer;transition:all .15s;}
.ctrl-btn:hover{background:#30363d;}
.ctrl-btn.off{background:#e74c3c;border-color:#e74c3c;}
.lobby-name{background:#21262d;border:1px solid #30363d;color:#e6edf3;width:100%;padding:10px 14px;border-radius:8px;font-size:.9rem;margin-bottom:12px;}
.lobby-name:focus{outline:none;border-color:var(--accent);}
.btn-join{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn-join:hover{opacity:.9;}
.btn-join:disabled{opacity:.5;cursor:not-allowed;}
.lobby-info{font-size:.78rem;color:#8b949e;margin-top:12px;}
#lobby-error{color:#e74c3c;font-size:.82rem;margin-top:8px;display:none;}

/* ROOM */
#room{display:none;flex-direction:column;height:100dvh;background:#0d1117;}

/* VIDEO GRID */
#video-grid{flex:1;display:grid;gap:4px;padding:4px;overflow:hidden;}
.vid-tile{background:#1c2128;border-radius:10px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.vid-tile video{width:100%;height:100%;object-fit:cover;}
.vid-tile .avatar{width:72px;height:72px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;}
.vid-tile .peer-name{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.6);color:#fff;font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:20px;}
.vid-tile .mic-off{position:absolute;top:8px;right:8px;font-size:.9rem;}
.vid-tile.local{border:2px solid var(--accent);}
#screen-tile{display:none;grid-column:1/-1;min-height:60vh;}

/* TOOLBAR */
#toolbar{background:#161b22;border-top:1px solid #21262d;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.tool-group{display:flex;gap:8px;align-items:center;}
.t-btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:8px 14px;border-radius:24px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.t-btn:hover{background:#30363d;}
.t-btn.off,.t-btn.danger{background:#e74c3c;border-color:#e74c3c;}
.t-btn.active{background:var(--accent);border-color:var(--accent);}
.t-btn.end{background:#e74c3c;border-color:#e74c3c;padding:8px 20px;font-size:.85rem;}
#timer{font-size:.85rem;font-weight:700;color:#8b949e;}
#timer.warning{color:#e74c3c;animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:.4;}}

/* CHAT PANEL */
#chat-panel{position:fixed;right:0;top:0;bottom:0;width:300px;background:#161b22;border-left:1px solid #21262d;display:none;flex-direction:column;z-index:50;}
#chat-header{padding:12px 16px;font-weight:700;font-size:.88rem;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center;}
#chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;}
.chat-msg{background:#21262d;border-radius:8px;padding:6px 10px;font-size:.78rem;}
.chat-msg .from{font-weight:700;color:var(--accent);margin-bottom:2px;}
.chat-msg.mine{background:#1a3a5c;margin-left:20px;}
#chat-input-row{padding:10px;display:flex;gap:6px;border-top:1px solid #21262d;}
#chat-input{flex:1;background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:7px 10px;border-radius:20px;font-size:.8rem;}
#chat-input:focus{outline:none;border-color:var(--accent);}
#btn-chat-send{background:var(--accent);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;}

/* PARTICIPANTS PANEL */
#parts-panel{position:fixed;left:0;top:0;bottom:0;width:240px;background:#161b22;border-right:1px solid #21262d;display:none;flex-direction:column;z-index:50;padding:12px;}
#parts-panel h3{font-size:.85rem;font-weight:700;margin-bottom:10px;}
.part-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #21262d;font-size:.8rem;}
.part-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;}

/* COUNTDOWN OVERLAY */
#countdown-overlay{position:fixed;top:0;left:50%;transform:translateX(-50%);background:#e74c3c;color:#fff;padding:8px 20px;border-radius:0 0 10px 10px;font-size:.85rem;font-weight:700;z-index:200;display:none;}

/* ENDED */
#ended-screen{display:none;position:fixed;inset:0;background:#0d1117;align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center;}
#ended-screen h2{font-size:1.4rem;font-weight:800;}
#ended-screen p{color:#8b949e;font-size:.88rem;}

/* RESPONSIVE */
@media(max-width:600px){
  #chat-panel{width:100%;left:0;}
  .t-btn span{display:none;}
  .t-btn{padding:8px 10px;}
}
</style>
  <link rel="stylesheet" href="/assets/responsive.css">
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-card">
    <div class="lobby-logo">📹</div>
    <div class="lobby-title" id="lobby-meeting-title">Rejoindre la réunion</div>
    <div class="lobby-sub" id="lobby-meeting-sub">Prévisualisez votre caméra avant de rejoindre</div>
    <div class="lobby-preview">
      <video id="preview-video" autoplay muted playsinline></video>
      <div class="no-cam" id="no-cam-msg">📷</div>
    </div>
    <div class="lobby-controls">
      <button class="ctrl-btn" id="lobby-cam-btn" onclick="toggleLobbyVideo()" title="Caméra">📷</button>
      <button class="ctrl-btn" id="lobby-mic-btn" onclick="toggleLobbyAudio()" title="Micro">🎙</button>
    </div>
    <input class="lobby-name" id="lobby-name" type="text" placeholder="Votre nom d'affichage" maxlength="40">
    <button class="btn-join" id="btn-join" onclick="joinRoom()">Rejoindre la réunion</button>
    <div class="lobby-info" id="lobby-info">Réunion sécurisée · Maximum 40 minutes</div>
    <div id="lobby-error"></div>
  </div>
</div>

<!-- ROOM -->
<div id="room">
  <div id="countdown-overlay" id="countdown-bar">⏱ Temps restant : <span id="countdown-text"></span></div>
  <div id="video-grid">
    <div class="vid-tile local" id="local-tile">
      <video id="local-video" autoplay muted playsinline></video>
      <div class="avatar" id="local-avatar" style="display:none;">🧑</div>
      <div class="peer-name" id="local-name-badge">Vous</div>
      <div class="mic-off" id="local-mic-indicator" style="display:none;">🔇</div>
    </div>
  </div>
  <div id="toolbar">
    <div class="tool-group">
      <span id="timer">⏱ 00:00</span>
    </div>
    <div class="tool-group">
      <button class="t-btn" id="btn-mic" onclick="toggleMic()">🎙 <span>Micro</span></button>
      <button class="t-btn" id="btn-cam" onclick="toggleCam()">📷 <span>Caméra</span></button>
      <button class="t-btn" id="btn-screen" onclick="toggleScreen()">🖥 <span>Partager</span></button>
      <button class="t-btn" id="btn-chat" onclick="toggleChat()">💬 <span>Chat</span></button>
      <button class="t-btn" id="btn-parts" onclick="toggleParts()">👥 <span>Participants</span></button>
    </div>
    <div class="tool-group">
      <button class="t-btn end" onclick="endCall()">📵 <span>Quitter</span></button>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-panel">
  <div id="chat-header"><span>💬 Chat</span><button onclick="toggleChat()" style="background:none;border:none;color:#e6edf3;cursor:pointer;font-size:1.1rem;">×</button></div>
  <div id="chat-messages"></div>
  <div id="chat-input-row">
    <input id="chat-input" type="text" placeholder="Message…" onkeydown="if(event.key==='Enter')sendChat()">
    <button id="btn-chat-send" onclick="sendChat()">➤</button>
  </div>
</div>

<!-- PARTICIPANTS -->
<div id="parts-panel">
  <h3>👥 Participants</h3>
  <div id="parts-list"></div>
</div>

<!-- ENDED -->
<div id="ended-screen">
  <div style="font-size:3rem;">📵</div>
  <h2>Réunion terminée</h2>
  <p id="ended-duration"></p>
  <a href="/agenda.html" style="background:var(--accent);color:#fff;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:700;margin-top:12px;">← Retour à l'agenda</a>
</div>

<script>
/* ═══════════ PARAMS ═══════════ */
const params  = new URLSearchParams(location.search);
const ROOM_ID = params.get('room');
const TOKEN   = params.get('token');
const PEER_ID = 'peer_' + Math.random().toString(36).slice(2,10);

/* ═══════════ STATE ═══════════ */
let localStream = null;
let previewStream = null;
let pc = {}; // peerId → RTCPeerConnection
let role = 'guest';
let meeting = null;
let micOn = true, camOn = true;
let screenStream = null;
let started_at = null;
let timerInterval = null;
let pollInterval = null;
let maxMinutes = 40;
let lastSignalId = 0;
let peers = {}; // peerId → { name, stream }
let chatOpen = false, partsOpen = false;
let myName = 'Vous';

const ICE_CONFIG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]
};

/* ═══════════ LOBBY ═══════════ */
async function initLobby() {
  if (!ROOM_ID || !TOKEN) {
    showLobbyError('Lien de réunion invalide. Vérifiez votre invitation.');
    return;
  }
  // Valider le token
  try {
    const r = await fetch(`/api/meetings/${ROOM_ID}/validate-token?token=${encodeURIComponent(TOKEN)}`, { credentials:'include' });
    const j = await r.json();
    if (!r.ok) { showLobbyError(j.error||'Accès refusé'); return; }
    role = j.role;
    meeting = j.meeting;
    maxMinutes = j.meeting.duree_max_minutes || 40;
    document.getElementById('lobby-meeting-title').textContent = j.meeting.titre || 'Réunion';
    document.getElementById('lobby-meeting-sub').textContent = `Rôle : ${role==='host'?'Hôte':'Participant'} · Max ${maxMinutes} min`;
  } catch(e) { showLobbyError('Impossible de valider votre accès'); return; }

  // Pré-remplir le nom depuis le profil
  try {
    const r = await fetch('/api/me', { credentials:'include' });
    if (r.ok) { const u = await r.json(); document.getElementById('lobby-name').value = `${u.prenom||''} ${u.nom||''}`.trim(); }
  } catch(e) {}

  // Preview camera
  try {
    previewStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    document.getElementById('preview-video').srcObject = previewStream;
    document.getElementById('no-cam-msg').style.display = 'none';
  } catch(e) {
    document.getElementById('no-cam-msg').style.display = 'flex';
  }
}

let lobbyVideoEnabled = true, lobbyAudioEnabled = true;
function toggleLobbyVideo() {
  lobbyVideoEnabled = !lobbyVideoEnabled;
  if (previewStream) previewStream.getVideoTracks().forEach(t => t.enabled = lobbyVideoEnabled);
  document.getElementById('lobby-cam-btn').classList.toggle('off', !lobbyVideoEnabled);
  document.getElementById('preview-video').style.opacity = lobbyVideoEnabled ? '1' : '0';
  document.getElementById('no-cam-msg').style.display = lobbyVideoEnabled ? 'none' : 'flex';
}
function toggleLobbyAudio() {
  lobbyAudioEnabled = !lobbyAudioEnabled;
  if (previewStream) previewStream.getAudioTracks().forEach(t => t.enabled = lobbyAudioEnabled);
  document.getElementById('lobby-mic-btn').classList.toggle('off', !lobbyAudioEnabled);
}
function showLobbyError(msg) {
  const el = document.getElementById('lobby-error');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
  document.getElementById('btn-join').disabled = true;
}

async function joinRoom() {
  const name = document.getElementById('lobby-name').value.trim() || 'Anonyme';
  myName = name;
  document.getElementById('btn-join').disabled = true;
  document.getElementById('btn-join').textContent = 'Connexion…';
  try {
    localStream = previewStream || await navigator.mediaDevices.getUserMedia({ video: lobbyVideoEnabled, audio: lobbyAudioEnabled });
    if (!lobbyVideoEnabled) localStream.getVideoTracks().forEach(t => t.enabled = false);
    if (!lobbyAudioEnabled) localStream.getAudioTracks().forEach(t => t.enabled = false);
    micOn = lobbyAudioEnabled;
    camOn = lobbyVideoEnabled;
  } catch(e) {
    try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e2) {}
  }
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('room').style.display = 'flex';
  // Local video
  const lv = document.getElementById('local-video');
  if (localStream) { lv.srcObject = localStream; lv.style.display=''; document.getElementById('local-avatar').style.display='none'; }
  else { lv.style.display='none'; document.getElementById('local-avatar').style.display='flex'; }
  document.getElementById('local-name-badge').textContent = name + (role==='host'?' (Hôte)':'');
  updateMicCamUI();
  // Démarrer si hôte
  if (role === 'host') {
    await fetch(`/api/meetings/${meeting.id}/start`, { method:'PATCH', headers:{'Content-Type':'application/json'}, credentials:'include', body:'{}' });
    started_at = new Date();
  } else {
    started_at = meeting.started_at ? new Date(meeting.started_at) : new Date();
  }
  updateVideoGrid();
  startTimer();
  // Envoyer signal JOIN
  await sendSignal(null, 'join', { name, role, peer_id: PEER_ID });
  // Démarrer polling
  pollInterval = setInterval(pollSignals, 600);
}

/* ═══════════ WEBRTC ═══════════ */
async function getOrCreatePC(peerId) {
  if (pc[peerId]) return pc[peerId];
  const p = new RTCPeerConnection(ICE_CONFIG);
  pc[peerId] = p;
  // Add local tracks
  if (localStream) localStream.getTracks().forEach(track => p.addTrack(track, localStream));
  // ICE
  p.onicecandidate = e => { if (e.candidate) sendSignal(peerId, 'ice', { candidate: e.candidate }); };
  // Remote stream
  p.ontrack = e => {
    if (!peers[peerId]) peers[peerId] = { name: 'Participant', stream: null };
    if (!peers[peerId].stream) peers[peerId].stream = new MediaStream();
    peers[peerId].stream.addTrack(e.track);
    updateVideoGrid();
  };
  p.onconnectionstatechange = () => {
    if (['disconnected','failed','closed'].includes(p.connectionState)) {
      removePeer(peerId);
    }
  };
  return p;
}

async function pollSignals() {
  try {
    const r = await fetch(`/api/meetings/${ROOM_ID}/signal?peer=${encodeURIComponent(PEER_ID)}&after=${lastSignalId}`, { credentials:'include' });
    if (!r.ok) return;
    const signals = await r.json();
    for (const sig of signals) {
      lastSignalId = Math.max(lastSignalId, sig.id);
      if (sig.from_peer === PEER_ID) continue; // ignore our own
      await handleSignal(sig);
    }
  } catch(e) {}
}

async function handleSignal(sig) {
  const fromPeer = sig.from_peer;
  switch (sig.type) {
    case 'join':
      peers[fromPeer] = { name: sig.data.name||'Participant', stream: null };
      updateVideoGrid();
      updateParts();
      addChatMsg('Système', `${sig.data.name||'Quelqu\'un'} a rejoint la réunion`, true);
      // Si on est là avant eux : initier l'offre
      const p = await getOrCreatePC(fromPeer);
      if (p.signalingState === 'stable') {
        const offer = await p.createOffer();
        await p.setLocalDescription(offer);
        await sendSignal(fromPeer, 'offer', { sdp: offer });
      }
      break;
    case 'offer':
      const pc2 = await getOrCreatePC(fromPeer);
      await pc2.setRemoteDescription(new RTCSessionDescription(sig.data.sdp));
      const answer = await pc2.createAnswer();
      await pc2.setLocalDescription(answer);
      await sendSignal(fromPeer, 'answer', { sdp: answer });
      break;
    case 'answer':
      const pc3 = pc[fromPeer];
      if (pc3 && pc3.signalingState === 'have-local-offer') {
        await pc3.setRemoteDescription(new RTCSessionDescription(sig.data.sdp));
      }
      break;
    case 'ice':
      const pc4 = pc[fromPeer];
      if (pc4 && sig.data.candidate) {
        try { await pc4.addIceCandidate(new RTCIceCandidate(sig.data.candidate)); } catch(e) {}
      }
      break;
    case 'chat':
      addChatMsg(sig.data.name||'?', sig.data.message);
      break;
    case 'leave':
      removePeer(fromPeer);
      addChatMsg('Système', `${peers[fromPeer]?.name||'Quelqu\'un'} a quitté la réunion`, true);
      break;
    case 'end':
      showEnded();
      break;
  }
}

async function sendSignal(toPeer, type, data) {
  try {
    await fetch(`/api/meetings/${ROOM_ID}/signal`, {
      method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
      body: JSON.stringify({ from_peer: PEER_ID, to_peer: toPeer||null, type, data })
    });
  } catch(e) {}
}

function removePeer(peerId) {
  if (pc[peerId]) { pc[peerId].close(); delete pc[peerId]; }
  delete peers[peerId];
  updateVideoGrid();
  updateParts();
}

/* ═══════════ VIDEO GRID ═══════════ */
function updateVideoGrid() {
  const grid = document.getElementById('video-grid');
  const count = Object.keys(peers).length + 1; // +1 for local
  // Enlever vieilles tuiles
  document.querySelectorAll('.vid-tile:not(.local):not(#screen-tile)').forEach(t => t.remove());
  // Ajouter tuiles peers
  for (const [pid, peer] of Object.entries(peers)) {
    const tile = document.createElement('div');
    tile.className = 'vid-tile';
    tile.id = `tile-${pid}`;
    if (peer.stream) {
      const v = document.createElement('video');
      v.autoplay = true; v.playsInline = true;
      v.srcObject = peer.stream;
      tile.appendChild(v);
    } else {
      const av = document.createElement('div');
      av.className = 'avatar';
      av.textContent = (peer.name||'?').charAt(0).toUpperCase();
      tile.appendChild(av);
    }
    const name = document.createElement('div');
    name.className = 'peer-name';
    name.textContent = peer.name||'Participant';
    tile.appendChild(name);
    grid.appendChild(tile);
  }
  // Ajuster grille CSS
  const total = count + (screenStream?1:0);
  if (total <= 1) grid.style.gridTemplateColumns = '1fr';
  else if (total <= 2) grid.style.gridTemplateColumns = '1fr 1fr';
  else if (total <= 4) grid.style.gridTemplateColumns = '1fr 1fr';
  else grid.style.gridTemplateColumns = 'repeat(3,1fr)';
}

/* ═══════════ CONTRÔLES ═══════════ */
function toggleMic() {
  micOn = !micOn;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  document.getElementById('btn-mic').classList.toggle('off', !micOn);
  document.getElementById('btn-mic').innerHTML = (micOn?'🎙':'🔇') + ' <span>Micro</span>';
  document.getElementById('local-mic-indicator').style.display = micOn?'none':'block';
}
function toggleCam() {
  camOn = !camOn;
  if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  document.getElementById('btn-cam').classList.toggle('off', !camOn);
  document.getElementById('btn-cam').innerHTML = (camOn?'📷':'🚫') + ' <span>Caméra</span>';
  document.getElementById('local-video').style.opacity = camOn?'1':'0';
  document.getElementById('local-avatar').style.display = camOn?'none':'flex';
}
function updateMicCamUI() {
  document.getElementById('btn-mic').classList.toggle('off', !micOn);
  document.getElementById('btn-mic').innerHTML = (micOn?'🎙':'🔇') + ' <span>Micro</span>';
  document.getElementById('btn-cam').classList.toggle('off', !camOn);
  document.getElementById('btn-cam').innerHTML = (camOn?'📷':'🚫') + ' <span>Caméra</span>';
}

async function toggleScreen() {
  if (screenStream) {
    screenStream.getTracks().forEach(t => t.stop());
    screenStream = null;
    document.getElementById('screen-tile').style.display = 'none';
    document.getElementById('btn-screen').classList.remove('active');
    // Remplacer la vidéo dans les PCs
    if (localStream) {
      const vt = localStream.getVideoTracks()[0];
      if (vt) Object.values(pc).forEach(p => { const s = p.getSenders().find(s => s.track?.kind==='video'); if(s) s.replaceTrack(vt); });
    }
    await sendSignal(null, 'screen_off', {});
  } else {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({ video:true });
      const st = document.getElementById('screen-tile');
      st.style.display = 'block';
      let sv = st.querySelector('video');
      if (!sv) { sv = document.createElement('video'); sv.autoplay=true; sv.playsInline=true; st.appendChild(sv); }
      sv.srcObject = screenStream;
      document.getElementById('btn-screen').classList.add('active');
      // Partager aux peers
      const vt = screenStream.getVideoTracks()[0];
      Object.values(pc).forEach(p => { const s = p.getSenders().find(s => s.track?.kind==='video'); if(s) s.replaceTrack(vt); });
      screenStream.getVideoTracks()[0].onended = () => toggleScreen();
      await sendSignal(null, 'screen_on', { name: myName });
    } catch(e) {}
  }
  updateVideoGrid();
}

/* ═══════════ CHAT ═══════════ */
function toggleChat() {
  chatOpen = !chatOpen;
  const panel = document.getElementById('chat-panel');
  panel.style.display = chatOpen ? 'flex' : 'none';
  document.getElementById('btn-chat').classList.toggle('active', chatOpen);
  if (chatOpen) document.getElementById('room').style.paddingRight = '300px';
  else document.getElementById('room').style.paddingRight = '0';
}
function toggleParts() {
  partsOpen = !partsOpen;
  const panel = document.getElementById('parts-panel');
  panel.style.display = partsOpen ? 'flex' : 'none';
  document.getElementById('btn-parts').classList.toggle('active', partsOpen);
}

function addChatMsg(from, text, isSystem=false) {
  const div = document.createElement('div');
  div.className = 'chat-msg' + (from===myName?' mine':'');
  div.innerHTML = isSystem
    ? `<div style="color:#8b949e;font-size:.72rem;text-align:center;">${_esc(text)}</div>`
    : `<div class="from">${_esc(from)}</div><div>${_esc(text)}</div>`;
  const msgs = document.getElementById('chat-messages');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  // Badge si chat fermé
  if (!chatOpen && !isSystem) {
    const btn = document.getElementById('btn-chat');
    btn.innerHTML = '💬 <span>Chat ●</span>';
  }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addChatMsg(myName, msg);
  document.getElementById('btn-chat').innerHTML = '💬 <span>Chat</span>';
  await sendSignal(null, 'chat', { name: myName, message: msg });
}

function updateParts() {
  const list = document.getElementById('parts-list');
  const all = [{ id: 'local', name: myName + (role==='host'?' (Hôte)':''), isMe: true }, ...Object.entries(peers).map(([id,p])=>({ id, name:p.name, isMe:false }))];
  list.innerHTML = all.map(p => `<div class="part-item"><div class="part-avatar">${(p.name||'?').charAt(0).toUpperCase()}</div><span style="font-size:.8rem;">${_esc(p.name)}${p.isMe?' (Vous)':''}</span></div>`).join('');
}

/* ═══════════ TIMER ═══════════ */
function startTimer() {
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - started_at.getTime()) / 1000);
    const remaining = maxMinutes * 60 - elapsed;
    const mm = String(Math.floor(Math.abs(elapsed)/60)).padStart(2,'0');
    const ss = String(Math.abs(elapsed)%60).padStart(2,'0');
    document.getElementById('timer').textContent = `⏱ ${mm}:${ss}`;

    if (remaining <= 0) {
      document.getElementById('timer').classList.add('warning');
      showEnded();
      return;
    }
    if (remaining <= 5*60) {
      const remMin = Math.floor(remaining/60); const remSec = remaining%60;
      const co = document.getElementById('countdown-overlay');
      co.style.display = 'block';
      document.getElementById('countdown-text').textContent = `${String(remMin).padStart(2,'0')}:${String(remSec).padStart(2,'0')}`;
      document.getElementById('timer').classList.add('warning');
      if (remaining <= 5 && role === 'host') {
        // Auto-terminate
        showEnded();
      }
    }
  }, 1000);
}

/* ═══════════ FIN ═══════════ */
async function endCall() {
  await sendSignal(null, 'leave', { name: myName });
  if (role === 'host') {
    await fetch(`/api/meetings/${meeting.id}/end`, { method:'PATCH', headers:{'Content-Type':'application/json'}, credentials:'include', body:'{}' });
    await sendSignal(null, 'end', { reason: 'host_ended' });
  }
  showEnded();
}
function showEnded() {
  clearInterval(timerInterval); clearInterval(pollInterval);
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  Object.values(pc).forEach(p => p.close());
  const elapsed = started_at ? Math.floor((Date.now()-started_at.getTime())/60000) : 0;
  document.getElementById('room').style.display = 'none';
  document.getElementById('chat-panel').style.display = 'none';
  document.getElementById('parts-panel').style.display = 'none';
  document.getElementById('ended-screen').style.display = 'flex';
  document.getElementById('ended-duration').textContent = elapsed ? `Durée : ${elapsed} minute${elapsed>1?'s':''}` : '';
}

function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── START ───
initLobby();
</script>
