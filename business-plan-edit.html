<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diaspo'Actif — Éditeur Business Plan</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="assets/styles.v2.css">
<link rel="stylesheet" href="assets/responsive.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b00">
<style>
/* ===== LAYOUT ===== */
html,body{height:100%;overflow:hidden;}
.bp-shell{display:flex;height:calc(100vh - 56px);overflow:hidden;}

/* Sidebar navigation */
.bp-sidebar{width:260px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.bp-sidebar-head{padding:14px 16px;border-bottom:1px solid var(--border);}
.bp-sidebar-head .bp-name{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.prog-bar{height:6px;border-radius:99px;background:var(--border);overflow:hidden;}
.prog-bar .fill{height:100%;border-radius:99px;background:linear-gradient(135deg,#2563EB,#1d4ed8);transition:width .5s;}
.prog-label{font-size:11px;color:var(--muted);margin-top:3px;}
.bp-nav{flex:1;overflow-y:auto;padding:8px 0;}
.bp-nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);transition:background .1s;border-left:3px solid transparent;}
.bp-nav-item:hover{background:var(--surface2);}
.bp-nav-item.active{background:var(--orange-light);border-left-color:#2563EB;color:#2563EB;}
.bp-nav-item .nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center;}
.bp-nav-item .check{margin-left:auto;font-size:13px;}
.bp-sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}

/* Zone centrale */
.bp-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.bp-topbar{padding:10px 20px;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.bp-topbar .bp-title-input{flex:1;border:none;font-size:16px;font-weight:800;font-family:inherit;outline:none;background:transparent;}
.bp-topbar .bp-title-input:focus{border-bottom:2px solid var(--orange);}
.bp-save-status{font-size:12px;color:var(--muted);flex-shrink:0;}
.bp-content{flex:1;overflow-y:auto;padding:24px;}

/* Section */
.bp-section{max-width:860px;margin:0 auto;}
.bp-section-head{margin-bottom:20px;}
.bp-section-head h2{margin:0;font-size:20px;font-weight:800;}
.bp-section-head p{margin:6px 0 0;color:var(--muted);font-size:13.5px;}
.bp-section-head .section-comment-btn{float:right;font-size:12px;}

.bp-card-inner{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;}
.bp-card-inner h3{margin:0 0 14px;font-size:14px;font-weight:800;color:var(--text);}

/* Formulaires */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg .full{grid-column:1/-1;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13.5px;box-sizing:border-box;background:var(--bg);}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#2563EB;}
.fg textarea{resize:vertical;min-height:90px;}

/* SWOT */
.swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.swot-cell{border-radius:12px;padding:16px;}
.swot-cell.forces{background:#d1fae5;border:1px solid #6ee7b7;}
.swot-cell.faiblesses{background:#fee2e2;border:1px solid #fca5a5;}
.swot-cell.opportunites{background:#dbeafe;border:1px solid #93c5fd;}
.swot-cell.menaces{background:#fef3c7;border:1px solid #fcd34d;}
.swot-cell label{display:block;font-weight:800;font-size:12px;text-transform:uppercase;margin-bottom:8px;}
.swot-cell textarea{width:100%;border:none;background:rgba(255,255,255,.7);border-radius:8px;padding:8px;font-family:inherit;font-size:13px;resize:vertical;min-height:100px;box-sizing:border-box;}

/* BMC - Business Model Canvas */
.bmc-grid{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:auto auto;gap:8px;}
.bmc-cell{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;}
.bmc-cell label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;color:#2563EB;margin-bottom:6px;}
.bmc-cell textarea{width:100%;border:none;background:var(--bg);border-radius:6px;padding:6px;font-family:inherit;font-size:12px;resize:vertical;min-height:80px;box-sizing:border-box;}
.bmc-cell.partenaires{grid-row:span 2;}
.bmc-cell.activites{grid-column:2;}
.bmc-cell.proposition{grid-column:3;grid-row:span 2;}

/* Aide contextuelle (?) */
.bp-help{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:#cbd5e1;color:#334155;font-size:10px;font-weight:800;cursor:help;margin-left:6px;position:relative;vertical-align:middle;flex-shrink:0;text-transform:none;}
.bp-help:hover,.bp-help.active{background:#F39C12;color:#fff;}
.bp-help .bp-help-tip{display:none;position:absolute;left:0;bottom:135%;background:#1f2937;color:#fff;font-size:12px;font-weight:400;line-height:1.4;padding:8px 10px;border-radius:6px;width:230px;white-space:normal;z-index:80;box-shadow:0 4px 12px rgba(0,0,0,.25);text-transform:none;}
.bp-help:hover .bp-help-tip,.bp-help.active .bp-help-tip{display:block;}

/* Tableau de bord financier */
.fin-dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-top:10px;}
.fin-dash-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.fin-dash-card .fdc-label{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;}
.fin-dash-card .fdc-value{font-size:18px;font-weight:800;margin-top:4px;}

/* Plan de financement (Ressources / Emplois) */
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:10px;}
.pf-col h4{margin:0 0 10px;font-size:13px;text-transform:uppercase;color:var(--muted);}
.pf-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
.pf-row label{font-size:12.5px;flex:1;}
.pf-row input{width:120px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;text-align:right;box-sizing:border-box;}
.pf-total{display:flex;justify-content:space-between;font-weight:800;margin-top:8px;padding-top:8px;border-top:2px solid var(--border);}
.pf-balance{margin-top:14px;padding:10px 12px;border-radius:8px;font-weight:700;text-align:center;}
.pf-balance.ok{background:#d1fae5;color:#065f46;}
.pf-balance.ko{background:#fee2e2;color:#991b1b;}

/* Ratios financiers */
.ratio-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;flex-shrink:0;}
.ratio-dot.green{background:#10b981;}
.ratio-dot.orange{background:#f59e0b;}
.ratio-dot.red{background:#dc2626;}
.ratio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:10px;}
.ratio-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
.ratio-card .r-label{font-size:12.5px;color:var(--muted);}
.ratio-card .r-value{font-weight:800;font-size:14px;display:flex;align-items:center;}
.bmc-cell.relations{grid-column:4;}
.bmc-cell.segments{grid-column:5;grid-row:span 2;}
.bmc-cell.ressources{grid-column:2;grid-row:2;}
.bmc-cell.canaux{grid-column:4;grid-row:2;}
.bmc-foot{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.bmc-foot .bmc-cell{border-color:var(--orange-light);}

/* Tableau produits/services */
.bp-table{width:100%;border-collapse:collapse;font-size:13px;}
.bp-table th{background:var(--surface2);padding:8px 12px;text-align:left;font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);}
.bp-table td{padding:8px 10px;border:1px solid var(--border);vertical-align:top;}
.bp-table td input{border:none;background:transparent;width:100%;font-family:inherit;font-size:13px;padding:0;outline:none;}
.bp-table tr:hover td{background:var(--surface2);}

/* Tableau financier */
.fin-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:12px;}
.fin-table th{background:linear-gradient(135deg,#2563EB,#1d4ed8);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;border:1px solid var(--border);}
.fin-table td{padding:7px 10px;border:1px solid var(--border);text-align:right;}
.fin-table td:first-child{text-align:left;font-weight:600;}
.fin-table td input{border:none;background:transparent;width:70px;text-align:right;font-family:inherit;font-size:12px;padding:0;}
.fin-table .total-row td{background:#fff7ed;font-weight:800;}
.fin-table .header-row td{background:var(--surface2);font-weight:700;font-size:11px;text-transform:uppercase;}

/* Risques */
.risk-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 2fr;gap:8px;align-items:center;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:#fff;}
.risk-row select,.risk-row input{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:inherit;font-size:12px;}
.risk-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:800;}
.risk-faible{background:#d1fae5;color:#065f46;}
.risk-moyen{background:#fef3c7;color:#92400e;}
.risk-eleve{background:#fee2e2;color:#991b1b;}
.risk-critique{background:#7f1d1d;color:#fff;}

/* Gantt simplifié */
.gantt-table{width:100%;border-collapse:collapse;font-size:12px;}
.gantt-table th{background:var(--surface2);padding:6px 8px;border:1px solid var(--border);font-size:11px;font-weight:700;text-align:center;}
.gantt-table td{border:1px solid var(--border);padding:5px 8px;}
.gantt-bar{height:14px;border-radius:99px;background:linear-gradient(135deg,#2563EB,#1d4ed8);opacity:.8;}

/* Complétude */
.complet-table{width:100%;border-collapse:collapse;font-size:13px;}
.complet-table th{padding:8px 12px;text-align:left;font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);background:var(--surface2);border:1px solid var(--border);}
.complet-table td{padding:8px 12px;border:1px solid var(--border);}

/* Commentaires sidebar */
.comments-panel{width:280px;background:#fff;border-left:1px solid var(--border);display:none;flex-direction:column;overflow:hidden;}
.comments-panel.open{display:flex;}
.comments-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.comments-body{flex:1;overflow-y:auto;padding:12px;}
.comment-item{background:var(--bg);border-radius:8px;padding:10px;margin-bottom:8px;font-size:12.5px;}
.comment-item .ca{font-weight:700;font-size:11px;margin-bottom:3px;}

/* Versions */
.ver-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;}

/* Export buttons */
.export-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}

/* Mobile */
@media(max-width:768px){
  .bp-sidebar{position:fixed;left:-260px;z-index:100;height:100%;transition:left .25s;}
  .bp-sidebar.open{left:0;}
  .bmc-grid{grid-template-columns:1fr 1fr;display:flex;flex-direction:column;}
  .bmc-cell{grid-column:auto!important;grid-row:auto!important;}
  .fg{grid-template-columns:1fr;}
  .swot-grid{grid-template-columns:1fr;}
}

/* ===== ASSISTANT BP ===== */
#bpa-widget{position:fixed;bottom:24px;right:24px;z-index:400;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
#bpa-toggle{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6d28d9,#a78bfa);border:none;cursor:pointer;box-shadow:0 4px 20px rgba(109,40,217,.4);display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform .2s;position:relative;}
#bpa-toggle:hover{transform:scale(1.08);}
#bpa-badge{position:absolute;top:-2px;right:-2px;width:14px;height:14px;background:#10b981;border-radius:50%;border:2px solid #fff;}
#bpa-panel{width:360px;background:#fff;border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,.18);display:none;flex-direction:column;overflow:hidden;border:1px solid #e0d4fd;max-height:70vh;}
#bpa-panel.open{display:flex;}
#bpa-panel.minimized{max-height:56px;}
#bpa-header{background:linear-gradient(135deg,#6d28d9,#a78bfa);padding:14px 16px;display:flex;align-items:center;gap:10px;color:#fff;cursor:pointer;flex-shrink:0;}
#bpa-header .bpa-av{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
#bpa-header .bpa-info{flex:1;}
#bpa-header .bpa-name{font-weight:800;font-size:14px;}
#bpa-header .bpa-status{font-size:11px;opacity:.85;}
.bpa-head-btns{display:flex;gap:4px;}
.bpa-head-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.bpa-head-btn:hover{background:rgba(255,255,255,.35);}
#bpa-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#faf5ff;}
.bpa-msg{max-width:88%;border-radius:12px;padding:10px 13px;font-size:13px;line-height:1.55;word-break:break-word;}
.bpa-msg.bot{background:#fff;border:1px solid #e0d4fd;align-self:flex-start;border-bottom-left-radius:3px;}
.bpa-msg.user{background:linear-gradient(135deg,#6d28d9,#8b5cf6);color:#fff;align-self:flex-end;border-bottom-right-radius:3px;}
.bpa-msg.typing{color:#9ca3af;font-style:italic;font-size:12px;background:#fff;border:1px solid #e0d4fd;border-bottom-left-radius:3px;}
.bpa-msg strong{font-weight:700;}
#bpa-quick{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px 0;flex-shrink:0;}
.bpa-q{border:1px solid #a78bfa;background:#f5f3ff;color:#6d28d9;border-radius:99px;padding:4px 11px;font-size:11.5px;cursor:pointer;white-space:nowrap;transition:background .1s;}
.bpa-q:hover{background:#ede9fe;}
#bpa-input-row{display:flex;gap:6px;padding:10px 12px;border-top:1px solid #e0d4fd;background:#fff;flex-shrink:0;}
#bpa-input{flex:1;padding:8px 12px;border-radius:20px;border:1px solid #a78bfa;font-size:13px;font-family:inherit;outline:none;background:#faf5ff;}
#bpa-input:focus{border-color:#6d28d9;}
#bpa-send{background:linear-gradient(135deg,#6d28d9,#a78bfa);color:#fff;border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.bpa-section-tag{font-size:10.5px;font-weight:700;text-transform:uppercase;color:#6d28d9;background:#f5f3ff;border-radius:99px;padding:2px 8px;margin-bottom:6px;display:inline-block;}
.bpa-prog-mini{background:#f5f3ff;border-radius:10px;padding:10px 12px;margin-bottom:4px;}
.bpa-prog-mini .bar{height:6px;border-radius:99px;background:#e0d4fd;overflow:hidden;margin:4px 0;}
.bpa-prog-mini .bar .fill{height:100%;border-radius:99px;background:#6d28d9;transition:width .5s;}

/* ═══ Dossier final (rapport multimédia) ═══ */
#fr-overlay{display:none;position:fixed;inset:0;background:#f1f5f9;z-index:2000;overflow-y:auto;}
#fr-overlay.open{display:block;}
#fr-toolbar{position:sticky;top:0;z-index:10;background:#1f2937;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
#fr-toolbar h3{margin:0;font-size:15px;}
.fr-theme-btn{border:2px solid transparent;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:700;}
.fr-theme-btn.active{border-color:#fff;}
#fr-doc{max-width:900px;margin:24px auto;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.12);padding:50px 60px;
  --fr-primary:#1E3A8A; --fr-secondary:#F3F4F6; --fr-accent:#2563EB; --fr-text:#111827; --fr-on-secondary:#111827; --fr-muted:#6b7280;
  color:var(--fr-text);}
#fr-doc.theme-moderne{--fr-primary:#065f46; --fr-secondary:#0a0a0a; --fr-accent:#10b981; --fr-text:#111827; --fr-on-secondary:#f9fafb; --fr-muted:#9ca3af;}
#fr-doc.theme-premium{--fr-primary:#111827; --fr-secondary:#1a1a1a; --fr-accent:#B8860B; --fr-text:#111827; --fr-on-secondary:#f9fafb; --fr-muted:#9ca3af;}
.fr-cover{text-align:center;padding:60px 0 40px;border-bottom:4px solid var(--fr-primary);margin-bottom:30px;}
.fr-cover h1{font-size:32px;color:var(--fr-primary);margin:0 0 8px;}
.fr-cover .fr-slogan{font-size:16px;color:#6b7280;font-style:italic;}
.fr-cover .fr-brand{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--fr-accent);font-weight:800;margin-bottom:16px;}
.fr-toc{background:var(--fr-secondary);border-radius:10px;padding:20px 24px;margin-bottom:30px;}
.fr-toc h3{margin:0 0 10px;color:var(--fr-primary);}
.fr-toc a{display:block;padding:3px 0;color:var(--fr-accent);text-decoration:none;font-size:13.5px;}
.fr-section{margin-bottom:36px;page-break-inside:avoid;}
.fr-section h2{color:var(--fr-primary);border-bottom:2px solid var(--fr-accent);padding-bottom:6px;font-size:20px;}
.fr-section h4{color:var(--fr-primary);font-size:14px;text-transform:uppercase;margin-bottom:4px;}
.fr-section p{font-size:13.5px;line-height:1.6;}
.fr-grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.fr-table{width:100%;border-collapse:collapse;font-size:12.5px;margin:10px 0;}
.fr-table th,.fr-table td{border:1px solid #e5e7eb;padding:6px 8px;text-align:left;}
.fr-table th{background:var(--fr-secondary);color:var(--fr-on-secondary);}
.fr-score-card{display:flex;gap:20px;flex-wrap:wrap;margin:16px 0;}
.fr-score-box{background:var(--fr-secondary);border-radius:10px;padding:16px 22px;text-align:center;min-width:140px;}
.fr-score-box .fr-score-num{font-size:30px;font-weight:800;color:var(--fr-accent);}
.fr-score-box .fr-score-label{font-size:11px;text-transform:uppercase;color:var(--fr-on-secondary);opacity:.75;}
.fr-chart-bar{display:flex;align-items:flex-end;gap:10px;height:140px;margin:16px 0;}
.fr-chart-bar .fr-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.fr-chart-bar .fr-bar{width:100%;background:var(--fr-accent);border-radius:4px 4px 0 0;min-height:2px;}
.fr-chart-bar .fr-bar-label{font-size:10.5px;margin-top:4px;color:#6b7280;}
.fr-pie{width:130px;height:130px;border-radius:50%;flex-shrink:0;}
.fr-pie-legend{display:flex;flex-direction:column;gap:5px;justify-content:center;font-size:12px;}
.fr-pie-legend span.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;}
.fr-footer{text-align:center;font-size:11px;color:#9ca3af;padding-top:20px;border-top:1px solid #e5e7eb;margin-top:40px;}
@media print{
  body *{visibility:hidden;}
  #fr-overlay, #fr-overlay *{visibility:visible;}
  #fr-overlay{position:absolute;inset:0;background:#fff;}
  #fr-toolbar{display:none;}
  #fr-doc{box-shadow:none;margin:0;max-width:100%;}
  .fr-section{page-break-after:auto;}
}
</style>

<body>
<div class="page" style="height:100vh;overflow:hidden;display:flex;flex-direction:column;">

  <header class="topbar" style="flex-shrink:0;">
    <div class="topbar-inner">
      <a href="business-plan.html" style="color:var(--muted);text-decoration:none;font-size:13px;font-weight:700;">← Mes plans</a>
      <div class="logo" style="margin-left:16px;"><img loading="lazy" class="logo-img" src="assets/logo.svg" alt="Diaspo'Actif"> DIASPO'ACTIF</div>
      <div class="topbar-right">
        <select class="lang-select" id="lang-select"></select>
        <div id="auth-area" class="auth-area"></div>
      </div>
    </div>
  </header>

  <div class="bp-shell" id="bp-shell">

    <!-- SIDEBAR navigation -->
    <div class="bp-sidebar" id="bp-sidebar">
      <div class="bp-sidebar-head">
        <div class="bp-name" id="sidebar-name">Chargement…</div>
        <div class="prog-bar"><div class="fill" id="sidebar-prog" style="width:0%"></div></div>
        <div class="prog-label" id="sidebar-prog-label">0% complété</div>

/* ---- Chargement initial ---- */
async function loadBP() {
  bpId = new URLSearchParams(location.search).get('id');
  if (!bpId) { window.location.href='business-plan.html'; return; }
  try {
    bp = await api('GET', `/business-plans/${bpId}`);
    sections = bp.sections || {};
    monRole = bp.mon_role || 'lecteur';
    document.title = `BP — ${bp.nom_projet||'Sans titre'} · Diaspo\'Actif`;
    document.getElementById('bp-title-input').value = bp.nom_projet || '';
    buildNav();
    updateProgress(bp.progression||0);
    renderSection(currentSection);
  } catch(e) {
    document.getElementById('bp-content').innerHTML = `<div style="padding:40px;text-align:center;color:#D33;">${e.message}</div>`;
  }
}

function updateProgress(prog) {
  document.getElementById('sidebar-prog').style.width = prog+'%';
  document.getElementById('sidebar-prog-label').textContent = `${prog}% complété`;
  document.getElementById('sidebar-name').textContent = bp?.nom_projet||'Sans titre';
}

/* ---- Navigation ---- */
function buildNav() {
  const completude = bp?.completude || [];
  const nav = document.getElementById('bp-nav');
  nav.innerHTML = SECTIONS.map(s => {
    const check = completude.find(c=>c.key===s.key);
    const ok = check?.ok;
    return `<div class="bp-nav-item ${s.key===currentSection?'active':''}" onclick="navTo('${s.key}')">
      <span class="nav-icon">${s.icon}</span>
      <span>${s.label}</span>
      <span class="check">${check ? (ok?'✅':'⚠️') : ''}</span>
    </div>`;
  }).join('');
}

function navToBase(key) {
  saveCurrentSection();
  currentSection = key;
  buildNav();
  renderSection(key);
  loadComments(key);
}

/* ---- Auto-save ---- */
function markDirty() {
  hasUnsaved = true;
  document.getElementById('save-status').textContent = '● Non sauvegardé';
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveCurrentSection, 3000);
}

async function saveCurrentSection() {
  if (!hasUnsaved || monRole==='lecteur') return;
  hasUnsaved = false;
  document.getElementById('save-status').textContent = 'Sauvegarde…';
  try {
    const nom = document.getElementById('bp-title-input').value.trim();
    await api('PUT', `/business-plans/${bpId}`, {
      nom_projet: nom||undefined,
      sections: { [currentSection]: sections[currentSection]||{} }
    });
    const updated = await api('GET', `/business-plans/${bpId}`);
    bp.completude = updated.completude;
    bp.progression = updated.progression;
    updateProgress(updated.progression);
    buildNav();
    document.getElementById('save-status').textContent = '✓ Sauvegardé';
  } catch(e) {
    document.getElementById('save-status').textContent = '✗ Erreur sauvegarde';
  }
}

async function patchMeta() {
  const nom = document.getElementById('bp-title-input').value.trim();
  if (nom) { bp.nom_projet=nom; document.getElementById('sidebar-name').textContent=nom; }
  markDirty();
}

/* ---- Aide contextuelle ---- */
function helpText(key) {
  return HELP[currentSection+'|'+key] || HELP[key] || '';
}
function helpIcon(key) {
  const t = helpText(key);
  if (!t) return '';
  return `<span class="bp-help" onclick="event.preventDefault();event.stopPropagation();this.classList.toggle('active')">?<span class="bp-help-tip">${esc(t)}</span></span>`;
}

/* ---- Helpers de saisie ---- */
function field(key, label, placeholder='', type='text', full=false, required=false) {
  const val = sections[currentSection]?.[key]||'';
  const ro = monRole==='lecteur';
  return `<div class="${full?'full':''}">
    <label>${label}${required?` <span style="color:#D33;">*</span>`:''}${helpIcon(key)}</label>
    <input type="${type}" data-key="${key}" value="${esc(val)}" placeholder="${placeholder}" ${ro?'readonly':''} oninput="updateField('${key}',this.value)">
  </div>`;
}

function textarea(key, label, placeholder='', rows=3, full=true) {
  const val = sections[currentSection]?.[key]||'';
  const ro = monRole==='lecteur';
  return `<div class="${full?'full':''}">
    <label>${label}${helpIcon(key)}</label>
    <textarea data-key="${key}" rows="${rows}" placeholder="${placeholder}" ${ro?'readonly':''} oninput="updateField('${key}',this.value)">${esc(val)}</textarea>
  </div>`;
}

function select(key, label, options, full=false) {
  const val = sections[currentSection]?.[key]||'';
  const ro = monRole==='lecteur';
  return `<div class="${full?'full':''}">
    <label>${label}${helpIcon(key)}</label>
    <select data-key="${key}" ${ro?'disabled':''} onchange="updateField('${key}',this.value)">
      ${options.map(o=>typeof o==='string'?`<option value="${o}" ${val===o?'selected':''}>${o}</option>`:`<option value="${o.v}" ${val===o.v?'selected':''}>${o.l}</option>`).join('')}
    </select>
  </div>`;
}

function updateField(key, value) {
  if (!sections[currentSection]) sections[currentSection]={};
  sections[currentSection][key] = value;
  markDirty();
}

   RENDU DE CHAQUE SECTION
   ════════════════════════════════════════════════════ */
function renderSection(key) {
  const content = document.getElementById('bp-content');
  const def = SECTIONS.find(s=>s.key===key);
  const renderers = {
    infos_generales: renderInfosGenerales,
    resume_executif: renderResumeExecutif,
    presentation: renderPresentation,
    probleme: renderProbleme,
    solution: renderSolution,
    marche: renderMarche,
    swot: renderSWOT,
    business_model: renderBMC,
    produits: renderProduits,
    strategie_marketing: renderMarketing,
    plan_commercial: renderCommercial,
    plan_operationnel: renderOperationnel,
    organisation: renderOrganisation,
    rh: renderRH,
    calendrier: renderCalendrier,
    plan_financier: renderFinancier,
    risques: renderRisques,
    impact: renderImpact,
    financement: renderFinancement,
    annexes: renderAnnexes,
    completude: renderCompletude,
  };
  const fn = renderers[key] || (() => '<div class="bp-section"><div class="bp-card-inner"><p>Section en cours de développement.</p></div></div>');
  content.innerHTML = fn();
  if (key === 'plan_financier') calcAllFinance();
  if (key === 'produits') (sections.produits?.etude_prix||[]).forEach((_,i)=>calcMargeEtudePrix(i));
  if (!def?.noSave && monRole !== 'lecteur') {
    content.insertAdjacentHTML('beforeend', `
      <div class="bp-section" style="padding-top:0;">
        <div class="bp-card-inner" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
          <span id="valider-msg" style="font-size:12.5px;color:var(--muted);"></span>
          <button class="btn btn-orange" onclick="validerSection()">✅ Valider cette étape</button>
        </div>
      </div>`);
  }
  content.scrollTop = 0;
}

async function validerSection() {
  hasUnsaved = true;
  await saveCurrentSection();
  const check = bp?.completude?.find(c=>c.key===currentSection);
  if (check?.ok) {
    const idx = SECTIONS.findIndex(s=>s.key===currentSection);
    const next = SECTIONS.slice(idx+1).find(s=>!s.noSave);
    if (next) { navTo(next.key); return; }
  }
  const msg = document.getElementById('valider-msg');
  if (msg) msg.textContent = check?.ok ? '✅ Étape validée et complète. Dernière section atteinte.' : '💾 Enregistré — quelques champs restent à compléter pour la marquer complète.';
}

function genResumeAuto() {
  const infos = sections.infos_generales || {};
  const pb = sections.probleme || {};
  const sol = sections.solution || {};
  const mar = sections.marche || {};
  const fin = sections.financement || {};
  if (!sections.resume_executif) sections.resume_executif = {};
  const s = sections.resume_executif;
  if (infos.nom_projet && !s.projet) s.projet = `${infos.nom_projet} est un(e) ${infos.type_initiative||'projet'} dans le secteur ${infos.secteur||'—'}, basé(e) à ${infos.ville||'—'}, ${infos.pays||'—'}.`;
  if (pb.description && !s.probleme) s.probleme = pb.description.substring(0,300);
  if (sol.description && !s.solution) s.solution = sol.description.substring(0,300);
  if (mar.taille_marche && !s.marche) s.marche = `Taille du marché : ${mar.taille_marche}. ${mar.tendances||''}`;
  if (fin.montant && !s.besoins) s.besoins = `Montant recherché : ${fin.montant}€. Utilisation : ${fin.utilisation||'—'}`;
  markDirty();
  renderSection('resume_executif');
}

function calcMarge(i) {
  const items = sections.produits?.items||[];
  const it = items[i]||{};
  const cout = parseFloat(it.cout_revient)||0;
  const prix = parseFloat(it.prix_vente)||0;
  const marge = prix>0 ? Math.round((prix-cout)/prix*100) : 0;
  it.marge = marge;
  const el = document.getElementById('marge-'+i);
  if(el) el.value = marge;
}

function updFin(key,val) {
  if(!sections.plan_financier) sections.plan_financier={};

  markDirty();
}
function fmtEuro(n){ return (Math.round(n*100)/100).toLocaleString('fr')+'€'; }
function ratioDot(value, seuilVert, seuilOrange, inverse) {
  let cls='red';
  if (inverse) { if(value<=seuilVert) cls='green'; else if(value<=seuilOrange) cls='orange'; }
  else { if(value>=seuilVert) cls='green'; else if(value>=seuilOrange) cls='orange'; }
  return `<span class="ratio-dot ${cls}"></span>`;
}
function calcFinRow() {
  const s = sections.plan_financier||{};
  for(let i=1;i<=5;i++){
    const ca=(parseFloat(s[`ca_${i}`])||0)+(parseFloat(s[`autres_produits_${i}`])||0);
    const charges=(parseFloat(s[`achats_${i}`])||0)+(parseFloat(s[`salaires_${i}`])||0)+
      (parseFloat(s[`loyers_${i}`])||0)+(parseFloat(s[`marketing_charge_${i}`])||0)+(parseFloat(s[`autres_charges_${i}`])||0);
    const res=ca-charges;
    const el=document.getElementById(`fin-res-${i}`);
    if(el){el.textContent=fmtEuro(res);el.style.color=res>=0?'#10b981':'#dc2626';}
  }
}
function calcPlanFinancement() {
  const s = sections.plan_financier||{};
  const totalRes = PF_RESSOURCES.reduce((sum,[k])=>sum+(parseFloat(s[k])||0),0);
  const totalEmp = PF_EMPLOIS.reduce((sum,[k])=>sum+(parseFloat(s[k])||0),0);
  const elRes=document.getElementById('pf-total-ressources'); if(elRes) elRes.textContent=fmtEuro(totalRes);
  const elEmp=document.getElementById('pf-total-emplois'); if(elEmp) elEmp.textContent=fmtEuro(totalEmp);
  const bal=document.getElementById('pf-balance');
  if(bal){
    const diff=totalRes-totalEmp;
    if(Math.abs(diff)<0.01){ bal.className='pf-balance ok'; bal.textContent='✅ Équilibré — Ressources = Emplois'; }
    else { bal.className='pf-balance ko'; bal.textContent=`⚠️ Écart de ${fmtEuro(Math.abs(diff))} (${diff>0?'Ressources > Emplois':'Emplois > Ressources'})`; }
  }
  return { totalRes, totalEmp };
}
function calcTresorerie() {
  const s = sections.plan_financier||{};
  let cumul = 0;
  let dernier = 0;
  for(const m of CF_MOIS){
    const entrees = CF_ENTREES.reduce((sum,[k])=>sum+(parseFloat(s[`cf_${k}_${m}`])||0),0);
    const sorties = CF_SORTIES.reduce((sum,[k])=>sum+(parseFloat(s[`cf_${k}_${m}`])||0),0);
    cumul += entrees - sorties;
    dernier = cumul;
    const el=document.getElementById(`cf-final-${m}`);
    if(el){ el.textContent=fmtEuro(cumul); el.style.color=cumul>=0?'#10b981':'#dc2626'; }
  }
  return dernier;
}
function calcRatios() {
  const s = sections.plan_financier||{};
  const ca1=(parseFloat(s.ca_1)||0)+(parseFloat(s.autres_produits_1)||0);
  const ca2=(parseFloat(s.ca_2)||0)+(parseFloat(s.autres_produits_2)||0);
  const achats1=parseFloat(s.achats_1)||0;
  const charges1=achats1+(parseFloat(s.salaires_1)||0)+(parseFloat(s.loyers_1)||0)+(parseFloat(s.marketing_charge_1)||0)+(parseFloat(s.autres_charges_1)||0);
  const resultat1=ca1-charges1;
  const invest=parseFloat(s.investissement_initial)||0;
  const financement=parseFloat(s.financement_recherche)||0;
  const bfrMontant=parseFloat(s.bfr)||0;

  const margeBrute = ca1>0 ? (ca1-achats1)/ca1*100 : 0;
  const margeNette = ca1>0 ? resultat1/ca1*100 : 0;
  const roi = invest>0 ? resultat1/invest*100 : 0;
  const croissance = ca1>0 ? (ca2-ca1)/ca1*100 : 0;
  const endettement = invest>0 ? financement/invest*100 : 0;
  const bfrRatio = ca1>0 ? bfrMontant/ca1*100 : 0;

  const set = (id, value, suffix, dot) => { const el=document.getElementById(id); if(el) el.innerHTML=`${dot}${value.toFixed(1)}${suffix}`; };
  set('ratio-marge-brute', margeBrute, '%', ratioDot(margeBrute,30,15,false));
  set('ratio-marge-nette', margeNette, '%', ratioDot(margeNette,15,5,false));
  set('ratio-roi', roi, '%', ratioDot(roi,20,10,false));
  set('ratio-croissance', croissance, '%', ratioDot(croissance,10,0,false));
  set('ratio-endettement', endettement, '%', ratioDot(endettement,50,80,true));
  set('ratio-bfr', bfrRatio, '%', ratioDot(bfrRatio,10,25,true));
  return { margeBrute, margeNette, roi, resultat1, ca1 };
}
function calcDashboard(tresorerieDisponible, ratios) {
  const s = sections.plan_financier||{};
  const set = (id,val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  set('fd-invest', s.investissement_initial ? fmtEuro(parseFloat(s.investissement_initial)) : '—');
  set('fd-apport', s.apport_personnel ? fmtEuro(parseFloat(s.apport_personnel)) : '—');
  set('fd-financement', s.financement_recherche ? fmtEuro(parseFloat(s.financement_recherche)) : '—');
  set('fd-ca', ratios.ca1 ? fmtEuro(ratios.ca1) : '—');
  set('fd-resultat', fmtEuro(ratios.resultat1));
  set('fd-rentabilite', ratios.margeNette.toFixed(1)+'%');
  set('fd-roi', ratios.roi.toFixed(1)+'%');
  set('fd-pointmort', s.point_mort ? s.point_mort+' mois' : '—');
  set('fd-tresorerie', fmtEuro(tresorerieDisponible));
}
function calcAllFinance() {
  calcFinRow();
  calcPlanFinancement();
  const tresorerieDisponible = calcTresorerie();
  const ratios = calcRatios();
  calcDashboard(tresorerieDisponible, ratios);
}
function exportFinancierCSV() {
  const s=sections.plan_financier||{};
  const rows=[['Poste','An 1','An 2','An 3','An 4','An 5']];

const FR_COLORS = { corporate:'#2563EB', moderne:'#10b981', premium:'#B8860B' };

function frTopList(list, sortKey, nameKey, extraLabel) {
  const arr = (list||[]).filter(x=>x[nameKey]);
  const top = [...arr].sort((a,b)=>(parseFloat(b[sortKey])||0)-(parseFloat(a[sortKey])||0)).slice(0,3);
  if (!top.length) return '<p style="color:#9ca3af;font-style:italic;">Aucune donnée renseignée pour l\'instant.</p>';
  return '<ul style="font-size:13px;">' + top.map(x=>`<li><strong>${esc(x[nameKey])}</strong>${x[sortKey]?` — ${extraLabel} ${esc(x[sortKey])}${sortKey!=='menace'&&sortKey!=='interet'?'':'/100'}`:''}</li>`).join('') + '</ul>';
}

function frTable(list, cols) {
  const arr = (list||[]).filter(x=>x[cols[0].key]);
  if (!arr.length) return '<p style="color:#9ca3af;font-style:italic;">Aucune donnée renseignée pour l\'instant.</p>';
  return `<table class="fr-table"><thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
    <tbody>${arr.map(x=>`<tr>${cols.map(c=>`<td>${esc(x[c.key]||'—')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function frBarChart(values, labels) {
  const max = Math.max(...values, 1);
  if (values.every(v=>!v)) return '<p style="color:#9ca3af;font-style:italic;">Renseignez le compte de résultat prévisionnel pour générer ce graphique.</p>';
  return `<div class="fr-chart-bar">${values.map((v,i)=>`
    <div class="fr-bar-col">
      <div class="fr-bar" style="height:${Math.max(2,Math.round(v/max*100))}%;" title="${v}"></div>
      <div class="fr-bar-label">${labels[i]}<br>${Math.round(v).toLocaleString('fr')}€</div>
    </div>`).join('')}</div>`;
}

function frPieChart(segments) {
  const total = segments.reduce((s,x)=>s+x.value,0);
  if (!total) return '<p style="color:#9ca3af;font-style:italic;">Renseignez les charges de l\'An 1 pour générer la répartition.</p>';
  let acc = 0;
  const stops = segments.map(seg => {
    const start = acc/total*360; acc += seg.value; const end = acc/total*360;
    return `${seg.color} ${start}deg ${end}deg`;
  }).join(', ');
  return `<div style="display:flex;gap:20px;align-items:center;">
    <div class="fr-pie" style="background:conic-gradient(${stops});"></div>
    <div class="fr-pie-legend">${segments.map(s=>`<div><span class="dot" style="background:${s.color};"></span>${s.label} — ${Math.round(s.value/total*100)}%</div>`).join('')}</div>
  </div>`;
}

function computeReportScore() {
  const fin = sections.plan_financier || {};
  const ca1 = (parseFloat(fin.ca_1)||0) + (parseFloat(fin.autres_produits_1)||0);
  const charges1 = (parseFloat(fin.achats_1)||0)+(parseFloat(fin.salaires_1)||0)+(parseFloat(fin.loyers_1)||0)+(parseFloat(fin.marketing_charge_1)||0)+(parseFloat(fin.autres_charges_1)||0);
  const margeNette = ca1>0 ? (ca1-charges1)/ca1*100 : 0;
  const invest = parseFloat(fin.investissement_initial)||0;
  const roi = invest>0 ? (ca1-charges1)/invest*100 : 0;
  const finHealth = Math.max(0, Math.min(100, margeNette*2*0.6 + roi*0.4));
  const nbRisques = (sections.risques?.items||[]).filter(r=>r.description).length;
  const riskCoverage = Math.min(100, nbRisques/5*100);
  const marketSignals = ['taille_marche','profil_client','segmentation'].filter(k=>sections.marche?.[k]).length
    + ((sections.marche?.concurrents||[]).filter(c=>c.nom).length>0?1:0)
    + ((sections.business_model?.partenaires_liste||[]).filter(p=>p.nom).length>0?1:0);
  const marketCoverage = Math.min(100, marketSignals/5*100);
  const progression = bp?.progression || 0;
  const score = Math.round(progression*0.4 + finHealth*0.25 + riskCoverage*0.15 + marketCoverage*0.2);
  const niveauRisque = score>=70?'Faible':score>=40?'Moyen':'Élevé';
  const potentiel = score>=70?'Élevé':score>=40?'Moyen':'À renforcer';
  return { score, niveauRisque, potentiel };
}

let bpaOpen = false;

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.*?)__/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

function bpaAddMsg(text, role) {
  const body = document.getElementById('bpa-body');
  const d = document.createElement('div');
  d.className = `bpa-msg ${role}`;
  if (role === 'bot') {
    const gotoMatch = text.match(/\[\[GOTO:([a-z_]+)\]\]/);
    const cleanText = text.replace(/👉\s*\[\[GOTO:[a-z_]+\]\]/,'').replace(/\[\[GOTO:[a-z_]+\]\]/,'').trim();
    d.innerHTML = renderMarkdown(cleanText);
    if (gotoMatch) {
      const sectionKey = gotoMatch[1];
      const label = (SECTIONS.find(s=>s.key===sectionKey)||{}).label || sectionKey;
      const btn = document.createElement('button');
      btn.className = 'btn btn-orange btn-sm';
      btn.style.marginTop = '8px';
      btn.textContent = `👉 Ouvrir "${label}"`;
      btn.onclick = () => navTo(sectionKey);
      d.appendChild(btn);
    }
  } else d.textContent = text;
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
  return d;
}

async function bpaSend(text) {
  const msg = (text || document.getElementById('bpa-input').value).trim();
  if (!msg) return;
  document.getElementById('bpa-input').value = '';

  if (!bpaOpen) toggleBPA();

  bpaAddMsg(msg, 'user');
  const typing = bpaAddMsg('Je réfléchis…', 'typing');

  try {
    const r = await api('POST', `/business-plans/${bpId}/assistant`, {
      message: msg,
      currentSection
    });
    typing.remove();
    bpaAddMsg(r.response || 'Je n\'ai pas compris. Reformulez.', 'bot');
  } catch(e) {
    typing.remove();
    bpaAddMsg('Une erreur s\'est produite. Réessayez.', 'bot');
  }
}

window.bpaSend = bpaSend;

function toggleBPA() {
  bpaOpen = !bpaOpen;
  const panel = document.getElementById('bpa-panel');
  if (bpaOpen) {
    panel.classList.add('open');
    bpaMinimized = false;
    panel.classList.remove('minimized');
    document.getElementById('bpa-input').focus();
    bpaUpdateContext();
  } else {
    panel.classList.remove('open');
  }
}

}
