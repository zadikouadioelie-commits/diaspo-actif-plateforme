<style>
/* ===== LAYOUT ===== */
html,body{height:100%;overflow:hidden;}
.bp-shell{display:flex;height:calc(100vh - 56px);overflow:hidden;}

/* Sidebar navigation */
.bp-sidebar{width:260px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.bp-sidebar-head{padding:14px 16px;border-bottom:1px solid var(--border);}
.bp-sidebar-head .bp-name{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.prog-bar{height:6px;border-radius:99px;background:var(--border);overflow:hidden;}
.prog-bar .fill{height:100%;border-radius:99px;background:linear-gradient(135deg,#2563EB,#1d4ed8);transition:width .5s;}
.prog-label{font-size:11px;color:var(--muted);margin-top:3px;}
.bp-nav{flex:1;overflow-y:auto;padding:8px 0;}
.bp-nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);transition:background .1s;border-left:3px solid transparent;}
.bp-nav-item:hover{background:var(--surface2);}
.bp-nav-item.active{background:var(--orange-light);border-left-color:#2563EB;color:#2563EB;}
.bp-nav-item .nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center;}
.bp-nav-item .check{margin-left:auto;font-size:13px;}
.bp-sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}

/* Zone centrale */
.bp-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.bp-topbar{padding:10px 20px;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.bp-topbar .bp-title-input{flex:1;border:none;font-size:16px;font-weight:800;font-family:inherit;outline:none;background:transparent;}
.bp-topbar .bp-title-input:focus{border-bottom:2px solid var(--orange);}
.bp-save-status{font-size:12px;color:var(--muted);flex-shrink:0;}
.bp-content{flex:1;overflow-y:auto;padding:24px;}

/* Section */
.bp-section{max-width:860px;margin:0 auto;}
.bp-section-head{margin-bottom:20px;}
.bp-section-head h2{margin:0;font-size:20px;font-weight:800;}
.bp-section-head p{margin:6px 0 0;color:var(--muted);font-size:13.5px;}
.bp-section-head .section-comment-btn{float:right;font-size:12px;}

.bp-card-inner{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;}
.bp-card-inner h3{margin:0 0 14px;font-size:14px;font-weight:800;color:var(--text);}

/* Formulaires */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg .full{grid-column:1/-1;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13.5px;box-sizing:border-box;background:var(--bg);}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#2563EB;}
.fg textarea{resize:vertical;min-height:90px;}

/* SWOT */
.swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.swot-cell{border-radius:12px;padding:16px;}
.swot-cell.forces{background:#d1fae5;border:1px solid #6ee7b7;}
.swot-cell.faiblesses{background:#fee2e2;border:1px solid #fca5a5;}
.swot-cell.opportunites{background:#dbeafe;border:1px solid #93c5fd;}
.swot-cell.menaces{background:#fef3c7;border:1px solid #fcd34d;}
.swot-cell label{display:block;font-weight:800;font-size:12px;text-transform:uppercase;margin-bottom:8px;}
.swot-cell textarea{width:100%;border:none;background:rgba(255,255,255,.7);border-radius:8px;padding:8px;font-family:inherit;font-size:13px;resize:vertical;min-height:100px;box-sizing:border-box;}

/* BMC - Business Model Canvas */
.bmc-grid{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:auto auto;gap:8px;}
.bmc-cell{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;}
.bmc-cell label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;color:#2563EB;margin-bottom:6px;}
.bmc-cell textarea{width:100%;border:none;background:var(--bg);border-radius:6px;padding:6px;font-family:inherit;font-size:12px;resize:vertical;min-height:80px;box-sizing:border-box;}
.bmc-cell.partenaires{grid-row:span 2;}
.bmc-cell.activites{grid-column:2;}
.bmc-cell.proposition{grid-column:3;grid-row:span 2;}
.bmc-cell.relations{grid-column:4;}
.bmc-cell.segments{grid-column:5;grid-row:span 2;}
.bmc-cell.ressources{grid-column:2;grid-row:2;}
.bmc-cell.canaux{grid-column:4;grid-row:2;}
.bmc-foot{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.bmc-foot .bmc-cell{border-color:var(--orange-light);}

/* Tableau produits/services */
.bp-table{width:100%;border-collapse:collapse;font-size:13px;}
.bp-table th{background:var(--surface2);padding:8px 12px;text-align:left;font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);}
.bp-table td{padding:8px 10px;border:1px solid var(--border);vertical-align:top;}
.bp-table td input{border:none;background:transparent;width:100%;font-family:inherit;font-size:13px;padding:0;outline:none;}
.bp-table tr:hover td{background:var(--surface2);}

/* Tableau financier */
.fin-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:12px;}
.fin-table th{background:linear-gradient(135deg,#2563EB,#1d4ed8);color:#fff;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;border:1px solid var(--border);}
.fin-table td{padding:7px 10px;border:1px solid var(--border);text-align:right;}
.fin-table td:first-child{text-align:left;font-weight:600;}
.fin-table td input{border:none;background:transparent;width:70px;text-align:right;font-family:inherit;font-size:12px;padding:0;}
.fin-table .total-row td{background:#fff7ed;font-weight:800;}
.fin-table .header-row td{background:var(--surface2);font-weight:700;font-size:11px;text-transform:uppercase;}

/* Risques */
.risk-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 2fr;gap:8px;align-items:center;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:#fff;}
.risk-row select,.risk-row input{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:inherit;font-size:12px;}
.risk-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:800;}
.risk-faible{background:#d1fae5;color:#065f46;}
.risk-moyen{background:#fef3c7;color:#92400e;}
.risk-eleve{background:#fee2e2;color:#991b1b;}
.risk-critique{background:#7f1d1d;color:#fff;}

/* Gantt simplifié */
.gantt-table{width:100%;border-collapse:collapse;font-size:12px;}
.gantt-table th{background:var(--surface2);padding:6px 8px;border:1px solid var(--border);font-size:11px;font-weight:700;text-align:center;}
.gantt-table td{border:1px solid var(--border);padding:5px 8px;}
.gantt-bar{height:14px;border-radius:99px;background:linear-gradient(135deg,#2563EB,#1d4ed8);opacity:.8;}

/* Complétude */
.complet-table{width:100%;border-collapse:collapse;font-size:13px;}
.complet-table th{padding:8px 12px;text-align:left;font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);background:var(--surface2);border:1px solid var(--border);}
.complet-table td{padding:8px 12px;border:1px solid var(--border);}

/* Commentaires sidebar */
.comments-panel{width:280px;background:#fff;border-left:1px solid var(--border);display:none;flex-direction:column;overflow:hidden;}
.comments-panel.open{display:flex;}
.comments-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.comments-body{flex:1;overflow-y:auto;padding:12px;}
.comment-item{background:var(--bg);border-radius:8px;padding:10px;margin-bottom:8px;font-size:12.5px;}
.comment-item .ca{font-weight:700;font-size:11px;margin-bottom:3px;}

/* Versions */
.ver-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;}

/* Export buttons */
.export-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}

/* Mobile */
@media(max-width:768px){
  .bp-sidebar{position:fixed;left:-260px;z-index:100;height:100%;transition:left .25s;}
  .bp-sidebar.open{left:0;}
  .bmc-grid{grid-template-columns:1fr 1fr;display:flex;flex-direction:column;}
  .bmc-cell{grid-column:auto!important;grid-row:auto!important;}
  .fg{grid-template-columns:1fr;}
  .swot-grid{grid-template-columns:1fr;}
}

/* ===== ASSISTANT BP ===== */
#bpa-widget{position:fixed;bottom:24px;right:24px;z-index:400;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
#bpa-toggle{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6d28d9,#a78bfa);border:none;cursor:pointer;box-shadow:0 4px 20px rgba(109,40,217,.4);display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform .2s;position:relative;}
#bpa-toggle:hover{transform:scale(1.08);}
#bpa-badge{position:absolute;top:-2px;right:-2px;width:14px;height:14px;background:#10b981;border-radius:50%;border:2px solid #fff;}
#bpa-panel{width:360px;background:#fff;border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,.18);display:none;flex-direction:column;overflow:hidden;border:1px solid #e0d4fd;max-height:70vh;}
#bpa-panel.open{display:flex;}
#bpa-panel.minimized{max-height:56px;}
#bpa-header{background:linear-gradient(135deg,#6d28d9,#a78bfa);padding:14px 16px;display:flex;align-items:center;gap:10px;color:#fff;cursor:pointer;flex-shrink:0;}
#bpa-header .bpa-av{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
#bpa-header .bpa-info{flex:1;}
#bpa-header .bpa-name{font-weight:800;font-size:14px;}
#bpa-header .bpa-status{font-size:11px;opacity:.85;}
.bpa-head-btns{display:flex;gap:4px;}
.bpa-head-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.bpa-head-btn:hover{background:rgba(255,255,255,.35);}
#bpa-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#faf5ff;}
.bpa-msg{max-width:88%;border-radius:12px;padding:10px 13px;font-size:13px;line-height:1.55;word-break:break-word;}
.bpa-msg.bot{background:#fff;border:1px solid #e0d4fd;align-self:flex-start;border-bottom-left-radius:3px;}
.bpa-msg.user{background:linear-gradient(135deg,#6d28d9,#8b5cf6);color:#fff;align-self:flex-end;border-bottom-right-radius:3px;}
.bpa-msg.typing{color:#9ca3af;font-style:italic;font-size:12px;background:#fff;border:1px solid #e0d4fd;border-bottom-left-radius:3px;}
.bpa-msg strong{font-weight:700;}
#bpa-quick{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px 0;flex-shrink:0;}
.bpa-q{border:1px solid #a78bfa;background:#f5f3ff;color:#6d28d9;border-radius:99px;padding:4px 11px;font-size:11.5px;cursor:pointer;white-space:nowrap;transition:background .1s;}
.bpa-q:hover{background:#ede9fe;}
#bpa-input-row{display:flex;gap:6px;padding:10px 12px;border-top:1px solid #e0d4fd;background:#fff;flex-shrink:0;}
#bpa-input{flex:1;padding:8px 12px;border-radius:20px;border:1px solid #a78bfa;font-size:13px;font-family:inherit;outline:none;background:#faf5ff;}
#bpa-input:focus{border-color:#6d28d9;}
#bpa-send{background:linear-gradient(135deg,#6d28d9,#a78bfa);color:#fff;border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.bpa-section-tag{font-size:10.5px;font-weight:700;text-transform:uppercase;color:#6d28d9;background:#f5f3ff;border-radius:99px;padding:2px 8px;margin-bottom:6px;display:inline-block;}
.bpa-prog-mini{background:#f5f3ff;border-radius:10px;padding:10px 12px;margin-bottom:4px;}
.bpa-prog-mini .bar{height:6px;border-radius:99px;background:#e0d4fd;overflow:hidden;margin:4px 0;}
.bpa-prog-mini .bar .fill{height:100%;border-radius:99px;background:#6d28d9;transition:width .5s;}
</style>

/* ---- Chargement initial ---- */
async function loadBP() {
  bpId = new URLSearchParams(location.search).get('id');
  if (!bpId) { window.location.href='business-plan.html'; return; }
  try {
    bp = await api('GET', `/business-plans/${bpId}`);
    sections = bp.sections || {};
    monRole = bp.mon_role || 'lecteur';
    document.title = `BP — ${bp.nom_projet||'Sans titre'} · Diaspo\'Actif`;
    document.getElementById('bp-title-input').value = bp.nom_projet || '';
    buildNav();
    updateProgress(bp.progression||0);
    renderSection(currentSection);
  } catch(e) {
    document.getElementById('bp-content').innerHTML = `<div style="padding:40px;text-align:center;color:#D33;">${e.message}</div>`;
  }
}

function updateProgress(prog) {
  document.getElementById('sidebar-prog').style.width = prog+'%';
  document.getElementById('sidebar-prog-label').textContent = `${prog}% complété`;
  document.getElementById('sidebar-name').textContent = bp?.nom_projet||'Sans titre';
}

/* ---- Navigation ---- */
function buildNav() {
  const completude = bp?.completude || [];
  const nav = document.getElementById('bp-nav');
  nav.innerHTML = SECTIONS.map(s => {
    const check = completude.find(c=>c.key===s.key);
    const ok = check?.ok;
    return `<div class="bp-nav-item ${s.key===currentSection?'active':''}" onclick="navTo('${s.key}')">
      <span class="nav-icon">${s.icon}</span>
      <span>${s.label}</span>
      <span class="check">${check ? (ok?'✅':'⚠️') : ''}</span>
    </div>`;
  }).join('');
}

function navTo(key) {
  saveCurrentSection();
  currentSection = key;
  buildNav();
  renderSection(key);
  loadComments(key);
}

/* ---- Auto-save ---- */
function markDirty() {
  hasUnsaved = true;
  document.getElementById('save-status').textContent = '● Non sauvegardé';
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveCurrentSection, 3000);
}

async function saveCurrentSection() {
  if (!hasUnsaved || monRole==='lecteur') return;
  hasUnsaved = false;
  document.getElementById('save-status').textContent = 'Sauvegarde…';
  try {
    const nom = document.getElementById('bp-title-input').value.trim();
    await api('PUT', `/business-plans/${bpId}`, {
      nom_projet: nom||undefined,
      sections: { [currentSection]: sections[currentSection]||{} }
    });
    const updated = await api('GET', `/business-plans/${bpId}`);
    bp.completude = updated.completude;
    bp.progression = updated.progression;
    updateProgress(updated.progression);
    buildNav();
    document.getElementById('save-status').textContent = '✓ Sauvegardé';
  } catch(e) {
    document.getElementById('save-status').textContent = '✗ Erreur sauvegarde';
  }
}

async function patchMeta() {
  const nom = document.getElementById('bp-title-input').value.trim();
  if (nom) { bp.nom_projet=nom; document.getElementById('sidebar-name').textContent=nom; }
  markDirty();
}

/* ---- Helpers de saisie ---- */
function field(key, label, placeholder='', type='text', full=false, required=false) {
  const val = sections[currentSection]?.[key]||'';
  const ro = monRole==='lecteur';
  return `<div class="${full?'full':''}">
    <label>${label}${required?` <span style="color:#D33;">*</span>`:''}</label>
    <input type="${type}" data-key="${key}" value="${esc(val)}" placeholder="${placeholder}" ${ro?'readonly':''} oninput="updateField('${key}',this.value)">
  </div>`;
}

function textarea(key, label, placeholder='', rows=3, full=true) {
  const val = sections[currentSection]?.[key]||'';
  const ro = monRole==='lecteur';
  return `<div class="${full?'full':''}">
    <label>${label}</label>
    <textarea data-key="${key}" rows="${rows}" placeholder="${placeholder}" ${ro?'readonly':''} oninput="updateField('${key}',this.value)">${esc(val)}</textarea>
  </div>`;
}

function select(key, label, options, full=false) {
  const val = sections[currentSection]?.[key]||'';
  const ro = monRole==='lecteur';
  return `<div class="${full?'full':''}">
    <label>${label}</label>
    <select data-key="${key}" ${ro?'disabled':''} onchange="updateField('${key}',this.value)">
      ${options.map(o=>typeof o==='string'?`<option value="${o}" ${val===o?'selected':''}>${o}</option>`:`<option value="${o.v}" ${val===o.v?'selected':''}>${o.l}</option>`).join('')}
    </select>
  </div>`;
}

function updateField(key, value) {
  if (!sections[currentSection]) sections[currentSection]={};
  sections[currentSection][key] = value;
  markDirty();
}

function genResumeAuto() {
  const infos = sections.infos_generales || {};

  const fin = sections.financement || {};

  if (infos.nom_projet && !s.projet) s.projet = `${infos.nom_projet} est un(e) ${infos.type_initiative||'projet'} dans le secteur ${infos.secteur||'—'}, basé(e) à ${infos.ville||'—'}, ${infos.pays||'—'}.`;
  if (pb.description && !s.probleme) s.probleme = pb.description.substring(0,300);
  if (sol.description && !s.solution) s.solution = sol.description.substring(0,300);
  if (mar.taille_marche && !s.marche) s.marche = `Taille du marché : ${mar.taille_marche}. ${mar.tendances||''}`;
  if (fin.montant && !s.besoins) s.besoins = `Montant recherché : ${fin.montant}€. Utilisation : ${fin.utilisation||'—'}`;

function renderProduitRows(items) {

      <td><input type="number" value="${esc(it.cout_revient||'')}" placeholder="0" oninput="updProduit(${i},'cout_revient',this.value);calcMarge(${i})"></td>
      <td><input type="number" value="${esc(it.prix_vente||'')}" placeholder="0" oninput="updProduit(${i},'prix_vente',this.value);calcMarge(${i})"></td>

function calcMarge(i) {
  const items = sections.produits?.items||[];
  const it = items[i]||{};
  const cout = parseFloat(it.cout_revient)||0;
  const prix = parseFloat(it.prix_vente)||0;
  const marge = prix>0 ? Math.round((prix-cout)/prix*100) : 0;
  it.marge = marge;
  const el = document.getElementById('marge-'+i);
  if(el) el.value = marge;
}

function updFin(key,val) {
  if(!sections.plan_financier) sections.plan_financier={};
  sections.plan_financier[key]=val;
  markDirty();
}
function calcFinRow() {
  const s = sections.plan_financier||{};
  for(let i=1;i<=5;i++){
    const ca=(parseFloat(s[`ca_${i}`])||0)+(parseFloat(s[`autres_produits_${i}`])||0);
    const charges=(parseFloat(s[`achats_${i}`])||0)+(parseFloat(s[`salaires_${i}`])||0)+
      (parseFloat(s[`loyers_${i}`])||0)+(parseFloat(s[`marketing_charge_${i}`])||0)+(parseFloat(s[`autres_charges_${i}`])||0);
    const res=ca-charges;
    const el=document.getElementById(`fin-res-${i}`);
    if(el){el.textContent=res.toLocaleString('fr')+'€';el.style.color=res>=0?'#10b981':'#dc2626';}
  }
}
function exportFinancierCSV() {
  const s=sections.plan_financier||{};
  const rows=[['Poste','An 1','An 2','An 3','An 4','An 5']];
  const keys=['ca','autres_produits','achats','salaires','loyers','marketing_charge','autres_charges'];
  const labels={'ca':'CA','autres_produits':'Autres produits','achats':'Achats','salaires':'Salaires','loyers':'Loyers','marketing_charge':'Marketing','autres_charges':'Autres charges'};
  for(const k of keys) rows.push([labels[k],...[1,2,3,4,5].map(i=>s[`${k}_${i}`]||'0')]);
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`finances_${bp?.nom_projet||'bp'}.csv`;
  a.click();
}

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="margin:0;">Documents (${docs.length})</h3>
        <button class="btn btn-orange btn-sm" onclick="addAnnexe()">+ Ajouter un document</button>
      </div>
      <div id="annexes-form" style="display:none;border:1px dashed var(--border);border-radius:10px;padding:14px;margin-bottom:12px;">
        <div class="fg">
          <div><label>Nom du document</label><input id="ann-nom" placeholder="Ex : Statuts de la société…"></div>
          <div><label>Type</label><select id="ann-type">
            ${types.map(t=>`<option value="${t.ext}">${t.icon} ${t.label}</option>`).join('')}
          </select></div>
          <div class="full"><label>URL / Lien</label><input id="ann-url" placeholder="https://drive.google.com/…"></div>
          <div class="full"><label>Description</label><input id="ann-desc" placeholder="Brève description du document…"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn btn-orange btn-sm" onclick="saveAnnexe()">Ajouter</button>
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('annexes-form').style.display='none'">Annuler</button>
        </div>
      </div>
      ${docs.length ? `
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${docs.map((d,i) => `
            <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);">
              <span style="font-size:20px;">${types.find(t=>t.ext===d.type)?.icon||'📎'}</span>
              <div style="flex:1;">
                <div style="font-weight:700;font-size:13px;">${esc(d.nom)}</div>
                ${d.description?`<div style="font-size:11px;color:var(--muted);">${esc(d.description)}</div>`:''}
              </div>
              ${d.url?`<a href="${esc(d.url)}" target="_blank" class="btn btn-outline btn-sm" style="font-size:11px;">🔗 Ouvrir</a>`:''}
              <button onclick="delAnnexe(${i})" style="background:none;border:none;cursor:pointer;color:var(--muted);">🗑</button>
            </div>`).join('')}
        </div>` : '<p style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0;">Aucune annexe ajoutée.</p>'}
    </div>
  </div>`;
}
function addAnnexe() { document.getElementById('annexes-form').style.display='block'; }
function saveAnnexe() {
  const nom = document.getElementById('ann-nom').value.trim();
  if (!nom) return alert('Nom requis');
  if (!sections.annexes) sections.annexes={};
  if (!sections.annexes.items) sections.annexes.items=[];
  sections.annexes.items.push({ nom, type:document.getElementById('ann-type').value, url:document.getElementById('ann-url').value.trim(), description:document.getElementById('ann-desc').value.trim() });
  markDirty();
  renderSection('annexes');
}
function delAnnexe(i) {
  sections.annexes.items.splice(i,1);
  markDirty();
  renderSection('annexes');
}

              <td>${c.label}</td>

async function loadComments(sectionKey) {

  document.getElementById('comments-section-label').textContent = def?.label||sectionKey;
  document.getElementById('comments-body').innerHTML = '<div style="color:var(--muted);font-size:12px;">Chargement…</div>';

/* ════════════════════════════════════════════════════
   ASSISTANT BP — Logique frontend

let bpaOpen = false;
let bpaMinimized = false;

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.*?)__/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

function bpaAddMsg(text, role) {
  const body = document.getElementById('bpa-body');
  const d = document.createElement('div');
  d.className = `bpa-msg ${role}`;
  if (role === 'bot') d.innerHTML = renderMarkdown(text);
  else d.textContent = text;
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
  return d;
}

function bpaSetQuickBtns(section) {
  const el = document.getElementById('bpa-quick');
  const btns = {
    infos_generales: ['Que mettre dans le type ?', 'Quels réseaux renseigner ?', 'Audit complet'],
    resume_executif: ['Génère un résumé', 'Conseils structure', 'Audit complet'],
    marche: ['Comment analyser mes concurrents ?', 'Qu\'est-ce que le TAM/SAM/SOM ?', 'Génère un exemple'],
    swot: ['Génère une SWOT', 'Comment l\'utiliser en présentation ?', 'Audit complet'],
    business_model: ['Explique le Business Model Canvas', 'Génère un exemple', 'Qu\'est-ce que la proposition de valeur ?'],
    plan_financier: ['Qu\'est-ce que le BFR ?', 'Explique le seuil de rentabilité', 'Génère des conseils financiers'],
    risques: ['Quels risques prioritaires ?', 'Génère des risques courants', 'Comment gérer une crise ?'],
    default: ['Analyse ma progression', 'Génère un exemple', 'Audit complet', 'Simulation de présentation'],
  };
  const list = btns[section] || btns.default;
  el.innerHTML = list.map(b => `<button class="bpa-q" onclick="bpaSend('${b.replace(/'/g,"\\'")}')">💬 ${b}</button>`).join('');
}

async function bpaSend(text) {
  const msg = (text || document.getElementById('bpa-input').value).trim();
  if (!msg) return;
  document.getElementById('bpa-input').value = '';

  if (!bpaOpen) toggleBPA();

  bpaAddMsg(msg, 'user');
  const typing = bpaAddMsg('Je réfléchis…', 'typing');

  try {
    const r = await api('POST', `/business-plans/${bpId}/assistant`, {
      message: msg,
      currentSection
    });
    typing.remove();
    bpaAddMsg(r.response || 'Je n\'ai pas compris. Reformulez.', 'bot');
  } catch(e) {
    typing.remove();
    bpaAddMsg('Une erreur s\'est produite. Réessayez.', 'bot');
  }
}

window.bpaSend = bpaSend;

function toggleBPA() {
  bpaOpen = !bpaOpen;
  const panel = document.getElementById('bpa-panel');
  if (bpaOpen) {
    panel.classList.add('open');
    bpaMinimized = false;
    panel.classList.remove('minimized');
    document.getElementById('bpa-input').focus();
    bpaUpdateContext();
  } else {
    panel.classList.remove('open');
  }
}

function closeBPA() {
  bpaOpen = false;
  document.getElementById('bpa-panel').classList.remove('open');
}

function toggleBPAMinimize() {
  bpaMinimized = !bpaMinimized;
  document.getElementById('bpa-panel').classList.toggle('minimized', bpaMinimized);
}

function bpaUpdateContext() {
  const def = SECTIONS.find(s => s.key === currentSection);
  const prog = bp?.progression || 0;
  const body = document.getElementById('bpa-body');

  // Si premier message, afficher l'intro
  if (!body.children.length) {
    bpaAddMsg(`Bonjour ! Je suis votre **consultant spécialisé Business Plan** pour **"${bp?.nom_projet||'votre projet'}"**.\n\nJe connais tout votre dossier et je m'adapte à chaque section.\n\nVous êtes actuellement dans la section **"${def?.label||currentSection}"**. Que puis-je faire pour vous ?`, 'bot');

    // Mini-progress
    const progDiv = document.createElement('div');
    progDiv.className = 'bpa-prog-mini';
    progDiv.innerHTML = `<div style="display:flex;justify-content:space-between;font-size:11px;color:#6d28d9;font-weight:700;"><span>Progression du Business Plan</span><span>${prog}%</span></div><div class="bar"><div class="fill" style="width:${prog}%"></div></div><div style="font-size:10.5px;color:#9ca3af;">${prog<50?'Continuez à remplir les sections !':prog<80?'Bon avancement, continuez !':'Excellent niveau de complétude !'}</div>`;
    body.appendChild(progDiv);
  }

  // Mettre à jour les suggestions contextuelles
  bpaSetQuickBtns(currentSection);

  // Afficher un tag de section
  document.getElementById('bpa-status').textContent = `● Section active : ${def?.label||currentSection}`;
}

function bpaAudit() {
  if (!bpaOpen) toggleBPA();
  bpaSend('Fais un audit complet de mon business plan');
}

function openBPASimulation() {
  if (bpId) window.open(`business-plan-simulation.html?bp=${bpId}`, '_blank');
}

// Mettre à jour l'assistant quand on change de section (hook dans navTo)
const _origNavTo = navTo;
function navTo(key) {
  _origNavTo(key);
  if (bpaOpen) {
    bpaSetQuickBtns(key);
    document.getElementById('bpa-status').textContent = `● Section active : ${SECTIONS.find(s=>s.key===key)?.label||key}`;
  }
}

document.getElementById('bpa-send').addEventListener('click', () => bpaSend());
document.getElementById('bpa-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); bpaSend(); }
});

window.addEventListener('beforeunload', (e) => {

(async()=>{
  me = await fetchCurrentUser();
  if (!me) { window.location.href='login.html'; return; }

  setInterval(saveCurrentSection, 60000);

    bpaUpdateContext();
