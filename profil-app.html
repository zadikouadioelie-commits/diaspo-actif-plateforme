  if (hasMap) dynBtns.push(`<a class="pvt-contact-btn" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(mapsQuery)}" target="_blank" rel="noopener">📍 Itinéraire</a>`);
  if (!isOwn && init.vitrine_rdv_active) dynBtns.push(`<a class="pvt-contact-btn" href="javascript:void(0)" onclick="pvtOpenRdvModal(${ownerId},'${esc(init.nom||'')}')">📅 Prendre rendez-vous</a>`);
  dynBtns.push(`<a class="pvt-contact-btn" href="javascript:void(0)" onclick="contacterBoutique(${ownerId})">💬 Message</a>`);

  const contactSec = `<section id="pv-contact" class="pvt-contact">
    <div>
      <h4>Coordonnées</h4>
      ${coordsBody}
    </div>
    <div>
      <h4>Commander en un clic</h4>
      <div style="display:flex;flex-direction:column;gap:9px;">${dynBtns.join('')}</div>
    </div>
    <div style="text-align:center;">
      <h4 style="text-align:center;">Partager la vitrine</h4>
      <div id="pvt-qr" style="display:flex;justify-content:center;"></div>
    </div>
  </section>`;

  const vitrineVisible = init.vitrine_active !== 0;
  const masqueeBanner = isOwn ? `<div style="background:${vitrineVisible?'#F0FDF4':'#1F2937'};color:${vitrineVisible?'#166534':'#FBBF24'};padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">

    <button class="pvz-btn" style="white-space:nowrap;${window._daPremiumInitiative===false?'background:linear-gradient(135deg,#c8960c,#f2c94c);color:#2a1e00;border:none;':''}" onclick="pvzQuickToggleVitrine()">${vitrineVisible ? '🔒 Masquer la vitrine' : '🌐 Rendre visible'}</button>
  </div>` : '';

  el.innerHTML = `<div class="pvt-scope" id="pvt-scope" data-theme="${theme==='bordeaux'?'':theme}">
    <div class="pvt-flow">
      ${masqueeBanner}
      ${subnav}
      ${hero}
      ${actionbar}
      ${offreFlashSec}
      ${presentation}
      ${collectionsSec}
      ${produitsSec}
      <div id="pvt-publications"></div>
      <div class="pvt-grid2">${promosSec}${meilleuresVentesSec}</div>
      <div class="pvt-grid2">${services}${pourquoiSec}</div>
      ${galerieSec}
      ${avisSec}
      <div class="pvt-grid2">${partenairesObjectifSec}${telechargementsSec}</div>
      ${contactSec}
    </div>
  </div>`;

  // Catalogues → Articles (hiérarchie à deux niveaux)
  renderPvtCatalogues(catalogues, produits, ownerId);

  // Articles non classés (cartes stylées)
  renderPvtProducts(articlesNonClasses, ownerId);

  // QR de partage
  if (window.ProfileQR) {
    ProfileQR.render(document.getElementById('pvt-qr'), { url:`${location.origin}/profil.html?id=${profil.id}#vitrine`, userName:(init.nom||'Vitrine'), userRole:'Vitrine', size:130 });
  }

  // Abonnement + publications promotionnelles (réutilise l'existant)
  const subSlot = document.getElementById('pvt-subscribe');
  if (subSlot && !isOwn && CU && CU.role === 'utilisateur') {
    subSlot.innerHTML = `<button class="pvt-btn primary" id="pvt-sub-btn" onclick="toggleVitrineSubscribe(${init.id})">＋ Suivre</button>`;
    try { const r = await api('GET','/mes-suivis'); if ((r.initiatives||[]).some(i=>Number(i.id)===Number(init.id))) { const b=document.getElementById('pvt-sub-btn'); if(b){ b.textContent='✓ Abonné'; b.classList.add('following'); } } } catch(e){}
  }
  if (window.renderPublications) {
    // Injecte les publications "À la une" dans une section stylée si présentes
    const pubWrap = document.getElementById('pvt-publications');

  // Meilleures ventes + objectif (même requête, réutilisée)
  try {
    const bv = await api('GET', `/initiatives/${init.id}/meilleures-ventes`);

    }
    const objActuel = document.getElementById('pvt-objectif-actuel');
    const objBar = document.getElementById('pvt-objectif-bar');
    if (objActuel && init.vitrine_objectif_cible) {
      const n = bv.total_commandes || 0;
      objActuel.textContent = n;
      if (objBar) objBar.style.width = Math.min(100, Math.round(n / init.vitrine_objectif_cible * 100)) + '%';
    }
  } catch (e) {}

  // Compte à rebours offre flash (réel, basé sur vitrine_offre_flash_fin)
  const cdEl = document.getElementById('pvt-flash-countdown');
  if (cdEl && init.vitrine_offre_flash_fin) {
    const endDate = new Date(init.vitrine_offre_flash_fin);
    const tick = () => {
      const s = Math.max(0, Math.floor((endDate - new Date()) / 1000));
      const h = String(Math.floor(s/3600)).padStart(2,'0');
      const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
      const sec = String(s%60).padStart(2,'0');
      cdEl.innerHTML = [[h,'H'],[m,'MIN'],[sec,'SEC']].map(([v,l])=>`<div style="background:rgba(255,255,255,.12);border-radius:8px;padding:6px 9px;text-align:center;min-width:44px;"><div>${v}</div><div style="font-size:8px;opacity:.75;">${l}</div></div>`).join('');
      if (s <= 0) clearInterval(_pvtFlashTimer);
    };
    tick();
    if (_pvtFlashTimer) clearInterval(_pvtFlashTimer);
    _pvtFlashTimer = setInterval(tick, 1000);
  }

  // Avis clients (note + titre + commentaire + réponse du propriétaire + signalement + répartition)
  try {
    const av = await api('GET', `/initiatives/${init.id}/avis`);
    const avBody = document.getElementById('pvt-avis-body');
    if (avBody) {
      const canReview = !isOwn && CU;

      const breakdown = av.total ? `<div style="flex:1;min-width:140px;display:flex;flex-direction:column;gap:3px;">
        ${[5,4,3,2,1].map(n=>{ const c=(av.repartition||{})[n]||0; const pct = Math.round(c/maxN*100); return `<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#8794A7;"><span style="width:14px;">${n}★</span><div style="flex:1;height:6px;background:#F1E4E6;border-radius:3px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:#F4A62A;"></div></div><span style="width:18px;text-align:right;">${c}</span></div>`; }).join('')}
      </div>` : '';
      avBody.innerHTML = `
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap;">
          ${av.moyenne ? `<div style="font-family:'Bricolage Grotesque';font-size:34px;font-weight:700;color:#122A4D;line-height:1;">${av.moyenne}</div><div><div style="color:#F4A62A;font-size:15px;letter-spacing:2px;">${'★'.repeat(Math.round(av.moyenne))}${'☆'.repeat(5-Math.round(av.moyenne))}</div><div style="font-size:11.5px;color:#8794A7;margin-top:2px;">${av.total} avis</div></div>${breakdown}` : `<span class="pvz-empty">Aucun avis pour le moment.</span>`}
        </div>
        ${(av.avis||[]).slice(0,10).map((a,i)=>`<div style="border-top:1px solid var(--vsoftbd);padding:12px 0${i===0?';border-top:none':''};font-size:12.5px;color:#3B4658;line-height:1.5;" id="pvt-avis-${a.id}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div>
              <div style="color:#F4A62A;font-size:12px;letter-spacing:1px;">${'★'.repeat(a.note)}${'☆'.repeat(5-a.note)}</div>
              ${a.titre?`<div style="font-weight:700;color:#122A4D;margin-top:3px;">${esc(a.titre)}</div>`:''}
              ${a.commentaire?`<div style="margin-top:3px;">${esc(a.commentaire)}</div>`:''}
              <div style="font-size:11.5px;color:#8794A7;margin-top:4px;">— ${esc([a.prenom,a.nom].filter(Boolean).join(' ')||'Client')} · ${fmtDateFrCourt(a.created_at)}</div>
            </div>
            ${(!isOwn && CU) ? `<button onclick="pvtSignalerAvis(${init.id},${a.id})" title="Signaler cet avis" style="background:none;border:none;color:#8794A7;font-size:11px;cursor:pointer;white-space:nowrap;">🚩 Signaler</button>` : ''}
          </div>
          ${a.reponse_texte ? `<div style="margin:10px 0 0 16px;padding:9px 12px;background:var(--vsoft);border-radius:9px;border-left:3px solid var(--v1);">
              <div style="font-size:11px;font-weight:700;color:var(--v1);">Réponse de ${esc(init.nom||'la boutique')}</div>
              <div style="margin-top:3px;">${esc(a.reponse_texte)}</div>
              ${isOwn?`<div style="margin-top:6px;display:flex;gap:10px;"><span onclick="pvtReplyAvis(${init.id},${a.id})" style="font-size:11px;color:var(--v1);font-weight:600;cursor:pointer;">✏️ Modifier</span><span onclick="pvtDeleteReplyAvis(${init.id},${a.id})" style="font-size:11px;color:#B91C1C;font-weight:600;cursor:pointer;">🗑️ Supprimer</span></div>`:''}
            </div>`
            : (isOwn ? `<button onclick="pvtReplyAvis(${init.id},${a.id})" style="margin:8px 0 0 16px;font-size:11.5px;font-weight:600;color:var(--v1);background:none;border:1px solid var(--v1);border-radius:7px;padding:5px 10px;cursor:pointer;">💬 Répondre</button>` : '')}
        </div>`).join('')}
        ${canReview ? `<button onclick="pvtWriteAvis(${init.id})" style="margin-top:14px;width:100%;font-size:13px;font-weight:700;color:#fff;background:var(--v1);border:none;border-radius:10px;padding:11px;cursor:pointer;">✍️ Écrire un avis</button>` : (!CU ? `<a href="login.html" style="display:block;margin-top:14px;text-align:center;font-size:12.5px;color:var(--v1);">Connectez-vous pour laisser un avis</a>` : '')}
      `;
    }
  } catch (e) {}

  // Pourquoi nous choisir (arguments — CRUD + glisser-déposer pour le titulaire)
  await renderPvtArguments(init);

  // Promotions du mois (table dédiée, jusqu'à 3 actives)
  await renderPvtPromos(init);
}
let _pvtFlashTimer = null;

function fmtDateFrCourt(iso) {
  if (!iso) return '';
  try { const d = new Date((iso||'').replace(' ','T')); return isNaN(d) ? '' : `${d.getDate()} ${MOIS[d.getMonth()]} ${d.getFullYear()}`; } catch(e) { return ''; }
}

/* Titulaire : créer/modifier l'offre flash */

  input.onchange = async (e) => {

/* Titulaire : téléchargements (documents externes, saisie d'URL) */
function pvtAddDocument() {
  if (!isOwn || !_vitrineInit) return;

  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:30px 12px;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:14px;max-width:440px;width:100%;padding:20px;">
      <h3 style="margin:0 0 14px;">➕ Ajouter un document</h3>
      <label style="font-size:12px;font-weight:700;">Titre</label>
      <input type="text" id="pvt-doc-titre" placeholder="Ex : Catalogue produits" style="margin:4px 0 10px;width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;">
      <div class="da-pill-group" style="margin-bottom:12px;">
        <label class="da-pill checked" id="pvt-doc-mode-fichier"><input type="radio" name="pvt-doc-mode" value="fichier" checked onchange="pvtDocChoisirMode('fichier')"><span>📁 Fichier</span></label>
        <label class="da-pill" id="pvt-doc-mode-lien"><input type="radio" name="pvt-doc-mode" value="lien" onchange="pvtDocChoisirMode('lien')"><span>🔗 Lien</span></label>
        <label class="da-pill" id="pvt-doc-mode-photo"><input type="radio" name="pvt-doc-mode" value="photo" onchange="pvtDocChoisirMode('photo')"><span>🖼️ Photo</span></label>
      </div>
      <div id="pvt-doc-fichier-row">
        <input type="file" id="pvt-doc-file" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,image/jpeg,image/png,image/webp" onchange="pvtDocUploadFichier(this)">
        <div id="pvt-doc-file-status" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>
      </div>
      <div id="pvt-doc-lien-row" style="display:none;">
        <input type="url" id="pvt-doc-url" placeholder="https://…" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;">
      </div>
      <div id="pvt-doc-photo-row" style="display:none;">
        <input type="file" id="pvt-doc-photo-file" accept="image/jpeg,image/png,image/webp" onchange="pvtDocUploadFichier(this)">
        <div id="pvt-doc-photo-status" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
        <button class="btn btn-outline" onclick="window._pvtDocOverlay.remove()">Annuler</button>
        <button class="btn btn-orange" onclick="pvtDocEnregistrer()">Ajouter</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  window._pvtDocOverlay = overlay;
  window._pvtDocUrl = null;
}

function pvtDocChoisirMode(mode) {
  ['fichier','lien','photo'].forEach(m => document.getElementById('pvt-doc-mode-'+m).classList.toggle('checked', m===mode));
  document.getElementById('pvt-doc-fichier-row').style.display = mode==='fichier' ? 'block' : 'none';
  document.getElementById('pvt-doc-lien-row').style.display = mode==='lien' ? 'block' : 'none';
  document.getElementById('pvt-doc-photo-row').style.display = mode==='photo' ? 'block' : 'none';
}

async function pvtDocUploadFichier(input) {
  const file = input.files[0]; if (!file) return;
  const isPhoto = input.id === 'pvt-doc-photo-file';
  const statusEl = document.getElementById(isPhoto ? 'pvt-doc-photo-status' : 'pvt-doc-file-status');
  statusEl.textContent = '⏳ Téléversement en cours…';
  window._pvtDocUploading = true;
  try {
    const url = await uploadMedia(file, isPhoto ? 'document' : 'document');
    window._pvtDocUrl = url;
    statusEl.textContent = '✅ ' + file.name;
  } catch (e) {
    statusEl.textContent = '';
    showToast?.('Erreur upload : ' + e.message, 'danger') || alert('Erreur upload : ' + e.message);
  } finally {
    window._pvtDocUploading = false;
  }
}

async function pvtDocEnregistrer() {
  if (window._pvtDocUploading) { showToast?.('Patientez la fin du téléversement.', 'warning') || alert('Patientez la fin du téléversement.'); return; }
  const titre = document.getElementById('pvt-doc-titre').value.trim();
  if (!titre) { showToast?.('Titre requis.', 'warning') || alert('Titre requis.'); return; }
  const mode = document.querySelector('input[name="pvt-doc-mode"]:checked').value;
  let url;
  if (mode === 'lien') {
    url = document.getElementById('pvt-doc-url').value.trim();
    if (!url) { showToast?.('Lien requis.', 'warning') || alert('Lien requis.'); return; }
  } else {
    url = window._pvtDocUrl;
    if (!url) { showToast?.('Choisissez un fichier.', 'warning') || alert('Choisissez un fichier.'); return; }
  }
  const list = safeParseJson(_vitrineInit.vitrine_documents_json, []);
  list.push({ titre, url });
  try {
    await api('PUT', `/initiatives/${_vitrineInit.id}/vitrine`, { vitrine_documents_json: list });
    _vitrineInit.vitrine_documents_json = JSON.stringify(list);
    window._pvtDocOverlay?.remove();
    renderVitrineVisitor(_vitrineInit);
  } catch (e) { alert('Erreur : ' + (e.message||'')); }
}
async function pvtRemoveDocument(i) {
  if (!isOwn || !_vitrineInit) return;
  const list = safeParseJson(_vitrineInit.vitrine_documents_json, []);
  list.splice(i, 1);
  try {
    await api('PUT', `/initiatives/${_vitrineInit.id}/vitrine`, { vitrine_documents_json: list });
    _vitrineInit.vitrine_documents_json = JSON.stringify(list);
    renderVitrineVisitor(_vitrineInit);
  } catch (e) { alert('Erreur : ' + (e.message||'')); }
}

/* Visiteur : écrire un avis (note + commentaire) */
async function pvtWriteAvis(initId) {
  if (!CU) { window.location.href = 'login.html'; return; }
  const note = prompt('Votre note (1 à 5) :', '5');
  if (note === null) return;
  const n = Number(note);
  if (!Number.isInteger(n) || n < 1 || n > 5) { alert('Note invalide (1 à 5).'); return; }
  const titre = prompt('Titre de votre avis (facultatif) :', '') || '';
  const commentaire = prompt('Votre commentaire (facultatif) :', '') || '';
  try {
    await api('POST', `/initiatives/${initId}/avis`, { note: n, titre, commentaire });
    if (_vitrineInit) renderVitrineVisitor(_vitrineInit);
  } catch (e) { alert('Erreur : ' + (e.message||'')); }
}

/* Titulaire : répondre / modifier sa réponse à un avis */
async function pvtReplyAvis(initId, avisId) {
  if (!isOwn) return;
  const texte = prompt('Votre réponse à cet avis :', '');

function wireArgumentDrag(container, initId) {
  let dragId = null;
  container.querySelectorAll('.pvt-arg-card').forEach(card => {
    card.addEventListener('dragstart', () => { dragId = card.dataset.argid; card.style.opacity = '.5'; });
    card.addEventListener('dragend', () => { card.style.opacity = ''; });
    card.addEventListener('dragover', (e) => e.preventDefault());
    card.addEventListener('drop', async (e) => {
      e.preventDefault();
      const targetId = card.dataset.argid;
      if (!dragId || dragId === targetId) return;
      const ids = [...container.querySelectorAll('.pvt-arg-card')].map(c => c.dataset.argid);
      const from = ids.indexOf(dragId); ids.splice(from, 1);
      const to = ids.indexOf(targetId); ids.splice(to, 0, dragId);
      const dragCard = container.querySelector(`[data-argid="${dragId}"]`);
      container.insertBefore(dragCard, card);
      try { await api('PATCH', `/initiatives/${initId}/arguments/reorder`, { order: ids.map(Number) }); } catch (e) {}
    });
  });
}

async function pvtSendRdv(ownerId) {
  const titre = document.getElementById('pvt-rdv-titre').value.trim();
  const date = document.getElementById('pvt-rdv-date').value;
  const heure = document.getElementById('pvt-rdv-heure').value;
  const err = document.getElementById('pvt-rdv-err');
  if (!titre || !date || !heure) { err.textContent = 'Tous les champs sont requis.'; err.style.display = 'block'; return; }
  const heureFin = String(Math.min(23, Number(heure.split(':')[0])+1)).padStart(2,'0') + ':' + heure.split(':')[1];
  try {
    await api('POST', '/rdv', { destinataire_id: ownerId, titre, date_proposee: date, heure_debut: heure, heure_fin: heureFin, duree_minutes: 60, lieu_type: 'virtuel' });
    document.getElementById('pvt-rdv-modal')?.remove();
    alert('✅ Votre demande de rendez-vous a été envoyée. Vous recevrez une notification dès qu\'elle sera acceptée.');
  } catch (e) { err.textContent = e.message || 'Erreur.'; err.style.display = 'block'; }
}

  else if (statut === 'indisponible') badge = `<span class="pvt-badge stock">Indisponible</span>`;
  else if (statut === 'masque') badge = `<span class="pvt-badge stock">Masqué</span>`;
  const prix = p.prix != null ? Number(p.prix).toFixed(2) + ' ' + (p.devise||'EUR') : 'Prix sur demande';

  return `<div class="pvt-prod-card" data-pid="${p.id}"${statut==='masque'?' style="opacity:.55;"':''}>

    </div>`;
  }).join('');
  if (isOwn) {

    visibles.forEach(cat => {
      const catGrid = document.getElementById('pvt-cat-articles-' + cat.id);
      if (catGrid) wireProductDrag(catGrid, _vitrineInit.id, cat.id);
    });

}

function wireCatalogueDrag(grid, initiativeId) {
  grid.querySelectorAll('.pvt-catalogue-block').forEach(block => {
    block.setAttribute('draggable', 'true');
    block.addEventListener('dragstart', () => { _catalogueDragId = block.dataset.catid; block.classList.add('dragging'); });
    block.addEventListener('dragend', () => block.classList.remove('dragging'));
    block.addEventListener('dragover', (e) => e.preventDefault());
    block.addEventListener('drop', async (e) => {
      e.preventDefault();
      const targetId = block.dataset.catid;
      if (!_catalogueDragId || _catalogueDragId === targetId) return;
      const ids = [...grid.querySelectorAll('.pvt-catalogue-block')].map(b => b.dataset.catid);
      const from = ids.indexOf(_catalogueDragId);
      ids.splice(from, 1);
      const to = ids.indexOf(targetId);
      ids.splice(to, 0, _catalogueDragId);
      const dragBlock = grid.querySelector(`[data-catid="${_catalogueDragId}"]`);
      grid.insertBefore(dragBlock, block);
      try { await api('PATCH', `/initiatives/${initiativeId}/catalogues/reorder`, { order: ids.map(Number) }); } catch (e) {}
    });
  });
}

async function handleCatalogueCover(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const compressed = await compressImageFile(file, 800, 800, 0.82);
    const url = await uploadMedia(compressed, 'produit');
    _catalogueCoverUrl = url;
    renderCatalogueCoverSlot();
  } catch (e) { alert('Erreur upload image : ' + e.message); }
}

async function saveCatalogue(catalogueId) {
  const nom = document.getElementById('cf-nom').value.trim();
  const err = document.getElementById('cf-err');
  if (!nom) { err.textContent = 'Le nom est requis.'; err.style.display = 'block'; return; }
  const payload = {
    nom,
    description: document.getElementById('cf-description').value.trim() || null,
    categorie: document.getElementById('cf-categorie').value || null,
    image_url: _catalogueCoverUrl,
    statut: document.getElementById('cf-visible').checked ? 'visible' : 'masque',
  };
  try {
    if (catalogueId) await api('PUT', `/catalogues/${catalogueId}`, payload);
    else await api('POST', `/initiatives/${_vitrineInit.id}/catalogues`, payload);
    document.getElementById('cat-modal-overlay').remove();
    renderVitrineVisitor(_vitrineInit);
  } catch (e) {
    err.textContent = e.message || 'Erreur.';
    err.style.display = 'block';
  }
}

let _boutiqueInit = null;
let _produitFiltre = 'tous';

function contacterBoutique(ownerId) {
  if (!CU) { window.location.href = 'login.html'; return; }

}

function filtrerProduits(f) {
  _produitFiltre = f;

    const map = { tous:'tous', dispo:'disponible', indispo:'indisponible' };
    const btn = document.getElementById('pf-filtre-'+k);

}

const STATUT_LABEL = { disponible:'Disponible', indisponible:'Temporairement indisponible', epuise:'Épuisé', masque:'Masqué' };
const STATUT_BANNER = { indisponible:'Temporairement indisponible', epuise:'Épuisé' };

function fmtDateRetour(d) {
  if (!d) return '';
  try {
    const dt = new Date(d);
    return dt.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
  } catch (e) { return d; }
}

function renderProductGrid(produits, init, ownerFlag) {
  const grid = document.getElementById('prod-grid');
  if (!grid) return;
  const ownerId = init.owner_user_id;

  // Filtre propriétaire
  let liste = produits;
  if (ownerFlag && _produitFiltre === 'disponible') liste = produits.filter(p => (p.statut||'disponible') === 'disponible');
  else if (ownerFlag && _produitFiltre === 'indisponible') liste = produits.filter(p => (p.statut||'disponible') !== 'disponible');

  if (!liste.length) {
    grid.innerHTML = `<div class="empty-p" style="grid-column:1/-1;padding:20px 0;"><div class="ei">🛍️</div>${ownerFlag ? 'Aucun produit dans ce filtre.' : 'Aucun produit pour le moment.'}</div>`;
    return;
  }
  grid.innerHTML = liste.map(p => {
    const photos = p.photos || [];
    const cover = photos[0];
    const statut = p.statut || 'disponible';
    const dispo = statut === 'disponible';
    const banner = STATUT_BANNER[statut];
    return `
    <div class="evt-card prod-card${ownerFlag?' draggable':''}" data-pid="${p.id}" ${ownerFlag?'draggable="true"':''}>
      <div style="position:relative;">
        ${cover ? `<img loading="lazy" class="evt-img" src="${esc(cover)}" style="object-fit:cover;">` : `<div class="evt-img">🛍️</div>`}
        ${banner ? `<div class="prod-banner">${banner}</div>` : ''}
      </div>
      <div class="evt-body">
        <div class="prod-price">${p.prix != null ? Number(p.prix).toFixed(2) + ' ' + (p.devise||'EUR') : 'Prix sur demande'}</div>
        <div class="evt-title">${esc(p.nom)}</div>
        ${p.reference ? `<div style="font-size:11px;color:#94a3b8;margin-bottom:4px;">Réf. ${esc(p.reference)}</div>` : ''}
        ${p.description ? `<div style="font-size:12.5px;color:var(--muted);margin-bottom:8px;line-height:1.4;">${esc(p.description).slice(0,90)}${p.description.length>90?'…':''}</div>` : ''}
        ${!dispo && p.date_retour ? `<div style="font-size:12px;color:var(--tp);font-weight:600;margin-bottom:6px;">↩️ Retour estimé : ${fmtDateRetour(p.date_retour)}</div>` : ''}
        <div class="evt-meta">
          ${p.categorie ? `<span class="evt-tag">${esc(p.categorie)}</span>` : ''}
          <span class="evt-tag${dispo?'':' prod-badge-indispo'}">${dispo ? '✅ Disponible' : (statut==='epuise' ? '⛔ Épuisé' : statut==='masque' ? '🙈 Masqué' : '❌ Indisponible')}</span>
          ${ownerFlag && p.nb_alertes ? `<span class="evt-tag" title="Personnes en attente d'alerte">🔔 ${p.nb_alertes} intéressé${p.nb_alertes>1?'s':''}</span>` : ''}
          ${ownerFlag && p.nb_commandes ? `<span class="evt-tag" title="Demandes reçues">📦 ${p.nb_commandes} demande${p.nb_commandes>1?'s':''}</span>` : ''}
        </div>
        <div class="prod-actions">
          ${ownerFlag
            ? `<button class="prod-btn-edit" onclick="openProductModal(${p.id})">✏️ Modifier</button><button class="prod-btn-delete" onclick="deleteProduct(${p.id})">🗑️</button>`
            : `${dispo ? `<button class="prod-btn-commander" onclick="openCommanderModal(${p.id})">📦 Commander</button>` : `<button class="prod-btn-alerte" onclick="alerteProduit(${p.id})">🔔 M'avertir</button>`}
               <button class="prod-btn-contact" onclick="contacterVendeur(${ownerId},${p.id})">💬 Contacter le vendeur</button>`}
        </div>
      </div>
    </div>`;
  }).join('');

  if (ownerFlag) wireProductDrag(grid, init.id);
}

/* ---- Drag & drop réorganisation (pattern simplifié inspiré de widget-board.js) ----
   catalogueId optionnel : si fourni, le reorder n'affecte que les articles de ce catalogue. */
function wireProductDrag(grid, initiativeId, catalogueId) {
  const cardSel = grid.classList.contains('pvt-catalogue-articles') || grid.id === 'pvt-prodgrid' ? '.pvt-prod-card' : '.prod-card';
  grid.querySelectorAll(cardSel).forEach(card => {
    card.setAttribute('draggable', 'true');
    card.addEventListener('dragstart', () => { _boutiqueDragId = card.dataset.pid; card.classList.add('dragging'); });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    card.addEventListener('dragover', (e) => e.preventDefault());
    card.addEventListener('drop', async (e) => {
      e.preventDefault();
      const targetId = card.dataset.pid;
      if (!_boutiqueDragId || _boutiqueDragId === targetId) return;
      const ids = [...grid.querySelectorAll(cardSel)].map(c => c.dataset.pid);
      const from = ids.indexOf(_boutiqueDragId);
      ids.splice(from, 1);
      const to = ids.indexOf(targetId);
      ids.splice(to, 0, _boutiqueDragId);
      const dragCard = grid.querySelector(`[data-pid="${_boutiqueDragId}"]`);
      grid.insertBefore(dragCard, card);
      const payload = { order: ids.map(Number) };
      if (catalogueId != null) payload.catalogue_id = catalogueId;
      try { await api('PATCH', `/initiatives/${initiativeId}/produits/reorder`, payload); } catch (e) {}
    });
  });
}

function renderPhotoSlots() {
  const wrap = document.getElementById('pf-photo-slots');
  if (!wrap) return;
  wrap.innerHTML = [0,1,2,3].map(i => `
    <div class="prod-photo-slot" id="pf-slot-${i}" onclick="document.getElementById('pf-file-${i}').click()">
      ${_prodPhotoData[i] ? `<img src="${esc(_prodPhotoData[i])}"><button class="slot-del" onclick="event.stopPropagation();clearProductPhoto(${i})">✕</button>` : '＋'}
      <input type="file" id="pf-file-${i}" accept="image/jpeg,image/png,image/webp" style="display:none;" onchange="handleProductPhoto(${i}, this)">
    </div>`).join('');
}

async function handleProductPhoto(i, input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const compressed = await compressImageFile(file, 800, 800, 0.82);
    const url = await uploadMedia(compressed, 'produit');
    _prodPhotoData[i] = url;
    renderPhotoSlots();
  } catch (e) { alert('Erreur upload photo : ' + e.message); }
}
function clearProductPhoto(i) { _prodPhotoData[i] = null; renderPhotoSlots(); }

function pfToggleDateRetour() {
  const st = document.getElementById('pf-statut').value;
  const wrap = document.getElementById('pf-date-retour-wrap');
  if (wrap) wrap.style.display = st === 'indisponible' ? 'block' : 'none';
}

async function saveProduct(productId) {
  const nom = document.getElementById('pf-nom').value.trim();
  const err = document.getElementById('pf-err');
  if (!nom) { err.textContent = 'Le nom est requis.'; err.style.display = 'block'; return; }
  const statut = document.getElementById('pf-statut').value;
  const catSel = document.getElementById('pf-catalogue').value;
  const payload = {
    nom,
    description: document.getElementById('pf-description').value.trim() || null,
    prix: document.getElementById('pf-prix').value ? Number(document.getElementById('pf-prix').value) : null,
    prix_promo: document.getElementById('pf-prix-promo').value ? Number(document.getElementById('pf-prix-promo').value) : null,
    categorie: document.getElementById('pf-categorie').value.trim() || null,
    reference: document.getElementById('pf-reference').value.trim() || null,
    statut,
    date_retour: statut === 'indisponible' ? (document.getElementById('pf-date-retour').value || null) : null,
    photos: _prodPhotoData.filter(Boolean),
    catalogue_id: catSel ? Number(catSel) : null,
  };
  try {
    if (productId) await api('PUT', `/produits/${productId}`, payload);
    else await api('POST', `/initiatives/${_vitrineInit.id}/produits`, payload);
    document.getElementById('prod-modal-overlay').remove();
    renderVitrineVisitor(_vitrineInit);
  } catch (e) {
    err.textContent = e.message || 'Erreur.';
    err.style.display = 'block';
  }
}

async function deleteProduct(id) {
  if (!confirm('Supprimer ce produit ?')) return;
  try {
    await api('DELETE', `/produits/${id}`);
    renderVitrineVisitor(_vitrineInit);
  } catch (e) { alert('Erreur : ' + e.message); }
}

function renderPubPhotoSlots() {

async function handlePubPhoto(i, input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const compressed = await compressImageFile(file, 1400, 1400, 0.85);
    const url = await uploadMedia(compressed, 'publication');
    _pubPhotoData[i] = url;
    renderPubPhotoSlots();
    // Extraction des couleurs depuis le blob local (pas de souci CORS) → propose les fonds
    try { _pubPalette = await extractColors(URL.createObjectURL(compressed)); } catch(_) { _pubPalette = null; }
    if (!_pubMediaBg) _pubMediaBg = 'auto'; // pré-sélection recommandée
    renderBgPicker();
  } catch (e) { alert('Erreur upload photo : ' + e.message); }
}
function clearPubPhoto(i) { _pubPhotoData[i] = null; renderPubPhotoSlots(); renderBgPicker(); }

/* ===== Fond intelligent : extraction couleurs + sélecteur avec aperçus ===== */
function extractColors(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const S = 40, c = document.createElement('canvas');
        c.width = S; c.height = S;
        const cx = c.getContext('2d');
        cx.drawImage(img, 0, 0, S, S);
        const data = cx.getImageData(0, 0, S, S).data;
        const counts = {};
        for (let k = 0; k < data.length; k += 4) {
          if (data[k+3] < 125) continue;
          const qr = Math.min(255, Math.round(data[k]/16)*16), qg = Math.min(255, Math.round(data[k+1]/16)*16), qb = Math.min(255, Math.round(data[k+2]/16)*16);
          const key = qr+','+qg+','+qb;
          counts[key] = (counts[key] || 0) + 1;
        }
        const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).map(e => e[0].split(',').map(Number));
        resolve(sorted.length ? sorted : null);
      } catch (e) { resolve(null); } // canvas "tainted" (CORS) → null
    };
    img.onerror = () => resolve(null);
    img.src = src;
  });
}
function _rgbToHex(r,g,b){ return '#' + [r,g,b].map(x => Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join(''); }
function _rgbToHsl(r,g,b){ r/=255;g/=255;b/=255; const mx=Math.max(r,g,b),mn=Math.min(r,g,b); let h,s,l=(mx+mn)/2; if(mx===mn){h=s=0;}else{const d=mx-mn; s=l>0.5?d/(2-mx-mn):d/(mx+mn); switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;} h/=6;} return [h*360,s,l]; }
function _hslToCss(h,s,l){ return `hsl(${Math.round(h)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`; }
/* Teinte douce et claire dérivée d'une couleur (fond harmonieux, pro) */
function _softTint(rgb){ const [h,s] = _rgbToHsl(rgb[0],rgb[1],rgb[2]); return _hslToCss(h, Math.max(0.18, Math.min(s,0.5)), 0.90); }
/* Version un peu plus soutenue (pour dégradé) sans être criarde */
function _mediumTint(rgb){ const [h,s,l] = _rgbToHsl(rgb[0],rgb[1],rgb[2]); return _hslToCss(h, Math.min(s,0.72), Math.min(0.82, Math.max(0.6, l))); }
function _clamp(x){ return Math.max(0, Math.min(255, Math.round(x))); }
function _rgbCss(rgb){ return `rgb(${_clamp(rgb[0])}, ${_clamp(rgb[1])}, ${_clamp(rgb[2])})`; }
function _isExtreme(rgb){ const mx=Math.max(rgb[0],rgb[1],rgb[2]), mn=Math.min(rgb[0],rgb[1],rgb[2]); return mx>248 || mn<8; } // quasi blanc / quasi noir purs
function _colorDist(a,b){ return Math.abs(a[0]-b[0]) + Math.abs(a[1]-b[1]) + Math.abs(a[2]-b[2]); }

/* Sélectionne dominante + secondaire "parlantes" (on évite blanc/noir purs si possible) */
function _pickDomSec(pal) {
  const meaningful = pal.filter(c => !_isExtreme(c));
  const list = meaningful.length ? meaningful : pal;
  const dom = list[0];
  const sec = list.find(c => _colorDist(c, dom) > 80) || pal.find(c => _colorDist(c, dom) > 80) || list[1] || dom;
  return { dom, sec };
}

/* Construit la liste des fonds proposés (dynamiques depuis la photo + présélections) */
function _buildBgOptions() {
  const opts = [];
  const pal = _pubPalette;
  if (pal && pal.length) {
    const { dom, sec } = _pickDomSec(pal);
    // Auto : teinte douce claire de la dominante (lisible, premium)
    opts.push({ key:'auto',  label:'Auto (recommandé)', bg:_softTint(dom) });
    // Dominante / Secondaire : les VRAIES couleurs de la photo
    opts.push({ key:'dom',   label:'Dominante',         bg:_rgbCss(dom) });
    opts.push({ key:'sec',   label:'Secondaire',        bg:_rgbCss(sec) });
    // Dégradé : basé sur les deux couleurs de la photo
    opts.push({ key:'grad',  label:'Dégradé',           bg:`linear-gradient(135deg, ${_mediumTint(dom)}, ${_mediumTint(sec)})` });
  } else {
    opts.push({ key:'auto', label:'Auto (recommandé)', bg:'#f4f1ec' });
  }
  // Fonds VIFS (comblent l'espace avec du caractère)
  opts.push({ key:'v_rouge',  label:'Rouge vif',   bg:'#e53935' });
  opts.push({ key:'v_orange', label:'Orange vif',  bg:'#fb8c00' });
  opts.push({ key:'v_jaune',  label:'Jaune or',    bg:'#fdd835' });
  opts.push({ key:'v_vert',   label:'Vert vif',    bg:'#2e9e5b' });
  opts.push({ key:'v_teal',   label:'Turquoise',   bg:'#00acc1' });
  opts.push({ key:'v_bleu',   label:'Bleu vif',    bg:'#1e88e5' });
  opts.push({ key:'v_indigo', label:'Indigo',      bg:'#3949ab' });
  opts.push({ key:'v_violet', label:'Violet',      bg:'#8e24aa' });
  opts.push({ key:'v_rose',   label:'Rose vif',    bg:'#e91e8c' });
  opts.push({ key:'v_noir',   label:'Noir',        bg:'#1b1b1f' });
  opts.push({ key:'v_grad1',  label:'Dégradé sunset', bg:'linear-gradient(135deg,#ff6a00,#ee0979)' });
  opts.push({ key:'v_grad2',  label:'Dégradé océan',  bg:'linear-gradient(135deg,#2193b0,#6dd5ed)' });
  opts.push({ key:'v_grad3',  label:'Dégradé violet', bg:'linear-gradient(135deg,#8e2de2,#4a00e0)' });
  // Présélections douces/neutres
  opts.push({ key:'beige',  label:'Beige clair',    bg:'#f3ead9' });
  opts.push({ key:'blanc',  label:'Blanc cassé',    bg:'#faf8f4' });
  opts.push({ key:'creme',  label:'Crème',          bg:'#fdf6e3' });
  opts.push({ key:'gris',   label:'Gris très clair',bg:'#f1f3f5' });
  opts.push({ key:'vert',   label:'Vert doux',      bg:'#e6f2ea' });
  opts.push({ key:'marron', label:'Marron clair',   bg:'#e7dccc' });
  opts.push({ key:'orange', label:'Orange léger',   bg:'#fdefe2' });
  return opts;
}
/* Résout la valeur CSS effective pour le fond mémorisé (_pubMediaBg peut être 'auto' ou une valeur CSS directe) */
function _resolveBg(val, opts) {
  if (!val) return null;
  if (val === 'auto') { const a = opts.find(o => o.key === 'auto'); return a ? a.bg : '#f4f1ec'; }
  const match = opts.find(o => o.bg === val);
  return val; // déjà une valeur CSS
}

function renderBgPicker() {
  const box = document.getElementById('pub-bg-picker');
  if (!box) return;
  if (!_pubPhotoData[0]) { box.innerHTML = ''; return; }
  const photo = _pubPhotoData[0];
  const opts = _buildBgOptions();
  const currentCss = _resolveBg(_pubMediaBg, opts) || '#f1f3f5';
  const curLabel = (opts.find(o => (_pubMediaBg === o.key) || o.bg === currentCss) || {}).label || '';
  box.innerHTML = `
    <label class="vtp-lbl" style="margin-top:0;">🎨 Fond de l'image (remplit les côtés, sans recadrer)</label>
    <div class="vtp-bg-live" style="background:${currentCss};">

    </div>

    <div class="vtp-bg-grid">
      ${opts.map(o => {
        const selected = (_pubMediaBg === o.key) || (currentCss === o.bg);

        </button>`;
      }).join('')}
    </div>`;
}
function chooseBg(key, bg) {
  // On mémorise la valeur CSS effective (pour 'auto' on garde le mot-clé pour rester dynamique à l'affichage)
  _pubMediaBg = (key === 'auto') ? 'auto' : bg;

async function savePublication(pubId) {
  const titre = document.getElementById('pub-titre').value.trim();
  const err = document.getElementById('pub-err');
  if (!titre) { err.textContent = 'Le titre est requis.'; err.style.display = 'block'; return; }
  const produitVal = document.getElementById('pub-produit').value;
  const cta = document.getElementById('pub-cta').value;
  if (cta !== 'aucun' && !produitVal) { err.textContent = 'Le bouton d\'action nécessite un produit lié.'; err.style.display = 'block'; return; }
  const medias = _pubPhotoData.filter(Boolean);
  const bgVal = medias.length ? _resolveBg(_pubMediaBg, _buildBgOptions()) : null;
  const payload = {
    titre,
    description: document.getElementById('pub-description').value.trim() || null,
    prix: document.getElementById('pub-prix').value !== '' ? Number(document.getElementById('pub-prix').value) : null,
    promo: document.getElementById('pub-promo').value.trim() || null,
    produit_id: produitVal ? Number(produitVal) : null,
    cta_type: cta,
    medias,
    media_bg: bgVal,
    statut: document.getElementById('pub-brouillon').checked ? 'brouillon' : 'publie',
  };
  const btn = document.getElementById('pub-save'); btn.disabled = true;
  try {
    if (pubId != null) await api('PUT', `/publications/${pubId}`, payload);
    else await api('POST', `/initiatives/${_pubInit.id}/publications`, payload);
    document.getElementById('pub-modal-overlay').remove();
    renderPublications(_pubInit, _pubOwner);
  } catch (e) {
    err.textContent = e.message || 'Erreur.'; err.style.display = 'block'; btn.disabled = false;
  }
}

async function deletePublication(id) {
  if (!confirm('Supprimer définitivement cette publication ? Les statistiques associées seront perdues.')) return;
  try {
    await api('DELETE', `/publications/${id}`);

}

function timeAgo(str) {
  try {
    const d = new Date(str.replace(' ','T'));
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return "à l'instant";
    if (diff < 3600) return Math.floor(diff/60) + ' min';
    if (diff < 86400) return Math.floor(diff/3600) + ' h';
    if (diff < 2592000) return Math.floor(diff/86400) + ' j';
    return d.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
  } catch(e) { return ''; }
}

async function downloadBanner() {
  if (!profil.banner_url) return;
  try {
    const res = await fetch(profil.banner_url, { credentials: 'include' });
    const blob = await res.blob();
    const ext = blob.type.includes('png') ? 'png' : blob.type.includes('webp') ? 'webp' : 'jpg';
    const nom = [profil.prenom, profil.nom].filter(Boolean).join('-') || 'banniere';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `banniere-${nom}.${ext}`;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch(e) {
    /* fallback : ouvre dans un nouvel onglet */
    window.open(profil.banner_url, '_blank');
  }
}

async function saveFichePartenaire() {
  const split = s => s.split(',').map(x => x.trim()).filter(Boolean);
  try {
    await api('PUT', '/partenaires/moi', {
      description_complete: document.getElementById('po-desc').value.trim() || null,
      domaines_expertise:   split(document.getElementById('po-domaines').value),
      pays_intervention:    split(document.getElementById('po-pays').value),
      services:             split(document.getElementById('po-services').value),
      site_web:             document.getElementById('po-site').value.trim() || null,
    });
    const msg = document.getElementById('po-save-msg');
    if (msg) { msg.style.display = 'block'; setTimeout(() => document.getElementById('modal-fiche-po')?.remove(), 1500); }
    // rafraîchir les données du profil
    const data = await api('GET', `/profil/${profil.id}`);
    if (data.profil) { Object.assign(profil, data.profil); renderIdentity(); }
  } catch(e) { alert('Erreur lors de la sauvegarde.'); }
}

function toggleApropos() {
  const txt  = document.getElementById('apropos-text');
  const btn  = document.getElementById('apropos-more');
  if (!txt || !btn) return;
  const collapsed = txt.classList.toggle('collapsed');
  btn.textContent = collapsed ? 'Lire la suite ▾' : 'Réduire ▴';
}

function openAproposEditor() {
  const block = document.getElementById('apropos-block');
  // supprimer un éditeur déjà ouvert
  document.getElementById('apropos-editor-wrap')?.remove();
  const wrap = document.createElement('div');
  wrap.id = 'apropos-editor-wrap';
  wrap.className = 'apropos-editor';
  wrap.innerHTML = `
    <textarea id="apropos-ta" placeholder="Parlez de vous : votre parcours, vos projets, vos valeurs…" maxlength="2000">${esc(profil.bio||'')}</textarea>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
      <span style="font-size:11px;color:var(--muted)" id="apropos-counter">${(profil.bio||'').length}/2000</span>
      <div class="apropos-editor-actions" style="margin-top:0">
        <button class="apropos-cancel-btn" onclick="closeAproposEditor()">Annuler</button>
        <button class="apropos-save-btn" onclick="saveApropos()">💾 Enregistrer</button>
      </div>
    </div>`;
  // Insérer dans le bloc existant ou sous le bouton "Ajouter"
  const addBtn = document.querySelector('.apropos-add-btn');
  if (addBtn) { addBtn.insertAdjacentElement('afterend', wrap); }
  else if (block) { block.appendChild(wrap); }
  const ta = document.getElementById('apropos-ta');
  ta.addEventListener('input', () => { document.getElementById('apropos-counter').textContent = ta.value.length + '/2000'; });
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
}

function closeAproposEditor() {
  document.getElementById('apropos-editor-wrap')?.remove();
}

async function saveApropos() {
  const ta = document.getElementById('apropos-ta');
  if (!ta) return;
  const bio = ta.value.trim();
  try {
    await api('PUT', '/profil', { bio });
    profil.bio = bio;
    renderIdentity();
  } catch(e) {
    alert('Erreur lors de la sauvegarde.');
  }
}

function switchProfileTab(id) {
  document.querySelectorAll('.p-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.p-tab-panel').forEach(p => p.classList.toggle('active', p.id === 'ptab-'+id));
  const panel = document.getElementById('ptab-'+id);
  if (!panel || panel.dataset.loaded) return;
  panel.dataset.loaded = '1';
  if (id === 'activite') loadActiviteTab();
  if (id === 'publications') loadPublicationsTab();
  if (id === 'suivis') loadSuivisTab();
  if (id === 'abonnes') loadAbonnesTab();
  if (id === 'communs') loadCommunsTab();
  if (id === 'portfolio') loadPortfolioTab();
  if (id === 'recommandations') loadRecommandationsTab();
  if (id === 'photos') loadPhotosTab();
  if (id === 'videos') loadVideosTab();
  if (id === 'evenements') loadEvenementsTab();
  if (id === 'partenaires') loadPartenairesTab();
  if (id === 'documents') loadDocumentsTab();
}

      ${imgs.map(u=>`<a href="${esc(u)}" target="_blank" style="display:block;border-radius:10px;overflow:hidden;aspect-ratio:1;"><img loading="lazy" src="${esc(u)}" alt="" style="width:100%;height:100%;object-fit:cover;transition:transform .3s;" onmouseover="this.style.transform='scale(1.06)'" onmouseout="this.style.transform='scale(1)'"></a>`).join('')}
    </div></div>`;
}

function extractProfileVideos() {
  const vids = [];
  (profil.publications || []).forEach(p => {
    let medias = p.medias;
    if (typeof medias === 'string') { try { medias = JSON.parse(medias); } catch(e){ medias = []; } }
    if (Array.isArray(medias)) medias.forEach(m => {
      const url = typeof m === 'string' ? m : (m && m.url);
      const type = m && m.type;
      if (url && (type === 'video' || /\.(mp4|webm|mov)/i.test(url))) vids.push(url);
    });
    if (p.media_type === 'video' && p.media_url) vids.push(p.media_url);
  });
  return [...new Set(vids)].slice(0, 12);
}

function loadVideosTab() {
  const panel = document.getElementById('ptab-videos');
  const vids = extractProfileVideos();
  if (!vids.length) {
    panel.innerHTML = `<div class="p-section"><div class="empty-p"><div class="ei">🎬</div>Aucune vidéo pour l'instant.</div></div>`;
    return;

  panel.innerHTML = `<div class="p-section"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;">
    ${vids.map(u=>`<video controls preload="metadata" style="width:100%;border-radius:10px;background:#000;"><source src="${esc(u)}"></video>`).join('')}

}

function fmtDateFull(str) {
  if (!str) return '';
  try {
    const d = new Date(str.replace(' ','T'));
    return d.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' }).toUpperCase();
  } catch(e) { return str; }
}

/* ======================================================
   ONGLET — ACTIVITÉ
   ====================================================== */
const ACT_CATS = [
  { id:'all', label:'Tout' },
  { id:'publications', label:'Publications' },
  { id:'commentaires', label:'Commentaires' },
  { id:'evenements', label:'Événements' },
  { id:'accreditations', label:'Accréditations' },
];
const ACT_ICONS = { publication:'📝', commentaire:'💬', evenement:'📅', accreditation:'🏅', default:'⚡' };
let _actPage = 1, _actCat = 'all', _actQ = '';

async function loadActiviteTab(reset = true) {
  const panel = document.getElementById('ptab-activite');
  if (reset) { _actPage = 1; panel.innerHTML = buildActHeader(); }
  try {
    const r = await api('GET', `/profil/${profil.id}/activite?page=${_actPage}&categorie=${_actCat}&q=${encodeURIComponent(_actQ)}`);
    const list = document.getElementById('act-list') || (() => { const d = document.createElement('div'); d.id='act-list'; panel.appendChild(d); return d; })();
    if (reset) list.innerHTML = '';
    if (!r.activite.length && reset) {
      list.innerHTML = '<div class="empty-p"><div class="ei">⚡</div>Aucune activité publique pour l\'instant.</div>';
    } else {
      r.activite.forEach(item => {
        const d = document.createElement('div');
        d.className = 'act-item';
        d.innerHTML = `
          <div class="act-icon">${ACT_ICONS[item.type] || ACT_ICONS.default}</div>
          <div class="act-body">
            <div class="act-type">${esc(item.categorie||item.type)}</div>
            <div class="act-titre">${esc(item.titre||'—')}</div>
            <div class="act-date">${fmtDate(item.date)}</div>
          </div>`;
        if (item.url) d.style.cursor='pointer', d.onclick=()=>location.href=item.url;
        list.appendChild(d);
      });
      // Bouton "voir plus"
      const existing = document.getElementById('act-more-btn');
      if (existing) existing.remove();
      if (r.page < r.pages) {
        const btn = document.createElement('button');
        btn.id = 'act-more-btn';
        btn.className = 'act-load-more';
        btn.textContent = `Voir plus (${r.total - _actPage*20 > 0 ? r.total - _actPage*20 : ''} activités restantes)`;
        btn.onclick = () => { _actPage++; loadActiviteTab(false); };
        list.after(btn);
      }
    }
  } catch(e) {
    document.getElementById('ptab-activite').innerHTML += `<div style="color:#dc2626;padding:10px">Erreur : ${e.message}</div>`;
  }
}

function buildActHeader() {
  return `<div class="p-section" style="margin-bottom:0;border-radius:12px 12px 0 0;border-bottom:none;padding-bottom:10px">
    <div class="act-feed-filter" id="act-filter-row">
      ${ACT_CATS.map(c=>`<button class="act-filter-btn${c.id===_actCat?' active':''}" onclick="setActCat('${c.id}')">${c.label}</button>`).join('')}
    </div>
    <div class="act-search-row">
      <input type="text" placeholder="🔍 Rechercher dans l'activité…" value="${esc(_actQ)}" oninput="debAct(this.value)">
    </div>
  </div><div class="p-section" style="border-radius:0 0 12px 12px;border-top:none;min-height:80px;" id="act-list-wrap">`;
}

let _actTimer = null;
function debAct(v) { clearTimeout(_actTimer); _actTimer = setTimeout(()=>{ _actQ=v; loadActiviteTab(true); }, 400); }
function setActCat(c) { _actCat=c; document.querySelectorAll('.act-filter-btn').forEach(b=>b.classList.toggle('active',b.textContent===ACT_CATS.find(x=>x.id===c)?.label)); loadActiviteTab(true); }
function fmtDate(d) { if (!d) return ''; try { return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}); } catch(e){return d;} }

  if (isOwn && reset) {
    const createBtn = document.createElement('div');
    createBtn.style.cssText = 'margin-bottom:14px;';
    createBtn.innerHTML = `<button class="btn btn-outline" onclick="if(window.Posts){Posts.openModal();}else{location.href='fil-actualite.html';}" style="border-color:#4338CA;color:#4338CA;font-weight:700;">✍️ Créer un post</button>`;
    panel.prepend(createBtn);
  }
  try {
    const r = await api('GET', `/profil/${profil.id}/publications?page=${_pubPage}&categorie=${_pubCat}&q=${encodeURIComponent(_pubQ)}`);
    let list = document.getElementById('pub-list');
    if (!list) { list = document.createElement('div'); list.id='pub-list'; panel.querySelector('.pub-list-wrap')?.appendChild(list); }
    if (reset) list.innerHTML = '';
    if (!r.publications.length && reset) {
      list.innerHTML = `<div class="empty-p"><div class="ei">📝</div>${isOwn ? 'Aucune publication. <button class="btn btn-sm" onclick="if(window.Posts){Posts.openModal();}else{location.href=\'fil-actualite.html\';}" style="background:#4338CA;color:#fff;border:none;border-radius:6px;padding:5px 12px;margin-left:8px;cursor:pointer;">Créer mon premier post</button>' : 'Aucune publication pour l\'instant.'}</div>`;
    } else {
      if (window.Posts) {
        Posts.renderFeed(r.publications, list.id || 'pub-list', { currentUserId: CU?.id });
      } else {
        r.publications.forEach(p => {
          const d = document.createElement('div');
          d.className = 'post-card';
          const nom = [profil.prenom, profil.nom].filter(Boolean).join(' ') || profil.nom;
          const avHtml = profil.photo_url ? `<img loading="lazy" src="${esc(profil.photo_url)}" alt="">` : `<span style="font-size:13px;font-weight:800">${initials(nom)}</span>`;
          d.innerHTML = `<div class="post-header"><div class="post-av">${avHtml}</div><div class="post-meta"><div class="pm-nom">${esc(nom)}</div><div class="pm-date">${fmtDate(p.created_at)}</div></div></div><div class="post-body"><div class="post-text">${esc(p.contenu||'')}</div></div><div class="post-stats"><span>❤️ ${p.nb_reactions||0}</span><span>💬 ${p.nb_commentaires||0}</span></div>`;
          list.appendChild(d);
        });
      }
      const existing = document.getElementById('pub-more-btn');
      if (existing) existing.remove();
      if (r.page < r.pages) {
        const btn = document.createElement('button');
        btn.id='pub-more-btn'; btn.className='act-load-more';
        btn.textContent='Voir plus';
        btn.onclick=()=>{ _pubPage++; loadPublicationsTab(false); };
        list.after(btn);
      }
    }
  } catch(e) { document.getElementById('ptab-publications').innerHTML += `<div style="color:#dc2626;padding:10px">Erreur : ${e.message}</div>`; }
}

function buildPubHeader() {
  return `<div class="p-section" style="padding-bottom:8px">
    <div class="act-feed-filter">

/* ---- Demande de suppression définitive (workflow admin) ---- */
async function loadDeletionRequestStatus() {
  const zone = document.getElementById('del-req-zone');
  if (!zone) return;
  try {
    const r = await api('GET', '/deletion-requests/mine');
    const active = (r.requests || []).find(x => !['refusee', 'compte_supprime'].includes(x.statut));
    if (active) { renderDeletionRequestDossier(active); return; }
    zone.innerHTML = `
      <p style="font-size:13px;color:var(--muted);margin:0 0 12px;">Demander la suppression définitive transmet votre dossier à l'administration, qui pourra échanger avec vous avant toute suppression irréversible.</p>
      <button class="btn-ico" style="background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca;padding:8px 16px;" onclick="openDeletionRequestModal()">🗑️ Demander la suppression de mon compte</button>`;
  } catch (e) { zone.innerHTML = ''; }
}

const DEL_STATUT_LABELS = {
  demande_recue: '🟡 Demande reçue', en_discussion: '🔵 En discussion', en_cours_analyse: '🟠 En cours d\'analyse',
  validee: '🟢 Validée', refusee: '🔴 Refusée', compte_supprime: '⚫ Compte supprimé',
};

function renderDeletionRequestDossier(dr) {
  const zone = document.getElementById('del-req-zone');
  if (!zone) return;
  zone.innerHTML = `
    <p style="font-size:13px;font-weight:700;color:#374151;margin:0 0 4px;">Dossier ${dr.numero_dossier} — ${DEL_STATUT_LABELS[dr.statut] || dr.statut}</p>
    ${dr.admin_justification && dr.statut === 'refusee' ? `<p style="font-size:12.5px;color:#dc2626;margin:0 0 8px;">Motif du refus : ${esc(dr.admin_justification)}</p>` : ''}
    <div id="del-req-messages" style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;padding:10px;margin:10px 0;background:#fafbfc;">
      ${(dr.messages||[]).map(m => `
        <div style="margin-bottom:8px;">
          <div style="font-size:11px;font-weight:700;color:${m.sender_role==='administrateur'?'#2563eb':'#374151'};">${m.sender_role==='administrateur' ? 'Administration' : 'Vous'} · ${fmtDateFrCourt(m.created_at)}</div>
          <div style="font-size:13px;color:#1f2937;">${esc(m.contenu)}</div>
        </div>`).join('') || '<p style="font-size:12.5px;color:var(--muted);">Aucun message pour le moment.</p>'}
    </div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="del-req-msg-input" placeholder="Écrire un message…" style="flex:1;padding:8px 10px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;">
      <button onclick="sendDeletionRequestMessage(${dr.id})" style="padding:8px 14px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-weight:600;cursor:pointer;">Envoyer</button>
    </div>`;
}

async function sendDeletionRequestMessage(id) {
  const input = document.getElementById('del-req-msg-input');
  const contenu = input.value.trim();
  if (!contenu) return;
  try {
    await api('POST', `/deletion-requests/${id}/messages`, { contenu });
    input.value = '';
    await loadDeletionRequestStatus();
  } catch (e) { alert('Erreur : ' + (e.message||'')); }
}

function openDeletionRequestModal() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(13,27,42,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px;max-width:480px;width:100%;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.3);">
      <h2 style="margin:0 0 10px;font-size:18px;color:#dc2626;">Attention :</h2>
      <p style="font-size:13px;color:#475569;line-height:1.7;margin:0 0 10px;">
        Vous êtes sur le point de demander la suppression définitive de votre compte Diaspo'Actif.<br><br>
        Cette demande sera transmise à l'administration.<br><br>
        Un administrateur pourra échanger avec vous avant de procéder à la suppression définitive.<br><br>
        Une fois la suppression validée, votre profil, vos publications, vos messages, vos documents, vos fichiers et toutes vos données personnelles seront supprimés conformément à notre politique de confidentialité, sauf celles dont la conservation est imposée par la loi.
      </p>
      <textarea id="del-req-motif" placeholder="Motif (facultatif)" style="width:100%;box-sizing:border-box;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;min-height:60px;margin-bottom:12px;"></textarea>
      <label style="display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#374151;margin-bottom:14px;cursor:pointer;">
        <input type="checkbox" id="del-req-ack" style="margin-top:2px;"> Je comprends les conséquences de cette demande.
      </label>
      <p id="del-req-err" style="color:#dc2626;font-size:12px;margin:0 0 12px;display:none;"></p>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button onclick="this.closest('div[style*=fixed]').remove()" style="padding:9px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:#374151;font-weight:600;cursor:pointer;">Annuler</button>
        <button id="del-req-confirm" disabled style="padding:9px 16px;border-radius:8px;border:none;background:#94a3b8;color:#fff;font-weight:700;cursor:not-allowed;">📨 Envoyer ma demande</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  const ack = document.getElementById('del-req-ack');
  const confirmBtn = document.getElementById('del-req-confirm');
  ack.addEventListener('change', () => {
    confirmBtn.disabled = !ack.checked;
    confirmBtn.style.background = ack.checked ? '#dc2626' : '#94a3b8';
    confirmBtn.style.cursor = ack.checked ? 'pointer' : 'not-allowed';
  });
  confirmBtn.onclick = async () => {
    if (!ack.checked) return;
    const motif = document.getElementById('del-req-motif').value.trim();
    const err = document.getElementById('del-req-err');
    try {
      await api('POST', '/deletion-requests', { motif });
      overlay.remove();
      await loadDeletionRequestStatus();
    } catch (e) {
      err.textContent = e.message || 'Erreur lors de l\'envoi.';
      err.style.display = 'block';
    }
  };
}

/* ---- Masquage de compte (remplace l'ancienne suppression RGPD) ---- */
function openDeleteAccountModal() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(13,27,42,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px;max-width:440px;width:100%;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.3);">
      <h2 style="margin:0 0 10px;font-size:18px;color:#dc2626;">🙈 Masquer votre profil public ?</h2>
      <p style="font-size:13px;color:#475569;line-height:1.6;margin:0 0 16px;">
        Votre profil ne sera plus visible par les autres utilisateurs. Vos données restent intactes : reconnectez-vous à tout moment pour le réafficher.
      </p>
      <label style="font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:6px;">Confirmez avec votre mot de passe</label>
      <input type="password" id="del-acc-pw" placeholder="Votre mot de passe" style="width:100%;box-sizing:border-box;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:14px;margin-bottom:8px;">
      <p id="del-acc-err" style="color:#dc2626;font-size:12px;margin:0 0 12px;display:none;"></p>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button onclick="this.closest('div[style*=fixed]').remove()" style="padding:9px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:#374151;font-weight:600;cursor:pointer;">Annuler</button>
        <button id="del-acc-confirm" style="padding:9px 16px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-weight:700;cursor:pointer;">Masquer mon compte</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('del-acc-confirm').onclick = async () => {
    const pw = document.getElementById('del-acc-pw').value;
    const err = document.getElementById('del-acc-err');
    if (!pw) { err.textContent = 'Mot de passe requis.'; err.style.display = 'block'; return; }
    try {
      await fetch('/api/auth/account', {
        method: 'DELETE', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      }).then(async r => { const d = await r.json(); if (!r.ok) throw new Error(d.error || 'Erreur'); });
      window.location.href = 'index.html';
    } catch (e) {
      err.textContent = e.message || 'Mot de passe incorrect.';
      err.style.display = 'block';
    }
  };
}

let _privTimer = null;
async function savePrivacy() {
  const sections = ['publications','activite','commentaires','evenements','accreditations','contacts'];
  const privacy = {};
  sections.forEach(s => {
    const el = document.getElementById('priv-'+s);
    if (el) privacy[s] = el.value;
  });
  try {
    await api('PUT', '/profil', { privacy });
    profil.privacy = privacy;
    const msg = document.getElementById('priv-msg');
    if (msg) { msg.style.display='block'; clearTimeout(_privTimer); _privTimer=setTimeout(()=>msg.style.display='none',2500); }
  } catch(e) {}
}

    const canvas = document.querySelector('#codes-da-qr canvas');
    if (!canvas) return;
    const a = document.createElement('a');
    a.download = `qr-diaspoactif-${daId}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };

  let _dsAction = 'reveal';
  window._showDsIdForm = function(action) {
    _dsAction = action;
    document.getElementById('ds-pwd-form').style.display = 'block';
    document.getElementById('ds-pwd-title').textContent = action === 'regen'
      ? '⚠️ Régénérer le DS-ID — entrez votre mot de passe (l\'ancien code sera invalidé)'
      : '🔑 Entrez votre mot de passe pour afficher votre DS-ID';
    document.getElementById('ds-pwd-input').value = '';
    document.getElementById('ds-pwd-err').style.display = 'none';
    document.getElementById('ds-pwd-input').focus();
  };
  window._cancelDsId = function() {
    document.getElementById('ds-pwd-form').style.display = 'none';
  };
  window._hideDsId = function() {
    document.getElementById('ds-revealed-view').style.display = 'none';
    document.getElementById('ds-masked-view').style.display = '';
    document.getElementById('ds-value').textContent = '';
  };
  window._copyDsId = async function() {
    const val = document.getElementById('ds-value').textContent;
    if (!val) return;
    await navigator.clipboard.writeText(val);
    await api('POST', '/profil/ds-id/log-copy', {});
    showToast?.('📋 DS-ID copié !');
  };
  window._submitDsId = async function() {
    const pwd = document.getElementById('ds-pwd-input').value;
    const err = document.getElementById('ds-pwd-err');
    err.style.display = 'none';
    if (!pwd) { err.textContent = 'Mot de passe requis.'; err.style.display = 'block'; return; }
    try {
      if (_dsAction === 'regen') {
        const r = await api('POST', '/profil/ds-id/regenerate', { password: pwd });
        document.getElementById('ds-value').textContent = r.ds_id;
        document.getElementById('ds-pwd-form').style.display = 'none';
        document.getElementById('ds-masked-view').style.display = 'none';
        document.getElementById('ds-revealed-view').style.display = '';
        showToast?.('✅ DS-ID régénéré avec succès.');
      } else {
        const r = await api('POST', '/profil/ds-id/reveal', { password: pwd });
        document.getElementById('ds-value').textContent = r.ds_id;
        document.getElementById('ds-pwd-form').style.display = 'none';
        document.getElementById('ds-masked-view').style.display = 'none';
        document.getElementById('ds-revealed-view').style.display = '';
      }
      loadDsHistory();
    } catch(e) {
      err.textContent = e.message || 'Erreur de validation.';
      err.style.display = 'block';
    }
  };

  // Touche Entrée dans le champ mot de passe
  document.getElementById('ds-pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') window._submitDsId(); });

  async function loadDsHistory() {
    const el = document.getElementById('ds-history-list');
    try {
      const r = await api('GET', '/profil/ds-id/history');
      if (!r.history.length) { el.innerHTML = '<p style="font-size:13px;color:var(--muted);">Aucune activité enregistrée.</p>'; return; }
      const labels = { creation:'Création', consultation:'Consultation', copie:'Copie', regeneration:'Régénération', signature:'Signature numérique', echec_validation:'Tentative échouée' };
      const colors = { creation:'#16a34a', consultation:'#2563eb', copie:'#7c3aed', regeneration:'#d97706', signature:'#0891b2', echec_validation:'#dc2626' };
      el.innerHTML = '<div class="history-list">' + r.history.map(h => `
        <div class="history-row">
          <span class="history-action" style="color:${colors[h.action]||'var(--text)'}">${labels[h.action]||h.action}</span>
          <div class="history-meta">
            <div>${new Date(h.created_at).toLocaleString('fr-FR')}</div>
            ${h.ip ? `<div>IP : ${h.ip}</div>` : ''}
          </div>
        </div>`).join('') + '</div>';
    } catch(e) { el.innerHTML = '<p style="font-size:13px;color:var(--muted);">Historique indisponible.</p>'; }
  }
  loadDsHistory();
}

/* ---- Carte "Vérifier mon identité" (Stripe Identity) ---- */
function fmtDateFr(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' }); }
  catch (e) { return iso; }
}

            <div style="font-size:12px;color:#92400e;">Le pays associé à votre document d'identité ne correspond pas à la nationalité déclarée sur votre profil. Vérifiez vos informations dans <a href="confidentialite.html" style="color:#92400e;text-decoration:underline;">Confidentialité</a>, ou contactez le support si c'est une erreur.</div>
          </div>

}

async function startIdentityVerification() {
  const btn = document.getElementById('identity-start-btn');
  const err = document.getElementById('identity-err');
  if (btn) btn.disabled = true;
  try {
    const r = await api('POST', '/identity/verify', {});
    window.location.href = r.url; // redirige vers la page hébergée Stripe Identity
  } catch (e) {
    if (err) { err.textContent = e.message || 'Erreur lors du lancement de la vérification.'; err.style.display = 'block'; }
    if (btn) btn.disabled = false;
  }
}

async function loadContactsTab(panel, type, titre, icon) {
  let page = 1, q = '';
  async function render(p, search) {
    try {
      const data = await api('GET', `/profil/${profil.id}/${type}?page=${p}&q=${encodeURIComponent(search||'')}`);
      if (data.masque) {
        panel.innerHTML = `<div style="padding:32px;text-align:center;color:var(--muted)">🔒 Cette liste est privée.</div>`;
        return;
      }
      const list = data[type] || [];
      const total = data.total || 0;
      const pages = data.pages || 1;
      if (p === 1) {
        panel.innerHTML = `
          <div style="padding:16px 0">
            <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">${icon} ${titre} <span style="font-size:12px;color:var(--muted);font-weight:400">(${total})</span></h3>
            <div style="display:flex;gap:8px;margin-bottom:16px;">
              <input id="contacts-search-${type}" type="text" placeholder="Rechercher…" value="${search||''}"
                style="flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--card);"
                oninput="debContacts_${type}(this.value)">
            </div>
            <div id="contacts-list-${type}" class="contacts-grid"></div>
            <div id="contacts-more-${type}" style="text-align:center;margin-top:12px;"></div>
          </div>`;
        window[`debContacts_${type}`] = debounce(v => { q = v; render(1, v); }, 300);
      }
      const listEl = document.getElementById(`contacts-list-${type}`);
      if (!listEl) return;
      if (p === 1) listEl.innerHTML = '';
      if (!list.length && p === 1) { listEl.innerHTML = '<div style="color:var(--muted);padding:16px;text-align:center;">Aucun résultat.</div>'; }
      list.forEach(u => {
        const card = document.createElement('a');
        card.href = `/profil.html?id=${u.id}`;
        card.className = 'contact-card';
        const nom = [u.prenom, u.nom].filter(Boolean).join(' ') || '—';
        const roleLabel = { individu:'Membre', initiative:'Initiative', association:'Association', entreprise:'Entreprise', etablissement:'Établissement', organisation:'Organisation' }[u.role] || u.role || 'Membre';
        card.innerHTML = `
          <div class="cc-avatar">${u.photo_url ? `<img src="${u.photo_url}" alt="">` : `<div class="cc-initials">${nom.charAt(0)}</div>`}</div>
          <div class="cc-body">
            <div class="cc-nom">${nom}</div>
            <div class="cc-role">${roleLabel}${u.pays ? ` · ${u.pays}` : ''}${u.ville ? ` · ${u.ville}` : ''}</div>
            ${u.titre_pro ? `<div class="cc-titre">${u.titre_pro}</div>` : ''}
          </div>`;
        listEl.appendChild(card);
      });
      const moreEl = document.getElementById(`contacts-more-${type}`);
      if (moreEl) {
        moreEl.innerHTML = p < pages ? `<button class="act-load-more" onclick="loadMore_${type}()">Voir plus</button>` : '';
        window[`loadMore_${type}`] = () => { page++; render(page, q); };
      }
    } catch(e) {
      panel.innerHTML = `<div style="padding:20px;color:var(--muted)">Erreur de chargement.</div>`;
    }
  }
  render(1, '');
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

/* ---- Extraction des images depuis les publications (données réelles) ---- */
function extractProfileImages() {
  const imgs = [];
  (profil.publications || []).forEach(p => {
    let medias = p.medias;
    if (typeof medias === 'string') { try { medias = JSON.parse(medias); } catch(e){ medias = []; } }
    if (Array.isArray(medias)) {
      medias.forEach(m => {
        const url = typeof m === 'string' ? m : (m && m.url);
        if (url && /\.(jpg|jpeg|png|gif|webp)/i.test(url)) imgs.push(url);
      });
    }
    if (p.media_url && /\.(jpg|jpeg|png|gif|webp)/i.test(p.media_url)) imgs.push(p.media_url);
  });
  return [...new Set(imgs)].slice(0, 12);
}

/* ---- Widget galerie (carrousel) ---- */
function buildGalleryWidget() {
  const imgs = extractProfileImages();
  if (!imgs.length) return null; // masqué si aucune image
  const w = document.createElement('div');
  w.className = 'p-widget';
  const id = 'gal-' + Math.random().toString(36).slice(2,7);
  w.innerHTML = `
    <div class="p-widget-title">📸 Galerie photos
      <button class="p-widget-more" onclick="switchProfileTab('photos')">Tout voir</button>
    </div>
    <div class="carousel-wrap" id="${id}">
      <div class="carousel-track">${imgs.map(u=>`<div class="carousel-slide"><img loading="lazy" src="${esc(u)}" alt=""></div>`).join('')}</div>
      ${imgs.length>1 ? `<button class="carousel-btn prev" onclick="carouselMove('${id}',-1)">‹</button><button class="carousel-btn next" onclick="carouselMove('${id}',1)">›</button>
      <div class="carousel-dots">${imgs.map((_,i)=>`<span class="carousel-dot ${i===0?'active':''}" onclick="carouselGo('${id}',${i})"></span>`).join('')}</div>` : ''}
    </div>`;
  return w;
}
const _carouselIdx = {};
function carouselGo(id, i) {
  const wrap = document.getElementById(id); if (!wrap) return;
  const track = wrap.querySelector('.carousel-track');
  const dots = wrap.querySelectorAll('.carousel-dot');
  const n = track.children.length;
  i = (i + n) % n; _carouselIdx[id] = i;
  track.style.transform = `translateX(-${i*100}%)`;
  dots.forEach((d,j)=>d.classList.toggle('active', j===i));
}
function carouselMove(id, dir) { carouselGo(id, (_carouselIdx[id]||0) + dir); }

function miniBarChart(rows, color) {
  const max = Math.max(...rows.map(r=>r.val), 1);
  return rows.map(r => `
    <div class="pchart-row">
      <div class="pchart-lbl">${esc(r.label)}</div>
      <div class="pchart-track"><div class="pchart-fill" style="width:${(r.val/max*100).toFixed(1)}%;background:${color};"></div></div>
      <div class="pchart-val">${r.val}</div>
    </div>`).join('');
}

function buildSectionExp() {
  const sec = document.createElement('div');
  sec.className = 'p-section';
  sec.id = 'sec-exp';

  const exps = Array.isArray(profil.experiences) ? profil.experiences : [];

  let hd = `<div class="p-sec-hd"><h3>💼 Expériences professionnelles</h3>`;
  if (isOwn) hd += `<div class="p-sec-actions"><button class="btn-ico" onclick="openAddExp()">+ Ajouter</button></div>`;
  hd += `</div>`;

  if (!exps.length) {
    sec.innerHTML = hd + `<div class="empty-p"><div class="ei">💼</div>Aucune expérience renseignée${isOwn?' — cliquez sur "+ Ajouter"':''}</div>`;
  } else {
    const items = exps.map((e, i) => {
      const dates = [fmtDate(e.debut), e.actuel ? 'Aujourd\'hui' : fmtDate(e.fin)].filter(Boolean).join(' – ');
      return `<div class="exp-item" id="exp-${i}">
        <div class="exp-logo">${initials(e.entreprise)}</div>
        <div class="exp-body">
          <h4>${esc(e.titre)}</h4>
          <div class="exp-company">${esc(e.entreprise)}${e.lieu?` · ${esc(e.lieu)}`:''}</div>
          ${dates?`<div class="exp-dates">📅 ${esc(dates)}</div>`:''}
          ${e.description?`<div class="exp-desc">${esc(e.description)}</div>`:''}
          ${isOwn?`<div class="exp-btns">
            <button class="btn-sm-ghost" onclick="openEditExp(${i})">✏️ Modifier</button>
            <button class="btn-sm-ghost danger" onclick="deleteExp(${i})">🗑 Supprimer</button>
          </div>`:''}
        </div>
      </div>`;
    }).join('');
    sec.innerHTML = hd + `<div class="exp-list">${items}</div>`;
  }

  sec.innerHTML += `<div id="exp-form-wrap"></div>`;
  return sec;
}

function openAddExp() { renderExpForm(null, null); }
function openEditExp(i) { renderExpForm(profil.experiences[i], i); }

function renderExpForm(exp, idx) {
  const wrap = document.getElementById('exp-form-wrap');
  const isEdit = idx !== null;
  wrap.innerHTML = `<div class="p-edit-form">
    <h4 style="margin:0 0 12px;font-size:14px;">${isEdit?'Modifier':'Ajouter'} une expérience</h4>
    <div class="fg">
      <div><label>Titre du poste *</label><input id="ef-titre" value="${esc(exp?.titre||'')}"></div>
      <div><label>Entreprise / Organisation *</label><input id="ef-ent" value="${esc(exp?.entreprise||'')}"></div>
      <div><label>Lieu</label><input id="ef-lieu" value="${esc(exp?.lieu||'')}"></div>
      <div><label>Date de début (AAAA-MM)</label><input id="ef-deb" placeholder="2022-01" value="${esc(exp?.debut||'')}"></div>
      <div><label>Date de fin (AAAA-MM)</label><input id="ef-fin" placeholder="2024-06" value="${esc(exp?.fin||'')}" ${exp?.actuel?'disabled':''}></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:24px">
        <input type="checkbox" id="ef-act" ${exp?.actuel?'checked':''} onchange="document.getElementById('ef-fin').disabled=this.checked">
        <label for="ef-act" style="font-size:13px;margin:0;text-transform:none;letter-spacing:0;color:var(--text);">Poste actuel</label>
      </div>
    </div>
    <div class="fg full"><div><label>Description</label><textarea id="ef-desc" rows="3">${esc(exp?.description||'')}</textarea></div></div>
    <div class="edit-btns">
      <button class="btn-save" onclick="saveExp(${idx})">Enregistrer</button>
      <button class="btn-cancel" onclick="document.getElementById('exp-form-wrap').innerHTML=''">Annuler</button>
    </div>
    <p class="e-msg err" id="exp-err"></p>
  </div>`;
  wrap.scrollIntoView({behavior:'smooth', block:'nearest'});
}

async function saveExp(idx) {
  const titre  = document.getElementById('ef-titre').value.trim();
  const ent    = document.getElementById('ef-ent').value.trim();
  const err    = document.getElementById('exp-err');
  if (!titre || !ent) { err.style.display='block'; err.textContent='Titre et entreprise requis.'; return; }

  const newExp = {
    titre, entreprise: ent,
    lieu:        document.getElementById('ef-lieu').value.trim(),
    debut:       document.getElementById('ef-deb').value.trim(),
    fin:         document.getElementById('ef-fin').value.trim(),
    actuel:      document.getElementById('ef-act').checked,
    description: document.getElementById('ef-desc').value.trim(),
  };

  const list = [...(profil.experiences||[])];
  if (idx !== null) list[idx] = newExp;
  else list.unshift(newExp);

  try {
    await api('PUT', '/profil', { experiences: list });
    profil.experiences = list;
    rebuildSection('sec-exp', buildSectionExp());
  } catch(e) { err.style.display='block'; err.textContent='Erreur lors de la sauvegarde.'; }
}

async function deleteExp(idx) {
  if (!confirm('Supprimer cette expérience ?')) return;
  const list = [...(profil.experiences||[])];
  list.splice(idx, 1);
  try {
    await api('PUT', '/profil', { experiences: list });
    profil.experiences = list;
    rebuildSection('sec-exp', buildSectionExp());
  } catch(e) { alert('Erreur.'); }
}
