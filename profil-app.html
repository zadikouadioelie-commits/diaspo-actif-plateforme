   SECTION — Compétences
   ====================================================== */
function buildSectionSkills() {
  const sec = document.createElement('div');
  sec.className = 'p-section';
  sec.id = 'sec-skills';

  const skills = Array.isArray(profil.competences) ? profil.competences : [];

  let hd = `<div class="p-sec-hd"><h3>🛠 Compétences</h3>`;
  if (isOwn) hd += `<div class="p-sec-actions"><button class="btn-ico" onclick="focusSkillInput()">+ Ajouter</button></div>`;
  hd += `</div>`;

  const pillsHtml = skills.length
    ? `<div class="skills-wrap">${skills.map((s,i)=>`<span class="skill-pill">${esc(s)}${isOwn?`<span class="skill-del" onclick="deleteSkill(${i})" title="Retirer">✕</span>`:''}</span>`).join('')}</div>`
    : `<div class="empty-p"><div class="ei">🛠</div>Aucune compétence renseignée${isOwn?' — ajoutez-en ci-dessous':''}</div>`;

  const addForm = isOwn ? `<div class="skill-add-row" id="skill-add-row">
    <input id="skill-input" placeholder="Ex : React, Finance, Agriculture…" onkeydown="if(event.key==='Enter')addSkill()">
    <button class="btn-ico" onclick="addSkill()">Ajouter</button>
  </div>` : '';

  sec.innerHTML = hd + pillsHtml + addForm;
  return sec;
}

function focusSkillInput() { document.getElementById('skill-input')?.focus(); }

async function addSkill() {
  const inp   = document.getElementById('skill-input');
  const val   = inp?.value.trim();
  if (!val) return;
  const list  = [...(profil.competences||[])];
  if (list.includes(val)) { inp.value=''; return; }
  list.push(val);
  try {
    await api('PUT', '/profil', { competences: list });
    profil.competences = list;
    rebuildSection('sec-skills', buildSectionSkills());
    setTimeout(focusSkillInput, 80);
  } catch(e) {}
}

async function deleteSkill(idx) {
  const list = [...(profil.competences||[])];
  list.splice(idx, 1);
  try {
    await api('PUT', '/profil', { competences: list });
    profil.competences = list;
    rebuildSection('sec-skills', buildSectionSkills());
  } catch(e) {}
}

async function toggleFollow() {
  if (!CU) { window.location.href='login.html'; return; }
  const btn = document.getElementById('btn-follow');
  btn.disabled = true;
  try {
    const method = profil.isFollowing ? 'DELETE' : 'POST';
    const r = await api(method, `/users/${profil.id}/suivre`);
    profil.isFollowing = !profil.isFollowing;
    profil.nbAbonnes   = r.nbAbonnes;
    renderActions();
    renderStats();
  } catch(e) { alert(e.message||'Erreur.'); }
  finally { const b2 = document.getElementById('btn-follow'); if(b2) b2.disabled=false; }
}

function openEditReseaux() {

  f.innerHTML = `

async function saveReseaux() {
  const keys = ['linkedin','facebook','instagram','x','youtube','tiktok','site_web','github','autre1','autre2'];
  const reseaux = {};
  for (const k of keys) { const v = document.getElementById('rs-'+k)?.value.trim(); if(v) reseaux[k]=v; }
  try {
    await api('PUT', '/profil/reseaux-sociaux', { reseaux });

    document.getElementById('reseaux-form').style.display = 'none';

  f.style.display = 'block';
}
async function saveRecommandation() {
  const texte = document.getElementById('rec-texte').value.trim();
  if (texte.length < 20) { alert('La recommandation doit faire au moins 20 caractères'); return; }
  const ok = document.getElementById('rec-ok');
  try {
    await api('POST', `/profil/${profil.id}/recommandations`, { texte, note: parseInt(document.getElementById('rec-note').value), relation: document.getElementById('rec-rel').value.trim()||null });
    ok.style.display='block'; ok.textContent='✓ Recommandation envoyée ! Elle sera visible après validation.';
    setTimeout(()=>document.getElementById('rec-form').style.display='none', 2000);
  } catch(e) { alert(e.message||'Erreur'); }
}
async function loadMesRecommandations() {
  const panel = document.getElementById('mes-recs-panel');
  if (panel.style.display !== 'none') { panel.style.display='none'; return; }
  panel.innerHTML = '<div style="color:var(--muted);font-size:13px;">Chargement…</div>';
  panel.style.display = 'block';
  try {
    const data = await api('GET', '/profil/mes-recommandations');
    const statutBtns = r => `
      <div style="display:flex;gap:6px;margin-top:8px;">
        ${r.statut !== 'approuve' ? `<button onclick="modifierRec(${r.id},'approuve')" class="btn btn-outline btn-sm" style="font-size:11px;color:#10b981;">✅ Approuver</button>` : '<span style="font-size:11px;color:#10b981;">✅ Approuvée</span>'}
        ${r.statut !== 'masque' ? `<button onclick="modifierRec(${r.id},'masque')" class="btn btn-outline btn-sm" style="font-size:11px;">🙈 Masquer</button>` : ''}
        ${r.statut !== 'refuse' ? `<button onclick="modifierRec(${r.id},'refuse')" class="btn btn-outline btn-sm" style="font-size:11px;color:#dc2626;">❌ Refuser</button>` : ''}
      </div>`;
    panel.innerHTML = `
      <div style="background:var(--bg-soft,#f8f8f8);border:1px solid var(--border);border-radius:10px;padding:14px;">
        <h4 style="margin:0 0 12px;font-size:13px;">Recommandations reçues (${data.recues.length})</h4>
        ${data.recues.length ? data.recues.map(r=>`
          <div style="border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;background:#fff;">
            <div style="font-weight:700;font-size:13px;">${esc(r.auteur_nom)}</div>
            <p style="font-size:12px;margin:6px 0;font-style:italic;">"${esc(r.texte)}"</p>
            <span style="font-size:11px;font-weight:700;color:${r.statut==='approuve'?'#10b981':r.statut==='refuse'?'#dc2626':'#f59e0b'};">${r.statut}</span>
            ${statutBtns(r)}
          </div>`).join('') : '<p style="color:var(--muted);font-size:12px;">Aucune recommandation reçue.</p>'}
      </div>`;
  } catch(e) { panel.innerHTML = '<p style="color:red;">Erreur lors du chargement.</p>'; }
}
async function modifierRec(id, statut) {
  await api('PATCH', '/profil/recommandations/'+id, { statut });
  loadMesRecommandations();
  document.getElementById('ptab-recommandations').dataset.loaded = '';
  loadRecommandationsTab();
}
