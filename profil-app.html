<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diaspo'Actif — Profil</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="assets/styles.v2.css">
  <link rel="stylesheet" href="/assets/responsive.v2.css">
<link rel="stylesheet" href="/assets/ui-enhancements.v2.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== VARIABLES THÈME (modifiées dynamiquement) ===== */
:root {
  --tp:        #1565C0;
  --tp-light:  #E3F2FD;
  --tp-dark:   #0D47A1;
  --tp-banner: linear-gradient(135deg,#0D47A1 0%,#1976D2 100%);
}

/* ===== BANNIÈRE (immersive, alignée au conteneur) ===== */
.p-banner {
  width:94%; max-width:1640px; margin:0 auto; height:320px;
  background: var(--tp-banner);
  position:relative; overflow:hidden;
  cursor:pointer; border-radius:0 0 16px 16px;
}
.p-banner img {
  width:100%; height:100%; object-fit:cover; display:block;
  opacity:0; transform:scale(1.04);
  transition:opacity .5s ease, transform .6s ease;
}
.p-banner img.loaded { opacity:1; transform:scale(1); }

/* ===== BANNIÈRE VITRINE ===== */
.p-vitrine-banner {
  width:100%; height:220px; border-radius:14px;
  background:linear-gradient(135deg,var(--tp,#1565C0),var(--tp-dark,#0D47A1));
  background-size:cover; background-position:center;
  position:relative; display:flex; align-items:flex-end; justify-content:flex-end; padding:14px;
}
.vt-banner-edit {
  background:rgba(0,0,0,.5); color:#fff; border:none; border-radius:8px;
  padding:8px 14px; font-size:12.5px; font-weight:700; cursor:pointer;
}
.p-banner-edit {
  position:absolute; bottom:10px; right:12px;
  background:rgba(0,0,0,.45); color:#fff; border:none; border-radius:6px;
  padding:5px 12px; font-size:12px; cursor:pointer; display:none;
}
.is-own .p-banner-edit { display:block; }
.banner-back-btn {
  position:absolute; top:12px; left:14px; z-index:10;
  background:rgba(0,0,0,.45); color:#fff; text-decoration:none;
  border-radius:8px; padding:5px 13px; font-size:13px; font-weight:600;
  backdrop-filter:blur(4px); transition:background .15s;
}
.banner-back-btn:hover { background:rgba(0,0,0,.65); color:#fff; }

/* ===== CARTE PROFIL ===== */
.p-card {
  background:#fff; border:1px solid var(--border);
  border-radius:12px; margin-bottom:14px;
  padding:0 24px 20px;
}
.p-card-top {
  display:flex; align-items:flex-end;
  justify-content:space-between; flex-wrap:wrap; gap:10px;
}
.p-avatar-wrap { position:relative; margin-top:-104px; }
.p-avatar {
  width:208px; height:208px; border-radius:50%;
  border:6px solid #fff; background:var(--tp);
  display:flex; align-items:center; justify-content:center;
  font-size:64px; font-weight:800; color:#fff;
  overflow:hidden; box-shadow:0 6px 28px rgba(0,0,0,.22);
  position:relative; cursor:default;
}
.p-avatar img {
  width:100%; height:100%; object-fit:cover; border-radius:50%;
  opacity:0; transform:scale(1.08);
  transition:opacity .45s ease, transform .5s ease;
}
.p-avatar img.loaded { opacity:1; transform:scale(1); }
.p-avatar-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,.4); border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:22px;
  opacity:0; transition:opacity .2s; cursor:pointer;
}
.is-own .p-avatar:hover .p-avatar-overlay { opacity:1; }
.is-own .p-avatar { cursor:pointer; }
.p-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding-bottom:6px; }
.btn-follow {
  height:36px; padding:0 20px; border-radius:8px; font-size:13px; font-weight:700;
  cursor:pointer; border:none; background:var(--tp); color:#fff; transition:background .2s;
}
.btn-follow:hover { background:var(--tp-dark); }
.btn-follow.following { background:#fff; color:var(--tp); border:1.5px solid var(--tp); }
.btn-follow.following:hover { background:#fee2e2; border-color:#dc2626; color:#dc2626; }
.btn-msg {
  height:36px; padding:0 16px; border-radius:8px; font-size:13px; font-weight:600;
  cursor:pointer; background:#fff; border:1.5px solid var(--border); color:var(--text);
  text-decoration:none; display:flex; align-items:center;
}
.btn-msg:hover { border-color:var(--tp); color:var(--tp); }

/* Identité */
.p-name { font-size:22px; font-weight:800; color:#0D1B2A; margin:14px 0 3px; }
.p-titre { font-size:14px; color:var(--muted); margin:0 0 5px; }
.p-loc { font-size:13px; color:var(--muted); margin:0 0 10px; }
.p-bio { font-size:14px; color:var(--text); line-height:1.65; margin:0 0 14px; white-space:pre-wrap; }

/* À propos */
.apropos-block { margin:14px 0; background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:16px 18px; position:relative; }
.apropos-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.apropos-title { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
.apropos-edit-btn { background:none; border:none; cursor:pointer; font-size:13px; color:var(--muted); padding:2px 6px; border-radius:6px; transition:background .15s; }
.apropos-edit-btn:hover { background:var(--bg); color:var(--accent); }
.apropos-text { font-size:14px; color:var(--text); line-height:1.7; white-space:pre-wrap; overflow:hidden; transition:max-height .3s ease; }
.apropos-text.collapsed { max-height:72px; }
.apropos-more-btn { background:none; border:none; cursor:pointer; font-size:12px; font-weight:700; color:var(--accent); padding:6px 0 0; display:block; }
.apropos-add-btn { background:none; border:1.5px dashed var(--border); border-radius:14px; width:100%; padding:14px; font-size:13px; color:var(--muted); cursor:pointer; text-align:center; margin:14px 0; transition:border-color .15s, color .15s; }
.apropos-add-btn:hover { border-color:var(--accent); color:var(--accent); }
.apropos-editor { margin-top:10px; }
.apropos-editor textarea { width:100%; box-sizing:border-box; border:1.5px solid var(--border); border-radius:8px; padding:10px 12px; font-size:14px; line-height:1.65; resize:vertical; min-height:100px; background:var(--bg); color:var(--fg); font-family:inherit; }
.apropos-editor textarea:focus { outline:none; border-color:var(--accent); }
.apropos-editor-actions { display:flex; gap:8px; margin-top:8px; justify-content:flex-end; }
.apropos-save-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:7px 18px; font-size:13px; font-weight:700; cursor:pointer; }
.apropos-cancel-btn { background:none; border:1.5px solid var(--border); border-radius:8px; padding:7px 14px; font-size:13px; cursor:pointer; color:var(--muted); }
.p-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.p-tag {
  background:var(--tp-light); color:var(--tp); border:1px solid var(--tp);
  border-radius:99px; padding:3px 12px; font-size:12px; font-weight:600;
}

/* Stats */
.p-stats {
  display:flex; gap:0; flex-wrap:wrap;
  border-top:1px solid var(--border); padding-top:14px; margin-top:2px;
}
.p-stat {
  padding:0 20px 0 0; margin-right:20px;
  border-right:1px solid var(--border); cursor:pointer;
}
.p-stat:last-child { border-right:none; }
.p-stat .n { font-size:17px; font-weight:800; color:var(--tp); }
.p-stat .l { font-size:11px; color:var(--muted); margin-top:1px; }

/* ===== SÉLECTEUR DE THÈME ===== */
.theme-row {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:12px 0; border-bottom:1px solid var(--border); margin-bottom:2px;
}
.theme-row span { font-size:12px; font-weight:700; color:var(--muted); }
.theme-swatch {
  width:26px; height:26px; border-radius:50%; cursor:pointer;
  border:3px solid transparent; transition:all .18s;
  box-shadow:0 1px 5px rgba(0,0,0,.22);
}
.theme-swatch.active { border-color:#0D1B2A; transform:scale(1.2); }

/* ===== SECTIONS ===== */
.p-section {
  background:#fff; border:1px solid var(--border);
  border-radius:12px; padding:20px 24px; margin-bottom:14px;
}
.p-sec-hd {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
}
.p-sec-hd h3 { margin:0; font-size:16px; font-weight:800; color:#0D1B2A; }
.p-sec-actions { display:flex; gap:6px; }
.btn-ico {
  background:none; border:1px solid var(--border); border-radius:6px;
  padding:5px 11px; cursor:pointer; font-size:12px; color:var(--muted);
  transition:all .18s; white-space:nowrap;
}
.btn-ico:hover { background:var(--tp-light); color:var(--tp); border-color:var(--tp); }

/* Expériences */
.exp-list { display:flex; flex-direction:column; gap:0; }
.exp-item {
  display:flex; gap:14px; padding:14px 0;
  border-bottom:1px solid var(--border);
}
.exp-item:last-child { border-bottom:none; padding-bottom:0; }
.exp-logo {
  width:46px; height:46px; flex-shrink:0; border-radius:8px;
  background:var(--tp-light); display:flex; align-items:center;
  justify-content:center; font-size:15px; font-weight:800; color:var(--tp);
}
.exp-body { flex:1; min-width:0; }
.exp-body h4 { margin:0 0 2px; font-size:14px; font-weight:700; color:#0D1B2A; }
.exp-company { font-size:13px; color:var(--text); margin:0 0 2px; }
.exp-dates { font-size:12px; color:var(--muted); margin:0 0 5px; }
.exp-desc { font-size:13px; color:var(--muted); margin:0; line-height:1.55; }
.exp-btns { display:flex; gap:5px; margin-top:6px; }
.btn-sm-ghost {
  background:none; border:1px solid var(--border); border-radius:5px;
  padding:3px 9px; font-size:11px; cursor:pointer; color:var(--muted);
}
.btn-sm-ghost:hover { border-color:var(--tp); color:var(--tp); }
.btn-sm-ghost.danger:hover { border-color:#dc2626; color:#dc2626; }

/* Compétences */
.skills-wrap { display:flex; flex-wrap:wrap; gap:8px; }
.skill-pill {
  display:flex; align-items:center; gap:6px;
  background:var(--tp-light); color:var(--tp);
  border:1px solid var(--tp); border-radius:99px;
  padding:5px 14px; font-size:13px; font-weight:600;
}
.skill-del { cursor:pointer; font-size:11px; opacity:.65; }
.skill-del:hover { opacity:1; }
.skill-add-row { display:flex; gap:8px; margin-top:12px; align-items:center; }
.skill-add-row input {
  flex:1; height:36px; border:1px solid var(--border); border-radius:6px;
  padding:0 12px; font-size:13px; font-family:inherit;
}

/* Publications */
.pub-item { padding:12px 0; border-bottom:1px solid var(--border); }
.pub-item:last-child { border-bottom:none; padding-bottom:0; }
.pub-cat { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--tp); margin-bottom:4px; }
.pub-text { font-size:14px; color:var(--text); line-height:1.55; margin:0 0 4px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.pub-date { font-size:11px; color:var(--muted); }

/* Grilles abonnements */
.follow-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}
.fc {
  border:1px solid var(--border); border-radius:10px;
  padding:14px 10px; text-align:center;
  text-decoration:none; color:inherit; transition:box-shadow .2s;
  display:block;
}
.fc:hover { box-shadow:0 4px 14px rgba(0,0,0,.1); }
.fc-av {
  width:50px; height:50px; border-radius:50%; margin:0 auto 8px;
  background:var(--tp-light); display:flex; align-items:center;
  justify-content:center; font-size:17px; font-weight:800; color:var(--tp); overflow:hidden;
}
.fc-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.fc-nom { font-size:12px; font-weight:700; color:#0D1B2A; margin-bottom:2px; line-height:1.3; }
.fc-sub { font-size:11px; color:var(--muted); }
.init-fc {
  border:1px solid var(--border); border-radius:10px; padding:12px 14px;
  text-decoration:none; color:inherit; display:flex; align-items:center;
  gap:10px; transition:box-shadow .2s;
}
.init-fc:hover { box-shadow:0 4px 14px rgba(0,0,0,.1); }
.init-fc-av {
  width:40px; height:40px; border-radius:8px; flex-shrink:0;
  background:var(--tp-light); display:flex; align-items:center;
  justify-content:center; font-size:13px; font-weight:800; color:var(--tp);
}
.init-fc-body .init-fc-nom { font-size:13px; font-weight:700; color:#0D1B2A; }
.init-fc-body .init-fc-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.init-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }

/* ===== FORMULAIRES ÉDITION ===== */
.p-edit-form { background:#F8FAFF; border:1px solid var(--border); border-radius:8px; padding:16px; margin-top:12px; }
.fg { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.fg.full { grid-template-columns:1fr; }
.fg label { font-size:11px; font-weight:700; color:var(--muted); display:block; margin-bottom:3px; text-transform:uppercase; letter-spacing:.04em; }
.fg input, .fg textarea, .fg select {
  width:100%; box-sizing:border-box; height:38px;
  border:1px solid var(--border); border-radius:6px;
  padding:0 12px; font-size:13px; font-family:inherit;
}
.fg textarea { height:80px; padding:10px 12px; resize:vertical; }
.edit-btns { display:flex; gap:8px; margin-top:12px; }
.btn-save {
  background:var(--tp); color:#fff; border:none; border-radius:7px;
  padding:8px 20px; font-size:13px; font-weight:700; cursor:pointer;
}
.btn-save:hover { background:var(--tp-dark); }
.btn-cancel {
  background:#fff; border:1px solid var(--border); border-radius:7px;
  padding:8px 16px; font-size:13px; cursor:pointer;
}
.e-msg { font-size:12px; margin-top:6px; display:none; }
.e-msg.err { color:#dc2626; } .e-msg.ok { color:#16a34a; }

/* ===== EMPTY STATE ===== */
.empty-p { text-align:center; padding:20px 0; color:var(--muted); font-size:13px; }
.empty-p .ei { font-size:28px; margin-bottom:6px; }

/* ===== CONTENEUR LARGE (immersif, occupe l'écran) ===== */
/* overflow-x:clip (au lieu de hidden) préserve position:sticky des colonnes latérales enrichies */
html, body { overflow-x:clip; }
.p-container-wide { width:94%; max-width:1640px; margin:0 auto; }

/* ===== LAYOUT 3 COLONNES (proportions ~23% / ~54% / ~23%) ===== */
.p-grid3 {
  display:grid;
  grid-template-columns:minmax(280px,23%) minmax(0,1fr) minmax(300px,23%);
  gap:20px; align-items:start;
}
.p-col-left, .p-col-right { min-width:0; }
.p-col-center { min-width:0; }
.p-col-sticky { position:sticky; top:14px; display:flex; flex-direction:column; gap:14px; }

/* Anciennes classes conservées pour compat (sections internes) */
.p-main   { flex:1; min-width:0; }
.p-side   { width:240px; flex-shrink:0; }
.p-side-sticky { position:sticky; top:14px; }

/* Bloc réutilisable colonnes latérales */
.p-widget {
  background:#fff; border:1px solid var(--border); border-radius:14px;
  padding:14px 16px; box-shadow:0 1px 3px rgba(13,27,42,.05);
}
.p-widget-title {
  font-size:13px; font-weight:800; color:#0D1B2A; margin-bottom:12px;
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.p-widget-more {
  font-size:12px; font-weight:600; color:var(--tp); background:none;
  border:none; cursor:pointer; padding:0;
}
.p-widget-more:hover { text-decoration:underline; }
.p-demo-badge {
  font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
  background:#FEF3C7; color:#92400E; border-radius:99px; padding:2px 7px;
}

/* Responsive : 1100px -> masquer colonne gauche ; 760px -> tout empilé */
@media(max-width:1100px){
  .p-grid3 { grid-template-columns:minmax(0,1fr) 300px; }
  .p-col-left { display:none; }
}
@media(max-width:760px){
  .p-grid3 { grid-template-columns:1fr; }
  .p-col-right { order:3; }
  .p-col-sticky { position:static; }
}

/* ===== CARTE ÉVÉNEMENT (repris de evenements.html) ===== */
.evt-card { border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:box-shadow .15s; background:#fff; }
.evt-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.1); }
.evt-img { width:100%; height:130px; object-fit:cover; background:linear-gradient(135deg,var(--tp) 0%,var(--tp-dark) 100%); display:flex; align-items:center; justify-content:center; font-size:42px; }
.evt-body { padding:14px 16px; }
.evt-date { font-size:12px; color:var(--tp); font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.evt-title { font-size:15px; font-weight:700; margin:0 0 8px; line-height:1.3; color:#0D1B2A; }
.evt-meta { font-size:12px; color:var(--muted); display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.evt-tag { background:var(--bg); border:1px solid var(--border); border-radius:99px; padding:2px 8px; font-size:11px; }
.evt-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }

/* ===== BOUTIQUE (produits vitrine) ===== */
.prod-card { position:relative; cursor:default; }
.prod-card.draggable { cursor:grab; }
.prod-card.dragging { opacity:.5; }
.prod-price { font-size:16px; font-weight:800; color:var(--tp); margin-bottom:6px; }
.prod-badge-indispo { background:#fef2f2; color:#dc2626; border-color:#fecaca; }
.prod-actions { display:flex; gap:6px; margin-top:8px; }
.prod-actions button { flex:1; padding:7px 10px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; border:none; }
.prod-btn-commander { background:var(--tp); color:#fff; }
.prod-btn-commander:hover { background:var(--tp-dark); }
.prod-btn-contact { background:var(--bg); color:var(--tp); border:1.5px solid var(--tp) !important; }
.prod-btn-contact:hover { background:var(--tp-light); }
.prod-btn-alerte { background:#fff7ed; color:#c2410c; border:1.5px solid #fdba74 !important; }
.prod-btn-alerte:hover { background:#ffedd5; }
.prod-banner { position:absolute; top:8px; left:8px; background:rgba(220,38,38,.92); color:#fff; font-size:11px; font-weight:800; padding:4px 10px; border-radius:6px; letter-spacing:.02em; }
.prod-btn-edit { background:var(--bg); color:#334155; }
.prod-btn-delete { background:#fef2f2; color:#dc2626; }
.prod-counter { font-size:12.5px; color:var(--muted); font-weight:600; }
.prod-photo-slots { display:flex; gap:8px; flex-wrap:wrap; }
.prod-photo-slot { width:70px; height:70px; border-radius:8px; border:1.5px dashed var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; overflow:hidden; background:var(--bg); font-size:20px; color:#94a3b8; }
.prod-photo-slot img { width:100%; height:100%; object-fit:cover; }
.prod-photo-slot .slot-del { position:absolute; top:2px; right:2px; background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:50%; width:18px; height:18px; font-size:11px; cursor:pointer; line-height:1; }

/* ===== PUBLICATIONS PROMOTIONNELLES (namespace vtp- pour éviter toute collision) ===== */
.vt-pub-wrap { border:1.5px solid var(--tp-light); }
.vtp-card { border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:18px; background:#fff; box-shadow:0 2px 10px rgba(13,27,42,.05); }
.vtp-card:last-child { margin-bottom:0; }
.vtp-brouillon { background:#fef3c7; color:#92400e; font-size:11.5px; font-weight:700; padding:5px 12px; }
/* Affichage "affiche premium" : image entière (contain), grande surface, fond neutre, ratio conservé */
.vtp-media { width:100%; background:#f1f3f5; display:flex; align-items:center; justify-content:center; }
.vtp-media img { width:100%; height:auto; max-height:72vh; display:block; object-fit:contain; }
.vtp-media video { width:100%; height:auto; max-height:72vh; display:block; object-fit:contain; background:#f1f3f5; }
.vtp-media-empty { display:flex; align-items:center; justify-content:center; font-size:60px; min-height:260px; color:#94a3b8; }
.vtp-media-duo { display:grid; grid-template-columns:1fr 1fr; gap:4px; background:#f1f3f5; }
.vtp-media-duo img { width:100%; height:auto; max-height:60vh; object-fit:contain; }
.vtp-body { padding:16px 18px; }
.vtp-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.vtp-titre { margin:0; font-size:19px; font-weight:800; color:#0d1b2a; line-height:1.25; }
.vtp-actions-owner { display:flex; gap:2px; flex-shrink:0; }
.vtp-meta { display:flex; gap:10px; flex-wrap:wrap; margin:8px 0 0; align-items:center; }
.vtp-prix { font-size:18px; font-weight:800; color:var(--tp); }
.vtp-promo { font-size:13px; font-weight:700; color:#b91c1c; background:#fee2e2; padding:3px 10px; border-radius:99px; }
.vtp-desc { font-size:14px; line-height:1.6; color:#334155; margin:10px 0 0; }
.vtp-interactions { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; align-items:center; }
.vtp-btn { display:inline-flex; align-items:center; gap:5px; font-size:13px; font-weight:600; padding:7px 12px; border-radius:99px; border:1.5px solid var(--border); background:var(--bg); color:#334155; cursor:pointer; transition:all .15s; }
.vtp-btn:hover { background:#eef2f7; }
.vtp-btn.liked { border-color:#fca5a5; background:#fef2f2; color:#b91c1c; }
.vtp-btn-cta { background:var(--tp); color:#fff; border-color:var(--tp); margin-left:auto; }
.vtp-btn-cta:hover { filter:brightness(1.08); background:var(--tp); }
.vtp-stats { margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }
.vtp-stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.vtp-stats-grid > div { background:var(--bg); border-radius:10px; padding:10px; text-align:center; }
.vtp-stats-grid b { display:block; font-size:20px; color:#0d1b2a; }
.vtp-stats-grid span { font-size:11px; color:var(--muted); }
.vtp-comments { margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
.vtp-com-list { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
.vtp-com { font-size:13px; color:#334155; line-height:1.5; }
.vtp-com b { color:#0d1b2a; }
.vtp-com-form { display:flex; gap:8px; }
.vtp-com-form input { flex:1; padding:8px 12px; border:1.5px solid var(--border); border-radius:99px; font-size:13px; }
.vtp-lbl { font-size:13px; font-weight:700; color:#374151; display:block; margin:12px 0 5px; }
.vtp-input { width:100%; box-sizing:border-box; padding:9px 12px; border:1.5px solid #E2E8F0; border-radius:8px; font-size:14px; }
.vtp-photo-slots { display:flex; gap:10px; }
.vtp-photo-slot { width:110px; height:90px; border-radius:10px; border:1.5px dashed var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; overflow:hidden; background:var(--bg); font-size:24px; color:#94a3b8; }
.vtp-photo-slot img { width:100%; height:100%; object-fit:cover; }
.vtp-photo-slot .slot-del { position:absolute; top:3px; right:3px; background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:12px; cursor:pointer; line-height:1; }
.vt-highlight { outline:3px solid var(--tp); outline-offset:3px; border-radius:12px; transition:outline .3s; }
.vtp-bg-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(84px, 1fr)); gap:8px; }
.vtp-bg-thumb { display:flex; flex-direction:column; align-items:center; gap:4px; padding:4px; border:2px solid var(--border); border-radius:10px; background:#fff; cursor:pointer; transition:all .15s; }
.vtp-bg-thumb:hover { border-color:var(--tp-light); }
.vtp-bg-thumb.sel { border-color:var(--tp); box-shadow:0 0 0 2px var(--tp-light); }
.vtp-bg-prev { width:100%; height:52px; border-radius:6px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.vtp-bg-prev img { max-width:100%; max-height:100%; object-fit:contain; }
.vtp-bg-lbl { font-size:10.5px; color:#475569; text-align:center; line-height:1.15; }
.vtp-bg-live { width:100%; height:170px; border-radius:12px; display:flex; align-items:center; justify-content:center; overflow:hidden; border:1px solid var(--border); transition:background .2s ease; margin-bottom:6px; }
.vtp-bg-live img { max-width:100%; max-height:100%; object-fit:contain; }
.vtp-bg-live-lbl { font-size:12px; color:var(--muted); text-align:center; margin-bottom:10px; }
.vtp-bg-prev { position:relative; }
.vtp-bg-check { position:absolute; top:2px; right:2px; width:16px; height:16px; border-radius:50%; background:var(--tp); color:#fff; font-size:10px; line-height:16px; text-align:center; font-weight:800; }
.vt-sub-card { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; background:linear-gradient(135deg, rgba(37,99,235,.06), rgba(255,107,0,.06)); border:1.5px solid var(--tp-light); border-radius:14px; padding:14px 18px; }
.vt-sub-txt { display:flex; flex-direction:column; gap:2px; }
.vt-sub-txt strong { font-size:15px; color:#0d1b2a; }
.vt-sub-txt span { font-size:12.5px; color:var(--muted); }
.vt-sub-btn { flex-shrink:0; font-size:14px; font-weight:700; padding:10px 20px; border-radius:99px; border:none; background:var(--tp); color:#fff; cursor:pointer; transition:all .15s; }
.vt-sub-btn:hover { filter:brightness(1.08); }
.vt-sub-btn.abonne { background:#dcfce7; color:#166534; border:1.5px solid #86efac; }
@media (max-width:560px){ .vt-sub-card { flex-direction:column; align-items:stretch; text-align:left; } .vt-sub-btn { width:100%; } }
@media (max-width:560px){ .vtp-media-duo { grid-template-columns:1fr; } .vtp-media img, .vtp-media video { max-height:60vh; } .vtp-titre { font-size:17px; } .vtp-stats-grid { grid-template-columns:repeat(2,1fr); } .vtp-btn-cta { margin-left:0; } }

/* ===== CARROUSEL GALERIE (repris de evenements.html) ===== */
.carousel-wrap { position:relative; overflow:hidden; border-radius:12px; background:#111; }
.carousel-track { display:flex; transition:transform .4s ease; }
.carousel-slide { min-width:100%; position:relative; }
.carousel-slide img { width:100%; height:220px; object-fit:cover; display:block; }
.carousel-btn { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,.45); color:#fff; border:none; border-radius:50%; width:32px; height:32px; font-size:16px; cursor:pointer; z-index:5; display:flex; align-items:center; justify-content:center; }
.carousel-btn.prev { left:8px; } .carousel-btn.next { right:8px; }
.carousel-dots { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); display:flex; gap:5px; }
.carousel-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.5); cursor:pointer; transition:background .2s; }
.carousel-dot.active { background:#fff; }

/* ===== FIL D'ACTIVITÉ (colonne gauche) ===== */
.pact-item { display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); cursor:pointer; text-decoration:none; color:inherit; }
.pact-item:last-child { border-bottom:none; }
.pact-item:hover .pact-txt { color:var(--tp); }
.pact-ic { width:30px; height:30px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; background:var(--tp-light); }
.pact-txt { font-size:12.5px; line-height:1.4; color:#334155; }
.pact-date { font-size:11px; color:var(--muted); margin-top:2px; }

/* ===== SUGGESTIONS (colonne gauche) ===== */
.psug-item { display:flex; align-items:center; gap:10px; padding:8px 0; }
.psug-av { width:40px; height:40px; border-radius:50%; flex-shrink:0; object-fit:cover; background:var(--tp-light); display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--tp); font-size:15px; overflow:hidden; }
.psug-av img { width:100%; height:100%; object-fit:cover; }
.psug-body { flex:1; min-width:0; }
.psug-nom { font-size:13px; font-weight:700; color:#0D1B2A; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.psug-type { font-size:11px; color:var(--muted); }
.psug-follow { font-size:11px; font-weight:700; padding:5px 12px; border-radius:8px; border:1.5px solid var(--tp); background:#fff; color:var(--tp); cursor:pointer; flex-shrink:0; transition:all .15s; }
.psug-follow:hover { background:var(--tp); color:#fff; }
.psug-follow.done { background:var(--tp-light); border-color:var(--tp-light); color:var(--tp); }

/* ===== INITIATIVES EN COURS (colonne droite, démo) ===== */
.pini-item { display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
.pini-item:last-child { border-bottom:none; }
.pini-img { width:44px; height:44px; border-radius:10px; object-fit:cover; flex-shrink:0; background:var(--tp-light); }
.pini-body { flex:1; min-width:0; }
.pini-titre { font-size:12.5px; font-weight:700; color:#0D1B2A; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pini-statut { font-size:10.5px; color:var(--muted); margin:2px 0 5px; }
.pini-bar { height:6px; background:var(--bg); border-radius:99px; overflow:hidden; }
.pini-bar-fill { height:100%; background:linear-gradient(90deg,var(--tp),var(--tp-dark)); border-radius:99px; }

/* ===== CENTRES D'INTÉRÊT (colonne droite) ===== */
.pint-grid { display:flex; flex-wrap:wrap; gap:7px; }

/* ===== MINI STATS CHART (colonne droite) ===== */
.pchart-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.pchart-lbl { width:78px; font-size:11px; color:var(--muted); text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pchart-track { flex:1; height:12px; background:var(--bg); border-radius:6px; overflow:hidden; }
.pchart-fill { height:100%; border-radius:6px; transition:width .6s; }
.pchart-val { font-weight:700; font-size:11px; width:32px; text-align:right; }

/* ===== PUBLICATIONS RICHES ===== */
.post-card {
  background:#fff; border:1px solid var(--border); border-radius:12px;
  margin-bottom:12px; overflow:hidden;
}
.post-header { display:flex; align-items:center; gap:10px; padding:14px 16px 8px; }
.post-av {
  width:40px; height:40px; border-radius:50%; flex-shrink:0;
  background:var(--tp-light); display:flex; align-items:center;
  justify-content:center; font-size:14px; font-weight:800; color:var(--tp); overflow:hidden;
}
.post-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.post-meta { flex:1; min-width:0; }
.post-meta .pm-nom { font-size:13px; font-weight:700; color:#0D1B2A; }
.post-meta .pm-titre { font-size:11px; color:var(--muted); }
.post-meta .pm-date { font-size:11px; color:var(--muted); }
.post-cat-pill {
  background:var(--tp-light); color:var(--tp); border-radius:99px;
  padding:2px 10px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em;
}
.post-body { padding:0 16px 10px; }
.post-text { font-size:14px; color:var(--text); line-height:1.65; margin:0 0 10px; white-space:pre-wrap; }
.post-img {
  width:100%; max-height:320px; object-fit:cover;
  border-radius:8px; display:block; margin-bottom:10px;
}
.post-link-card {
  border:1px solid var(--border); border-radius:8px; overflow:hidden;
  margin-bottom:10px; text-decoration:none; display:flex; color:inherit;
}
.post-link-card img { width:100px; height:80px; object-fit:cover; flex-shrink:0; }
.post-link-body { padding:10px 12px; flex:1; min-width:0; }
.post-link-body .plb-src { font-size:10px; color:var(--muted); text-transform:uppercase; font-weight:700; }
.post-link-body .plb-title { font-size:13px; font-weight:700; color:#0D1B2A; line-height:1.4; }
.post-shared {
  border:1px solid var(--border); border-radius:8px; padding:12px 14px;
  margin-bottom:10px; background:#F8FAFF;
}
.post-shared .ps-nom { font-size:12px; font-weight:700; color:var(--tp); margin-bottom:4px; }
.post-shared .ps-text { font-size:13px; color:var(--text); }
.post-actions {
  display:flex; gap:0; border-top:1px solid var(--border); padding:4px 8px;
}
.post-btn {
  flex:1; display:flex; align-items:center; justify-content:center; gap:5px;
  padding:8px 4px; font-size:12px; font-weight:600; color:var(--muted);
  background:none; border:none; border-radius:6px; cursor:pointer; transition:all .18s;
}
.post-btn:hover { background:var(--tp-light); color:var(--tp); }
.post-btn.liked { color:#dc2626; }
.post-stats { padding:0 16px 6px; font-size:11px; color:var(--muted); display:flex; gap:12px; }

/* SIDEBAR extras */
.side-card {
  background:#fff; border:1px solid var(--border); border-radius:10px;
  padding:14px; margin-bottom:12px;
}
.side-card h4 { margin:0 0 12px; font-size:13px; font-weight:800; color:#0D1B2A; }
.suggest-item { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.suggest-item:last-child { margin-bottom:0; }
.sug-av {
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  background:var(--tp-light); display:flex; align-items:center;
  justify-content:center; font-size:12px; font-weight:800; color:var(--tp); overflow:hidden;
}
.sug-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.sug-body { flex:1; min-width:0; }
.sug-body .sb-nom { font-size:12px; font-weight:700; color:#0D1B2A; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sug-body .sb-sub { font-size:11px; color:var(--muted); }
.btn-sug { background:none; border:1.5px solid var(--tp); color:var(--tp); border-radius:99px; padding:3px 12px; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; }
.btn-sug:hover { background:var(--tp-light); }

/* ===== TABS ===== */
.p-tabs { display:flex; flex-wrap:nowrap; gap:0; border-bottom:2px solid var(--border); margin-bottom:16px; background:#fff; border-radius:12px 12px 0 0; padding:0 4px; overflow-x:auto; scrollbar-width:thin; }
.p-tabs::-webkit-scrollbar { height:5px; }
.p-tabs::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
.p-tab-btn { padding:12px 16px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .18s; white-space:nowrap; flex-shrink:0; }
.p-tab-btn:hover { color:var(--tp); }
.p-tab-btn.active { color:var(--tp); border-bottom-color:var(--tp); }
.p-tab-panel { display:none; }
.p-tab-panel.active { display:block; }

/* ===== ACTIVITÉ FEED ===== */
.act-feed-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.act-filter-btn { padding:5px 12px; border-radius:99px; font-size:12px; font-weight:600; border:1.5px solid var(--border); cursor:pointer; background:#fff; color:var(--muted); transition:all .15s; }
.act-filter-btn.active, .act-filter-btn:hover { background:var(--tp-light); color:var(--tp); border-color:var(--tp); }
.act-search-row { display:flex; gap:8px; margin-bottom:14px; }
.act-search-row input { flex:1; height:36px; border:1px solid var(--border); border-radius:8px; padding:0 12px; font-size:13px; font-family:inherit; }
.act-item { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.act-item:last-child { border-bottom:none; }
.act-icon { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; background:var(--tp-light); }
.act-body { flex:1; }
.act-type { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--tp); margin-bottom:2px; }
.act-titre { font-size:13px; color:#0D1B2A; line-height:1.4; }
.act-date { font-size:11px; color:var(--muted); margin-top:3px; }
.act-load-more { width:100%; padding:10px; margin-top:10px; background:#fff; border:1.5px solid var(--border); border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; color:var(--muted); }
.act-load-more:hover { border-color:var(--tp); color:var(--tp); }

/* ===== BANNER UPLOAD ===== */
.p-banner-edit { display:none; }
.is-own .p-banner-edit { display:flex; align-items:center; gap:6px; }
.banner-crop-overlay { position:absolute; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; gap:8px; opacity:0; transition:opacity .2s; }
.p-banner:hover .banner-crop-overlay { opacity:1; }
.banner-btn { background:rgba(255,255,255,.92); color:#0D1B2A; border:none; border-radius:6px; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:4px; }

/* ===== BADGE PARTENAIRE OFFICIEL ===== */
.badge-partenaire-officiel {
  display:inline-flex; align-items:center; gap:5px;
  background:#eff6ff; color:#1e40af; border:1.5px solid #bfdbfe;
  border-radius:99px; padding:4px 13px; font-size:12px; font-weight:800;
  letter-spacing:.02em; text-decoration:none; transition:background .15s;
}
.badge-partenaire-officiel:hover { background:#dbeafe; color:#1e40af; }

/* ===== CONTACTS GRID (Suivis / Abonnés) ===== */
.contacts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
.contact-card { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--card); border:1.5px solid var(--border); border-radius:12px; text-decoration:none; color:inherit; transition:box-shadow .15s; }
.contact-card:hover { box-shadow:0 2px 10px rgba(0,0,0,.08); }
.cc-avatar { width:42px; height:42px; border-radius:50%; overflow:hidden; flex-shrink:0; background:var(--accent); display:flex; align-items:center; justify-content:center; }
.cc-avatar img { width:100%; height:100%; object-fit:cover; }
.cc-initials { font-size:18px; font-weight:700; color:#fff; }
.cc-body { min-width:0; }
.cc-nom { font-size:13px; font-weight:700; color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cc-role { font-size:11px; color:var(--muted); margin-top:2px; }
.cc-titre { font-size:11px; color:var(--accent); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ===== RELATIONS EN COMMUN ===== */
.communs-suggestions { background:linear-gradient(135deg,#eff6ff,#f0fdf4); border:1.5px solid #bfdbfe; border-radius:14px; padding:16px; margin-bottom:16px; }
.communs-suggestion { font-size:13px; color:#1e40af; padding:4px 0; }
.communs-bloc { background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
.communs-titre { font-size:14px; font-weight:700; margin-bottom:12px; color:var(--fg); }
.communs-points { display:flex; flex-direction:column; gap:8px; }
.communs-point { display:flex; align-items:flex-start; gap:10px; }
.communs-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
.communs-label { font-size:13px; font-weight:600; color:var(--fg); }
.communs-val { font-size:12px; color:var(--muted); margin-top:2px; }
.communs-init-list { display:flex; flex-direction:column; gap:8px; }
.communs-init-item { display:flex; align-items:flex-start; gap:10px; padding:8px; border-radius:8px; text-decoration:none; color:inherit; transition:background .15s; }
.communs-init-item:hover { background:var(--bg); }

/* ===== SIDEBAR "EN COMMUN" ===== */
.communs-sidebar-widget { background:linear-gradient(135deg,#eff6ff,#f0fdf4); border:1.5px solid #bfdbfe; border-radius:14px; padding:16px; margin-bottom:16px; }
.csw-head { font-size:13px; font-weight:800; color:#1e40af; margin-bottom:10px; }
.csw-item { font-size:12px; color:#1e3a8a; padding:4px 0; }
.csw-btn { margin-top:10px; font-size:12px; color:#2563eb; background:none; border:none; cursor:pointer; padding:0; font-weight:600; }
.csw-btn:hover { text-decoration:underline; }

/* ===== PRIVACY ===== */
.privacy-section { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:14px; }
.privacy-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
.privacy-row:last-child { border-bottom:none; }
.privacy-label { font-size:13px; font-weight:600; color:#0D1B2A; }
.privacy-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.privacy-select { border:1px solid var(--border); border-radius:6px; padding:5px 10px; font-size:12px; font-family:inherit; color:var(--text); background:#fff; cursor:pointer; }

/* ===== RESPONSIVE ===== */
@media(max-width:860px){
  .p-side { display:none; }
  .p-banner { height:240px; width:100%; border-radius:0; }
  .p-container-wide { width:100%; }
  .p-avatar { width:150px; height:150px; font-size:46px; }
  .p-avatar-wrap { margin-top:-75px; }
}
@media(max-width:600px){
  .p-banner { height:180px; }
  .p-avatar { width:120px; height:120px; font-size:38px; border-width:5px; }
  .p-avatar-wrap { margin-top:-60px; }
  .p-name { font-size:18px; }

<script>
/* ===================================================
   PROFIL UTILISATEUR — logique complète
   =================================================== */

const THEMES = {
  ocean:  { primary:'#1565C0', dark:'#0D47A1', light:'#E3F2FD', banner:'linear-gradient(135deg,#0D47A1 0%,#1976D2 100%)', label:'Océan' },
  foret:  { primary:'#2E7D32', dark:'#1B5E20', light:'#E8F5E9', banner:'linear-gradient(135deg,#1B5E20 0%,#388E3C 100%)', label:'Forêt' },
  soleil: { primary:'#D84315', dark:'#BF360C', light:'#FBE9E7', banner:'linear-gradient(135deg,#BF360C 0%,#F4511E 100%)', label:'Soleil' },
  violet: { primary:'#6A1B9A', dark:'#4A148C', light:'#F3E5F5', banner:'linear-gradient(135deg,#4A148C 0%,#7B1FA2 100%)', label:'Violet' },
  terre:  { primary:'#5D4037', dark:'#3E2723', light:'#EFEBE9', banner:'linear-gradient(135deg,#3E2723 0%,#6D4C41 100%)', label:'Terre' },
  nuit:   { primary:'#1A237E', dark:'#0D1B2A', light:'#E8EAF6', banner:'linear-gradient(135deg,#0D1B2A 0%,#1A237E 100%)', label:'Nuit' },
  rose:   { primary:'#C2185B', dark:'#880E4F', light:'#FCE4EC', banner:'linear-gradient(135deg,#880E4F 0%,#D81B60 100%)', label:'Rose' },
};

const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

let profil = null;
let isOwn  = false;
let CU     = null; /* utilisateur connecté */

/* ---- init ---- */
async function init() {
  CU = await fetchCurrentUser();
  await applyAuthState();
  if (window.Posts && CU) Posts.init(CU.id);
  const backLink = document.getElementById('back-link');
  if (CU) backLink.href = ROLE_DASHBOARD[CU.role] || 'index.html';
  else     backLink.href = 'index.html';

  const uid = new URLSearchParams(location.search).get('id') || CU?.id;
  if (!uid) { window.location.href = 'login.html'; return; }

  try {
    const r = await api('GET', '/profil/' + uid);
    profil = r.profil;
    isOwn  = CU && Number(CU.id) === Number(profil.id);
    if (isOwn) document.getElementById('root-page').classList.add('is-own');
    applyTheme(profil.theme_couleur || 'ocean');
    // Charger les accréditations publiques
    try {
      const ra = await api('GET', '/accreditations/user/' + uid);
      profil._accreditations = (ra.accreditations||[]).map(a=>a.type);
      const decouverte = (ra.accreditations||[]).find(a => a.type_tarif === 'decouverte' && a.date_expiration && new Date(a.date_expiration).getTime() > Date.now());
      profil._decouverte_premium = decouverte ? { date_expiration: decouverte.date_expiration } : null;
    } catch(e) { profil._accreditations = []; profil._decouverte_premium = null; }
    // Charger le badge association
    try {
      const rb = await api('GET', '/asso/badge/' + uid);
      profil._asso_badge = rb.badge || null;
    } catch(e) { profil._asso_badge = null; }
    /* Lien direct "Voir la vitrine" (ex: depuis l'annuaire) : ouvre directement l'onglet Vitrine.
       On positionne le hash AVANT render() pour que initVitrineSwitch() (appelé pendant le rendu)
       détecte #vitrine et bascule dessus naturellement, sans risque d'être écrasé après coup. */
    if (new URLSearchParams(location.search).get('vitrine') === '1') {
      history.replaceState(null, '', window.location.pathname + window.location.search + '#vitrine');
    }
    render();
    try { await renderEnrichedColumns(); } catch(e) { console.warn('colonnes enrichies:', e); }
  } catch(e) {
    document.getElementById('p-sections').innerHTML =
      '<div class="p-section"><p style="color:red">Profil introuvable ou erreur serveur.</p></div>';
  }

  /* Retour depuis Stripe Checkout (commande boutique) */
  const paiement = new URLSearchParams(location.search).get('paiement');
  if (paiement === 'succes') {
    showToast?.('✅ Paiement confirmé ! Votre commande est en cours de traitement.', 'success');
  } else if (paiement === 'annule') {
    showToast?.('❌ Paiement annulé — aucune somme n\'a été débitée.', 'warning');
  }
  if (paiement) {
    const url = new URL(location.href);
    url.searchParams.delete('paiement'); url.searchParams.delete('commande');
    history.replaceState({}, '', url);
  }
}

/* ══════════════════════════════════════════════════════════
   COLONNES LATÉRALES ENRICHIES (miroir de initiative.html)
   ══════════════════════════════════════════════════════════ */
async function renderEnrichedColumns() {
  const left = document.getElementById('pp-col-left');
  const right = document.getElementById('pp-col-right');
  if (!left || !right || !profil) return;
  const esc2 = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const owner = !!isOwn;

  window.ppContact = (sujet) => { location.href = `messagerie.html?user=${profil.id}&sujet=${encodeURIComponent(sujet)}`; };

  window.ppDemandeRelation = async (membreId) => {
    if (window.DemandeContact) return window.DemandeContact.open(membreId, profil.nom);
    const message = prompt("Message accompagnant votre demande de contact (optionnel) :", "");
    if (message === null) return;
    try {
      await api('POST', '/demandes-contact', { destinataire_id: membreId, motif: "Demande d'informations", message: message || "Bonjour, je souhaite entrer en contact avec vous." });
      alert("Demande envoyée. La conversation ne sera ouverte qu'après acceptation par le membre.");
    } catch(e) { alert('Erreur : ' + (e.message || 'impossible d\'envoyer la demande.')); }
  };

  let SCOREACT = null;
  try { SCOREACT = await api('GET', `/profil/${profil.id}/score-activite`); } catch(e) {}

  const editBtn = section => owner ? `<button class="edit-btn" onclick="ppEditSection('${section}')" title="Modifier">✏️</button>` : '';

  /* Masquage/démasquage d'un numéro de téléphone affiché publiquement (👁 afficher / masquer) */
  window._ppPhoneN = 0;
  window.renderMaskedPhone = function(tel) {
    const t = String(tel || '');
    if (!t) return '';
    const visible = t.length > 2 ? t.slice(-2) : t;
    const masked = '•'.repeat(Math.max(t.length - visible.length, 4)) + ' ' + visible;
    const uid = 'phmask-' + (window._ppPhoneN++);
    return `<span id="${uid}" data-tel="${t.replace(/"/g,'&quot;')}" data-visible="0" style="word-break:break-word;">${masked}</span> <button type="button" onclick="ppTogglePhone('${uid}')" title="Afficher/masquer le numéro" style="background:none;border:none;cursor:pointer;font-size:13px;padding:0 2px;">👁</button>`;
  };
  window.ppTogglePhone = function(uid) {
    const el = document.getElementById(uid);
    if (!el) return;
    const shown = el.getAttribute('data-visible') === '1';
    const tel = el.getAttribute('data-tel') || '';
    if (shown) {
      const visible = tel.length > 2 ? tel.slice(-2) : tel;
      el.textContent = '•'.repeat(Math.max(tel.length - visible.length, 4)) + ' ' + visible;
      el.setAttribute('data-visible', '0');
    } else {
      el.textContent = tel;
      el.setAttribute('data-visible', '1');
    }
  };

  function renderLeft() {
    const comps = Array.isArray(profil.competences) ? profil.competences : [];
    const galerie = Array.isArray(profil.galerie) ? profil.galerie : [];
    const zones = Array.isArray(profil.zones) ? profil.zones : [];
    const publics = Array.isArray(profil.publics) ? profil.publics : [];
    const besoins = Array.isArray(profil.besoins) ? profil.besoins : [];
    const rs = Object.assign({}, profil.reseaux_sociaux || {}, profil.reseaux_enrichis || {});
    const RS_ICONS = { site:'🌐', facebook:'📘', linkedin:'💼', instagram:'📸', youtube:'▶️', tiktok:'🎵', whatsapp:'💬', x:'✖️', twitter:'✖️', lien:'🔗' };
    const infos = [
      profil.telephone && ['📞', renderMaskedPhone(profil.telephone)],
      (profil.ville || profil.pays) && ['📍', esc2([profil.ville, profil.pays].filter(Boolean).join(', '))],
      profil.titre_pro && ['💼', esc2(profil.titre_pro)],
      profil.situation_pro && ['🎓', esc2(profil.situation_pro)],
    ].filter(Boolean);

    left.innerHTML = `
      ${owner ? `<div class="pp-side-card" id="pp-recherche-contacts"></div>` : ''}
      <div class="pp-side-card">
        <h4><span>💡 Compétences</span> ${owner ? '<button class="edit-btn" onclick="switchProfileTab(\'competences\')" title="Modifier dans l\'onglet Compétences">✏️</button>' : ''}</h4>
        ${comps.length ? comps.map(c => `<span class="pp-tag">${esc2(typeof c === 'string' ? c : (c.nom || c.label || ''))}</span>`).join('') : '<p style="font-size:12px;color:var(--muted);margin:0;">Non renseigné.</p>'}
      </div>
      <div class="pp-side-card">
        <h4><span>🌍 Zones d'intervention</span> ${editBtn('zones')}</h4>
        ${zones.length ? zones.map(z => `<span class="pp-tag">${esc2(z)}</span>`).join('') : '<p style="font-size:12px;color:var(--muted);margin:0;">Non renseigné.</p>'}
      </div>
      <div class="pp-side-card">
        <h4><span>🎯 Public concerné</span> ${editBtn('publics')}</h4>
        ${publics.length ? publics.map(p => `<span class="pp-tag">${esc2(p)}</span>`).join('') : '<p style="font-size:12px;color:var(--muted);margin:0;">Non renseigné.</p>'}
      </div>
      <div class="pp-side-card">
        <h4><span>🤝 Recherche actuellement</span> ${editBtn('besoins')}</h4>
        ${besoins.length ? besoins.map(b => `<span class="pp-tag clickable" onclick="ppContact('${esc2('Au sujet de : ' + b).replace(/'/g, "\\'")}')" title="Cliquez pour en discuter">${esc2(b)}</span>`).join('') : '<p style="font-size:12px;color:var(--muted);margin:0;">Aucun besoin exprimé.</p>'}
      </div>
      <div class="pp-side-card">
        <h4><span>💼 Services proposés</span> ${editBtn('services')}</h4>
        ${profil.services_perso ? `<p style="font-size:12.5px;margin:0;line-height:1.6;white-space:pre-line;">${esc2(profil.services_perso)}</p>` : '<p style="font-size:12px;color:var(--muted);margin:0;">Non renseigné.</p>'}
      </div>
      ${Object.keys(rs).filter(k => rs[k]).length ? `<div class="pp-side-card">
        <h4>🌐 Réseaux sociaux</h4>
        ${Object.entries(rs).filter(([,v]) => v).map(([k,v]) => `<div class="pp-list-item"><span>${RS_ICONS[k]||'🔗'}</span><a href="${esc2(v)}" target="_blank" style="color:var(--tp);">${esc2(k.charAt(0).toUpperCase()+k.slice(1))}</a></div>`).join('')}
      </div>` : ''}
      ${infos.length ? `<div class="pp-side-card">
        <h4>📞 Informations pratiques</h4>
        ${infos.map(([ic,val]) => `<div class="pp-list-item"><span>${ic}</span><span style="flex:1;word-break:break-word;">${val}</span></div>`).join('')}
      </div>` : ''}
      ${(galerie.length || owner) ? `<div class="pp-side-card">
        <h4><span>🖼 Galerie</span> ${owner ? `<button class="edit-btn" onclick="ppAddGaleriePhoto()" title="Ajouter une photo">➕</button>` : ''}</h4>
        ${galerie.length ? `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;">
          ${galerie.map((img, idx) => `
            <div style="border-radius:6px;overflow:hidden;background:var(--bg);cursor:pointer;" onclick='openGaleriePhoto("user", ${profil.id}, ${JSON.stringify(img.id || ('p'+idx))}, ${JSON.stringify(img.url||'')}, ${JSON.stringify(img.titre||'')}, ${JSON.stringify(img.caption||'')})'>
              <div style="height:70px;display:flex;align-items:center;justify-content:center;font-size:22px;">
                ${img.url ? `<img loading="lazy" src="${img.url}" style="width:100%;height:100%;object-fit:cover;" alt="${(img.caption||'').replace(/"/g,'&quot;')}">` : '🖼'}
              </div>
              <div id="ga-counts-${img.id || ('p'+idx)}" style="font-size:9px;color:var(--muted);text-align:center;padding:2px 0;">♥ 0 · 💬 0</div>
            </div>
          `).join('')}
        </div>` : '<p style="font-size:12px;color:var(--muted);margin:0;">Aucune photo pour l\'instant.</p>'}
      </div>` : ''}
    `;
    if (galerie.length) loadGaleriePhotoCounts('user', profil.id);
  }

  window.ppAddGaleriePhoto = function() {
    const url = prompt("URL de la photo (image) :");
    if (!url) return;
    const titre = prompt("Titre de la photo (optionnel) :") || '';
    const caption = prompt("Légende (optionnel) :") || '';
    const galerie = Array.isArray(profil.galerie) ? profil.galerie.slice() : [];
    galerie.push({ id: 'p' + Date.now(), url, titre, caption });
    api('PUT', '/profil', { galerie }).then(() => {
      profil.galerie = galerie;
      renderLeft();
    }).catch(e => alert(e.message || 'Erreur.'));
  };

  function renderRight() {
    const stats = profil.stats_perso || {};
    const STAT_LABELS = { projets:'Projets', formations:'Formations', collaborations:'Collaborations', pays_couverts:'Pays couverts', clients:'Clients', missions:'Missions' };
    const reals = Array.isArray(profil.realisations) ? profil.realisations : [];
    const labels = [];
    (profil._accreditations || []).forEach(a => labels.push('🎖 ' + a));
    if (profil.partenaire_officiel) labels.push('🏅 Partenaire Officiel Diaspo\'Actif');
    if (profil.is_deal_master) labels.push('🏆 Deal Master');
    if (profil.email_verifie) labels.push('✔️ Email vérifié');

    const ciRight = Array.isArray(profil.centres_interet) ? profil.centres_interet : [];
    right.innerHTML = `
      ${!owner ? `<div class="pp-side-card">
        <h4>🚀 Entrer en relation</h4>
        ${CU && CU.role === 'collectivite' ? `
          <button class="pp-join-btn" onclick="ppDemandeRelation(${profil.id})">🤝 Mise en relation</button>
          <p style="font-size:11px;color:var(--muted);margin:6px 0 0;">Les comptes officiels ne peuvent pas contacter directement un membre : une demande lui sera envoyée, la conversation ne s'ouvrira qu'après son acceptation.</p>
        ` : `
          <a class="pp-join-btn" href="messagerie.html?user=${profil.id}">✉️ Contacter</a>
          <button class="pp-join-btn" onclick="ppContact('Proposition de collaboration')">🤝 Proposer une collaboration</button>
        `}
      </div>` : ''}
      <div class="pp-side-card">
        <h4><span>📝 À propos</span> ${owner ? `<button class="edit-btn" onclick="openEditIdentity()" title="Modifier">✏️</button>` : ''}</h4>
        ${profil.bio ? `<div style="font-size:13px;line-height:1.6;color:var(--text);white-space:pre-line;">${esc2(profil.bio)}</div>` : '<p style="font-size:12px;color:var(--muted);margin:0;">Ce membre n\'a pas encore ajouté de présentation.</p>'}
      </div>
      ${(ciRight.length || owner) ? `<div class="pp-side-card">
        <h4><span>🎯 Centres d'intérêt</span> ${owner ? `<button class="edit-btn" onclick="openEditIdentity()" title="Modifier">✏️</button>` : ''}</h4>
        ${ciRight.length ? ciRight.map(c => `<span class="pp-tag">${esc2(c)}</span>`).join('') : '<p style="font-size:12px;color:var(--muted);margin:0;">Aucun centre d\'intérêt renseigné.</p>'}
      </div>` : ''}
      ${labels.length ? `<div class="pp-side-card"><h4>🏆 Labels & accréditations</h4>${labels.map(l => `<div class="pp-list-item">${esc2(l)}</div>`).join('')}</div>` : ''}
      ${SCOREACT ? `<div class="pp-side-card">
        <h4>⭐ Score d'activité</h4>
        <div style="font-size:22px;font-weight:800;color:var(--tp);">${SCOREACT.score}<span style="font-size:13px;color:var(--muted);">/100</span></div>
        <div class="pp-gauge"><div style="width:${SCOREACT.score}%;"></div></div>
        <div style="font-size:11px;color:var(--muted);">Calculé sur les publications, abonnés, relations et la complétude du profil.</div>
      </div>` : ''}
      <div class="pp-side-card">
        <h4><span>📈 Statistiques</span> ${editBtn('stats')}</h4>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div style="text-align:center;background:var(--bg);border-radius:8px;padding:9px;"><div style="font-size:17px;font-weight:800;">${profil.nbAbonnes ?? 0}</div><div style="font-size:10px;color:var(--muted);">Abonnés</div></div>
          <div style="text-align:center;background:var(--bg);border-radius:8px;padding:9px;"><div style="font-size:17px;font-weight:800;">${(profil.publications||[]).length}</div><div style="font-size:10px;color:var(--muted);">Publications</div></div>
          ${profil.annee_debut ? `<div style="text-align:center;background:var(--bg);border-radius:8px;padding:9px;"><div style="font-size:17px;font-weight:800;">${profil.annee_debut}</div><div style="font-size:10px;color:var(--muted);">Depuis</div></div>` : ''}
          ${Object.entries(stats).filter(([,v]) => v).map(([k,v]) => `<div style="text-align:center;background:var(--bg);border-radius:8px;padding:9px;"><div style="font-size:17px;font-weight:800;">${esc2(v)}</div><div style="font-size:10px;color:var(--muted);">${STAT_LABELS[k] || esc2(k)}</div></div>`).join('')}
        </div>
      </div>
      <div class="pp-side-card">
        <h4>🚀 Initiatives suivies</h4>
        ${(() => {

      </div>

  renderBanner();

function compressImage(dataUrl, maxW, maxH, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

function renderBanner() {
  const banner = document.getElementById('p-banner');
  const img = document.getElementById('banner-img');
  const delBtn = document.getElementById('banner-del-btn');
  if (profil.banner_url) {
    img.src = profil.banner_url;
    img.style.display = 'block';
    banner.style.background = 'none';
    if (delBtn) delBtn.style.display = 'flex';
  } else {
    img.style.display = 'none';
    const t = THEMES[profil.theme_couleur || 'ocean'];
    banner.style.background = t.banner;
    if (delBtn) delBtn.style.display = 'none';
  }
}

/* ---- avatar ---- */
function editAvatar() {
  if (!isOwn) return;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/jpeg,image/png,image/webp,image/gif';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const cropped = await openImageCropper(file, { shape: 'circle', aspect: 1, outW: 600, outH: 600 });
      if (!cropped) return; // annulé par l'utilisateur
      const url = await uploadMedia(cropped, 'avatar');
      await api('PUT', '/profil', { photo_url: url });
      profil.photo_url = url;
      renderVisitorProfile();
    } catch(err) { alert('Erreur lors du chargement de la photo : ' + err.message); }
  };
  input.click();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(n) { return (n||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase(); }

function fmtDate(str) {
  if (!str) return '';
  const [y, m] = str.split('-');
  return (MOIS[parseInt(m,10)-1]||'') + ' ' + y;
}

/* Extrait la 1re image d'une publication (medias JSON ou media_url) */
function pvzFirstImage(p) {
  let medias = p.medias;
  if (typeof medias === 'string') { try { medias = JSON.parse(medias); } catch(e){ medias = null; } }
  if (Array.isArray(medias)) {
    for (const m of medias) {
      const url = typeof m === 'string' ? m : (m && m.url);
      const type = m && m.type;
      if (url && type !== 'video' && !/\.(mp4|webm|mov)/i.test(url)) return url;
    }
  }
  if (p.media_url && p.media_type !== 'video' && !/\.(mp4|webm|mov)/i.test(p.media_url)) return p.media_url;
  return null;
}

/* Bascule Profil/Vitrine côté visiteur */
function pvzSwitchTab(view) {
  const body = document.getElementById('pvz-profil-body');
  const vitrine = document.getElementById('p-vitrine');
  const segP = document.getElementById('pvz-seg-profil');
  const segV = document.getElementById('pvz-seg-vitrine');
  const isVitrine = view === 'vitrine';
  if (body) body.style.display = isVitrine ? 'none' : '';
  if (vitrine) vitrine.style.display = isVitrine ? '' : 'none';
  if (segP) segP.classList.toggle('active', !isVitrine);
  if (segV) segV.classList.toggle('active', isVitrine);

  /* En vitrine : on retire la colonne de droite pour donner plus d'espace aux produits. */
  const colRight = document.getElementById('pp-col-right');
  const col3 = document.querySelector('.pp-3col');
  if (colRight) colRight.style.display = isVitrine ? 'none' : '';
  if (col3) col3.style.gridTemplateColumns = isVitrine ? 'minmax(230px,270px) minmax(0,1fr)' : '';

  if (isVitrine) {
    history.replaceState(null, '', '#vitrine');
    if (!_vitrineLoaded) { _vitrineLoaded = true; renderVitrine(); }
  } else {
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }
}

/* Suivre / ne plus suivre depuis la carte hi-fi visiteur */
async function pvzToggleFollow() {
  if (!CU) { window.location.href = 'login.html'; return; }
  const btn = document.getElementById('pvz-follow');
  if (btn) btn.disabled = true;
  try {
    const method = profil.isFollowing ? 'DELETE' : 'POST';
    const r = await api(method, `/users/${profil.id}/suivre`);
    profil.isFollowing = !profil.isFollowing;
    if (typeof r.nbAbonnes === 'number') profil.nbAbonnes = r.nbAbonnes;
    renderVisitorProfile();
  } catch(e) { alert(e.message||'Erreur.'); if (btn) btn.disabled = false; }
}

/* Édition rapide des réseaux sociaux depuis la carte hi-fi (titulaire uniquement) */
function pvzEditReseaux() {
  const card = document.querySelector('.pvz-reseaux-body');
  if (!card) return;
  const r = profil.reseaux_sociaux || {};
  const fields = [['site_web','Site web'],['linkedin','LinkedIn'],['instagram','Instagram'],['facebook','Facebook'],['x','X / Twitter'],['youtube','YouTube']];
  card.innerHTML = fields.map(([k,l]) => `
    <div style="margin-bottom:8px;">
      <label style="font-size:11px;font-weight:700;color:#8794A7;text-transform:uppercase;display:block;margin-bottom:3px;">${l}</label>
      <input id="pvz-rs-${k}" value="${esc(r[k]||'')}" placeholder="https://…" style="width:100%;box-sizing:border-box;border:1px solid rgba(18,32,56,.16);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;">
    </div>`).join('')
    + `<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
        <button onclick="renderVisitorProfile()" style="padding:7px 14px;border:1px solid rgba(18,32,56,.16);border-radius:8px;background:none;cursor:pointer;font-size:12.5px;">Annuler</button>

async function pvzSaveReseaux() {
  const fields = ['site_web','linkedin','instagram','facebook','x','youtube'];
  const reseaux = {};
  fields.forEach(k => { const v = document.getElementById('pvz-rs-'+k)?.value.trim(); if (v) reseaux[k] = v; });
  try {
    await api('PUT', '/profil/reseaux-sociaux', { reseaux });
    profil.reseaux_sociaux = reseaux;
    renderVisitorProfile();
  } catch(e) { alert('Erreur : ' + (e.message||'')); }
}

/* Partager le profil (Web Share API + repli presse-papiers) */
function pvzShare() {
  const url = location.origin + location.pathname + '?id=' + profil.id;
  const title = [profil.prenom, profil.nom].filter(Boolean).join(' ') || 'Profil Diaspo\'Actif';
  if (navigator.share) { navigator.share({ title, url }).catch(()=>{}); return; }
  if (navigator.clipboard) { navigator.clipboard.writeText(url).then(()=>alert('Lien copié dans le presse-papiers.')).catch(()=>prompt('Copiez le lien :', url)); }
  else prompt('Copiez le lien :', url);
}

/* Helper : crée un conteneur avec un id donné, appelle un loader qui cible cet id */
function widgetFromLoader(bodyEl, containerId, loaderFn) {
  const c = document.createElement('div');
  c.id = containerId;
  c.innerHTML = '<div class="empty-p" style="padding:12px 0;">Chargement…</div>';
  bodyEl.appendChild(c);
  try { loaderFn(); } catch(e) { console.error('[widget loader '+containerId+']', e); }
}

function initWidgetBoard() {
  const container = document.getElementById('p-board');
  if (!container || !window.WidgetBoard) return;
  const registry = buildWidgetRegistry();
  const def = defaultLayout(profil.role);
  // Layout sauvegardé (profil_json.layout) ou défaut. Filtrer les widgets inconnus.
  let saved = (profil.profil && Array.isArray(profil.profil.layout)) ? profil.profil.layout : null;
  let layout = (saved && saved.length ? saved : def).filter(x => registry[x.id]);
  // Ajouter en fin les widgets par défaut manquants (nouvelles rubriques), masqués
  def.forEach(d => { if (!layout.find(x=>x.id===d.id)) layout.push({ ...d, hidden:true }); });

  _board = window.WidgetBoard.init(container, {
    registry, layout, editable: isOwn,
    defaultLayout: def,
    onSave: (lay) => {
      if (!isOwn) return;
      api('PUT', '/profil', { profil: { layout: lay } }).catch(()=>{});
    }
  });

  if (isOwn) renderBoardToolbar();
}

function renderBoardToolbar() {
  const slot = document.getElementById('wb-toolbar-slot');
  if (!slot) return;
  slot.innerHTML = `<div class="wb-toolbar">
    <button class="wb-tb-btn primary" id="wb-edit-toggle">✏️ Personnaliser</button>

    <button class="wb-tb-btn ghost" id="wb-reset" style="display:none;">↺ Réinitialiser</button>
    <span class="wb-tb-hint" id="wb-hint"></span>
  </div>`;
  const toggle = slot.querySelector('#wb-edit-toggle');
  const addBtn = slot.querySelector('#wb-add');
  const resetBtn = slot.querySelector('#wb-reset');
  const hint = slot.querySelector('#wb-hint');
  toggle.onclick = () => {
    _board.toggleEditMode();
    const on = _board.editMode;
    toggle.textContent = on ? '✓ Terminer' : '✏️ Personnaliser';
    toggle.classList.toggle('primary', !on);
    addBtn.style.display = on ? '' : 'none';
    resetBtn.style.display = on ? '' : 'none';
    hint.textContent = on ? 'Glissez les widgets, changez leur taille, masquez-les. Sauvegarde automatique.' : '';
  };
  addBtn.onclick = () => _board.openLibrary();
  resetBtn.onclick = () => { if (confirm('Réinitialiser la disposition par défaut ?')) _board.reset(); };
}

let _vitrineLoaded = false;

function initVitrineSwitch() {
  const sw = document.getElementById('p-view-switch');
  if (!sw) return;
  if (profil.role !== 'initiative') { sw.style.display = 'none'; return; }
  sw.style.display = 'block';
  const startView = (window.location.hash || '').startsWith('#vitrine') ? 'vitrine' : 'profil';
  switchProfileView(startView);
}

function switchProfileView(view) {
  const board = document.getElementById('p-board');
  const vitrine = document.getElementById('p-vitrine');
  const toolbar = document.getElementById('wb-toolbar-slot');
  const btnProfil = document.getElementById('p-view-btn-profil');
  const btnVitrine = document.getElementById('p-view-btn-vitrine');
  const isVitrine = view === 'vitrine';

  board.style.display = isVitrine ? 'none' : '';
  vitrine.style.display = isVitrine ? '' : 'none';
  if (toolbar) toolbar.style.display = isVitrine ? 'none' : '';
  btnProfil.classList.toggle('active', !isVitrine);
  btnVitrine.classList.toggle('active', isVitrine);

  /* En mode Vitrine : l'espace devient un espace de vente — on masque la bannière du profil
     personnel ; la vitrine affiche sa propre bannière (héro rouge pvt-hero « VOIR NOS PRODUITS »).
     On garde la carte d'identité (photo de profil) visible. */
  const pBanner = document.getElementById('p-banner');
  if (pBanner) pBanner.style.display = isVitrine ? 'none' : '';

  /* En vitrine : on retire la colonne de droite pour donner plus d'espace aux produits. */
  const colRight = document.getElementById('pp-col-right');
  const col3 = document.querySelector('.pp-3col');
  if (colRight) colRight.style.display = isVitrine ? 'none' : '';
  if (col3) col3.style.gridTemplateColumns = isVitrine ? 'minmax(230px,270px) minmax(0,1fr)' : '';

  if (isVitrine) {
    // Préserve un éventuel &pub=<id> pour le lien profond
    const pubMatch = (window.location.hash || '').match(/pub=(\d+)/);
    history.replaceState(null, '', pubMatch ? `#vitrine&pub=${pubMatch[1]}` : '#vitrine');
    if (!_vitrineLoaded) { _vitrineLoaded = true; renderVitrine(); /* renderVitrine appellera renderVitrineCols() une fois _vitrineInit chargé */ }
    else renderVitrineCols();
  } else {
    history.replaceState(null, '', window.location.pathname + window.location.search);
    if (window._ppRenderProfilCols) window._ppRenderProfilCols();
  }
}

async function renderVitrineCols() {
  const left = document.getElementById('pp-col-left');
  const right = document.getElementById('pp-col-right');
  if (!left || !right) return;
  const esc2 = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  left.innerHTML = '<div class="pp-side-card" style="text-align:center;color:var(--muted);font-size:12px;">Chargement…</div>';
  right.innerHTML = '';

  const initId = _vitrineInit ? _vitrineInit.id : null;
  if (!initId) { left.innerHTML = ''; return; }

  let produits = [], avis = null;
  try { const r = await api('GET', `/initiatives/${initId}/produits`); produits = r.produits || []; } catch (e) {}
  try { avis = await api('GET', `/initiatives/${initId}/avis`); } catch (e) {}

  const dispo = produits.filter(p => (p.statut || 'disponible') === 'disponible');
  const prix = dispo.map(p => Number(p.prix)).filter(v => v > 0);
  const prixMin = prix.length ? Math.min(...prix) : null;
  const devise = (dispo.find(p => p.devise)?.devise) || 'EUR';
  const enAvant = dispo.filter(p => p.mis_en_avant).slice(0, 3);
  const topProduits = (enAvant.length ? enAvant : dispo.slice(0, 3));
  const offreFlashTitre = _vitrineInit.vitrine_offre_flash_titre;
  const offreFlashFin = _vitrineInit.vitrine_offre_flash_fin;
  const wa = (_vitrineInit.vitrine_whatsapp || '').replace(/[^0-9+]/g, '').replace('+', '');
  const scrollTo = id => `document.getElementById('${id}')?.scrollIntoView({behavior:'smooth'})`;

  /* ── COLONNE GAUCHE : réassurance + infos utiles ── */
  left.innerHTML = `
    <div class="pp-side-card">
      <h4>🛍️ La boutique en bref</h4>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div style="text-align:center;background:var(--bg);border-radius:8px;padding:9px;"><div style="font-size:18px;font-weight:800;">${dispo.length}</div><div style="font-size:10px;color:var(--muted);">Produits</div></div>
        ${prixMin != null ? `<div style="text-align:center;background:var(--bg);border-radius:8px;padding:9px;"><div style="font-size:18px;font-weight:800;">${prixMin}<span style="font-size:11px;">${esc2(devise)}</span></div><div style="font-size:10px;color:var(--muted);">À partir de</div></div>` : ''}
      </div>
    </div>
    ${avis && avis.moyenne ? `<div class="pp-side-card">
      <h4>⭐ Avis clients</h4>
      <div style="font-size:20px;font-weight:800;color:#f59e0b;">${'★'.repeat(Math.round(avis.moyenne))}${'☆'.repeat(5 - Math.round(avis.moyenne))} <span style="color:var(--text);font-size:15px;">${avis.moyenne}/5</span></div>
      <div style="font-size:12px;color:var(--muted);">Basé sur ${avis.total} avis</div>
    </div>` : ''}
    <div class="pp-side-card">
      <h4>🔒 Acheter en confiance</h4>
      <div class="pp-list-item"><span>💳</span><span style="flex:1;">Paiement 100% sécurisé (Stripe)</span></div>
      <div class="pp-list-item"><span>✅</span><span style="flex:1;">Vendeur vérifié Diaspo'Actif</span></div>
      <div class="pp-list-item"><span>💬</span><span style="flex:1;">Contact direct avec le vendeur</span></div>
    </div>
    ${(_vitrineInit.vitrine_horaires || _vitrineInit.adresse || _vitrineInit.ville) ? `<div class="pp-side-card">
      <h4>📍 Retrait & horaires</h4>
      ${_vitrineInit.vitrine_horaires ? `<div class="pp-list-item"><span>🕒</span><span style="flex:1;white-space:pre-line;">${esc2(_vitrineInit.vitrine_horaires)}</span></div>` : ''}
      ${(_vitrineInit.adresse || _vitrineInit.ville) ? `<div class="pp-list-item"><span>📍</span><span style="flex:1;">${esc2([_vitrineInit.adresse, _vitrineInit.ville, _vitrineInit.pays].filter(Boolean).join(', '))}</span></div>` : ''}
    </div>` : ''}
    <div class="pp-side-card">
      <h4>💬 Une question ?</h4>
      <a class="pp-join-btn" href="messagerie.html?user=${profil.id}">✉️ Contacter le vendeur</a>
      ${wa ? `<a class="pp-join-btn" href="https://wa.me/${wa}" target="_blank">💬 WhatsApp</a>` : ''}
    </div>
  `;

  /* ── COLONNE DROITE : incitation à l'achat ── */
  right.innerHTML = `
    ${offreFlashTitre ? `<div class="pp-side-card" style="border:2px solid #ef4444;background:#fef2f2;">
      <h4 style="color:#ef4444;">🔥 Offre flash</h4>
      <div style="font-weight:700;font-size:13.5px;">${esc2(offreFlashTitre)}</div>
      ${offreFlashFin ? `<div id="pp-flash-timer" style="font-size:12px;color:#ef4444;font-weight:700;margin-top:4px;"></div>` : ''}
      <button class="pp-join-btn" style="background:#ef4444;color:#fff;border-color:#ef4444;margin-top:8px;" onclick="${scrollTo('pv-produits')}">Voir l'offre →</button>
    </div>` : ''}
    ${topProduits.length ? `<div class="pp-side-card">
      <h4>🏆 ${enAvant.length ? 'Mis en avant' : 'À découvrir'}</h4>
      ${topProduits.map(p => {
        const img = (p.photos && p.photos[0]) || p.image_url;
        return `<div class="pp-list-item" style="cursor:pointer;" onclick="${scrollTo('pv-produits')}">
          <div style="width:42px;height:42px;border-radius:8px;overflow:hidden;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;">${img ? `<img src="${esc2(img)}" style="width:100%;height:100%;object-fit:cover;">` : '🛍️'}</div>
          <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc2(p.nom)}</div>${Number(p.prix) > 0 ? `<div style="font-size:12px;color:var(--tp);font-weight:700;">${p.prix} ${esc2(p.devise || devise)}</div>` : '<div style="font-size:11px;color:var(--muted);">Sur devis</div>'}</div>
        </div>`;
      }).join('')}
      <button class="pp-join-btn" style="background:var(--tp);color:#fff;border-color:var(--tp);margin-top:6px;" onclick="${scrollTo('pv-produits')}">🛒 Voir tous les produits</button>
    </div>` : `<div class="pp-side-card"><h4>🛒 Boutique</h4><button class="pp-join-btn" style="background:var(--tp);color:#fff;border-color:var(--tp);" onclick="${scrollTo('pv-produits')}">Découvrir les produits →</button></div>`}
    <div class="pp-side-card">
      <h4>💳 Comment commander</h4>
      <div class="pp-list-item"><span>1️⃣</span><span style="flex:1;">Choisissez un produit</span></div>
      <div class="pp-list-item"><span>2️⃣</span><span style="flex:1;">Cliquez sur « Commander »</span></div>
      <div class="pp-list-item"><span>3️⃣</span><span style="flex:1;">Payez en ligne en toute sécurité</span></div>
    </div>
    ${_vitrineInit.vitrine_objectif_cible ? `<div class="pp-side-card">
      <h4>🎯 Objectif de la boutique</h4>
      <div style="font-size:12.5px;margin-bottom:6px;">${esc2(_vitrineInit.vitrine_objectif_libelle || 'commandes')}</div>
      <div class="pp-gauge"><div id="pp-obj-bar" style="width:0%;"></div></div>
      <div style="font-size:11px;color:var(--muted);">Cible : ${_vitrineInit.vitrine_objectif_cible}</div>
    </div>` : ''}
    <div class="pp-side-card" style="background:linear-gradient(135deg,var(--tp),var(--tp-dark));color:#fff;">
      <h4 style="color:#fff;">📢 Ne ratez rien</h4>
      <p style="font-size:12px;margin:0 0 8px;opacity:.9;">Abonnez-vous pour être averti des nouveautés et promotions.</p>
      <button class="pp-join-btn" style="background:#fff;color:var(--tp);border:none;" onclick="document.getElementById('pvz-subscribe-btn')?.click?.() || (${scrollTo('p-card')})">🔔 S'abonner à la boutique</button>
    </div>
  `;

  /* Compte à rebours offre flash */
  if (offreFlashFin) {
    const timerEl = document.getElementById('pp-flash-timer');
    const tick = () => {
      if (!document.getElementById('pp-flash-timer')) return;
      const diff = new Date(offreFlashFin) - new Date();
      if (diff <= 0) { timerEl.textContent = '⏱ Offre terminée'; return; }
      const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
      timerEl.textContent = `⏱ Se termine dans ${h}h ${m}m ${s}s`;
      setTimeout(tick, 1000);
    };
    tick();
  }
  /* Barre de progression objectif */
  if (_vitrineInit.vitrine_objectif_cible) {
    const bar = document.getElementById('pp-obj-bar');
    if (bar) { const pct = Math.min(100, Math.round((dispo.length / _vitrineInit.vitrine_objectif_cible) * 100)); requestAnimationFrame(() => bar.style.width = pct + '%'); }
  }
}

async function renderVitrine() {
  const el = document.getElementById('p-vitrine');
  el.innerHTML = '<div class="empty-p" style="padding:30px 0;">Chargement de la vitrine…</div>';

  // Récupérer l'initiative liée à ce profil (le propriétaire ou n'importe quel visiteur la consulte)
  let init = null;
  try {
    const all = await api('GET', '/initiatives');
    init = (all.initiatives || []).find(i => Number(i.owner_user_id) === Number(profil.id)) || null;
  } catch (e) { init = null; }

  if (!init) {
    el.innerHTML = `<div class="empty-p" style="padding:40px 0;"><div class="ei">🏪</div>${isOwn ? "Vous n'avez pas encore d'initiative associée pour activer la vitrine." : "Cette initiative n'a pas encore de vitrine."}</div>`;
    return;
  }
  _vitrineInit = init;

  // Vitrine masquée par son propriétaire : invisible aux visiteurs (sauf admin), le propriétaire garde accès complet
  const isAdmin = CU && CU.role === 'administrateur';
  if (init.vitrine_active === 0 && !isOwn && !isAdmin) {
    el.innerHTML = `<div class="empty-p" style="padding:40px 0;"><div class="ei">🔒</div>Cette vitrine n'est pas disponible pour le moment.</div>`;
    return;
  }

  // Vue hi-fi unifiée (propriétaire ET visiteur) — le propriétaire voit la même vitrine
  // restylée que ses visiteurs, avec des contrôles de modification en plus (voir
  // renderVitrineVisitor()). Le code de gestion "ancien style" ci-dessous n'est plus
  // exécuté (conservé tel quel comme référence pour les fonctions qu'il définit).
  renderVitrineVisitor(init);
  renderVitrineCols(); /* colonnes latérales orientées produit/achat (init maintenant chargée) */
  return;

  const banniere = init.vitrine_banniere_url || '';
  const galerie = safeParseJson(init.galerie_json, []);

  el.innerHTML = `

        <span style="font-size:12px;color:var(--muted);">Choisissez la couleur vue par les visiteurs de votre boutique.</span>
      </div>
    </div>
    <div id="vt-publications" style="margin-top:14px;"></div>
    <div class="p-widget" style="margin-top:14px;">

  // QR code pointant vers la vitrine publique

  if (window.renderBoutique) renderBoutique(init, isOwn);

        ${telAny?`📞 ${esc(telAny)}<br>`:''}
        ${init.vitrine_email_pro?`✉️ ${esc(init.vitrine_email_pro)}<br>`:''}

      </div>`;

  const dynBtns = [];
  if (whatsappNum) dynBtns.push(`<a class="pvt-contact-btn" href="https://wa.me/${esc(whatsappNum)}" target="_blank" rel="noopener">🟢 WhatsApp</a>`);
  if (telAnyClean) dynBtns.push(`<a class="pvt-contact-btn" href="tel:${esc(telAnyClean)}">📞 Téléphone</a>`);
  if (init.vitrine_email_pro) dynBtns.push(`<a class="pvt-contact-btn" href="mailto:${esc(init.vitrine_email_pro)}">✉️ Email</a>`);
