<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diaspo'Actif — Offres &amp; Opportunités</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/styles.v2.css">
  <link rel="stylesheet" href="/assets/responsive.v2.css">
<link rel="stylesheet" href="/assets/ui-enhancements.v2.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="assets/logo.svg">
<style>
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.filters select,.filters input{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);}
.offre-card{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.offre-card:hover{border-color:#2563EB;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.type-badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;margin-bottom:8px;}
.type-emploi{background:#f0fdf4;color:#15803d;border:1px solid #86efac;}
.type-stage{background:#eff6ff;color:#1d4ed8;border:1px solid #93c5fd;}
.type-mission{background:#fdf4ff;color:#7e22ce;border:1px solid #d8b4fe;}
.type-partenariat{background:#fff7ed;color:#c2410c;border:1px solid #fdba74;}
.type-incubation{background:#fef9c3;color:#a16207;border:1px solid #fde047;}
.type-autre{background:#f3f4f6;color:#374151;border:1px solid #d1d5db;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.modal-box{background:#fff;border-radius:12px;padding:28px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;position:relative;}
.comp-tag{display:inline-block;padding:3px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--border);font-size:12px;margin:2px;}
.cand-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap;}
.cand-statut{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.s-recu{background:#f3f4f6;color:#6b7280;}
.s-en_etude{background:#dbeafe;color:#1d4ed8;}
.s-entretien{background:#fef9c3;color:#a16207;}
.s-accepte{background:#dcfce7;color:#15803d;}
.s-refuse{background:#fee2e2;color:#dc2626;}
</style>
  <link rel="stylesheet" href="/assets/design-upgrade.v2.css">
  <link rel="stylesheet" href="/assets/theme-manager.css">
</head>
<body>
<div class="page">

<header class="topbar">
  <div class="topbar-inner">
    <div class="logo"><img loading="lazy" class="logo-img" src="assets/logo.svg" alt="Diaspo'Actif"> DIASPO'ACTIF</div>
    <nav class="nav">
      <a href="index.html">Accueil</a>
      <a href="annuaire.html">Annuaire</a>
      <a href="sondages.html">Sondages</a>
      <a href="offres.html" class="active">Offres</a>
    </nav>
    <div class="topbar-right">
      <select class="lang-select" id="lang-select"></select>
      <div id="auth-area" class="auth-area"></div>
    </div>
  </div>
</header>

<div style="max-width:860px;margin:0 auto;padding:30px 16px;">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
    <div>
      <h1 style="margin:0 0 4px;">💼 Offres &amp; Opportunités</h1>
      <p style="margin:0;color:var(--muted);font-size:13px;">Emplois, stages, missions, partenariats et programmes publiés par la communauté Diaspo'Actif.</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button id="btn-mes-cands" class="btn btn-outline" style="display:none;" onclick="voirMesCandidatures()">Mes candidatures</button>
      <button id="btn-mes-offres" class="btn btn-outline" style="display:none;" onclick="voirMesOffres()">Mes offres</button>
      <button id="btn-creer" class="btn btn-orange" style="display:none;" onclick="openCreateModal()">+ Publier une offre</button>
    </div>
  </div>

  <div class="filters">
    <input id="search-q" type="search" placeholder="Rechercher…" oninput="filterOffres()" style="width:200px;">
    <select id="filter-type" onchange="filterOffres()">
      <option value="">Tous les types</option>
      <optgroup label="Recrutement">
        <option value="emploi">Emploi</option>
        <option value="stage">Stage</option>
        <option value="mission">Mission</option>
        <option value="contrat">Contrat</option>
      </optgroup>
      <optgroup label="Opportunités économiques">
        <option value="partenariat">Partenariat</option>
        <option value="investissement">Investissement</option>
        <option value="distribution">Distribution</option>
        <option value="fournisseur">Fournisseur</option>
        <option value="representant">Représentant local</option>
      </optgroup>
      <optgroup label="Accompagnement">
        <option value="incubation">Incubation</option>
        <option value="acceleration">Accélération</option>
        <option value="mentorat">Mentorat</option>
        <option value="coaching">Coaching</option>
      </optgroup>
      <optgroup label="Événements pro">
        <option value="forum_emploi">Forum emploi</option>
        <option value="rencontre_b2b">Rencontre B2B</option>
        <option value="networking">Networking</option>
        <option value="salon">Salon professionnel</option>
      </optgroup>
    </select>
    <select id="filter-pays" onchange="filterOffres()">
      <option value="">Tous pays</option>
    </select>
  </div>

  <div id="offres-list"><div style="color:var(--muted);">Chargement…</div></div>
</div>
</div>

<!-- Modal : Détail offre -->
<div id="modal-offre" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal('modal-offre')">
  <div class="modal-box">
    <button onclick="closeModal('modal-offre')" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);">✕</button>
    <div id="modal-offre-content"></div>
  </div>
</div>

<!-- Modal : Postuler -->
<div id="modal-postuler" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal('modal-postuler')">
  <div class="modal-box" style="max-width:500px;">
    <button onclick="closeModal('modal-postuler')" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);">✕</button>
    <h2 style="margin-top:0;" id="postuler-titre">Postuler</h2>
    <div style="display:grid;gap:10px;">
      <div>
        <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">Message de motivation</label>
        <textarea id="postuler-message" rows="5" placeholder="Présentez votre candidature, vos motivations et votre expérience pertinente…" style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;box-sizing:border-box;resize:vertical;"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button class="btn btn-orange" onclick="submitPostuler()">Envoyer ma candidature</button>
      <button class="btn btn-outline" onclick="closeModal('modal-postuler')">Annuler</button>
    </div>
  </div>
</div>

<!-- Modal : Candidatures reçues -->
<div id="modal-candidatures" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal('modal-candidatures')">
  <div class="modal-box" style="max-width:700px;">
    <button onclick="closeModal('modal-candidatures')" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);">✕</button>
    <div id="modal-candidatures-content"></div>
  </div>
</div>

<!-- Modal : Créer offre -->
<div id="modal-create" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal('modal-create')">
  <div class="modal-box" style="max-width:680px;">
    <button onclick="closeModal('modal-create')" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);">✕</button>
    <h2 style="margin-top:0;">Publier une offre / opportunité</h2>
    <div style="display:grid;gap:10px;">
      <input id="of-titre" placeholder="Titre de l'offre *" style="padding:9px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <select id="of-type" style="flex:1;padding:9px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;">
          <option value="emploi">Emploi</option>
          <option value="stage">Stage</option>
          <option value="mission">Mission</option>
          <option value="contrat">Contrat</option>
          <option value="partenariat">Partenariat</option>
          <option value="investissement">Investissement</option>
          <option value="distribution">Distribution</option>
          <option value="fournisseur">Fournisseur</option>
          <option value="representant">Représentant local</option>
          <option value="incubation">Incubation</option>
          <option value="acceleration">Accélération</option>
          <option value="mentorat">Mentorat</option>
          <option value="coaching">Coaching</option>
          <option value="forum_emploi">Forum emploi</option>
          <option value="rencontre_b2b">Rencontre B2B</option>
          <option value="networking">Networking</option>
          <option value="salon">Salon professionnel</option>
        </select>
        <input id="of-nb-postes" type="number" min="1" value="1" placeholder="Nb postes" style="width:100px;padding:9px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;">
      </div>
      <textarea id="of-desc" rows="5" placeholder="Description de l'offre *" style="padding:9px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;"></textarea>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <input id="of-localisation" placeholder="Ville / localisation" style="flex:1;padding:9px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;">
        <input id="of-pays" placeholder="Pays" style="flex:1;padding:9px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;">
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <input id="of-remuneration" placeholder="Rémunération / budget (optionnel)" style="flex:1;padding:9px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;">
        <input id="of-date-limite" type="date" style="flex:1;padding:9px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;">
      </div>
      <div>
        <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">Compétences requises</label>
        <div id="comps-container" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;"></div>
        <div style="display:flex;gap:6px;">
          <input id="comp-input" placeholder="Ajouter une compétence…" style="flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;" onkeydown="if(event.key==='Enter'){event.preventDefault();addComp();}">
          <button type="button" class="btn btn-outline btn-sm" onclick="addComp()">+</button>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-orange" onclick="submitCreateOffre()">Publier l'offre</button>
      <button class="btn btn-outline" onclick="closeModal('modal-create')">Annuler</button>
    </div>
  </div>
</div>

<!-- Modal : Mes candidatures -->
<div id="modal-mes-cands" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal('modal-mes-cands')">
  <div class="modal-box" style="max-width:640px;">
    <button onclick="closeModal('modal-mes-cands')" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);">✕</button>
    <div id="modal-mes-cands-content"></div>
  </div>
</div>

<!-- Modal : Mes offres publiées -->
<div id="modal-mes-offres" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal('modal-mes-offres')">
  <div class="modal-box" style="max-width:680px;">
    <button onclick="closeModal('modal-mes-offres')" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);">✕</button>
    <div id="modal-mes-offres-content"></div>
  </div>
</div>

<script src="assets/data.js"></script>
<script src="assets/demo.js"></script>
<script src="assets/app.js"></script>
<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){if(!d)return '';try{return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});}catch(e){return d;}}
function closeModal(id){document.getElementById(id).style.display='none';}

const TYPE_LABELS={emploi:'Emploi',stage:'Stage',mission:'Mission',contrat:'Contrat',partenariat:'Partenariat',investissement:'Investissement',distribution:'Distribution',fournisseur:'Fournisseur',representant:'Représentant local',incubation:'Incubation',acceleration:'Accélération',mentorat:'Mentorat',coaching:'Coaching',forum_emploi:'Forum emploi',rencontre_b2b:'Rencontre B2B',networking:'Networking',salon:'Salon pro'};
const TYPE_CSS_MAP={emploi:'type-emploi',stage:'type-stage',mission:'type-mission',contrat:'type-emploi',partenariat:'type-partenariat',investissement:'type-partenariat',distribution:'type-partenariat',fournisseur:'type-partenariat',representant:'type-partenariat',incubation:'type-incubation',acceleration:'type-incubation',mentorat:'type-incubation',coaching:'type-incubation',forum_emploi:'type-stage',rencontre_b2b:'type-stage',networking:'type-stage',salon:'type-stage'};
const CAND_STAT={recu:'Reçue',en_etude:'En étude',entretien:'Entretien',accepte:'Acceptée',refuse:'Non retenue'};

let allOffres=[];
let currentMe=null;
let pendingOffreId=null;
let comps=[];

async function init(){
  await applyAuthState();
  currentMe=await fetchCurrentUser().catch(()=>null);
  if(currentMe){
    document.getElementById('btn-mes-cands').style.display='inline-flex';
    try{
      const r=await api('GET','/accreditations/mes');
      const hasCO=(r.accreditations||[]).some(a=>a.type==='createur_opportunites'&&a.statut==='active');
      if(hasCO){
        document.getElementById('btn-creer').style.display='inline-flex';
        document.getElementById('btn-mes-offres').style.display='inline-flex';
      }
    }catch(e){}
  }
  await loadOffres();
  const params=new URLSearchParams(location.search);
  if(params.get('action')==='creer') openCreateModal();
  if(params.get('id')) openOffre(params.get('id'));
}

async function loadOffres(){
  try{
    const r=await api('GET','/offres');
    allOffres=r.offres||[];
    // Populate pays filter
    const pays=[...new Set(allOffres.map(o=>o.pays).filter(Boolean))].sort();
    const sel=document.getElementById('filter-pays');
    sel.innerHTML='<option value="">Tous pays</option>'+pays.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');
    renderOffres(allOffres);
  }catch(e){document.getElementById('offres-list').innerHTML='<p style="color:var(--muted);">Erreur lors du chargement.</p>';}
}

function filterOffres(){
  const q=document.getElementById('search-q').value.toLowerCase();
  const type=document.getElementById('filter-type').value;
  const pays=document.getElementById('filter-pays').value;
  let list=allOffres;
  if(q) list=list.filter(o=>(o.titre+(o.description||'')).toLowerCase().includes(q));
  if(type) list=list.filter(o=>o.type===type);
  if(pays) list=list.filter(o=>o.pays===pays);
  renderOffres(list);
}

function renderOffres(list){
  const el=document.getElementById('offres-list');
  if(!list.length){el.innerHTML='<p style="color:var(--muted);">Aucune offre trouvée.</p>';return;}
  el.innerHTML=list.map(o=>{
    const comps=typeof o.competences_requises==='string'?JSON.parse(o.competences_requises||'[]'):o.competences_requises||[];
    return `<div class="offre-card" onclick="openOffre(${o.id})">
      <div class="type-badge ${TYPE_CSS_MAP[o.type]||'type-autre'}">${TYPE_LABELS[o.type]||o.type}</div>
      <div style="font-weight:700;font-size:15px;margin-bottom:4px;">${esc(o.titre)}</div>
      ${o.description?`<div style="font-size:13px;color:var(--muted);margin-bottom:8px;">${esc(o.description.slice(0,120))}${o.description.length>120?'…':''}</div>`:''}
      <div style="display:flex;gap:12px;font-size:12px;color:var(--muted);flex-wrap:wrap;margin-bottom:6px;">
        <span>👤 ${esc(o.createur_nom)}</span>
        ${o.localisation||o.pays?`<span>📍 ${esc([o.localisation,o.pays].filter(Boolean).join(', '))}</span>`:''}
        ${o.remuneration?`<span>💰 ${esc(o.remuneration)}</span>`:''}
        ${o.date_limite?`<span>📅 Limite : ${fmtDate(o.date_limite)}</span>`:''}
        <span>📨 ${o.nb_candidatures} candidature${o.nb_candidatures!==1?'s':''}</span>
      </div>
      ${comps.length?`<div>${comps.slice(0,4).map(c=>`<span class="comp-tag">${esc(c)}</span>`).join('')}${comps.length>4?`<span class="comp-tag">+${comps.length-4}</span>`:''}</div>`:''}
    </div>`;
  }).join('');
}

async function openOffre(id){
  const el=document.getElementById('modal-offre-content');
  el.innerHTML='<div style="color:var(--muted);">Chargement…</div>';
  document.getElementById('modal-offre').style.display='flex';
  try{
    const r=await api('GET','/offres/'+id);
    const {offre:o,dejaPostule}=r;
    const comps=o.competences_requises||[];
    const isCreateur=currentMe&&currentMe.id===o.createur_id;
    let html=`<div class="type-badge ${TYPE_CSS_MAP[o.type]||'type-autre'}" style="margin-bottom:10px;">${TYPE_LABELS[o.type]||o.type}</div>
      <h2 style="margin:0 0 6px;">${esc(o.titre)}</h2>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;">
        <span>👤 ${esc(o.createur_nom)}</span>
        ${o.localisation||o.pays?`<span>📍 ${esc([o.localisation,o.pays].filter(Boolean).join(', '))}</span>`:''}
        ${o.remuneration?`<span>💰 ${esc(o.remuneration)}</span>`:''}
        ${o.nb_postes>1?`<span>🪑 ${o.nb_postes} postes</span>`:''}
        ${o.date_limite?`<span>📅 Clôture : ${fmtDate(o.date_limite)}</span>`:''}
      </div>`;
    if(o.description) html+=`<p style="font-size:14px;line-height:1.65;white-space:pre-wrap;">${esc(o.description)}</p>`;
    if(comps.length) html+=`<div style="margin-bottom:16px;"><strong style="font-size:13px;">Compétences requises</strong><br>${comps.map(c=>`<span class="comp-tag">${esc(c)}</span>`).join('')}</div>`;

    if(isCreateur){
      html+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;">
        <button class="btn btn-outline btn-sm" onclick="voirCandidatures(${o.id})">📨 Candidatures (${o.nb_candidatures})</button>
      </div>`;
    } else if(dejaPostule){
      html+=`<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:14px;margin-top:12px;font-size:13px;color:#15803d;">✅ Vous avez déjà postulé à cette offre.</div>`;
    } else if(!currentMe){
      html+=`<div style="background:#fef9c3;border:1.5px solid #fde047;border-radius:8px;padding:12px;font-size:13px;margin-top:12px;">Connectez-vous pour postuler. <a href="login.html">Se connecter</a></div>`;
    } else {
      html+=`<button class="btn btn-orange" style="margin-top:14px;" onclick="openPostuler(${o.id},'${esc(o.titre).replace(/'/g,"\\'")}')">Postuler à cette offre</button>`;
    }
    el.innerHTML=html;
  }catch(e){el.innerHTML='<p style="color:red;">Erreur : '+esc(e.message)+'</p>';}
}

function openPostuler(offreId, titre){
  pendingOffreId=offreId;
  document.getElementById('postuler-titre').textContent='Postuler — '+titre;
  document.getElementById('postuler-message').value='';
  closeModal('modal-offre');
  document.getElementById('modal-postuler').style.display='flex';
}

async function submitPostuler(){
  if(!pendingOffreId)return;
  const message=document.getElementById('postuler-message').value.trim();
  try{
    await api('POST','/offres/'+pendingOffreId+'/postuler',{message});
    closeModal('modal-postuler');
    alert('Candidature envoyée avec succès !');
    loadOffres();
  }catch(e){alert(e.message||'Erreur lors de la candidature.');}
}

async function voirCandidatures(offreId){
  const el=document.getElementById('modal-candidatures-content');
  el.innerHTML='<div style="color:var(--muted);">Chargement…</div>';
  closeModal('modal-offre');
  document.getElementById('modal-candidatures').style.display='flex';
  try{
    const r=await api('GET','/offres/'+offreId+'/candidatures');
    const {candidatures,offre}=r;
    let html=`<h2 style="margin-top:0;">📨 Candidatures — ${esc(offre.titre)}</h2>
      <p style="font-size:13px;color:var(--muted);">${candidatures.length} candidature${candidatures.length!==1?'s':''}</p>`;
    if(!candidatures.length){html+='<p style="color:var(--muted);">Aucune candidature reçue pour l\'instant.</p>';}
    else{
      const STATUTS=['recu','en_etude','entretien','accepte','refuse'];
      const CSS_STAT={recu:'s-recu',en_etude:'s-en_etude',entretien:'s-entretien',accepte:'s-accepte',refuse:'s-refuse'};
      html+=candidatures.map(c=>`<div class="cand-row">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:14px;">${esc(c.candidat_nom)}</div>
          <div style="font-size:12px;color:var(--muted);">${esc([c.candidat_ville,c.candidat_pays].filter(Boolean).join(', '))} — ${fmtDate(c.created_at)}</div>
          ${c.message?`<div style="font-size:13px;margin-top:6px;line-height:1.5;">"${esc(c.message)}"</div>`:''}
        </div>
        <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
          <span class="cand-statut ${CSS_STAT[c.statut]||''}">${CAND_STAT[c.statut]||c.statut}</span>
          <select onchange="majStatutCand(${offreId},${c.id},this.value)" style="font-size:12px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;">
            ${STATUTS.map(s=>`<option value="${s}" ${c.statut===s?'selected':''}>${CAND_STAT[s]}</option>`).join('')}
          </select>
        </div>
      </div>`).join('');
    }
    el.innerHTML=html;
  }catch(e){el.innerHTML='<p style="color:red;">Erreur : '+esc(e.message)+'</p>';}
}

async function majStatutCand(offreId, candId, statut){
  try{
    await api('PATCH','/offres/'+offreId+'/candidatures/'+candId,{statut});
  }catch(e){alert(e.message||'Erreur.');}
}

async function voirMesCandidatures(){
  const el=document.getElementById('modal-mes-cands-content');
  el.innerHTML='<div style="color:var(--muted);">Chargement…</div>';
  document.getElementById('modal-mes-cands').style.display='flex';
  try{
    const r=await api('GET','/mes-candidatures-offres');
    const cands=r.candidatures||[];
    const CSS_STAT={recu:'s-recu',en_etude:'s-en_etude',entretien:'s-entretien',accepte:'s-accepte',refuse:'s-refuse'};
    let html='<h2 style="margin-top:0;">Mes candidatures</h2>';
    if(!cands.length) html+='<p style="color:var(--muted);">Vous n\'avez encore postulé à aucune offre.</p>';
    else html+=cands.map(c=>`<div class="cand-row">
      <div style="flex:1;">
        <div style="font-weight:700;font-size:14px;">${esc(c.offre_titre)}</div>
        <div style="font-size:12px;color:var(--muted);">${TYPE_LABELS[c.offre_type]||c.offre_type} · ${esc(c.createur_nom)} · ${fmtDate(c.created_at)}</div>
        ${c.message?`<div style="font-size:13px;margin-top:4px;color:var(--muted);">"${esc(c.message.slice(0,80))}${c.message.length>80?'…':''}"</div>`:''}
      </div>
      <span class="cand-statut ${CSS_STAT[c.statut]||''}">${CAND_STAT[c.statut]||c.statut}</span>
    </div>`).join('');
    el.innerHTML=html;
  }catch(e){el.innerHTML='<p style="color:red;">'+esc(e.message)+'</p>';}
}

async function voirMesOffres(){
  const el=document.getElementById('modal-mes-offres-content');
  el.innerHTML='<div style="color:var(--muted);">Chargement…</div>';
  document.getElementById('modal-mes-offres').style.display='flex';
  try{
    const r=await api('GET','/mes-offres');
    const offres=r.offres||[];
    let html='<h2 style="margin-top:0;">Mes offres publiées</h2>';
    if(!offres.length) html+='<p style="color:var(--muted);">Vous n\'avez pas encore publié d\'offres.</p>';
    else html+=offres.map(o=>`<div style="padding:12px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div>
          <div style="font-weight:700;">${esc(o.titre)}</div>
          <div style="font-size:12px;color:var(--muted);">${TYPE_LABELS[o.type]||o.type} · ${fmtDate(o.created_at)} · ${o.nb_candidatures} candidature${o.nb_candidatures!==1?'s':''}</div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="voirCandidatures(${o.id})">Candidatures</button>
      </div>
    </div>`).join('');
    el.innerHTML=html;
  }catch(e){el.innerHTML='<p style="color:red;">'+esc(e.message)+'</p>';}
}

/* ──── Création ──── */
function openCreateModal(){
  comps=[];
  document.getElementById('of-titre').value='';
  document.getElementById('of-desc').value='';
  document.getElementById('of-type').value='emploi';
  document.getElementById('of-localisation').value='';
  document.getElementById('of-pays').value='';
  document.getElementById('of-remuneration').value='';
  document.getElementById('of-date-limite').value='';
  document.getElementById('of-nb-postes').value='1';
  document.getElementById('comp-input').value='';
  renderComps();
  document.getElementById('modal-create').style.display='flex';
}

function addComp(){
  const v=document.getElementById('comp-input').value.trim();
  if(v&&!comps.includes(v)){comps.push(v);renderComps();}
  document.getElementById('comp-input').value='';
}

function removeComp(i){comps.splice(i,1);renderComps();}

function renderComps(){
  document.getElementById('comps-container').innerHTML=comps.map((c,i)=>
    `<span class="comp-tag" style="cursor:pointer;" onclick="removeComp(${i})">${esc(c)} ✕</span>`
  ).join('');
}

async function submitCreateOffre(){
  const titre=document.getElementById('of-titre').value.trim();
  if(!titre){alert('Titre requis.');return;}
  try{
    const r=await api('POST','/offres',{
      titre,
      type:document.getElementById('of-type').value,
      description:document.getElementById('of-desc').value.trim()||null,
      competences_requises:comps,
      localisation:document.getElementById('of-localisation').value.trim()||null,
      pays:document.getElementById('of-pays').value.trim()||null,
      remuneration:document.getElementById('of-remuneration').value.trim()||null,
      date_limite:document.getElementById('of-date-limite').value||null,
      nb_postes:parseInt(document.getElementById('of-nb-postes').value)||1
    });
    closeModal('modal-create');
    await loadOffres();
    openOffre(r.id);
  }catch(e){alert(e.message||'Erreur lors de la publication.');}
}

init();
