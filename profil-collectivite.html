<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>Profil Collectivité — Diaspo'Actif</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  body{background:#F3F5F8;}
  .pc-wrap{max-width:1800px;margin:0 auto;padding:20px 32px;}
  .pc-header{position:relative;border-radius:20px;overflow:hidden;color:#fff;margin-bottom:22px;box-shadow:0 14px 40px rgba(14,46,90,.18);background:var(--pc-c1,#0E2E5A);}
  .pc-banner{height:220px;background-size:cover;background-position:center;background-color:var(--pc-c2,#16457E);background-image:linear-gradient(135deg,var(--pc-c1,#0E2E5A),var(--pc-c2,#1E6091),var(--pc-accent,#E8933A)22);position:relative;}
  .pc-banner::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(14,46,90,0) 30%,rgba(9,26,50,.95) 100%);}
  .pc-banner-edit{position:absolute;top:14px;right:14px;z-index:3;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;}
  .pc-id{position:relative;display:flex;gap:18px;align-items:flex-end;padding:0 26px 22px;margin-top:-56px;flex-wrap:wrap;z-index:2;background:linear-gradient(180deg,rgba(9,26,50,.95),var(--pc-c1,#0E2E5A));}
  .pc-logo-wrap{position:relative;width:100px;height:100px;flex-shrink:0;}
  .pc-logo{width:100px;height:100px;border-radius:20px;background:#fff;object-fit:cover;border:4px solid #fff;box-shadow:0 10px 26px rgba(0,0,0,.3);display:block;}
  .pc-logo-edit{position:absolute;inset:0;border-radius:20px;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s,background .15s;color:#fff;font-size:22px;}
  .pc-logo-wrap:hover .pc-logo-edit{opacity:1;background:rgba(0,0,0,.45);}
  .pc-id-info{flex:1;min-width:220px;padding-bottom:4px;}
  .pc-id-info h1{margin:0;font-size:27px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.35);}
  .pc-id-meta{font-size:13px;opacity:.92;margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .pc-badge{background:rgba(255,255,255,.2);backdrop-filter:blur(4px);padding:3px 12px;border-radius:99px;font-size:11px;font-weight:700;}
  .pc-badge.pc-badge-verified{background:#16A34A;}
  .pc-badge.pc-badge-warm{background:linear-gradient(135deg,var(--pc-accent,#E8933A),var(--pc-accent-dark,#DB6B1F));}
  .pc-actions{position:relative;display:flex;gap:10px;padding:16px 26px 22px;flex-wrap:wrap;background:linear-gradient(180deg,rgba(9,26,50,.88),var(--pc-c1,#0E2E5A));z-index:2;}
  .pc-btn{border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:transform .15s,box-shadow .15s;}
  .pc-btn:hover{transform:translateY(-1px);}
  .pc-btn-primary{background:linear-gradient(135deg,var(--pc-accent-light,#F9A94A),var(--pc-accent,#E8703A));color:#fff;box-shadow:0 6px 16px rgba(232,112,58,.35);}
  .pc-btn-outline{background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.4);}
  .pc-grid{display:grid;grid-template-columns:320px 1fr 360px;gap:24px;align-items:start;}
  @media (max-width:1400px){.pc-grid{grid-template-columns:280px 1fr 320px;}}
  @media (max-width:980px){.pc-grid{grid-template-columns:1fr;}.pc-col-left,.pc-col-right{position:static!important;}}
  .pc-col-left,.pc-col-right{position:sticky;top:20px;display:flex;flex-direction:column;gap:16px;}
  .pc-col-center{display:flex;flex-direction:column;gap:16px;min-width:0;}
  .pc-card{background:var(--card,#fff);border:1px solid var(--border,#eef0f4);border-radius:18px;padding:20px;box-shadow:0 3px 14px rgba(20,30,60,.05);transition:box-shadow .2s,transform .2s;}
  .pc-card:hover{box-shadow:0 8px 24px rgba(20,30,60,.09);}
  .pc-card h3{margin:0 0 14px;font-size:13.5px;font-weight:800;letter-spacing:.2px;text-transform:uppercase;color:var(--pc-c1,#0E2E5A);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
  .pc-card h3 .pc-h3-lbl{display:flex;align-items:center;gap:9px;}
  .pc-h3-icon{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--pc-c2,#16457E),var(--pc-c1,#0E2E5A));display:inline-flex;align-items:center;justify-content:center;font-size:14.5px;flex-shrink:0;box-shadow:0 3px 8px rgba(14,46,90,.25);}
  .pc-stat-row{display:flex;align-items:center;gap:10px;font-size:13.5px;padding:9px 0;border-bottom:1px dashed var(--border,#eef0f4);}
  .pc-stat-row:last-child{border-bottom:none;}
  .pc-stat-row .pc-stat-icon{width:26px;height:26px;border-radius:8px;background:#EFF6FF;color:var(--pc-c2,#16457E);display:inline-flex;align-items:center;justify-content:center;font-size:12.5px;flex-shrink:0;}
  .pc-stat-row span{flex:1;color:#4b5568;}
  .pc-stat-row strong{font-size:15.5px;font-weight:800;color:var(--pc-c1,#0E2E5A);}
  .pc-feed-card{background:var(--card,#fff);border:1px solid var(--border,#eef0f4);border-radius:16px;padding:16px 18px;box-shadow:0 2px 10px rgba(20,30,60,.04);display:flex;gap:12px;}
  .pc-feed-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--pc-c2,#16457E),var(--pc-accent,#E8933A));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;}
  .pc-post{font-size:13.5px;flex:1;}
  .pc-post-date{font-size:11px;color:var(--muted,#888);margin-bottom:4px;}
  .pc-appel-card{background:linear-gradient(135deg,#FFF7ED,#FFEEDB);border:1.5px solid #F9D9A8;border-radius:16px;padding:16px 18px;}
  .pc-appel-card .pc-post-date{color:#B45309;}
  .pc-evt{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border,#f1f2f5);font-size:12.5px;}
  .pc-evt:last-child{border-bottom:none;}
  .pc-evt-date{background:#EFF6FF;color:#1e40af;border-radius:8px;padding:4px 8px;font-weight:700;font-size:10.5px;white-space:nowrap;height:fit-content;}
  .pc-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .pc-gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .pc-gallery img:hover{transform:scale(1.04);box-shadow:0 8px 20px rgba(0,0,0,.18);}
  .pc-proj{padding:11px 0;border-bottom:1px solid var(--border,#f1f2f5);font-size:12.5px;}
  .pc-proj:last-child{border-bottom:none;}
  .pc-proj-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-bottom:4px;}
  .pc-proj-badge.cours{background:#FEF3C7;color:#92400E;}
  .pc-proj-badge.fait{background:#DCFCE7;color:#166534;}
  .pc-doc{display:flex;align-items:center;gap:9px;padding:9px 4px;font-size:13px;border-radius:10px;transition:background .15s;}
  .pc-doc:hover{background:#F6F8FC;}
  .pc-doc a{color:var(--pc-c1,#0E2E5A);font-weight:600;text-decoration:none;}
  .pc-doc a:hover{text-decoration:underline;}
  .pc-doc .pc-doc-icon{width:28px;height:28px;border-radius:8px;background:#FEF3E2;color:#B45309;display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
  .pc-empty{color:var(--muted,#888);font-size:13px;}
  .pc-mini-btn{padding:3px 10px;font-size:11px;color:var(--pc-c2,#16457E);background:#EFF6FF;border:none;border-radius:8px;cursor:pointer;font-weight:700;}
  .pc-post-wrap{position:relative;}
  .pc-more-link{display:inline-block;margin:-6px 0 4px 4px;font-size:12px;font-weight:700;color:var(--pc-accent,#E8703A);text-decoration:none;}
  .pc-more-link:hover{text-decoration:underline;}
  .pc-theme-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
  .pc-theme-swatch.active{border-color:#111;box-shadow:0 0 0 2px #fff,0 0 0 4px currentColor;}
</style>
</head>
<body>

<div id="topbar-slot"></div>

<div class="pc-wrap" id="pc-wrap">
  <div class="pc-card"><div class="pc-empty">Chargement du profil…</div></div>
</div>

<script src="assets/data.js"></script>
<script src="assets/demo.js"></script>
<script src="assets/app.js"></script>
<script src="assets/back-to-dashboard.js"></script>
<script src="assets/galerie-lightbox.js"></script>
<script src="assets/posts.js"></script>
<script>
/* 7 thèmes de couleurs pour le profil public Collectivité */
const PC_THEMES = {
  navy:   { c1:'#0E2E5A', c2:'#16457E', accent:'#E8933A', accentDark:'#DB6B1F', accentLight:'#F9A94A', label:'Navy' },
  ocean:  { c1:'#0D47A1', c2:'#1976D2', accent:'#00ACC1', accentDark:'#00838F', accentLight:'#4DD0E1', label:'Océan' },
  foret:  { c1:'#1B5E20', c2:'#388E3C', accent:'#F9A825', accentDark:'#E65100', accentLight:'#FFCA28', label:'Forêt' },
  soleil: { c1:'#BF360C', c2:'#E64A19', accent:'#FFB300', accentDark:'#E65100', accentLight:'#FFD54F', label:'Soleil' },
  violet: { c1:'#4A148C', c2:'#7B1FA2', accent:'#EC407A', accentDark:'#AD1457', accentLight:'#F48FB1', label:'Violet' },
  terre:  { c1:'#3E2723', c2:'#6D4C41', accent:'#D4A017', accentDark:'#A16E00', accentLight:'#F0C24B', label:'Terre' },
  emeraude:{ c1:'#004D40', c2:'#00796B', accent:'#FFB300', accentDark:'#E65100', accentLight:'#FFD54F', label:'Émeraude' },
};
function applyPcTheme(name) {
  const t = PC_THEMES[name] || PC_THEMES.navy;
  const s = document.documentElement.style;
  s.setProperty('--pc-c1', t.c1); s.setProperty('--pc-c2', t.c2);
  s.setProperty('--pc-accent', t.accent); s.setProperty('--pc-accent-dark', t.accentDark); s.setProperty('--pc-accent-light', t.accentLight);
}

(async function () {
  const id = new URLSearchParams(location.search).get('id');
  const wrap = document.getElementById('pc-wrap');
  if (!id) { wrap.innerHTML = '<div class="pc-card">Profil introuvable.</div>'; return; }

  const CU = await fetchCurrentUser().catch(() => null);
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  if (window.Posts) Posts.init(CU ? CU.id : null);

  let profil;
  try {
    const r = await api('GET', `/collectivites/${id}/profil-public`);
    profil = r.profil;
  } catch (e) {
    wrap.innerHTML = `<div class="pc-card">Profil introuvable ou erreur : ${esc(e.message)}</div>`;
    return;
  }

  applyPcTheme(profil.theme_couleur);
  const TYPE_LABEL = { region:'Région', district:'District', departement:'Département', prefecture:'Préfecture', commune:'Commune', consulat:'Consulat', institution:'Institution', ambassade:'Ambassade', ministere:'Ministère' };
  const typeLabel = TYPE_LABEL[(profil.type_organisme||'').toLowerCase()] || profil.type_organisme || 'Collectivité';
  const territoire = [profil.ville, profil.departement, profil.region, profil.pays].filter(Boolean).join(', ');

  wrap.innerHTML = `
    <div class="pc-header">
      <div class="pc-banner" style="${profil.banner_url ? `background-image:url('${esc(profil.banner_url)}'),linear-gradient(135deg,var(--pc-c1,#0E2E5A),#1E6091)` : ''}">
        ${profil.is_owner ? `<button class="pc-banner-edit" id="pc-btn-banner">🖼️ Changer la bannière</button><input type="file" id="pc-banner-input" accept="image/*" style="display:none;">` : ''}
      </div>
      <div class="pc-id">
        <div class="pc-logo-wrap">
          ${profil.logo_url ? `<img class="pc-logo" id="pc-logo-img" src="${esc(profil.logo_url)}" alt="">` : `<div class="pc-logo" id="pc-logo-img" style="display:flex;align-items:center;justify-content:center;font-size:38px;">🏛️</div>`}
          ${profil.is_owner ? `<label class="pc-logo-edit" for="pc-logo-input" title="Changer la photo de profil">📷<input type="file" id="pc-logo-input" accept="image/*" style="display:none;"></label>` : ''}
        </div>
        <div class="pc-id-info">
          <h1>${esc(profil.nom)}</h1>
          <div class="pc-id-meta">
            <span class="pc-badge pc-badge-warm">${esc(typeLabel)}</span>
            ${profil.is_verified ? '<span class="pc-badge pc-badge-verified">✅ Vérifiée</span>' : ''}
            ${territoire ? `<span>📍 ${esc(territoire)}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="pc-actions">
        ${profil.is_owner ? `<button class="pc-btn pc-btn-outline" id="pc-btn-edit">✏️ Modifier mon profil</button>` : `<button class="pc-btn pc-btn-primary" id="pc-btn-abonner">${profil.abonne ? '✅ Abonné' : '🔔 S\'abonner'}</button>`}
        ${profil.site_web ? `<a class="pc-btn pc-btn-outline" href="${esc(profil.site_web)}" target="_blank" rel="noopener">🌐 Site officiel</a>` : ''}
        ${CU && CU.id !== profil.id ? `<a class="pc-btn pc-btn-outline" href="messagerie.html?user=${profil.id}">✉️ Contacter</a>` : ''}
        ${profil.is_owner ? `
          <div style="display:flex;align-items:center;gap:6px;margin-left:auto;">
            <span style="font-size:11px;color:rgba(255,255,255,.7);">🎨 Thème</span>
            ${Object.entries(PC_THEMES).map(([key,t]) => `<button class="pc-theme-swatch${(profil.theme_couleur||'navy')===key?' active':''}" data-theme="${key}" title="${t.label}" style="background:linear-gradient(135deg,${t.c1},${t.c2});color:${t.c1};"></button>`).join('')}
          </div>` : ''}
      </div>
    </div>

    <div class="pc-grid">

      <!-- ══ COLONNE GAUCHE — identité (statique) ══ -->
      <div class="pc-col-left">
        <div class="pc-card">
          <h3><span class="pc-h3-lbl"><span class="pc-h3-icon">📊</span>Statistiques publiques</span></h3>
          <div class="pc-stat-row"><span class="pc-stat-icon">👥</span><span>Abonnés</span><strong>${profil.stats.abonnes}</strong></div>
          <div class="pc-stat-row"><span class="pc-stat-icon">📰</span><span>Publications</span><strong>${profil.stats.publications}</strong></div>
          <div class="pc-stat-row"><span class="pc-stat-icon">📅</span><span>Événements organisés</span><strong>${profil.stats.evenements}</strong></div>
        </div>

        ${(!profil.is_owner && profil.abonne) ? `
        <div class="pc-card">
          <h3><span class="pc-h3-lbl"><span class="pc-h3-icon">🔔</span>Mes préférences</span></h3>
          <select id="pc-prefs-select" class="input-field" style="width:100%;padding:9px 10px;border-radius:10px;border:1px solid var(--border,#e5e7eb);font-size:13px;">
            <option value="toutes" ${profil.prefs==='toutes'?'selected':''}>Toutes les notifications</option>
            <option value="annonces" ${profil.prefs==='annonces'?'selected':''}>Annonces importantes</option>
            <option value="evenements" ${profil.prefs==='evenements'?'selected':''}>Événements</option>
            <option value="opportunites" ${profil.prefs==='opportunites'?'selected':''}>Opportunités</option>
          </select>
        </div>` : ''}

        <div class="pc-card">
          <h3><span class="pc-h3-lbl"><span class="pc-h3-icon">📝</span>Présentation</span></h3>
          ${profil.bio ? `<div style="font-size:13.5px;white-space:pre-line;line-height:1.65;color:#3a4358;">${esc(profil.bio)}</div>` : '<div class="pc-empty">Aucune présentation renseignée.</div>'}
        </div>

        ${(profil.nom_responsable || profil.presentation_gouvernance) ? `
        <div class="pc-card">
          <h3><span class="pc-h3-lbl"><span class="pc-h3-icon">🏛️</span>Gouvernance</span></h3>
          ${profil.nom_responsable ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><span style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--pc-c2,#16457E),var(--pc-accent,#E8933A));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;">${esc((profil.prenom_responsable||profil.nom_responsable||'?').charAt(0).toUpperCase())}</span><div><strong style="font-size:13.5px;">${esc([profil.prenom_responsable, profil.nom_responsable].filter(Boolean).join(' '))}</strong><br><span style="color:var(--muted,#888);font-size:12px;">${esc(profil.fonction_responsable || 'Responsable')}</span></div></div>` : ''}
          ${profil.presentation_gouvernance ? `<div style="font-size:13px;white-space:pre-line;color:#3a4358;">${esc(profil.presentation_gouvernance)}</div>` : ''}
        </div>` : ''}

        ${Object.keys(profil.reseaux_sociaux || {}).length ? `
        <div class="pc-card">
          <h3><span class="pc-h3-lbl"><span class="pc-h3-icon">🔗</span>Réseaux sociaux</span></h3>
          ${Object.entries(profil.reseaux_sociaux).filter(([,v]) => v).map(([k,v]) => `<a href="${esc(v)}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:9px;padding:8px 4px;border-radius:10px;font-size:13px;font-weight:600;color:var(--pc-c1,#0E2E5A);text-decoration:none;transition:background .15s;" onmouseover="this.style.background='#F6F8FC'" onmouseout="this.style.background='transparent'"><span style="width:26px;height:26px;border-radius:8px;background:#EFF6FF;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">🔗</span>${esc(k)}</a>`).join('')}
        </div>` : ''}

        ${(profil.documents.length || profil.is_owner) ? `
        <div class="pc-card">
          <h3><span class="pc-h3-lbl"><span class="pc-h3-icon">📄</span>Documents</span>${profil.is_owner ? `<button class="pc-mini-btn" id="pc-btn-add-doc">+ Ajouter</button>` : ''}</h3>
          <div id="pc-docs-list">${profil.documents.map(d => `<div class="pc-doc"><span class="pc-doc-icon">📎</span><a href="${esc(d.url)}" target="_blank" rel="noopener">${esc(d.nom || 'Document')}</a></div>`).join('') || '<div class="pc-empty">Aucun document.</div>'}</div>
        </div>` : ''}
      </div>

      <!-- ══ COLONNE CENTRE — fil (actualités, appels à projets) ══ -->
      <div class="pc-col-center">
        <div class="pc-appel-card" id="pc-appels-card" style="display:none;">
          <h3 style="margin:0 0 10px;">📢 Appels à projets & recherche de partenariats</h3>
          <div id="pc-appels"></div>
        </div>

        <div id="pc-actualites">
          <div class="pc-feed-card"><div class="pc-post pc-empty">Chargement des actualités…</div></div>
        </div>
      </div>

      <!-- ══ COLONNE DROITE — projets & galerie (statique) ══ -->
      <div class="pc-col-right">
        ${(profil.projets_en_cours.length || profil.is_owner) ? `
        <div class="pc-card">
          <h3>🚧 Projets en cours ${profil.is_owner ? `<button class="pc-mini-btn" id="pc-btn-add-projet">+ Ajouter</button>` : ''}</h3>
          <div id="pc-projets-list">${profil.projets_en_cours.map(p => `<div class="pc-proj"><span class="pc-proj-badge cours">En cours</span><br><strong>${esc(p.titre)}</strong>${p.description ? `<div style="margin-top:3px;color:var(--muted,#666);">${esc(p.description)}</div>` : ''}</div>`).join('') || '<div class="pc-empty">Aucun projet en cours.</div>'}</div>
        </div>` : ''}

        ${(profil.realisations.length || profil.is_owner) ? `
        <div class="pc-card">
          <h3>🏆 Projets réalisés ${profil.is_owner ? `<button class="pc-mini-btn" id="pc-btn-add-realisation">+ Ajouter</button>` : ''}</h3>
          <div id="pc-realisations-list">${profil.realisations.map(p => `<div class="pc-proj"><span class="pc-proj-badge fait">Réalisé</span><br><strong>${esc(p.titre)}</strong>${p.description ? `<div style="margin-top:3px;color:var(--muted,#666);">${esc(p.description)}</div>` : ''}</div>`).join('') || '<div class="pc-empty">Aucun projet réalisé archivé.</div>'}</div>
        </div>` : ''}

        ${profil.galerie.length ? `
        <div class="pc-card">
          <h3>🖼️ Galerie <span style="font-weight:400;font-size:11px;color:var(--muted,#999);">${profil.galerie.length} photo${profil.galerie.length>1?'s':''}</span></h3>
          <div class="pc-gallery">
            ${profil.galerie.map((img, idx) => `<img src="${esc(img.url)}" alt="${esc(img.titre||'')}" title="${esc(img.titre||'')}" onclick='openGaleriePhoto("user", ${profil.id}, ${JSON.stringify(img.id || ('p'+idx))}, ${JSON.stringify(img.url||'')}, ${JSON.stringify(img.titre||'')}, ${JSON.stringify(img.caption||'')})'>`).join('')}
          </div>
        </div>` : ''}

        <div class="pc-card">
          <h3>📅 Agenda territorial</h3>
          <div id="pc-agenda"><div class="pc-empty">Chargement…</div></div>
        </div>
      </div>
    </div>
  `;

  // Actualités (fil central) — cartes complètes : photos multiples, réactions, commentaires, republier
  try {
    const r = await api('GET', `/collectivites/${id}/actualites`);
    const posts = r.posts || [];
    document.getElementById('pc-actualites').innerHTML = posts.length
      ? posts.map(p => `
        <div class="pc-post-wrap">
          ${Posts.renderPostCard(p, { currentUserId: CU ? CU.id : null })}
          <a class="pc-more-link" href="fil-actualite.html#fp-${p.id}">En savoir plus →</a>
        </div>`).join('')
      : `<div class="pc-card"><div class="pc-empty">Aucune actualité publiée pour le moment.</div></div>`;
  } catch (e) { document.getElementById('pc-actualites').innerHTML = `<div class="pc-card"><div class="pc-empty">Indisponible.</div></div>`; }

  // Agenda
  try {
    const r = await api('GET', `/collectivites/${id}/agenda`);
    const events = r.events || [];
    document.getElementById('pc-agenda').innerHTML = events.length
      ? events.map(e => `<div class="pc-evt"><div class="pc-evt-date">${e.date_evt ? new Date(e.date_evt).toLocaleDateString('fr-FR') : '—'}</div><div><strong>${esc(e.titre)}</strong>${e.lieu ? `<div style="color:var(--muted,#888);">📍 ${esc(e.lieu)}</div>` : ''}</div></div>`).join('')
      : '<div class="pc-empty">Aucun événement à venir.</div>';
  } catch (e) { document.getElementById('pc-agenda').innerHTML = '<div class="pc-empty">Indisponible.</div>'; }

  // Appels à projets & recherche de partenariats
  let appelsData = [];
  try {
    const r = await api('GET', `/collectivites/${id}/appels-projets`);
    appelsData = r.posts || [];
    if (appelsData.length) {
      document.getElementById('pc-appels-card').style.display = '';
      document.getElementById('pc-appels').innerHTML = appelsData.map(p => Posts.renderPostCard(p, { currentUserId: CU ? CU.id : null })).join('');
    }
  } catch (e) { /* section masquée si indisponible */ }

  if (profil.galerie.length && typeof loadGaleriePhotoCounts === 'function') loadGaleriePhotoCounts('user', profil.id);

  // Abonnement
  const btnAbo = document.getElementById('pc-btn-abonner');
  if (btnAbo) btnAbo.addEventListener('click', async () => {
    if (!CU) { location.href = 'login.html?r=' + encodeURIComponent(location.pathname + location.search); return; }
    btnAbo.disabled = true;
    try {
      const r = await api('POST', `/collectivites/${id}/abonnement`);
      if (r.abonne) { location.reload(); return; }
      btnAbo.textContent = "🔔 S'abonner";
    } catch (e) { alert('Erreur : ' + e.message); }
    finally { btnAbo.disabled = false; }
  });

  // Préférences de notification
  const prefsSelect = document.getElementById('pc-prefs-select');
  if (prefsSelect) prefsSelect.addEventListener('change', async () => {
    try { await api('PUT', `/collectivites/${id}/abonnement/prefs`, { prefs: prefsSelect.value }); }
    catch (e) { alert('Erreur : ' + e.message); }
  });

  // Édition (propriétaire uniquement)
  if (profil.is_owner) {
    document.querySelectorAll('.pc-theme-swatch').forEach(sw => {
      sw.addEventListener('click', async () => {
        const theme = sw.dataset.theme;
        applyPcTheme(theme);
        document.querySelectorAll('.pc-theme-swatch').forEach(s => s.classList.toggle('active', s === sw));
        try { await api('PUT', '/profil', { theme_couleur: theme }); } catch (e) { /* thème reste appliqué localement */ }
      });
    });
    // Photo de profil : cliquer sur l'avatar → upload direct + ajustement (recadrage centré objet)
    const logoInput = document.getElementById('pc-logo-input');
    if (logoInput) logoInput.addEventListener('change', async () => {
      const file = logoInput.files[0]; if (!file) return;
      const fd = new FormData(); fd.append('logo', file);
      try {
        const up = await fetch('/api/upload/logo', { method: 'POST', body: fd, credentials: 'include' }).then(r => r.json());
        if (up.error) throw new Error(up.error);
        await api('PUT', '/profil', { logo_url: up.url });
        location.reload();
      } catch (e) { alert('Erreur upload : ' + e.message); }
    });

    const bannerInput = document.getElementById('pc-banner-input');
    const btnBanner = document.getElementById('pc-btn-banner');
    if (btnBanner) btnBanner.addEventListener('click', () => bannerInput.click());
    if (bannerInput) bannerInput.addEventListener('change', async () => {
      const file = bannerInput.files[0]; if (!file) return;
      const fd = new FormData(); fd.append('banner', file);
      try {
        const up = await fetch('/api/upload/banner', { method: 'POST', body: fd, credentials: 'include' }).then(r => r.json());
        if (up.error) throw new Error(up.error);
        location.reload();
      } catch (e) { alert('Erreur upload : ' + e.message); }
    });

    const btnEdit = document.getElementById('pc-btn-edit');
    if (btnEdit) btnEdit.addEventListener('click', async () => {
      const logo_url = prompt("URL du logo :", profil.logo_url || '');
      if (logo_url === null) return;
      const site_local = prompt("Site web officiel :", profil.site_web || '');
      if (site_local === null) return;
      const bio = prompt("Présentation du territoire :", profil.bio || '');
      if (bio === null) return;
      const presentation_gouvernance = prompt("Présentation de la gouvernance :", profil.presentation_gouvernance || '');
      if (presentation_gouvernance === null) return;
      const facebook = prompt("Lien Facebook (optionnel) :", (profil.reseaux_sociaux||{}).facebook || '') || '';
      const linkedin = prompt("Lien LinkedIn (optionnel) :", (profil.reseaux_sociaux||{}).linkedin || '') || '';
      try {
        await api('PUT', '/profil', { logo_url, site_local, bio, presentation_gouvernance, reseaux_sociaux_officiels: { facebook, linkedin } });
        location.reload();
      } catch (e) { alert('Erreur : ' + e.message); }
    });

    const btnDoc = document.getElementById('pc-btn-add-doc');
    if (btnDoc) btnDoc.addEventListener('click', async () => {
      const nom = prompt("Nom du document :"); if (!nom) return;
      const url = prompt("URL du document :"); if (!url) return;
      const docs = [...profil.documents, { nom, url }];
      try { await api('PUT', '/profil', { documents_publics: docs }); location.reload(); } catch (e) { alert('Erreur : ' + e.message); }
    });

    const btnProjet = document.getElementById('pc-btn-add-projet');
    if (btnProjet) btnProjet.addEventListener('click', async () => {
      const titre = prompt("Titre du projet en cours :"); if (!titre) return;
      const description = prompt("Description (optionnel) :") || '';
      const list = [...profil.projets_en_cours, { titre, description }];
      try { await api('PUT', '/profil', { projets_en_cours: list }); location.reload(); } catch (e) { alert('Erreur : ' + e.message); }
    });

    const btnReal = document.getElementById('pc-btn-add-realisation');
    if (btnReal) btnReal.addEventListener('click', async () => {
      const titre = prompt("Titre du projet réalisé :"); if (!titre) return;
      const description = prompt("Description (optionnel) :") || '';
      const list = [...profil.realisations, { titre, description }];
      try { await api('PUT', '/profil', { realisations: list }); location.reload(); } catch (e) { alert('Erreur : ' + e.message); }
    });
  }

  /* ── Assistant IA d'information territoriale ── agent d'information, pas de décision.
     Répond uniquement depuis les données du profil déjà chargées par la page (règles
     par mots-clés, aucun LLM, aucun appel backend supplémentaire). */
  const agendaEvents = (await api('GET', `/collectivites/${id}/agenda`).catch(() => ({events:[]}))).events || [];
  const fab = document.createElement('button');
  fab.textContent = '🤖';
  fab.title = `Poser une question à ${profil.nom}`;
  fab.style.cssText = 'position:fixed;bottom:22px;right:22px;width:52px;height:52px;border-radius:50%;background:#16457E;color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:999;';
  document.body.appendChild(fab);

  const panel = document.createElement('div');
  panel.style.cssText = 'position:fixed;bottom:84px;right:22px;width:320px;max-height:420px;background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.25);display:none;flex-direction:column;overflow:hidden;z-index:999;';
  panel.innerHTML = `
    <div style="background:#16457E;color:#fff;padding:12px 14px;font-weight:700;font-size:13px;">🤖 Assistant ${esc(profil.nom)}</div>
    <div id="pc-ia-msgs" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;font-size:13px;max-height:280px;"></div>
    <div style="display:flex;gap:6px;padding:10px;border-top:1px solid #eee;">
      <input id="pc-ia-input" placeholder="Votre question…" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid #ddd;font-size:13px;">
      <button id="pc-ia-send" style="background:#16457E;color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;">➤</button>
    </div>`;
  document.body.appendChild(panel);
  fab.addEventListener('click', () => { panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex'; });

  const msgsEl = panel.querySelector('#pc-ia-msgs');
  function addMsg(text, fromBot) {
    const b = document.createElement('div');
    b.style.cssText = fromBot ? 'align-self:flex-start;background:#EFF6FF;color:#1e3a5f;padding:8px 10px;border-radius:10px;max-width:85%;' : 'align-self:flex-end;background:#16457E;color:#fff;padding:8px 10px;border-radius:10px;max-width:85%;';
    b.textContent = text;
    msgsEl.appendChild(b);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  addMsg(`Bonjour, je peux répondre à vos questions sur ${profil.nom} : présentation du territoire, projets, événements, informations pratiques.`, true);

  const suggestions = ['Présentez-vous', 'Quels sont vos projets en cours ?', 'Quels sont les prochains événements ?', 'Comment vous contacter ?'];
  const sugEl = document.createElement('div');
  sugEl.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;align-self:flex-start;';
  sugEl.innerHTML = suggestions.map(s => `<button class="pc-ia-suggestion" style="background:#fff;border:1.5px solid #BFDBFE;color:#1e40af;border-radius:99px;padding:5px 11px;font-size:11.5px;cursor:pointer;">${esc(s)}</button>`).join('');
  msgsEl.appendChild(sugEl);
  sugEl.querySelectorAll('.pc-ia-suggestion').forEach(btn => {
    btn.addEventListener('click', () => {
      sugEl.remove();
      const q = btn.textContent;
      addMsg(q, false);
      setTimeout(() => addMsg(answerIA(q), true), 200);
    });
  });

  function answerIA(q) {
    const t = q.toLowerCase();
    if (/pr[ée]sent|qui[ -]?êtes|territoire|histoire/.test(t)) return profil.bio || "Aucune présentation du territoire n'est encore renseignée.";
    if (/gouvernance|responsable|maire|pr[ée]sident/.test(t)) {
      if (!profil.nom_responsable) return "Aucune information de gouvernance renseignée.";
      return `${[profil.prenom_responsable, profil.nom_responsable].filter(Boolean).join(' ')} — ${profil.fonction_responsable || 'Responsable'}.${profil.presentation_gouvernance ? ' ' + profil.presentation_gouvernance : ''}`;
    }
    if (/projet.*cours|en cours/.test(t)) return profil.projets_en_cours.length ? profil.projets_en_cours.map(p => `• ${p.titre}`).join('\n') : "Aucun projet en cours n'est publié pour le moment.";
    if (/r[ée]alis|termin[ée]|historique/.test(t)) return profil.realisations.length ? profil.realisations.map(p => `• ${p.titre}`).join('\n') : "Aucun projet réalisé n'est publié pour le moment.";
    if (/[ée]v[ée]nement|agenda|rencontre|forum/.test(t)) return agendaEvents.length ? agendaEvents.map(e => `• ${e.titre} — ${e.date_evt ? new Date(e.date_evt).toLocaleDateString('fr-FR') : ''}${e.lieu ? ' (' + e.lieu + ')' : ''}`).join('\n') : "Aucun événement à venir n'est actuellement publié.";
    if (/appel.*projet|partenariat|opportunit[ée]/.test(t)) return appelsData.length ? appelsData.map(p => `• ${p.contenu.slice(0,120)}`).join('\n') : "Aucun appel à projets ou recherche de partenariat en cours.";
    if (/contact|joindre|site|web|r[ée]seau/.test(t)) {
      const parts = [];
      if (profil.site_web) parts.push(`Site officiel : ${profil.site_web}`);
      const rs = Object.entries(profil.reseaux_sociaux || {}).filter(([,v]) => v);
      if (rs.length) parts.push('Réseaux : ' + rs.map(([k]) => k).join(', '));
      return parts.length ? parts.join('\n') : "Aucune information de contact publique renseignée pour l'instant.";
    }
    return "Je n'ai pas d'information à ce sujet dans les contenus publiés par la collectivité. Essayez : présentation, projets, événements, gouvernance, contact.";
  }

  function sendIA() {
    const input = panel.querySelector('#pc-ia-input');
    const q = input.value.trim();
    if (!q) return;
    addMsg(q, false);
    input.value = '';
    setTimeout(() => addMsg(answerIA(q), true), 200);
  }
  panel.querySelector('#pc-ia-send').addEventListener('click', sendIA);
  panel.querySelector('#pc-ia-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendIA(); });
})();
</script>
</body>
</html>
