<style>
/* ── Layout ── */
.deal-wrapper{display:flex;min-height:calc(100vh - 64px);background:var(--bg,#f1f5f9);}
.deal-sidebar{width:260px;flex-shrink:0;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;}
.deal-main{flex:1;min-width:0;padding:24px;}
/* ── Sidebar ── */
.deal-sid-head{padding:20px 16px 12px;border-bottom:1px solid #f1f5f9;}
.deal-sid-title{font-size:14px;font-weight:700;color:#1e293b;line-height:1.3;margin-bottom:4px;}
.deal-sid-meta{font-size:11px;color:#94a3b8;}
.deal-sid-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:6px;}
.deal-sid-status.brouillon{background:#f1f5f9;color:#64748b;}
.deal-sid-status.en_attente{background:#fef3c7;color:#d97706;}
.deal-sid-status.actif{background:#dcfce7;color:#16a34a;}
.deal-sid-status.cloture{background:#fee2e2;color:#dc2626;}
.deal-sid-status.archive{background:#e5e7eb;color:#6b7280;}
.deal-nav{padding:8px 0;}
.deal-nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;color:#475569;cursor:pointer;transition:background .15s;border-left:3px solid transparent;}
.deal-nav-item:hover{background:#f8fafc;color:#1e293b;}
.deal-nav-item.active{background:#eff6ff;color:#2563eb;border-left-color:#2563eb;font-weight:600;}
.deal-nav-item svg{flex-shrink:0;}
.deal-sid-actions{margin-top:auto;padding:12px 16px;border-top:1px solid #f1f5f9;display:flex;flex-direction:column;gap:6px;}
/* ── Tabs content ── */
.deal-tab{display:none;}

/* ── Common ── */
.deal-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:16px;}
.deal-card-title{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}

/* ── Stats bar ── */

.msg-bubble{background:#f8fafc;border-radius:10px;padding:10px 14px;border:1px solid #e2e8f0;}

/* ── Tasks ── */
.task-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:8px;}

<script>
async function _obFetch(method, url, body) {
  const opts = { method, credentials: 'include', headers: {} };
  if (body !== undefined) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(url, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw Object.assign(new Error(e.error || r.statusText), { status: r.status }); }
  return r.json();
}

const DEAL_ID = new URLSearchParams(location.search).get('id');
let DEAL = null, PARTICIPANTS = [], MY_INIT = null, MY_PART = null, ME = null;
let currentTab = 'dashboard';

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
async function initDeal() {
  try { ME = await _obFetch('GET', '/api/auth/me'); } catch(e) { location.href = '/login.html?next=' + encodeURIComponent(location.href); return; }
  if (!DEAL_ID) { showDenied('Aucun deal spécifié.'); return; }
  try {
    const r = await _obFetch('GET', `/api/deals/${DEAL_ID}`);
    DEAL = r.deal; PARTICIPANTS = r.participants;
    MY_INIT = PARTICIPANTS.find(p => {
      // on cherche notre initiative dans les participants
      return true; // sera filtré après
    });
  } catch(e) {
    if (e.status === 403 || e.status === 401) { showDenied('Vous n\'avez pas accès à ce Deal.'); return; }
    showDenied('Deal introuvable.'); return;
  }
  // Récupérer mon initiative
  try {
    const moi = await _obFetch('GET', '/api/initiatives/mes');
    if (moi && moi.length) {
      MY_INIT = moi[0];
      MY_PART = PARTICIPANTS.find(p => p.initiative_id == MY_INIT.id);
    }
  } catch(e) {}

  buildPage();
}

function showDenied(msg) {
  document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;background:#f1f5f9;">
    <div style="font-size:48px">🔒</div>
    <h2 style="font-size:20px;font-weight:700;color:#1e293b;">${msg}</h2>
    <a href="dashboard-initiative.html" style="color:#2563eb;font-size:14px;">Retour au tableau de bord</a>
  </div>`;
}

/* ══════════════════════════════════════════
   BUILD PAGE
══════════════════════════════════════════ */
function buildPage() {
  const isCreateur = MY_PART?.role === 'createur';
  const isInvite = MY_PART?.statut === 'invite';
  const isMembre = MY_PART?.statut === 'accepte';

  document.title = `${DEAL.titre} — Deal Diaspo'Actif`;

  const statusLabel = { brouillon:'Brouillon', en_attente:'En attente', actif:'Actif', cloture:'Clôturé', archive:'Archivé' }[DEAL.statut] || DEAL.statut;

  const sidebar = `
    <div class="deal-sidebar">
      <div class="deal-sid-head">
        <div class="deal-sid-title">${esc(DEAL.titre)}</div>
        <div class="deal-sid-meta">Par ${esc(DEAL.createur_nom)}</div>
        <span class="deal-sid-status ${DEAL.statut}">${statusLabel}</span>
      </div>
      <nav class="deal-nav" id="deal-nav">
        ${navItem('dashboard','🏠','Tableau de bord')}
        ${navItem('messages','💬','Messages')}
        ${navItem('taches','✅','Tâches')}
        ${navItem('documents','📁','Documents')}
        ${navItem('notes','📝','Notes')}
        ${navItem('calendrier','📅','Calendrier')}
        ${navItem('participants','👥','Participants')}
        ${navItem('historique','📋','Historique')}
      </nav>
      <div class="deal-sid-actions">
        ${isCreateur && DEAL.statut === 'actif' ? `<button class="btn btn-secondary btn-sm btn-full" onclick="doCloturer()">🔒 Clôturer</button>` : ''}
        ${isCreateur && DEAL.statut === 'cloture' ? `<button class="btn btn-secondary btn-sm btn-full" onclick="doArchiver()">📦 Archiver</button>` : ''}
        ${isCreateur && DEAL.statut === 'archive' ? `<button class="btn btn-primary btn-sm btn-full" onclick="doReactiver()">♻️ Réactiver</button>` : ''}
        <a href="dashboard-initiative.html" class="btn btn-secondary btn-sm btn-full">← Retour</a>
      </div>
    </div>`;

  const main = `
    <div class="deal-main">
      ${isInvite ? invitationBanner() : ''}
      <div id="tab-dashboard" class="deal-tab active">${buildDashboard()}</div>
      <div id="tab-messages" class="deal-tab"></div>
      <div id="tab-taches" class="deal-tab"></div>
      <div id="tab-documents" class="deal-tab"></div>
      <div id="tab-notes" class="deal-tab"></div>
      <div id="tab-calendrier" class="deal-tab"></div>
      <div id="tab-participants" class="deal-tab"></div>
      <div id="tab-historique" class="deal-tab"></div>
    </div>`;

  document.getElementById('app-root').innerHTML =
    `<div class="deal-wrapper">${sidebar}${main}</div>` + modals();

  document.querySelectorAll('.deal-nav-item').forEach(el => {
    el.addEventListener('click', () => switchTab(el.dataset.tab));
  });
}

function navItem(tab, icon, label) {
  return `<div class="deal-nav-item${tab==='dashboard'?' active':''}" data-tab="${tab}">${icon} ${label}</div>`;
}

function invitationBanner() {
  return `<div class="invite-banner">
    <h3>🤝 Vous avez été invité à rejoindre ce Deal</h3>
    <p>Acceptez l'invitation pour accéder à l'espace de travail complet.</p>
    <div class="invite-banner-btns">
      <button class="btn btn-primary" onclick="repondreInvitation('accepter')">✅ Accepter</button>
      <button class="btn btn-danger" onclick="repondreInvitation('refuser')">✗ Décliner</button>
    </div>
  </div>`;
}

function switchTab(tab) {
  document.querySelectorAll('.deal-nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.querySelectorAll('.deal-tab').forEach(el => el.classList.toggle('active', el.id === `tab-${tab}`));

  if (el && !el.dataset.loaded) { loadTab(tab); el.dataset.loaded = '1'; }
}

async function loadTab(tab) {
  const el = document.getElementById(`tab-${tab}`);
  el.innerHTML = `<div style="padding:40px;text-align:center;color:#94a3b8;font-size:14px;">Chargement…</div>`;
  try {

    else if (tab === 'documents') await loadDocuments();
    else if (tab === 'notes') await loadNotes();
    else if (tab === 'calendrier') await loadCalendrier();

    el.innerHTML = `<div style="padding:20px;color:#dc2626;">Erreur : ${e.message||'Inaccessible'}</div>`;

/* ══ Cockpit de Pilotage ══ */
async function loadDashboardStats() {
  try {
    const ck = await _obFetch('GET', `/api/deals/${DEAL_ID}/cockpit`);
    updateProgressRing(ck.progression || 0);
    updateHealth(ck.sante || 'attention');
    updateTachesStats(ck.taches_stats || {});
    document.getElementById('ck-d-total').textContent = ck.docs_stats?.total || 0;
    const nextEvt = ck.prochains_events?.[0];
    if (nextEvt) {
      document.getElementById('ck-evt-title').textContent = nextEvt.titre;
      document.getElementById('ck-evt-date').textContent = fmtCkDate(nextEvt.date_debut);
    }
    renderCockpitObjectifs(ck.objectifs || []);
    renderCockpitJalons(ck.jalons || []);
    renderCockpitActivite(ck.activite || []);
  } catch(e) {
    console.warn('Cockpit erreur:', e);
  }
}

function updateProgressRing(pct) {
  const circumference = 358;
  const arc = document.getElementById('ck-ring-arc');
  const offset = circumference - (pct / 100) * circumference;
  if (arc) { arc.style.strokeDashoffset = offset; }
  const el = document.getElementById('ck-pct');
  if (el) el.textContent = pct + '%';
  const bar = document.getElementById('ck-bar');
  if (bar) {
    bar.style.width = pct + '%';
    bar.style.background = pct === 100 ? '#1d4ed8' : pct >= 76 ? '#16a34a' : pct >= 51 ? '#ca8a04' : pct >= 26 ? '#ea580c' : '#dc2626';
  }
}

function updateHealth(sante) {
  const el = document.getElementById('ck-health');
  if (!el) return;
  el.className = 'cockpit-health ' + sante;
  el.textContent = sante === 'bon' ? '✅ Projet en bonne santé' : sante === 'critique' ? '🔴 Retard critique' : '⚠️ Attention requise';
}

function updateTachesStats(ts) {
  const el = document.getElementById('ck-t-done');
  if (el) el.textContent = (ts.done||0) + '/' + (ts.total||0);
  const sub = document.getElementById('ck-t-sub');
  if (sub) sub.textContent = `${ts.en_cours||0} en cours · ${ts.en_retard||0} en retard`;
  const bars = document.getElementById('ck-t-bars');
  if (!bars || !ts.total) return;
  const items = [
    { label:'Terminées', val:ts.done||0, color:'#16a34a' },
    { label:'En cours', val:ts.en_cours||0, color:'#2563eb' },
    { label:'En retard', val:ts.en_retard||0, color:'#dc2626' }
  ];
  bars.innerHTML = items.map(i => `
    <div class="ck-bar-row">
      <span>${i.label}</span>
      <div class="ck-bar-bg"><div class="ck-bar-fill" style="width:${ts.total?Math.round(i.val/ts.total*100):0}%;background:${i.color};"></div></div>
      <span class="val">${i.val}</span>
    </div>`).join('');
}

function renderCockpitObjectifs(objectifs) {
  const el = document.getElementById('ck-objectifs');
  if (!el) return;
  if (!objectifs.length) { el.innerHTML = '<span style="font-size:13px;color:#94a3b8;">Aucun objectif défini.</span>'; return; }
  el.innerHTML = objectifs.map(o => {
    const pct = o.progression || 0;
    const statusIcon = o.statut==='atteint'?'✅':o.statut==='abandonne'?'❌':'🔵';
    return `<div class="objectif-row">
      <div class="objectif-info">
        <div class="objectif-titre">${statusIcon} ${esc(o.titre)}</div>
        <div class="objectif-meta">${o.responsable_nom?esc(o.responsable_nom)+' · ':''}${o.date_limite?fmtCkDate(o.date_limite):''}</div>
      </div>
      <div class="objectif-bar-wrap"><div class="objectif-bar-fill" style="width:${pct}%;background:${pct===100?'#16a34a':'#2563eb'};"></div></div>
      <div class="objectif-pct">${pct}%</div>
    </div>`;
  }).join('');
}

function renderCockpitJalons(jalons) {
  const el = document.getElementById('ck-jalons');
  if (!el) return;
  if (!jalons.length) { el.innerHTML = '<span style="font-size:13px;color:#94a3b8;">Aucun jalon défini.</span>'; return; }
  const icons = { valide:'✅', en_cours:'🔵', prevu:'⬜', reporte:'🔶' };
  el.innerHTML = jalons.map((j,i) => `
    <div class="jalon-row">

      <div class="jalon-body">
        <div class="jalon-titre">${esc(j.titre)}</div>

          ${j.date_prevue ? fmtCkDate(j.date_prevue) : '—'}
          <span class="jalon-badge ${j.statut}" style="margin-left:6px;">${{valide:'Validé',en_cours:'En cours',prevu:'Prévu',reporte:'Reporté'}[j.statut]||j.statut}</span>
        </div>
      </div>

}

function renderCockpitActivite(activite) {
  const el = document.getElementById('ck-activite');
  if (!el) return;
  if (!activite.length) { el.innerHTML = '<span style="font-size:13px;color:#94a3b8;">Aucune activité enregistrée.</span>'; return; }
  el.innerHTML = activite.slice(0,8).map(e => `

async function loadDocuments() {
  const el = document.getElementById('tab-documents');
  const { documents } = await _obFetch('GET', `/api/deals/${DEAL_ID}/documents`);
  const byFolder = {};
  documents.forEach(d => { (byFolder[d.dossier] = byFolder[d.dossier]||[]).push(d); });
  el.innerHTML = `
    <div class="deal-card">
      <div class="deal-card-title">📁 Documents

      </div>
      ${!documents.length ? '<p style="font-size:13px;color:#94a3b8;">Aucun document partagé.</p>' : ''}
      ${Object.entries(byFolder).map(([folder, docs]) => `
        <div style="margin-bottom:16px;">
          <div style="font-size:12px;font-weight:700;color:#64748b;margin-bottom:8px;">📂 ${esc(folder)}</div>
          ${docs.map(d => `
            <div class="doc-item">
              <div class="doc-icon">${docIcon(d.type_mime)}</div>
              <div class="doc-info">
                <div class="doc-name">${esc(d.nom)}</div>
                <div class="doc-meta">${fmtSize(d.taille)} · ${fmtDate(d.created_at)}</div>
              </div>
              <button class="btn btn-secondary btn-sm" onclick="downloadDoc(${d.id})">⬇ Télécharger</button>
              <button class="btn btn-danger btn-sm" onclick="deleteDoc(${d.id})">✕</button>
            </div>`).join('')}
        </div>`).join('')}
    </div>`;
}

function docIcon(mime) {
  if (!mime) return '📄';
  if (mime.startsWith('image/')) return '🖼️';
  if (mime.startsWith('video/')) return '🎬';
  if (mime.includes('pdf')) return '📕';
  if (mime.includes('spreadsheet') || mime.includes('excel')) return '📊';
  if (mime.includes('presentation') || mime.includes('powerpoint')) return '📊';
  if (mime.includes('word') || mime.includes('document')) return '📝';
  return '📄';
}

function fmtSize(bytes) {
  if (!bytes) return '—';
  if (bytes < 1024) return bytes + ' o';
  if (bytes < 1024*1024) return Math.round(bytes/1024) + ' Ko';
  return (bytes/1024/1024).toFixed(1) + ' Mo';
}

function openDocModal() {
  document.getElementById('modal-doc').style.display = 'flex';
}

async function uploadDoc() {
  const fileInput = document.getElementById('doc-file');
  const dossier = document.getElementById('doc-dossier').value.trim() || '/';
  if (!fileInput.files.length) { alert('Veuillez sélectionner un fichier.'); return; }
  const file = fileInput.files[0];
  if (file.size > 5 * 1024 * 1024) { alert('Fichier trop volumineux (max 5 Mo).'); return; }
  const reader = new FileReader();
  reader.onload = async (e) => {
    const b64 = e.target.result.split(',')[1];
    try {
      await _obFetch('POST', `/api/deals/${DEAL_ID}/documents`, {
        nom: file.name, type_mime: file.type, taille: file.size,
        contenu_b64: b64, dossier
      });
      closeModal('modal-doc');
      document.getElementById('tab-documents').dataset.loaded = '';
      await loadDocuments();
    } catch(err) { alert(err.message || 'Erreur upload'); }
  };
  reader.readAsDataURL(file);
}

async function downloadDoc(docId) {
  try {
    const { document: doc } = await _obFetch('GET', `/api/deals/${DEAL_ID}/documents/${docId}`);
    const a = document.createElement('a');
    a.href = `data:${doc.type_mime||'application/octet-stream'};base64,${doc.contenu_b64}`;
    a.download = doc.nom;
    a.click();
  } catch(e) { alert('Erreur téléchargement'); }
}

async function deleteDoc(docId) {
  if (!confirm('Supprimer ce document ?')) return;
  try {
    await _obFetch('DELETE', `/api/deals/${DEAL_ID}/documents/${docId}`);
    document.getElementById('tab-documents').dataset.loaded = '';
    await loadDocuments();

}

let editingNoteId = null;
async function loadNotes() {
  const el = document.getElementById('tab-notes');
  const { notes } = await _obFetch('GET', `/api/deals/${DEAL_ID}/notes`);
  el.innerHTML = `
    <div class="deal-grid2">
      <div class="deal-card">
        <div class="deal-card-title">📝 Notes
          <button class="btn btn-primary btn-sm" onclick="newNote()">+ Nouvelle</button>
        </div>
        ${!notes.length ? '<p style="font-size:13px;color:#94a3b8;">Aucune note. Créez la première !</p>' : ''}
        ${notes.map(n => `
          <div class="note-item" onclick="openNote(${n.id})">
            <div class="note-title">${esc(n.titre)}</div>
            <div class="note-meta">${n.type} · ${n.auteur_nom||'—'} · ${fmtDate(n.updated_at)}</div>
            ${n.contenu ? `<div class="note-preview">${esc(n.contenu.substring(0,80))}${n.contenu.length>80?'…':''}</div>` : ''}
          </div>`).join('')}
      </div>
      <div class="deal-card" id="note-editor-panel">
        <div style="font-size:13px;color:#94a3b8;text-align:center;padding:40px 0;">
          Sélectionnez une note ou créez-en une nouvelle.
        </div>
      </div>
    </div>`;
  window._dealNotes = notes;
}

function newNote() {
  editingNoteId = null;
  document.getElementById('note-editor-panel').innerHTML = `
    <div class="deal-card-title">Nouvelle note</div>
    <div class="form-group"><input class="form-input" id="note-titre" placeholder="Titre" value="Sans titre"/></div>
    <div class="form-group">
      <select class="form-select" id="note-type">
        <option value="note">Note</option>
        <option value="compte_rendu">Compte rendu</option>
        <option value="proposition">Proposition</option>
        <option value="contrat">Contrat</option>
        <option value="autre">Autre</option>
      </select>
    </div>
    <textarea id="note-editor-area" placeholder="Rédigez votre note ici…"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-primary" onclick="saveNote()">Enregistrer</button>
      <button class="btn btn-secondary" onclick="loadNotes()">Annuler</button>
    </div>`;
}

function openNote(id) {
  const n = window._dealNotes?.find(x => x.id == id);
  if (!n) return;
  editingNoteId = id;
  document.getElementById('note-editor-panel').innerHTML = `
    <div class="deal-card-title">Modifier la note</div>
    <div class="form-group"><input class="form-input" id="note-titre" value="${esc(n.titre)}"/></div>
    <div class="form-group">
      <select class="form-select" id="note-type">
        ${['note','compte_rendu','proposition','contrat','autre'].map(v => `<option value="${v}"${n.type===v?' selected':''}>${v}</option>`).join('')}
      </select>
    </div>
    <textarea id="note-editor-area">${esc(n.contenu||'')}</textarea>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-primary" onclick="saveNote()">Enregistrer</button>
      <button class="btn btn-secondary" onclick="loadNotes()">Annuler</button>
    </div>`;
}

async function saveNote() {
  const titre = document.getElementById('note-titre').value.trim();
  const contenu = document.getElementById('note-editor-area').value;
  const type = document.getElementById('note-type').value;
  try {
    if (editingNoteId) {
      await _obFetch('PUT', `/api/deals/${DEAL_ID}/notes/${editingNoteId}`, { titre, contenu });
    } else {
      await _obFetch('POST', `/api/deals/${DEAL_ID}/notes`, { titre, contenu, type });
    }
    document.getElementById('tab-notes').dataset.loaded = '';
    await loadNotes();
  } catch(e) { alert(e.message || 'Erreur'); }
}

/* ══════════════════════════════════════════
   CALENDRIER
══════════════════════════════════════════ */
async function loadCalendrier() {
  const el = document.getElementById('tab-calendrier');
  const { evenements } = await _obFetch('GET', `/api/deals/${DEAL_ID}/evenements`);
  const now = new Date();
  const futurs = evenements.filter(e => new Date(e.date_debut) >= now).sort((a,b) => new Date(a.date_debut)-new Date(b.date_debut));
  const passes = evenements.filter(e => new Date(e.date_debut) < now).sort((a,b) => new Date(b.date_debut)-new Date(a.date_debut));
  el.innerHTML = `
    <div class="deal-card">
      <div class="deal-card-title">📅 Calendrier
        <button class="btn btn-primary btn-sm" onclick="openEventModal()">+ Ajouter</button>
      </div>
      ${futurs.length ? `<div style="margin-bottom:16px;"><div style="font-size:12px;font-weight:700;color:#64748b;margin-bottom:8px;">À venir</div>${futurs.map(renderEvent).join('')}</div>` : ''}
      ${passes.length ? `<div><div style="font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:8px;">Passés</div>${passes.map(renderEvent).join('')}</div>` : ''}
      ${!evenements.length ? '<p style="font-size:13px;color:#94a3b8;">Aucun événement programmé.</p>' : ''}
    </div>`;
}

function renderEvent(e) {
  return `<div class="cal-event ${e.type}" style="display:flex;align-items:flex-start;justify-content:space-between;">
    <div>
      <div class="cal-event-title">${typeEventIcon(e.type)} ${esc(e.titre)}</div>
      <div class="cal-event-meta">${fmtDate(e.date_debut)}${e.date_fin?' → '+fmtDate(e.date_fin):''}${e.description?` · ${esc(e.description)}`:''}</div>
    </div>
    <button class="btn btn-danger btn-sm" onclick="deleteEvent(${e.id})" title="Supprimer">✕</button>
  </div>`;
}

function typeEventIcon(type) {
  return { reunion:'🤝', echeance:'⏰', rappel:'🔔', appel:'📞', autre:'📌' }[type]||'📌';
}

function openEventModal() { document.getElementById('modal-event').style.display = 'flex'; }

async function saveEvent() {
  const titre = document.getElementById('event-titre').value.trim();
  const date_debut = document.getElementById('event-date').value;
  if (!titre || !date_debut) { alert('Titre et date requis'); return; }
  try {
    await _obFetch('POST', `/api/deals/${DEAL_ID}/evenements`, {
      titre, date_debut,
      date_fin: document.getElementById('event-date-fin').value||undefined,
      type: document.getElementById('event-type').value,
      description: document.getElementById('event-desc').value.trim()||undefined
    });
    closeModal('modal-event');
    document.getElementById('tab-calendrier').dataset.loaded = '';
    await loadCalendrier();
  } catch(e) { alert(e.message||'Erreur'); }
}

async function deleteEvent(id) {
  if (!confirm('Supprimer cet événement ?')) return;
  try {
    await _obFetch('DELETE', `/api/deals/${DEAL_ID}/evenements/${id}`);
    document.getElementById('tab-calendrier').dataset.loaded = '';
    await loadCalendrier();
  } catch(e) { alert(e.message||'Erreur'); }
}

async function loadParticipants() {
  const el = document.getElementById('tab-participants');
  const { deal, participants } = await _obFetch('GET', `/api/deals/${DEAL_ID}`);
  PARTICIPANTS = participants;
  const isCreateur = MY_PART?.role === 'createur';
  el.innerHTML = `
    <div class="deal-card">
      <div class="deal-card-title">👥 Participants (${participants.length})
        ${isCreateur ? `<button class="btn btn-primary btn-sm" onclick="openInviteModal()">+ Inviter</button>` : ''}
      </div>
      ${participants.map(p => `

          <div class="part-avatar">${p.nom.charAt(0)}</div>
          <div class="part-info">
            <div class="part-nom">${esc(p.nom)}</div>
            <div class="part-role">${p.role === 'createur' ? '👑 Créateur' : '🤝 Participant'}${p.pays?' · '+p.pays:''}</div>
          </div>

async function openInviteModal() {
  document.getElementById('modal-invite').style.display = 'flex';
  try {
    const { initiatives } = await _obFetch('GET', '/api/initiatives?limit=50');
    const myIds = new Set(PARTICIPANTS.map(p => p.initiative_id));
    const filtred = initiatives.filter(i => !myIds.has(i.id));
    const sel = document.getElementById('invite-select');
    sel.innerHTML = '<option value="">-- Sélectionner une initiative --</option>' +
      filtred.map(i => `<option value="${i.id}">${esc(i.nom)} (${i.pays||'—'})</option>`).join('');
  } catch(e) {}
}

async function sendInvite() {
  const initiative_id = document.getElementById('invite-select').value;
  const message = document.getElementById('invite-msg').value.trim();
  if (!initiative_id) { alert('Sélectionnez une initiative'); return; }
  try {
    await _obFetch('POST', `/api/deals/${DEAL_ID}/inviter`, { initiative_id: Number(initiative_id), message });
    closeModal('modal-invite');
    document.getElementById('tab-participants').dataset.loaded = '';
    await loadParticipants();
  } catch(e) { alert(e.message||'Erreur'); }
}

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(e) { return s; }
}
