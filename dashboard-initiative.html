<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diaspo'Actif — Espace Initiative</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/styles.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="assets/logo.svg">
</head>
<body>
<div class="page">

  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo"><img class="logo-img" src="assets/logo.svg" alt="Diaspo'Actif"> DIASPO'ACTIF</div>
      <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="annuaire.html">Annuaire</a>
        <a href="fil-actualite.html">Fil d'actualité</a>
        <a href="actualites.html">Actualités</a>
        <a href="evenements.html">Événements</a>
      </nav>
      <div class="topbar-right">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu">☰</button>
        <select class="lang-select" id="lang-select"></select>
        <div id="auth-area" class="auth-area"></div>
      </div>
    </div>
  </header>

  <div class="with-sidebar">
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-close" id="sidebar-close">×</button>
      <div class="brand" id="sidebar-brand">Mon espace initiative</div>
      <a class="active" href="#presentation">📋 Présentation</a>
      <a href="#publications">📰 Publications</a>
      <a href="#evenements">📅 Événements</a>
      <a href="#paiement">💳 Module paiement</a>
      <a href="#accreditations">🎖 Accréditations DA</a>
      <a href="#publicites-init">📣 Publicités <span class="pill" id="init-pub-badge" style="display:none;"></span></a>
      <a href="messagerie.html">💬 Messages <span class="pill" id="msg-count">—</span></a>
      <a href="confidentialite.html">🔐 Confidentialité</a>
    </aside>
    <main class="content" id="dashboard-content">
      <div class="notice">Chargement de votre espace initiative…</div>
    </main>
  </div>
</div>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
/* Catalogue accréditations DA — défini ici pour éviter les problèmes de cache data.js */
if (typeof ACCREDITATIONS_DA === 'undefined') {
  window.ACCREDITATIONS_DA = [
    { type:'mobilisation_active', label:'Mobilisation Active', emoji:'📢', couleur:'#f59e0b', couleurBg:'#fffbeb', couleurBorder:'#f59e0b', couleurText:'#92400e',
      description:"Autorisation d'exercer des fonctions de mobilisation au sein de Diaspo'Actif. Permet de participer activement aux missions, campagnes et appels de terrain.",
      droits:["Participer à des missions rémunérées","Répondre à des appels de mobilisation","Réaliser des enquêtes de terrain","Participer à des campagnes de sensibilisation","Être sollicité par des partenaires"],
      eligible:['initiative','utilisateur'], prix:{initiative:29,collectivite:0,utilisateur:19} },
    { type:'createur_opportunites', label:"Créateur d'Opportunités", emoji:'💼', couleur:'#3b82f6', couleurBg:'#eff6ff', couleurBorder:'#3b82f6', couleurText:'#1e40af',
      description:"Autorisation de publier des offres et de créer des opportunités professionnelles ou économiques pour la diaspora sur la plateforme.",
      droits:["Publier certaines offres (emplois, stages, marchés)","Mettre en relation des acteurs","Participer à des programmes de recrutement","Créer des opportunités professionnelles","Accéder au module offres prioritaires"],
      eligible:['initiative','collectivite'], prix:{initiative:39,collectivite:0} },
    { type:'observatoire_diaspora', label:'Observatoire Diaspora', emoji:'📊', couleur:'#059669', couleurBg:'#f0fdf4', couleurBorder:'#059669', couleurText:'#065f46',
      description:"Autorisation d'accéder aux données statistiques et outils d'analyse.",
      droits:["Accéder aux statistiques autorisées","Consulter les tableaux de bord","Réaliser des consultations","Obtenir des rapports","Analyser les tendances"],
      eligible:['collectivite'], prix:{collectivite:0} },
    { type:'institutionnelle', label:'Institutionnelle', emoji:'🏛️', couleur:'#7c3aed', couleurBg:'#f5f3ff', couleurBorder:'#7c3aed', couleurText:'#4c1d95',
      description:"Autorisation d'exercer des fonctions institutionnelles sur la plateforme.",
      droits:["Diffuser des communications officielles","Organiser des consultations publiques","Interagir avec un territoire donné","Accéder à certains outils institutionnels"],
      eligible:['collectivite'], prix:{collectivite:0} },
    { type:'creation_publicite', label:'Création de Publicité', emoji:'📣', couleur:'#dc2626', couleurBg:'#fef2f2', couleurBorder:'#dc2626', couleurText:'#991b1b',
      description:"Autorisation de créer et soumettre des publicités sur la plateforme Diaspo'Actif. Chaque publicité est soumise à validation avant diffusion.",
      droits:["Créer des campagnes publicitaires complètes","Définir le ciblage géographique et démographique","Choisir les emplacements de diffusion","Définir les périodes d'affichage","Suivre les statistiques","Soumettre des publicités à validation"],
      eligible:['initiative'], prix:{initiative:49} }
  ];
}
if (typeof REGLE_ACCREDITATIONS_DA === 'undefined') {
  window.REGLE_ACCREDITATIONS_DA = "Les accréditations Diaspo'Actif ne constituent ni une récompense, ni une distinction honorifique. Elles correspondent à des autorisations opérationnelles accordées à un utilisateur ou à une organisation afin d'exercer certaines fonctions ou d'accéder à des services spécifiques de la plateforme.";
}
(async function initDashboardInitiative() {
  const content = document.getElementById("dashboard-content");

  /* Vérification session */
  const me = await fetchCurrentUser();
  if (!me) {
    window.location.href = "login.html";
    return;
  }
  if (me.role !== "initiative") {
    content.innerHTML = `<div class="notice">⚠️ Cette page est réservée aux comptes Initiative. <a href="${ROLE_DASHBOARD[me.role] || 'index.html'}">Accéder à mon tableau de bord →</a></div>`;
    return;
  }

  /* Chargement des données du dashboard */
  let data;
  try {
    data = await api("GET", "/dashboard/initiative");
  } catch (e) {
    content.innerHTML = `<div class="notice">Impossible de charger les données. Vérifiez que le serveur tourne.</div>`;
    return;
  }

  const { initiative: init, messages_non_lus, publications_recentes } = data;

  /* Compteur messages */
  const msgPill = document.getElementById("msg-count");
  if (msgPill) msgPill.textContent = messages_non_lus || 0;

  /* Pas encore d'initiative liée → formulaire de création */
  if (!init) {
    document.getElementById("sidebar-brand").textContent = "Nouvelle initiative";
    content.innerHTML = `
      <div class="flex-between" style="margin-bottom:16px;">
        <h1 style="margin:0;">Créer votre fiche initiative</h1>
        <span class="badge badge-asso">Compte Initiative</span>
      </div>
      <div class="notice">Votre compte est prêt. Complétez votre fiche pour apparaître dans l'annuaire et accéder à toutes les fonctionnalités.</div>
      <div class="card" style="margin-top:20px;">
        <h3>Informations de base</h3>
        <div class="grid grid-2" style="margin-top:14px;gap:14px;">
          <div><label style="font-size:13px;font-weight:700;">Nom de l'initiative *</label><input id="cr-nom" class="input-field" style="width:100%;margin-top:4px;" placeholder="Association des…"></div>
          <div><label style="font-size:13px;font-weight:700;">Sigle</label><input id="cr-sigle" class="input-field" style="width:100%;margin-top:4px;" placeholder="A.I.T.O"></div>
          <div><label style="font-size:13px;font-weight:700;">Pays d'origine *</label><input id="cr-pays" class="input-field" style="width:100%;margin-top:4px;" placeholder="Côte d'Ivoire"></div>
          <div><label style="font-size:13px;font-weight:700;">Région de résidence</label><input id="cr-region" class="input-field" style="width:100%;margin-top:4px;" placeholder="Occitanie"></div>
          <div><label style="font-size:13px;font-weight:700;">Ville</label><input id="cr-ville" class="input-field" style="width:100%;margin-top:4px;" placeholder="Toulouse"></div>
          <div><label style="font-size:13px;font-weight:700;">Domaine d'activité</label>
            <select id="cr-domaine" class="input-field" style="width:100%;margin-top:4px;">
              <option value="">— Choisir —</option>
              ${["Action Sociale","Agriculture","Santé","Éducation","Technologie","Culture","Économie","Environnement"].map(d=>`<option>${d}</option>`).join("")}
            </select>
          </div>
          <div><label style="font-size:13px;font-weight:700;">Type d'organisation</label>
            <select id="cr-type" class="input-field" style="width:100%;margin-top:4px;">
              <option value="">— Choisir —</option>
              ${["Association","ONG","Entreprise","Fondation","Coopérative"].map(t=>`<option>${t}</option>`).join("")}
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:20px;">
            <input type="checkbox" id="cr-nat-unique"> <label for="cr-nat-unique" style="font-size:13px;">Réservée à une nationalité unique</label>
          </div>
        </div>
        <div style="margin-top:14px;"><label style="font-size:13px;font-weight:700;">Description</label>
          <textarea id="cr-desc" style="width:100%;min-height:80px;border-radius:10px;border:1px solid var(--border);padding:10px;font-family:inherit;margin-top:4px;" placeholder="Présentez votre initiative, ses objectifs et ses activités…"></textarea>
        </div>
        <div id="cr-error" style="color:#D33;font-size:13px;margin-top:8px;display:none;"></div>
        <button class="btn btn-orange btn-block" style="margin-top:16px;" id="cr-submit">Créer ma fiche initiative</button>
      </div>`;

    document.getElementById("cr-submit").addEventListener("click", async () => {
      const nom = document.getElementById("cr-nom").value.trim();
      const pays = document.getElementById("cr-pays").value.trim();
      const errEl = document.getElementById("cr-error");
      if (!nom || !pays) { errEl.textContent = "Le nom et le pays sont obligatoires."; errEl.style.display = "block"; return; }
      errEl.style.display = "none";
      try {
        await api("POST", "/initiatives", {
          nom, pays,
          sigle: document.getElementById("cr-sigle").value.trim(),
          region: document.getElementById("cr-region").value.trim(),
          ville: document.getElementById("cr-ville").value.trim(),
          domaine: document.getElementById("cr-domaine").value,
          type: document.getElementById("cr-type").value,
          description: document.getElementById("cr-desc").value.trim(),
          nationalite_unique: document.getElementById("cr-nat-unique").checked
        });
        window.location.reload();
      } catch (e) {
        errEl.textContent = e.message || "Erreur lors de la création.";
        errEl.style.display = "block";
      }
    });
    return;
  }

  /* Mise à jour du nom dans la sidebar */
  document.getElementById("sidebar-brand").textContent = init.sigle || init.nom;

  /* Abonnement — état initial depuis l'API */
  let abonneActif = !!init.abonnement_actif;
  function subBadgeHTML() {
    return abonneActif
      ? `<span class="badge badge-asso" id="sub-badge">⭐ Abonné — ${TARIF_INITIATIVE_ANNUEL || 50} €/an</span>`
      : `<span class="badge" style="background:#FFE2E2;color:#B00;" id="sub-badge">Non abonné</span>`;
  }
  function subNoticeHTML() {
    return abonneActif
      ? `Votre abonnement annuel de <strong>${TARIF_INITIATIVE_ANNUEL || 50}&nbsp;€/an</strong> soutient le fonctionnement et l'indépendance de la plateforme Diaspo'Actif.`
      : `Abonnez-vous pour <strong>${TARIF_INITIATIVE_ANNUEL || 50}&nbsp;€/an</strong> afin de débloquer la publication, la gestion des abonnés et les statistiques.`;
  }

  /* Rendu principal */
  content.innerHTML = `
    <div id="presentation">
      <div class="flex-between" style="margin-bottom:16px;">
        <h1 style="margin:0;">${init.nom}</h1>
        ${subBadgeHTML()}
      </div>
      <div class="notice" id="sub-notice">${subNoticeHTML()}</div>

      <div class="grid grid-2" style="margin-bottom:20px;align-items:stretch;">
        <div class="price-card">
          <div class="label" style="color:var(--muted);font-size:12.5px;text-transform:uppercase;font-weight:700;margin-bottom:6px;">Abonnement Compte Initiative</div>
          <div class="amount">${TARIF_INITIATIVE_ANNUEL || 50} €<span> / an / initiative</span></div>
          <p style="color:var(--muted);font-size:12.5px;margin:10px 0 16px;">Renouvellement annuel automatique. Donne accès à la publication, à la gestion des abonnés et aux statistiques.</p>
          <button class="btn btn-orange btn-block" id="btn-subscribe">${abonneActif ? "Suspendre l'abonnement (simulation)" : "Activer mon abonnement (simulation)"}</button>
          <p style="color:var(--muted);font-size:11px;margin-top:8px;">Démonstration — aucun paiement réel n'est traité dans ce prototype.</p>
        </div>
        <div class="stat-row" style="margin-bottom:0;">
          <div class="stat-card"><div class="num">${(init.membres || 0).toLocaleString("fr-FR")}</div><div class="label">Membres du réseau</div></div>
          <div class="stat-card"><div class="num">${messages_non_lus}</div><div class="label">Messages reçus</div></div>
          <div class="stat-card"><div class="num">${(init.vues || 0).toLocaleString("fr-FR")}</div><div class="label">Vues du profil</div></div>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px;">
        <h3>Localisation de l'initiative</h3>
        <div class="tags">
          ${init.pays ? `<span class="tag">🌍 Pays d'origine : ${init.pays}</span>` : ""}
          ${init.region ? `<span class="tag">📍 Région : ${init.region}</span>` : ""}
          ${init.ville ? `<span class="tag">📍 Ville : ${init.ville}</span>` : ""}
          ${init.zone ? `<span class="tag">🗺️ Zone : ${init.zone}</span>` : ""}
          ${init.domaine ? `<span class="tag">${init.domaine}</span>` : ""}
          ${init.type ? `<span class="badge ${badgeClass(init.type)}">${init.type}</span>` : ""}
          ${init.nationalite_unique ? `<span class="badge badge-unique">Réservée à la diaspora ${init.nationalite1 || ""} (nationalité unique)</span>` : ""}
        </div>
        ${init.description ? `<p style="margin-top:12px;color:var(--muted);font-size:13.5px;">${init.description}</p>` : ""}
        <a href="initiative.html?id=${init.slug || init.id}" class="btn btn-sm btn-outline" style="margin-top:12px;">Voir ma fiche publique →</a>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;" id="publications">
      <h3>Nouvelle publication</h3>
      <p style="font-size:13px;color:var(--muted);">Format court recommandé pour les vidéos : max 3 minutes. Vos publications apparaissent dans le <a href="fil-actualite.html" style="color:var(--orange);font-weight:700;">Fil d'actualité global</a>.</p>
      <div id="pub-form" style="margin-top:12px;">
        <select id="pub-categorie" class="input-field" style="margin-bottom:8px;">
          <option value="Actualité">📰 Actualité</option>
          <option value="Appel à projets">🤝 Appel à projets</option>
          <option value="Événement">📅 Événement</option>
          <option value="Témoignage">💬 Témoignage</option>
          <option value="Vidéo">🎬 Vidéo (&lt;3 min)</option>
        </select>
        <textarea id="pub-contenu" style="width:100%;min-height:80px;border-radius:10px;border:1px solid var(--border);padding:10px;font-family:inherit;" placeholder="Partager une actualité, une opportunité, un appel à projets…"></textarea>
        <button class="btn btn-orange" id="pub-btn" style="margin-top:8px;" ${abonneActif ? "" : "disabled"}>Publier</button>
        ${!abonneActif ? `<p style="color:var(--muted);font-size:12px;margin-top:6px;">Abonnez-vous pour débloquer la publication.</p>` : ""}
      </div>
      ${publications_recentes.length ? `
      <h4 style="margin-top:20px;font-size:13px;text-transform:uppercase;color:var(--muted);">Mes publications récentes</h4>
      ${publications_recentes.map(p => `
        <div class="feed-post" style="margin-top:10px;">
          <div class="flex-between">
            <span class="feed-cat">${p.categorie || ""}</span>
            <span style="color:var(--muted);font-size:12px;">${new Date(p.created_at.replace(" ","T")+"Z").toLocaleString("fr-FR")}</span>
          </div>
          <div class="feed-body" style="margin-top:6px;">${p.contenu}</div>
        </div>`).join("")}` : ""}
    </div>

    <div class="card" style="margin-bottom:20px;" id="evenements">
      <h3>Mobiliser la diaspora</h3>
      <div class="timeline-item" style="margin-top:14px;">
        <div class="date-chip">15<span>NOV</span></div>
        <div style="flex:1;">
          <div class="flex-between">
            <div><strong>Forum des entrepreneurs</strong><p style="margin:2px 0 0;color:var(--muted);font-size:13px;">120 participants confirmés</p></div>
            <button class="btn btn-sm btn-orange">Gérer les inscriptions</button>
          </div>
        </div>
      </div>
      <div class="timeline-item">
        <div class="date-chip">02<span>DÉC</span></div>
        <div style="flex:1;">
          <div class="flex-between">
            <div><strong>Gala de solidarité de fin d'année</strong><p style="margin:2px 0 0;color:var(--muted);font-size:13px;">Ouvert à tous</p></div>
            <button class="btn btn-sm btn-outline">Éditer l'événement</button>
          </div>
        </div>
      </div>
      <button class="btn btn-outline" style="margin-top:14px;">+ Créer un événement</button>
    </div>

    <div class="card" style="margin-bottom:20px;" id="paiement">
      <h3>Module de paiement — billetterie &amp; cotisations</h3>
      <p>Activez un module de paiement pour vos événements : vente de billets, cotisations, inscriptions, collectes de fonds, dons.</p>
      <p style="margin:14px 0 6px;font-weight:700;font-size:13px;">Type de tarification</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <label class="payment-option"><input type="radio" name="tarification" checked> Tarif unique</label>
        <label class="payment-option"><input type="radio" name="tarification"> Plusieurs catégories</label>
        <label class="payment-option"><input type="radio" name="tarification"> Accès gratuit</label>
        <label class="payment-option"><input type="radio" name="tarification"> Participation libre</label>
      </div>
      <p style="margin:16px 0 6px;font-weight:700;font-size:13px;">Moyens de paiement acceptés</p>
      <div class="payment-grid" id="moyens-paiement"></div>
      <button class="btn btn-navy btn-block" style="margin-top:14px;" disabled>Activer le module de paiement (démonstration)</button>
      <p style="color:var(--muted);font-size:11px;margin-top:8px;">⚠️ Démonstration uniquement — aucune transaction réelle n'est traitée.</p>
    </div>

    <div class="card" style="margin-bottom:20px;" id="accreditations">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <h3 style="margin:0;">🎖 Accréditations Diaspo'Actif</h3>
        <button class="btn btn-sm btn-outline" onclick="loadInitAccred()" style="font-size:12px;">↺ Actualiser</button>
      </div>
      <p style="font-size:13px;color:var(--muted);margin:0 0 10px;">Les accréditations DA sont des <strong>autorisations opérationnelles</strong> — pas des récompenses. Chaque accréditation vous donne le droit d'exercer une fonction spécifique sur la plateforme.</p>
      <div style="background:#f8fafc;border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:0 10px 10px 0;padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6;">
        📋 <em>Les accréditations Diaspo'Actif ne constituent ni une récompense, ni une distinction honorifique. Elles correspondent à des autorisations opérationnelles accordées à un utilisateur ou à une organisation afin d'exercer certaines fonctions ou d'accéder à des services spécifiques de la plateforme.</em>
      </div>

      <!-- Accréditations actives -->
      <div id="init-accred-actives"></div>

      <!-- Catalogue des accréditations disponibles -->
      <h4 style="margin:20px 0 14px;font-size:12px;text-transform:uppercase;color:var(--muted);letter-spacing:.6px;font-weight:700;">Accréditations disponibles</h4>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;" id="init-accred-catalogue"></div>

      <!-- Demandes en cours -->
      <div id="init-accred-demandes"></div>
    </div>

    <div id="ad-dashboard-initiative" data-ad-slot="4"></div>

    <!-- ── Section Publicités Initiative ── -->
    <div class="card" style="margin-bottom:20px;" id="publicites-init">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <h3 style="margin:0;">📣 Mes Publicités</h3>
        <button class="btn btn-sm btn-outline" onclick="loadInitPubs()" style="font-size:12px;">↺ Actualiser</button>
      </div>
      <p style="font-size:13px;color:var(--muted);margin:0 0 14px;">Créez et gérez vos campagnes publicitaires sur la plateforme. Chaque publicité est soumise à validation avant diffusion.</p>
      <!-- Gate : affiché si pas d'accréditation creation_publicite -->
      <div id="init-pub-gate">
        <div style="background:#fef2f2;border:1.5px solid #dc2626;border-radius:12px;padding:20px;text-align:center;">
          <div style="font-size:36px;margin-bottom:8px;">🔒</div>
          <div style="font-weight:700;font-size:15px;margin-bottom:6px;">Accréditation requise</div>
          <p style="font-size:13px;color:var(--muted);margin:0 0 14px;">Pour créer des publicités, vous devez obtenir l'accréditation <strong>📣 Création de Publicité</strong> (49 €/an).<br>Elle permet de soumettre des campagnes complètes avec ciblage, visuels et contacts.</p>
          <a href="#accreditations" class="btn btn-orange">Demander l'accréditation →</a>
        </div>
      </div>
      <!-- Contenu : affiché si accréditation active -->
      <div id="init-pub-content" style="display:none;">
        <div style="margin-bottom:18px;">
          <button class="btn btn-orange" onclick="openInitPubModal()">➕ Nouvelle publicité</button>
        </div>
        <div id="init-pub-list">
          <div style="color:var(--muted);font-size:13px;">Chargement…</div>
        </div>
      </div>
    </div>

    <!-- ── Modal Nouvelle publicité (initiative) ── -->
    <div id="init-pub-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;overflow-y:auto;">
      <div style="background:var(--bg);border-radius:16px;max-width:760px;margin:40px auto;padding:0;position:relative;">
        <div style="padding:20px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">

  async function loadInitAccred() {
    const [rMes, rDem] = await Promise.all([
      api('GET', '/accreditations/mes').catch(() => ({ accreditations: [] })),
      api('GET', '/accreditations/demandes').catch(() => ({ demandes: [] }))
    ]);
    const actives = rMes.accreditations || [];
    const demandes = rDem.demandes || [];

    // Bloc accréditations actives
    const activesEl = document.getElementById('init-accred-actives');
    if (activesEl) {
      if (actives.filter(a => a.statut === 'active').length) {
        activesEl.innerHTML = `
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
            ${actives.filter(a => a.statut === 'active').map(a => {
              const def = (ACCREDITATIONS_DA || []).find(d => d.type === a.type) || {};
              return `<div style="display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:12px;background:${def.couleurBg || '#f0fdf4'};border:1.5px solid ${def.couleurBorder || '#22c55e'};">
                <span style="font-size:18px;">${def.emoji || '🎖'}</span>
                <div>
                  <div style="font-weight:700;font-size:13px;color:${def.couleurText || '#166534'};">${def.label || a.type}</div>
                  <div style="font-size:11px;color:var(--muted);">Active${a.date_expiration ? ' · Expire le ' + a.date_expiration.slice(0,10) : ''}</div>
                </div>
              </div>`;
            }).join('')}
          </div>`;
      } else {
        activesEl.innerHTML = '';
      }
    }

    // Catalogue
    const catEl = document.getElementById('init-accred-catalogue');
    if (catEl && typeof ACCREDITATIONS_DA !== 'undefined') {
      const eligibles = ACCREDITATIONS_DA.filter(d => (d.eligible||[]).includes('initiative'));
      catEl.innerHTML = eligibles.map(def => {
        const active = actives.find(a => a.type === def.type && a.statut === 'active');
        const demandeEnCours = demandes.find(d => d.type === def.type && d.statut === 'en_attente');
        const refusee = demandes.find(d => d.type === def.type && d.statut === 'refusee');

  function initPubSwitchTab(n) {
    if (n < 1 || n > INIT_PUB_TAB_MAX) return;
    window._initPubCurrentTab = n;
    const modal = document.getElementById('init-pub-modal');
    modal.querySelectorAll('.pub-tab-content').forEach((el, i) => {
      el.style.display = (i + 1 === n) ? '' : 'none';
    });
    modal.querySelectorAll('.pub-tab').forEach(btn => {
      const active = parseInt(btn.dataset.tab) === n;
      btn.style.borderBottomColor = active ? 'var(--orange)' : 'transparent';
      btn.style.color = active ? 'var(--orange)' : 'var(--muted)';
      btn.style.fontWeight = active ? '800' : '700';
    });
    const prev = document.getElementById('init-pub-btn-prev');
    const next = document.getElementById('init-pub-btn-next');
    const save = document.getElementById('init-pub-btn-save');
    if (prev) prev.style.display = n > 1 ? '' : 'none';
    if (next) next.style.display = n < INIT_PUB_TAB_MAX ? '' : 'none';
    if (save) save.style.display = n >= 5 ? '' : 'none';
    if (n === 6) initPubUpdatePreview();
  }

  function initPubLoadFile(event, targetId, thumbId, isVideo = false) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const data = e.target.result;
      const input = document.getElementById(targetId);
      if (input) input.value = data;
      if (thumbId) {
        const wrap = document.getElementById(thumbId);
        if (wrap) {
          const media = wrap.querySelector(isVideo ? 'video' : 'img');
          if (media) { media.src = data; wrap.style.display = ''; }
        }
      }
      initPubDebouncedPreview();
    };
    reader.readAsDataURL(file);
  }

  function initPubLoadGalerie(event) {
    const files = [...event.target.files];
    if (!files.length) return;
    const promises = files.map(f => new Promise(res => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.readAsDataURL(f);
    }));
    Promise.all(promises).then(results => {
      const input = document.getElementById('pub-galerie');
      const existing = (input.value || '').split(',').map(s => s.trim()).filter(Boolean);
      const combined = [...existing, ...results];
      input.value = combined.join(', ');
      const thumb = document.getElementById('pub-galerie-thumb');
      thumb.innerHTML = combined.slice(0, 8).map(src =>
        `<img src="${src}" style="height:48px;width:48px;object-fit:cover;border-radius:6px;border:1px solid var(--border);">`
      ).join('');
      thumb.style.display = combined.length ? 'flex' : 'none';
    });
  }

  function initPubPreviewImg(srcId, thumbId) {
    const src = document.getElementById(srcId)?.value?.trim();
    const wrap = document.getElementById(thumbId);
    if (!wrap) return;
    if (src && (src.startsWith('http') || src.startsWith('data:'))) {
      wrap.querySelector('img').src = src;
      wrap.style.display = '';
    } else {
      wrap.style.display = 'none';
    }
  }

      contact_telephone: (document.getElementById('pub-tel')?.value || '').trim() || null,
      contact_whatsapp: (document.getElementById('pub-whatsapp')?.value || '').trim() || null,
      contact_email: (document.getElementById('pub-email-contact')?.value || '').trim() || null,
      contact_adresse: (document.getElementById('pub-adresse')?.value || '').trim() || null,
      reseaux_sociaux: rs,
      moyens_paiement: [...document.querySelectorAll('.pub-paiement:checked')].map(el => el.value),
      zone_geo: document.querySelector('[name="pub-zone-geo"]:checked')?.value || 'monde',
      cible_pays: (document.getElementById('pub-cible-pays')?.value || '').split(',').map(s=>s.trim()).filter(Boolean),
      cible_pays_residence: (document.getElementById('pub-cible-pays-res')?.value || '').split(',').map(s=>s.trim()).filter(Boolean),
      cible_regions: (document.getElementById('pub-cible-regions')?.value || '').split(',').map(s=>s.trim()).filter(Boolean),
      cible_villes: (document.getElementById('pub-cible-villes')?.value || '').split(',').map(s=>s.trim()).filter(Boolean),
      cible_roles: [...document.querySelectorAll('.pub-roles:checked')].map(el => el.value),
      cible_nationalites: [
        ...(document.getElementById('pub-cible-nat1')?.value || '').split(',').map(s=>s.trim()).filter(Boolean),
        ...(document.getElementById('pub-cible-nat2')?.value || '').split(',').map(s=>s.trim()).filter(Boolean)
      ],
      cible_origines: (document.getElementById('pub-cible-origines')?.value || '').split(',').map(s=>s.trim()).filter(Boolean),
      emplacements: [...document.querySelectorAll('.pub-emplacements:checked')].map(el => el.value),
      max_affichages_user: parseInt(document.getElementById('pub-max-user')?.value) || 0,
      max_affichages_jour: parseInt(document.getElementById('pub-max-jour')?.value) || 0,
      max_clics: parseInt(document.getElementById('pub-max-clics')?.value) || 0,
      date_debut: document.getElementById('pub-debut')?.value || null,
      date_fin: document.getElementById('pub-fin')?.value || null,
      heure_debut: document.getElementById('pub-heure-debut')?.value || null,
      heure_fin: document.getElementById('pub-heure-fin')?.value || null,
    };
    if (!body.titre) { alert('Veuillez renseigner au moins un titre.'); initPubSwitchTab(2); return; }
    const btn = document.getElementById('init-pub-btn-save');
    if (btn) { btn.disabled = true; btn.textContent = 'Envoi…'; }
    try {
      await api('POST', '/publicites', body);
      closeInitPubModal();
      await loadInitPubs();
      alert('✅ Votre publicité a été soumise avec succès. L\'équipe Diaspo\'Actif l\'examinera avant diffusion.');
    } catch (e) {
      alert('Erreur : ' + (e.message || 'Impossible de soumettre la publicité.'));
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '📣 Soumettre pour validation'; }
    }
  }

  /* Initialiser la section pubs selon accréditation */
  async function initPubSection() {
    try {
      const r = await api('GET', '/accreditations/mes');
      const accreds = r.accreditations || [];
      const hasPubAccred = accreds.some(a => a.type === 'creation_publicite' && a.statut === 'active');
      const gate = document.getElementById('init-pub-gate');
      const content = document.getElementById('init-pub-content');
      if (hasPubAccred) {
        if (gate) gate.style.display = 'none';
        if (content) content.style.display = '';
        loadInitPubs();
      } else {
        if (gate) gate.style.display = '';
        if (content) content.style.display = 'none';
      }
    } catch (e) {
      console.error('initPubSection error', e);
    }
  }
  initPubSection();

})();
</script>
</body>
</html>
