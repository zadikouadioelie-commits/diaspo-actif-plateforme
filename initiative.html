<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diaspo'Actif — Profil initiative</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/styles.v2.css">
  <link rel="stylesheet" href="/assets/responsive.v2.css">
<link rel="stylesheet" href="/assets/ui-enhancements.v2.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="assets/logo.svg">
<style>
/* ===== Initiative profile card ===== */
/* overflow-x:hidden (CSS global) casse position:sticky — clip a le même effet anti-débordement
   horizontal sans créer de conteneur de défilement, ce qui préserve le comportement sticky. */
html, body{overflow-x:clip !important;}
.init-profile-wrap{max-width:1380px;margin:24px auto;padding:0 16px 48px;}

/* Layout 3 colonnes : gauche (identité/pratique) · centre · droite (action/preuve sociale) */
.init-3col{display:grid;grid-template-columns:minmax(250px,300px) minmax(0,1fr) minmax(250px,300px);gap:16px;align-items:start;}

/* Colonnes latérales statiques : elles restent visibles pendant le défilement du centre,
   avec leur propre défilement interne si leur contenu dépasse la hauteur de l'écran. */
#col-left, #col-right{
  position:sticky;top:78px;
  max-height:calc(100vh - 96px);overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#col-left::-webkit-scrollbar, #col-right::-webkit-scrollbar{width:5px;}
#col-left::-webkit-scrollbar-thumb, #col-right::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* Bannière/header statique : reste épinglée en haut pendant le défilement du contenu central. */
.init-card-header{position:sticky;top:78px;z-index:20;}

@media(max-width:1100px){
  .init-3col{grid-template-columns:1fr;}
  #col-left, #col-right{position:static;max-height:none;overflow:visible;}
  .init-card-header{position:static;}
}

/* Cartes des colonnes latérales */
.side-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.side-card h4{margin:0 0 10px;font-size:13px;font-weight:800;color:var(--navy);display:flex;align-items:center;justify-content:space-between;gap:6px;}
.side-card h4 .edit-btn{background:none;border:none;cursor:pointer;font-size:13px;color:#2563EB;padding:2px;}
.side-tag{display:inline-block;background:var(--orange-light);color:#1B3A6B;border-radius:20px;padding:4px 11px;font-size:12px;font-weight:700;margin:0 4px 6px 0;}
.side-tag.clickable{cursor:pointer;background:#fef3c7;color:#92400e;transition:opacity .15s;}
.side-tag.clickable:hover{opacity:.75;}
.side-list-item{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:12.5px;border-bottom:1px solid var(--border);}
.side-list-item:last-child{border-bottom:none;}
.equipe-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;}
.equipe-item:last-child{border-bottom:none;}
.equipe-avatar{width:36px;height:36px;border-radius:50%;background:var(--orange-light);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#1B3A6B;flex-shrink:0;overflow:hidden;}
.equipe-avatar img{width:100%;height:100%;object-fit:cover;}
.rejoindre-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border-radius:9px;font-size:13px;font-weight:700;border:1.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;text-decoration:none;margin-bottom:8px;transition:border-color .15s;}
.rejoindre-btn:hover{border-color:#2563EB;}
.rejoindre-btn.primary{background:#2563EB;color:#fff;border-color:#2563EB;}
.activite-gauge{height:10px;border-radius:6px;background:var(--bg);overflow:hidden;margin:8px 0 4px;}
.activite-gauge > div{height:100%;border-radius:6px;background:linear-gradient(90deg,#f59e0b,#22c55e);transition:width .5s;}
.avis-stars{color:#f59e0b;letter-spacing:1px;}

/* Assistant IA de l'initiative */
.ia-fab{position:fixed;bottom:88px;right:22px;z-index:800;background:#1B3A6B;color:#fff;border:none;border-radius:26px;padding:12px 18px;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;}
.ia-panel{position:fixed;bottom:88px;right:22px;z-index:801;width:340px;max-width:calc(100vw - 32px);background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.28);display:none;flex-direction:column;overflow:hidden;}
.ia-panel.open{display:flex;}
.ia-head{background:#1B3A6B;color:#fff;padding:12px 16px;font-size:13.5px;font-weight:800;display:flex;justify-content:space-between;align-items:center;}
.ia-head button{background:none;border:none;color:#fff;font-size:16px;cursor:pointer;}
.ia-msgs{max-height:320px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.ia-msg{font-size:13px;line-height:1.5;padding:9px 12px;border-radius:11px;max-width:88%;}
.ia-msg.bot{background:var(--bg);align-self:flex-start;}
.ia-msg.user{background:#2563EB;color:#fff;align-self:flex-end;}
.ia-quick{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 10px;}
.ia-quick button{font-size:11.5px;padding:5px 10px;border-radius:14px;border:1px solid var(--border);background:#fff;cursor:pointer;}
.ia-input-row{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--border);}
.ia-input-row input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;}
.ia-input-row button{background:#2563EB;color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:700;}

/* Breadcrumb */
.breadcrumb{font-size:13px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px;}
.breadcrumb a{color:#2563EB;}

/* Header card */
.init-card-header{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;}

/* Banner */
.init-banner{height:180px;position:relative;overflow:hidden;}
.init-banner-img{width:100%;height:100%;object-fit:cover;}
.init-banner-overlay{position:absolute;inset:0;background:linear-gradient(135deg,#0F2A50 0%,#1B3A6B 50%,#1565C0 100%);opacity:.88;}

/* Top-right: name + bell */
.init-banner-topright{position:absolute;top:16px;right:20px;display:flex;align-items:center;gap:12px;}
.init-banner-name{color:#fff;font-weight:800;font-size:15px;letter-spacing:.2px;text-shadow:0 1px 4px rgba(0,0,0,.4);max-width:240px;text-align:right;line-height:1.3;}
.bell-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:background .2s;flex-shrink:0;}
.bell-btn:hover,.bell-btn.active{background:rgba(255,255,255,.3);}

/* Profile header row (below banner) */
.init-profile-header{display:flex;align-items:flex-end;gap:16px;padding:0 24px 20px;margin-top:-44px;flex-wrap:wrap;}
.init-profile-logo-wrap{flex-shrink:0;}
.init-profile-logo{width:88px;height:88px;border-radius:50%;border:4px solid #fff;background:var(--orange-light);overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.15);}
.init-profile-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.init-profile-info{flex:1;min-width:200px;padding-top:44px;}
.init-profile-info h1{margin:0 0 4px;font-size:20px;font-weight:800;line-height:1.2;}
.init-profile-meta{font-size:13px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:4px;}
.init-profile-meta .sep{color:var(--border);}
.init-profile-stats{display:flex;gap:20px;margin-top:10px;}
.init-stat{text-align:center;}
.init-stat .n{font-size:18px;font-weight:800;color:var(--navy);}
.init-stat .l{font-size:11px;color:var(--muted);margin-top:1px;}
.init-profile-actions{display:flex;gap:8px;align-items:center;padding-top:20px;flex-wrap:wrap;}

/* Bottom info strip */
.init-strip{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--border);}
.init-strip-item{display:flex;align-items:center;gap:10px;padding:14px 20px;font-size:13px;font-weight:600;color:var(--muted);}
.init-strip-item:not(:last-child){border-right:1px solid var(--border);}
.strip-icon{width:36px;height:36px;border-radius:50%;background:var(--orange-light);color:#2563EB;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.strip-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:2px;}
.strip-val{font-size:13px;font-weight:600;color:var(--text);}

/* Blue info band */
.init-info-band{background:var(--navy);border-radius:var(--radius);color:#fff;display:grid;grid-template-columns:1fr 1fr 1fr;margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow);}
.info-col{padding:22px 20px;position:relative;}
.info-col:not(:last-child)::after{content:'';position:absolute;right:0;top:16px;bottom:16px;width:1px;background:rgba(255,255,255,.12);}
.info-col-icon{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px;}
.info-col-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.6);margin-bottom:8px;}
.info-col-body{font-size:13px;line-height:1.6;color:rgba(255,255,255,.88);}

/* Content sections */
.init-section{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:16px;box-shadow:var(--shadow);}
.init-section h3{margin:0 0 14px;font-size:15px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px;}
.init-section h3::after{content:'';flex:1;height:1px;background:var(--border);}

/* Publications feed */
.pub-item{padding:14px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;}
.pub-item:last-child{border-bottom:none;}
.pub-avatar{flex-shrink:0;}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.stat-box{background:var(--bg);border-radius:6px;padding:14px;text-align:center;}
.stat-box .n{font-size:22px;font-weight:800;color:var(--navy);}
.stat-box .l{font-size:11px;color:var(--muted);margin-top:2px;}

/* Badges */
.type-badge{display:inline-flex;align-items:center;background:var(--orange-light);color:#2563EB;border-radius:4px;padding:3px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}

/* Responsive */
@media(max-width:640px){
  .init-info-band{grid-template-columns:1fr;}
  .info-col:not(:last-child)::after{display:none;}
  .info-col:not(:last-child){border-bottom:1px solid rgba(255,255,255,.12);}
  .init-strip{grid-template-columns:1fr;}
  .init-strip-item:not(:last-child){border-right:none;border-bottom:1px solid var(--border);}
  .init-profile-header{flex-direction:column;align-items:flex-start;}
}
</style>
  <link rel="stylesheet" href="/assets/design-upgrade.v2.css">
  <link rel="stylesheet" href="/assets/theme-manager.css">
</head>
<body>
<div class="page">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo"><img loading="lazy" class="logo-img" src="assets/logo.svg" alt="Diaspo'Actif"> DIASPO'ACTIF</div>
      <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="annuaire.html">Annuaire</a>
        <a href="fil-actualite.html">Fil d'actualité</a>
        <a href="formations.html">Formations</a>
      </nav>
      <div class="topbar-right">
        <select class="lang-select" id="lang-select"></select>
        <div id="auth-area" class="auth-area"></div>
      </div>
    </div>
  </header>

  <div class="init-profile-wrap" id="initiative-profil">
    <div class="init-section" style="text-align:center;color:var(--muted);">Chargement du profil…</div>
  </div>
</div>

<script src="assets/data.js"></script>
<script src="assets/demo.js"></script>
<script src="assets/app.js"></script>
<script>
/* Gradient cover selon domaine */
const DOMAIN_GRAD = {
  'Technologie':'linear-gradient(135deg,#0a1628 0%,#0F2A50 50%,#1565C0 100%)',
  'Agriculture':'linear-gradient(135deg,#0a2010 0%,#1B4D2E 50%,#2E7D52 100%)',
  'Sante':'linear-gradient(135deg,#0a1a28 0%,#12344D 50%,#1565A0 100%)',
  'Culture':'linear-gradient(135deg,#1a0a28 0%,#3B1F5E 50%,#6A3DAF 100%)',
  'Entrepreneuriat':'linear-gradient(135deg,#0F1A38 0%,#1B2E6B 50%,#2855B0 100%)',
  'Education':'linear-gradient(135deg,#0a1228 0%,#1B2A5E 50%,#2563EB 100%)',
};

(async () => {
  const params = new URLSearchParams(location.search);
  const slug = params.get("id");
  const el = document.getElementById("initiative-profil");

  if (!slug) {
    el.innerHTML = `<div class="init-section">Identifiant manquant. <a href="annuaire.html">Retour à l'annuaire</a>.</div>`;
    return;
  }

  let data, me;
  try {
    [data, me] = await Promise.all([
      api("GET", "/initiatives/" + slug),
      fetchCurrentUser().catch(() => null)
    ]);
  } catch(e) {
    el.innerHTML = `<div class="init-section">Initiative introuvable. <a href="annuaire.html">Retour à l'annuaire</a>.</div>`;
    return;
  }

  const init = data.initiative;
  const nats = Array.isArray(init.nationalites_concernees) ? init.nationalites_concernees : [];
  const reseaux = (init.reseaux_sociaux && typeof init.reseaux_sociaux === 'object') ? init.reseaux_sociaux : {};
  const galerie = Array.isArray(init.galerie_json) ? init.galerie_json : [];

  let estAbonne = false;
  if (me?.role === 'utilisateur') {
    try {
      const suivis = await api("GET", "/mes-suivis");
      estAbonne = suivis.initiatives.some(i => i.id === init.id || i.slug === slug);
    } catch(e) {}
  }

  const coverGrad = DOMAIN_GRAD[init.domaine] || 'linear-gradient(135deg,#0F2A50 0%,#1B3A6B 50%,#1565C0 100%)';
  const logoUrl = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(init.nom)}&backgroundColor=1B3A6B,1565C0,24487E&fontColor=ffffff&fontSize=38`;

  const localisation = [init.ville, init.region, init.pays].filter(Boolean).join(' · ');

  document.title = `Diaspo'Actif — ${init.nom}`;

  el.innerHTML = `
    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <a href="annuaire.html">Annuaire</a>
      <span>›</span>
      <span>${init.nom}</span>
    </div>

    <div class="init-3col">
    <aside id="col-left"><div class="side-card" style="text-align:center;color:var(--muted);font-size:12px;">Chargement…</div></aside>
    <div id="col-center">

    <!-- ===== HEADER CARD ===== -->
    <div class="init-card-header">

      <!-- Banner -->
      <div class="init-banner" style="background:${coverGrad};">
        <!-- Nom en haut à droite + cloche -->
        <div class="init-banner-topright">
          <div class="init-banner-name">${init.nom}${init.sigle ? '<br><span style="font-size:12px;opacity:.75">'+init.sigle+'</span>' : ''}</div>
          ${me?.role === 'utilisateur' ? `
            <button class="bell-btn ${estAbonne ? 'active' : ''}" id="btn-suivre" title="${estAbonne ? 'Se désabonner' : 'S\'abonner'}">
              🔔
            </button>
          ` : me ? '' : `<a href="login.html" class="bell-btn" title="Connexion pour s'abonner">🔔</a>`}
        </div>
      </div>

      <!-- Row: logo + infos + boutons -->
      <div class="init-profile-header">
        <div class="init-profile-logo-wrap">
          <div class="init-profile-logo">
            <img loading="lazy" src="${logoUrl}" alt="${init.nom}">
          </div>
        </div>
        <div class="init-profile-info">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <h1>${init.nom}</h1>
            ${init.type ? `<span class="type-badge">${init.type}</span>` : ''}
            ${init.certif ? badgeCertif(init.certif) : ''}
          </div>
          <div class="init-profile-meta">
            ${init.domaine ? `<span>📂 ${init.domaine}</span>` : ''}
            ${localisation ? `<span class="sep">|</span><span>📍 ${localisation}</span>` : ''}
            ${init.site_web ? `<span class="sep">|</span><a href="${init.site_web}" target="_blank" rel="noopener" style="color:#2563EB;">🌐 Site web</a>` : ''}
          </div>
          <div class="init-profile-stats">
            <div class="init-stat">
              <div class="n" id="live-membres">${init.membres ?? 0}</div>
              <div class="l">Membres</div>
            </div>
            <div class="init-stat">
              <div class="n" id="live-abonnes">${init.abonnes ?? 0}</div>
              <div class="l">Abonnés</div>
            </div>
            <div class="init-stat">
              <div class="n">${init.vues ?? 0}</div>
              <div class="l">Vues</div>
            </div>
          </div>
        </div>
        <div class="init-profile-actions">
          ${me?.role === 'utilisateur' ? `
            <button id="btn-suivre-2" class="btn ${estAbonne ? 'btn-outline' : 'btn-orange'}" style="gap:6px;">
              🔔 ${estAbonne ? 'Abonné' : "S'abonner"}
            </button>
          ` : me ? '' : `<a href="login.html" class="btn btn-orange">🔔 S'abonner</a>`}
          <a href="messagerie.html?init=${init.id}" class="btn btn-outline">✏️ Écrire</a>
        </div>
      </div>

      <!-- ===== BOTTOM STRIP ===== -->
      <div class="init-strip">
        <div class="init-strip-item">
          <div class="strip-icon">🌍</div>
          <div>
            <div class="strip-label">Origine</div>
            <div class="strip-val">${nats.length ? nats.slice(0,2).join(', ') + (nats.length > 2 ? '…' : '') : 'Non renseigné'}</div>
          </div>
        </div>
        <div class="init-strip-item">
          <div class="strip-icon">📍</div>
          <div>
            <div class="strip-label">Pays de résidence</div>
            <div class="strip-val">${localisation || 'Non renseigné'}</div>
          </div>
        </div>
        <div class="init-strip-item" style="cursor:pointer;" onclick="document.querySelector('a[href*=messagerie]')?.click()">
          <div class="strip-icon">✏️</div>
          <div>
            <div class="strip-label">Contact</div>
            <div class="strip-val" style="color:#2563EB;">Envoyer un message</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== BANDE BLEUE : 3 colonnes ===== -->
    <div class="init-info-band">
      <div class="info-col">
        <div class="info-col-icon">🏢</div>
        <div class="info-col-title">Présentation</div>
        <div class="info-col-body">${init.description || '<em style="opacity:.6">Aucune description renseignée.</em>'}</div>
      </div>
      <div class="info-col">
        <div class="info-col-icon">⚙️</div>
        <div class="info-col-title">Nos Activités</div>
        <div class="info-col-body">${init.mission || '<em style="opacity:.6">Mission non renseignée.</em>'}</div>
      </div>
      <div class="info-col">
        <div class="info-col-icon">✅</div>
        <div class="info-col-title">Nos Atouts</div>
        <div class="info-col-body">${init.historique || (init.membres ? `Communauté de <strong>${init.membres} membres</strong> actifs.` : '<em style="opacity:.6">Historique non renseigné.</em>')}</div>
      </div>
    </div>

    <!-- ===== NATIONALITÉS ===== -->
    ${nats.length ? `
    <div class="init-section">
      <h3>🌍 Nationalités concernées</h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${nats.map(n => `<span class="tag" style="font-size:13px;padding:5px 12px;">${n}</span>`).join('')}
        ${init.nationalite_unique ? `<span class="type-badge" style="margin-left:4px;">Nationalité unique</span>` : ''}
      </div>
    </div>` : ''}

    <!-- ===== TRUST SCORE & SIGNALEMENT ===== -->
    <div class="init-section" id="init-trust-section">
      <h3>🛡️ Score de confiance</h3>
      <div id="init-trust-widget">Chargement…</div>
    </div>

    <!-- ===== PUBLICATIONS ===== -->
    <div class="init-section">
      <h3>📰 Publications récentes</h3>
      <div id="init-publications"><div style="color:var(--muted);font-size:13px;">Chargement…</div></div>
    </div>

    <!-- ===== GALERIE ===== -->
    ${galerie.length ? `
    <div class="init-section">
      <h3>🖼 Galerie</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;" id="init-galerie-grid">
        ${galerie.map((img, idx) => `
          <div class="ga-thumb" style="border-radius:6px;overflow:hidden;background:var(--bg);cursor:pointer;" onclick='openGaleriePhoto("initiative", ${init.id}, ${JSON.stringify(img.id || ('p'+idx))}, ${JSON.stringify(img.url||'')}, ${JSON.stringify(img.titre||'')}, ${JSON.stringify(img.caption||'')})'>
            <div style="height:120px;display:flex;align-items:center;justify-content:center;font-size:32px;">
              ${img.url ? `<img loading="lazy" src="${img.url}" style="width:100%;height:100%;object-fit:cover;" alt="${(img.caption||'').replace(/"/g,'&quot;')}">` : '🖼'}
            </div>

        ${init.site_web ? `<div style="display:flex;gap:10px;align-items:center;font-size:13.5px;"><span>🌐</span><a href="${init.site_web}" target="_blank" rel="noopener" style="color:#2563EB;">${init.site_web.replace(/^https?:\/\//,'')}</a></div>` : ''}

        ${reseaux.instagram ? `<div style="display:flex;gap:10px;align-items:center;font-size:13.5px;"><span>📸</span><a href="${reseaux.instagram}" target="_blank" style="color:#2563EB;">Instagram</a></div>` : ''}
        ${reseaux.linkedin ? `<div style="display:flex;gap:10px;align-items:center;font-size:13.5px;"><span>💼</span><a href="${reseaux.linkedin}" target="_blank" style="color:#2563EB;">LinkedIn</a></div>` : ''}

  /* ---- Partenaires ---- */
  (async () => {

  /* ---- Boutons s'abonner ---- */
  function bindBtn(id) {

      try {
        if (estAbonne) {
          await api("DELETE", "/initiatives/" + init.id + "/suivre");
          estAbonne = false;
        } else {
          await api("POST", "/initiatives/" + init.id + "/suivre");
          estAbonne = true;
        }
        /* Mise à jour des deux boutons */
        const b1 = document.getElementById('btn-suivre');
        const b2 = document.getElementById('btn-suivre-2');
        if (b1) b1.classList.toggle('active', estAbonne);
        if (b2) {
          b2.textContent = '🔔 ' + (estAbonne ? 'Abonné' : "S'abonner");
          b2.classList.toggle('btn-outline', estAbonne);
          b2.classList.toggle('btn-orange', !estAbonne);
        }
        const liveEl = document.getElementById('live-abonnes');
        if (liveEl) liveEl.textContent = Math.max(0, parseInt(liveEl.textContent) + (estAbonne ? 1 : -1));
      } catch(e) { alert(e.message); }
    });

  const isOwner = me && init.owner_user_id && Number(me.id) === Number(init.owner_user_id);
  const esc2 = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  /* Masquage/démasquage d'un numéro de téléphone affiché publiquement (👁 afficher / masquer) */
  window._iniPhoneN = 0;
  window.renderMaskedPhone = function(tel) {
    const t = String(tel || '');
    if (!t) return '';
    const visible = t.length > 2 ? t.slice(-2) : t;
    const masked = '•'.repeat(Math.max(t.length - visible.length, 4)) + ' ' + visible;
    const uid = 'phmask-' + (window._iniPhoneN++);
    return `<span id="${uid}" data-tel="${t.replace(/"/g,'&quot;')}" data-visible="0">${masked}</span> <button type="button" onclick="ppTogglePhone('${uid}')" title="Afficher/masquer le numéro" style="background:none;border:none;cursor:pointer;font-size:13px;padding:0 2px;">👁</button>`;
  };
  window.ppTogglePhone = function(uid) {
    const el = document.getElementById(uid);
    if (!el) return;
    const shown = el.getAttribute('data-visible') === '1';
    const tel = el.getAttribute('data-tel') || '';
    if (shown) {
      const visible = tel.length > 2 ? tel.slice(-2) : tel;
      el.textContent = '•'.repeat(Math.max(tel.length - visible.length, 4)) + ' ' + visible;
      el.setAttribute('data-visible', '0');
    } else {
      el.textContent = tel;
      el.setAttribute('data-visible', '1');
    }
  };

      await api('POST', '/demandes-relation', { membre_id: init.owner_user_id, message });
      alert("Demande envoyée. La conversation ne sera ouverte qu'après acceptation par l'organisation.");

  };

  let EQUIPE = [], SCOREACT = null, CAMPAGNES = [], AVIS = null, EVENTS = [], FORMULES = [];

    const infos = [

      : null;
    const mapQuery = !hasLatLon && (init.adresse || init.ville)
      ? encodeURIComponent([init.adresse, init.ville, init.pays].filter(Boolean).join(', ')) : null;

    document.getElementById('col-left').innerHTML = `
      <div class="side-card">

        ${EQUIPE.length ? EQUIPE.map(m => `
          <a class="equipe-item" href="profil.html?id=${m.user_id}">

            <div><div style="font-size:13px;font-weight:700;">${esc2(m.nom)}</div><div style="font-size:11px;color:var(--muted);">${esc2(m.fonction)}</div></div>

      </div>

        ${infos.length ? infos.map(([ic,val]) => `<div class="side-list-item"><span>${ic}</span><span style="flex:1;word-break:break-word;">${val}</span></div>`).join('') : '<p style="font-size:12px;color:var(--muted);margin:0;">Non renseigné.</p>'}

        <a href="https://www.openstreetmap.org/search?query=${mapQuery}" target="_blank" style="font-size:12px;color:#2563EB;">Voir la localisation sur la carte →</a>
      </div>` : ''}
    `;
  }

  function renderColRight() {
    const stats = init.stats_perso || {};

        ` : `
          ${FORMULES.length ? `<a class="rejoindre-btn primary" href="adhesions.html?init=${init.id}">🎫 Adhérer / Cotiser</a>` : ''}

      ${SCOREACT ? `<div class="side-card">

      <div class="side-card">

          <div style="text-align:center;background:var(--bg);border-radius:8px;padding:9px;"><div style="font-size:17px;font-weight:800;">${init.abonnes ?? 0}</div><div style="font-size:10px;color:var(--muted);">Abonnés</div></div>
          ${init.annee_creation ? `<div style="text-align:center;background:var(--bg);border-radius:8px;padding:9px;"><div style="font-size:17px;font-weight:800;">${init.annee_creation}</div><div style="font-size:10px;color:var(--muted);">Année de création</div></div>` : ''}
          ${Object.entries(stats).filter(([,v]) => v).map(([k,v]) => `<div style="text-align:center;background:var(--bg);border-radius:8px;padding:9px;"><div style="font-size:17px;font-weight:800;">${esc2(v)}</div><div style="font-size:10px;color:var(--muted);">${STAT_LABELS[k] || esc2(k)}</div></div>`).join('')}
        </div>

      ${EVENTS.length ? `<div class="side-card"><h4>📅 Événements à venir</h4>${EVENTS.map(e => `

      ${CAMPAGNES.length ? `<div class="side-card"><h4>📢 Campagnes en cours</h4>${CAMPAGNES.map(c => `

          ${c.objectif_membres ? `<div style="font-size:11px;color:var(--muted);">Objectif : ${c.objectif_membres} membres</div>` : ''}
          <a href="adhesions.html?init=${init.id}" class="btn btn-orange" style="font-size:11px;padding:5px 12px;margin-top:5px;display:inline-block;">Participer</a>
        </div>`).join('')}</div>` : ''}
      <div class="side-card">
        <h4><span>📂 Réalisations</span> ${editBtn('realisations')}</h4>
        ${reals.length ? reals.map(r => `<div class="side-list-item"><span>✔️</span><div style="flex:1;"><div style="font-weight:700;font-size:12.5px;">${esc2(r.titre)}</div>${r.annee ? `<div style="font-size:11px;color:var(--muted);">${esc2(r.annee)}</div>` : ''}</div></div>`).join('') : '<p style="font-size:12px;color:var(--muted);margin:0;">Aucune réalisation renseignée.</p>'}
      </div>
      ${AVIS && (AVIS.avis || []).length ? `<div class="side-card"><h4>💬 Témoignages</h4>
        ${AVIS.moyenne ? `<div style="font-size:12px;margin-bottom:6px;"><span class="avis-stars">${'★'.repeat(Math.round(AVIS.moyenne))}${'☆'.repeat(5 - Math.round(AVIS.moyenne))}</span> ${AVIS.moyenne}/5 (${AVIS.total})</div>` : ''}
        ${AVIS.avis.slice(0,3).map(a => `<div style="padding:7px 0;border-bottom:1px solid var(--border);">
          <div class="avis-stars" style="font-size:11px;">${'★'.repeat(a.note)}${'☆'.repeat(5 - a.note)}</div>
          ${a.commentaire ? `<div style="font-size:12px;line-height:1.4;">« ${esc2(a.commentaire.slice(0,110))}${a.commentaire.length > 110 ? '…' : ''} »</div>` : ''}
          <div style="font-size:10.5px;color:var(--muted);">${esc2([a.prenom, a.nom].filter(Boolean).join(' '))}</div>
        </div>`).join('')}</div>` : ''}
      ${(init.documents || []).length ? `<div class="side-card"><h4>📄 Documents</h4>${init.documents.map(d => `
        <div class="side-list-item"><span>📄</span><span style="flex:1;">${esc2(d.titre)}</span><a href="${esc2(d.url)}" target="_blank" rel="noopener" style="font-size:11px;font-weight:700;color:#2563EB;">Télécharger</a></div>`).join('')}</div>` : ''}
      ${isOwner ? `<div class="side-card">
        <h4>🤖 Assistant IA</h4>
        <label style="display:flex;align-items:center;gap:8px;font-size:12.5px;cursor:pointer;">
          <input type="checkbox" id="assistant-toggle" ${init.assistant_actif ? 'checked' : ''} onchange="toggleAssistant(this.checked)">
          Activer l'assistant pour les visiteurs
        </label>
      </div>` : ''}
    `;
  }

  renderColLeft();
  renderColRight();
  if (galerie.length && typeof loadGaleriePhotoCounts === 'function') loadGaleriePhotoCounts('initiative', init.id);

  /* ══ ÉDITION INLINE (propriétaire) ══ */
  const PUBLICS_PRESETS = ['Diaspora','Entrepreneurs','Étudiants','Associations','Collectivités','Jeunes','Femmes','Agriculteurs','Professionnels','Familles'];
  const BESOINS_PRESETS = ['partenaires','bénévoles','investisseurs','sponsors','experts','membres','fournisseurs'];

  async function saveProfil(payload) {
    await api('PUT', `/initiatives/${init.id}/profil-public`, payload);
    const r = await api('GET', `/initiatives/${init.id}`);
    Object.assign(init, r.initiative);
    renderColLeft(); renderColRight();
  }

  function openEditModal(titre, bodyHtml, onSave) {
    const ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 14px;';
    ov.innerHTML = `<div style="background:#fff;border-radius:14px;max-width:440px;width:100%;padding:20px;">
      <h3 style="margin:0 0 14px;font-size:15px;">${titre}</h3>
      <div id="edit-modal-body">${bodyHtml}</div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
        <button class="btn btn-outline" id="edit-cancel">Annuler</button>
        <button class="btn btn-orange" id="edit-save">Enregistrer</button>
      </div></div>`;
    document.body.appendChild(ov);
    ov.querySelector('#edit-cancel').onclick = () => ov.remove();
    ov.querySelector('#edit-save').onclick = async () => {
      try { await onSave(ov); ov.remove(); } catch (e) { alert(e.message || 'Erreur.'); }
    };
  }

  function pillsHtml(presets, selected, cls) {
    return `<div style="display:flex;flex-wrap:wrap;gap:6px;">${presets.map(p =>
      `<label style="display:inline-flex;align-items:center;gap:5px;border:1.5px solid ${selected.includes(p) ? '#2563EB' : 'var(--border)'};border-radius:18px;padding:6px 12px;font-size:12.5px;cursor:pointer;${selected.includes(p) ? 'background:#eff6ff;font-weight:700;' : ''}">
        <input type="checkbox" class="${cls}" value="${esc2(p)}" ${selected.includes(p) ? 'checked' : ''} style="accent-color:#2563EB;"> ${esc2(p)}
      </label>`).join('')}</div>
      <input type="text" id="${cls}-autre" placeholder="Autres (séparés par des virgules)" style="width:100%;margin-top:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;"
        value="${esc2(selected.filter(s => !presets.includes(s)).join(', '))}">`;
  }

  function readPills(ov, cls) {
    const checked = [...ov.querySelectorAll('.' + cls + ':checked')].map(c => c.value);
    const autres = (ov.querySelector('#' + cls + '-autre')?.value || '').split(',').map(s => s.trim()).filter(Boolean);
    return [...checked, ...autres];
  }

  window.editSection = function (section) {
    if (section === 'publics') {
      openEditModal('🎯 Public concerné', pillsHtml(PUBLICS_PRESETS, init.publics || [], 'ep-pub'),
        ov => saveProfil({ publics: readPills(ov, 'ep-pub') }));
    } else if (section === 'besoins') {
      openEditModal('🤝 Recherche actuellement', pillsHtml(BESOINS_PRESETS, init.besoins || [], 'ep-bes'),
        ov => saveProfil({ besoins: readPills(ov, 'ep-bes') }));
    } else if (section === 'zones') {
      const zones = Array.isArray(init.pays_intervention_arr) ? init.pays_intervention_arr : [];
      openEditModal("🌍 Zones d'intervention",
        `<p style="font-size:12px;color:var(--muted);margin:0 0 8px;">Pays, régions ou villes, séparés par des virgules.</p>
         <input type="text" id="ez-zones" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;" value="${esc2(zones.join(', '))}" placeholder="France, Côte d'Ivoire, Sénégal…">`,
        ov => saveProfil({ pays_intervention: ov.querySelector('#ez-zones').value.split(',').map(s => s.trim()).filter(Boolean) }));
    } else if (section === 'services') {
      openEditModal('💼 Services proposés',
        `<textarea id="es-serv" rows="5" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;" placeholder="Conseil, Formation, Accompagnement…">${esc2(init.vitrine_services || '')}</textarea>`,
        ov => saveProfil({ vitrine_services: ov.querySelector('#es-serv').value }));
    } else if (section === 'stats') {
      const s = init.stats_perso || {};
      const champs = [['projets','Projets réalisés'],['formations','Formations dispensées'],['pays_couverts','Pays couverts'],['partenaires','Partenaires'],['benevoles','Bénévoles actifs']];
      openEditModal('📈 Statistiques',
        champs.map(([k,l]) => `<label style="display:block;font-size:12px;font-weight:700;margin:8px 0 3px;">${l}</label>
          <input type="number" min="0" id="est-${k}" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;" value="${s[k] ?? ''}">`).join('') +
        `<label style="display:block;font-size:12px;font-weight:700;margin:8px 0 3px;">Année de création</label>
         <input type="number" id="est-annee" min="1900" max="2100" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;" value="${init.annee_creation ?? ''}">`,
        ov => {
          const stats = {};
          champs.forEach(([k]) => { const v = ov.querySelector('#est-' + k).value; if (v) stats[k] = parseInt(v); });
          return saveProfil({ stats_perso: stats, annee_creation: ov.querySelector('#est-annee').value || undefined });
        });
    } else if (section === 'realisations') {
      const reals = init.realisations || [];
      openEditModal('📂 Réalisations',
        `<p style="font-size:12px;color:var(--muted);margin:0 0 8px;">Une réalisation par ligne, format : <em>Titre | Année</em> (année facultative).</p>
         <textarea id="er-reals" rows="6" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;" placeholder="Construction d'une école | 2024\nFormation de 500 entrepreneurs">${esc2(reals.map(r => r.titre + (r.annee ? ' | ' + r.annee : '')).join('\n'))}</textarea>`,
        ov => saveProfil({
          realisations: ov.querySelector('#er-reals').value.split('\n').map(l => l.trim()).filter(Boolean).map(l => {
            const [titre, annee] = l.split('|').map(s => s.trim());
            return annee ? { titre, annee } : { titre };
          })
        }));
    }
  };

  window.toggleAssistant = async function (actif) {
    try { await api('PUT', `/initiatives/${init.id}/profil-public`, { assistant_actif: actif }); init.assistant_actif = actif ? 1 : 0; renderAssistant(); }
    catch (e) { alert(e.message); }
  };

  /* ══ ASSISTANT IA DE L'INITIATIVE (règles/intents, données du profil) ══ */
  function assistantReponse(q) {
    const t = q.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    const has = (...words) => words.some(w => t.includes(w));
    if (has('que faites', 'quoi', 'presentation', 'mission', 'c est quoi', 'qui etes')) {
      return init.description || init.mission || `${init.nom} est une initiative ${init.domaine ? 'dans le domaine ' + init.domaine : ''} basée à ${init.ville || init.pays || '—'}.`;
    }
    if (has('adher', 'cotis', 'membre', 'inscrire', 'rejoindre')) {
      return FORMULES.length
        ? `Nous proposons ${FORMULES.length} formule(s) d'adhésion : ${FORMULES.map(f => f.nom).join(', ')}. <a href="adhesions.html?init=${init.id}" style="color:#2563EB;font-weight:700;">Adhérer maintenant →</a>`
        : `Pour rejoindre ${init.nom}, contactez-nous directement via la messagerie.`;
    }
    if (has('don', 'soutenir', 'aider financ')) {
      const don = FORMULES.find(f => ['don_libre','don_ponctuel'].includes(f.type_contribution));
      return don ? `Vous pouvez faire un don via notre formule « ${don.nom} ». <a href="adhesions.html?init=${init.id}" style="color:#2563EB;font-weight:700;">Faire un don →</a>`
                 : `Contactez-nous via la messagerie pour soutenir ${init.nom}.`;
    }
    if (has('evenement', 'event', 'prochain', 'agenda')) {
      return EVENTS.length
        ? `Prochains événements : ${EVENTS.map(e => `${e.titre} (${(e.date_debut||'').slice(0,10)})`).join(' · ')}.`
        : `Aucun événement à venir pour le moment — abonnez-vous pour être informé.`;
    }
    if (has('partenaire', 'partenariat', 'collabor', 'benevol', 'volontaire')) {
      const b = init.besoins || [];
      return (b.length ? `Nous recherchons actuellement : ${b.join(', ')}. ` : '') +
        `<button onclick="contacterBesoin('Proposition de partenariat / bénévolat')" style="color:#2563EB;font-weight:700;background:none;border:none;cursor:pointer;padding:0;">Nous contacter →</button>`;
    }
    if (has('service', 'prestation', 'proposez', 'offre')) {
      return init.vitrine_services ? `Nos services : ${init.vitrine_services}` : `Consultez notre profil ou contactez-nous pour découvrir nos services.`;
    }
    if (has('contact', 'joindre', 'telephone', 'mail', 'adresse', 'horaire', 'ou etes')) {
      const parts = [
        (init.vitrine_tel_pro || init.tel_responsable) && '📞 ' + (init.vitrine_tel_pro || init.tel_responsable),
        (init.vitrine_email_pro || init.email_responsable) && '✉️ ' + (init.vitrine_email_pro || init.email_responsable),
        init.vitrine_horaires && '🕒 ' + init.vitrine_horaires,
        (init.adresse || init.ville) && '📍 ' + [init.adresse, init.ville, init.pays].filter(Boolean).join(', '),
      ].filter(Boolean);
      return parts.length ? parts.join('<br>') : `Contactez-nous via la <a href="messagerie.html?init=${init.id}" style="color:#2563EB;">messagerie Diaspo'Actif</a>.`;
    }
    return `Je n'ai pas trouvé de réponse précise à votre question. Vous pouvez <a href="messagerie.html?init=${init.id}" style="color:#2563EB;font-weight:700;">écrire directement à ${esc2(init.nom)}</a> — l'équipe vous répondra.`;
  }

  function renderAssistant() {
    document.getElementById('ia-fab')?.remove();
    document.getElementById('ia-panel')?.remove();
    if (!init.assistant_actif) return;
    const fab = document.createElement('button');
    fab.id = 'ia-fab'; fab.className = 'ia-fab';
    fab.innerHTML = `🤖 Poser une question`;
    const panel = document.createElement('div');
    panel.id = 'ia-panel'; panel.className = 'ia-panel';
    panel.innerHTML = `
      <div class="ia-head"><span>🤖 Assistant de ${esc2(init.nom)}</span><button id="ia-close">✕</button></div>
      <div class="ia-msgs" id="ia-msgs">
        <div class="ia-msg bot">Bonjour ! 👋 Je réponds à vos questions sur ${esc2(init.nom)}.</div>
      </div>
      <div class="ia-quick">
        <button data-q="Que faites-vous ?">Que faites-vous ?</button>
        <button data-q="Comment adhérer ?">Comment adhérer ?</button>
        <button data-q="Quels sont vos prochains événements ?">Prochains événements</button>
        <button data-q="Comment devenir partenaire ?">Devenir partenaire</button>
      </div>
      <div class="ia-input-row">
        <input type="text" id="ia-input" placeholder="Votre question…">
        <button id="ia-send">➤</button>
      </div>`;
    document.body.append(fab, panel);

    const msgs = panel.querySelector('#ia-msgs');
    function poser(q) {
      if (!q.trim()) return;
      msgs.insertAdjacentHTML('beforeend', `<div class="ia-msg user">${esc2(q)}</div>`);
      msgs.insertAdjacentHTML('beforeend', `<div class="ia-msg bot">${assistantReponse(q)}</div>`);
      msgs.scrollTop = msgs.scrollHeight;
    }
    fab.onclick = () => { panel.classList.add('open'); fab.style.display = 'none'; };
    panel.querySelector('#ia-close').onclick = () => { panel.classList.remove('open'); fab.style.display = ''; };
    panel.querySelectorAll('.ia-quick button').forEach(b => b.onclick = () => poser(b.dataset.q));
    panel.querySelector('#ia-send').onclick = () => { const i = panel.querySelector('#ia-input'); poser(i.value); i.value = ''; };
    panel.querySelector('#ia-input').addEventListener('keydown', e => { if (e.key === 'Enter') { poser(e.target.value); e.target.value = ''; } });
  }
  renderAssistant();
})();
</script>

</body>
